<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Night Market — 夜市</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700;9..40,900&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/nightMarket-DrhnWzdv.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/assets/nightMarket-D8Z2PClX.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header id="hero">
      <div class="hero-inner">
        <h1 class="hero-zh">夜市</h1>
        <p class="hero-en">Taiwan Night Market</p>
        <p class="hero-sub">Can you name all 30 dishes? Click a photo to find out.</p>
      </div>
      <div class="hero-stats">
        <button id="mode-toggle" class="mode-btn">
          <span class="mode-icon">&#x1F4D6;</span>
          <span id="mode-label">Study Mode</span>
        </button>
        <div id="progress-hud">
          <span id="progress-text">0 / 30 studied</span>
        </div>
      </div>
    </header>

    <!-- Food Grid -->
    <main id="food-grid"></main>

    <!-- Detail Modal -->
    <div id="detail-overlay" class="overlay hidden">
      <div id="detail-panel" class="modal-panel">
        <button class="modal-close" data-close="detail">&times;</button>
        <div id="detail-photos" class="photo-row"></div>
        <div class="modal-body">
          <h1 id="detail-zh" class="modal-zh"></h1>
          <h2 id="detail-en" class="modal-en"></h2>
          <div class="detail-section">
            <span class="label">Ingredients</span>
            <div id="detail-ingredients" class="pill-row"></div>
          </div>
          <div class="detail-section">
            <span class="label">Origin</span>
            <p id="detail-origin" class="body-text"></p>
          </div>
          <div class="detail-section">
            <span class="label">How It's Made</span>
            <p id="detail-notes" class="body-text"></p>
          </div>
          <div class="detail-section">
            <span class="label">Trivia</span>
            <p id="detail-trivia-q" class="body-text trivia-q"></p>
            <button id="detail-reveal" class="reveal-btn">Reveal Answer</button>
            <p id="detail-trivia-a" class="body-text trivia-a hidden"></p>
          </div>
          <button id="detail-quiz-btn" class="quiz-cta">Quiz Me On This</button>
        </div>
      </div>
    </div>

    <!-- Quiz Modal -->
    <div id="quiz-overlay" class="overlay hidden">
      <div id="quiz-panel" class="modal-panel quiz-modal">
        <button class="modal-close" data-close="quiz">&times;</button>
        <div id="quiz-photos" class="photo-row"></div>
        <div class="modal-body">
          <p id="quiz-prompt" class="quiz-prompt">What dish is this?</p>
          <div id="quiz-choices" class="quiz-choices"></div>
          <div id="quiz-feedback" class="quiz-feedback hidden"></div>
          <div id="quiz-trivia" class="hidden">
            <p id="trivia-question" class="quiz-prompt"></p>
            <div id="trivia-choices" class="quiz-choices"></div>
          </div>
          <button id="quiz-next" class="quiz-next hidden">Next</button>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
