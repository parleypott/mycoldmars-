ant nations and has been a focal point of freedom of navigation operations conducted by the U.S. Navy."],"sources":["Permanent Court of Arbitration — The South China Sea Arbitration (The Republic of Philippines v. The People's Republic of China) Award of 12 July 2016 · https://pca-cpa.org/en/cases/7/","U.S. Energy Information Administration — Territorial disputes in the South China Sea, geographic features and formations · https://www.eia.gov/international/analysis/regions-of-interest/South_China_Sea","CIA World Factbook — Spratly Islands geographic location and regional context · https://www.cia.gov/the-world-factbook/countries/spratly-islands/","Asia Maritime Transparency Initiative — Scarborough Reef occupation and settlement status · https://amti.csis.org/scarborough-shoal/","U.S. Department of Defense — Freedom of Navigation Operations in the South China Sea · https://www.defense.gov/News/Releases/"]},"Senegal":{"clues":["This nation hosts the regional headquarters of the West African Economic and Monetary Union and uses the CFA franc as its official currency.","The Casamance River flows through the southern region, separated from the north by a narrow territorial intrusion along the Gambia River valley.","It shares borders with Mauritania to the north and Guinea-Bissau to the south.","Capital city starts with 'D'.","The island of Gorée, a UNESCO World Heritage Site off the coast, served as one of the largest slave-trading centers from the 15th to 19th century."],"sources":["CIA World Factbook — Senegal economy and currency information · https://www.cia.gov/the-world-factbook/countries/senegal/","Britannica — Geography of Senegal including Casamance River · https://www.britannica.com/place/Senegal","CIA World Factbook — Senegal international borders · https://www.cia.gov/the-world-factbook/countries/senegal/","CIA World Factbook — Senegal capital city · https://www.cia.gov/the-world-factbook/countries/senegal/","UNESCO World Heritage Centre — Island of Gorée · https://whc.unesco.org/en/list/26/"]},"Serranilla Bank":{"clues":["This disputed maritime feature is claimed by Colombia, Nicaragua, Honduras, and the United States, with Colombia maintaining a lighthouse and naval presence despite ICJ rulings favoring Nicaragua's territorial waters.","The submerged coral reef banks cover approximately 1,200 square kilometers and rise from ocean depths exceeding 1,000 meters, with only small portions breaking the surface at low tide.","Located in the Caribbean Sea approximately 350 kilometers northeast of Nicaragua's coast and 280 kilometers east of the Honduran coastline.","The controlling nation's capital city starts with 'B'.","The lighthouse keeper stationed here is typically the only human inhabitant of this remote coral atoll, resupplied periodically by naval vessels from the administering country."],"sources":["CIA World Factbook — Serranilla Bank sovereignty disputes and territorial claims · https://www.cia.gov/the-world-factbook/countries/colombia/","Britannica — Serranilla Bank geographic characteristics and coral reef structure · https://www.britannica.com/place/Serranilla-Bank","CIA World Factbook — Geographic location in Caribbean Sea relative to Nicaragua and Honduras · https://www.cia.gov/the-world-factbook/countries/colombia/","CIA World Factbook — Bogotá as capital of administering nation Colombia · https://www.cia.gov/the-world-factbook/countries/colombia/","Colombia Navy — Lighthouse operations and naval presence on Serranilla Bank · https://www.armada.mil.co/"]},"Seychelles":{"clues":["This nation hosts a Chinese satellite and space tracking station as part of the Belt and Road Initiative, raising strategic concerns among Western powers about monitoring capabilities in the Indian Ocean.","Consisting of 115 granite and coral islands, this archipelago includes Aldabra, the world's second-largest coral atoll and a UNESCO World Heritage Site.","Located in the western Indian Ocean, this island nation lies northeast of Madagascar and east of mainland Africa.","Capital city starts with 'V'.","This tropical paradise is home to the Coco de Mer palm, which produces the largest seed in the plant kingdom, weighing up to 25 kilograms."],"sources":["Center for Strategic and International Studies — China's Space Tracking Station in the Indian Ocean · https://www.csis.org/analysis/chinas-space-tracking-stations-and-us-indo-pacific-strategy","UNESCO World Heritage Centre — Aldabra Atoll · https://whc.unesco.org/en/list/185/","CIA World Factbook — Geography: Location in the Indian Ocean · https://www.cia.gov/the-world-factbook/countries/seychelles/","Britannica — Victoria, capital city · https://www.britannica.com/place/Victoria-national-capital-Seychelles","Royal Botanic Gardens Kew — Coco de Mer: The World's Largest Seed · https://www.kew.org/read-and-watch/coco-de-mer-largest-seed"]},"Siachen Glacier":{"clues":["This disputed territorial zone has been the world's highest battlefield, with military positions maintained above 20,000 feet since 1984.","The glacier itself stretches approximately 76 kilometers in length and lies in the eastern Karakoram range of the Himalayas.","This territory is claimed by both India and Pakistan, with the Line of Control extending to this region.","The nearest significant settlement under Indian administration starts with 'L'.","This frozen wasteland has been called the highest and coldest battlefield on Earth, where more soldiers have died from weather than combat."],"sources":["Britannica — Siachen Glacier military conflict history · https://www.britannica.com/place/Siachen-Glacier","National Geographic — Siachen Glacier physical dimensions and location · https://www.nationalgeographic.com/environment/article/siachen-glacier-himalayas-conflict","Council on Foreign Relations — India-Pakistan territorial disputes · https://www.cfr.org/global-conflict-tracker/conflict/conflict-between-india-and-pakistan","Britannica — Leh district administrative information · https://www.britannica.com/place/Leh-district-India","BBC News — Siachen Glacier conditions and casualties · https://www.bbc.com/news/world-asia-india-17361672"]},"Sierra Leone":{"clues":["This nation was founded by freed American slaves and became a key supplier of iron ore during the 20th century, though its vast diamond reserves fueled a devastating civil war from 1991 to 2002.","The Loma Mountains rise in the northeast near the border, containing the highest peak in West Africa outside of Cameroon at 1,948 meters.","It shares land borders with Guinea to the north and northeast, and Liberia to the southeast.","Capital city starts with 'F'.","This country was the epicenter of the 2014-2016 West African Ebola epidemic, which began in the eastern forest region and spread internationally."],"sources":["Britannica — Sierra Leone history, colonization by freed slaves, and civil war 1991-2002 · https://www.britannica.com/place/Sierra-Leone","Britannica — Loma Mountains and Bintumani peak elevation · https://www.britannica.com/place/Sierra-Leone/Relief","CIA World Factbook — Sierra Leone borders with Guinea and Liberia · https://www.cia.gov/the-world-factbook/countries/sierra-leone/","CIA World Factbook — Sierra Leone capital Freetown · https://www.cia.gov/the-world-factbook/countries/sierra-leone/","WHO — West African Ebola epidemic 2014-2016 origins · https://www.who.int/emergencies/disease-outbreak-news/item/2014_08_08-ebola"]},"Singapore":{"clues":["This territory operates one of the world's busiest container ports by throughput and serves as a critical transshipment hub connecting East Asian and South Asian maritime trade routes.","The main island features a central plateau with the highest point reaching only 163 meters above sea level, surrounded by roughly 64 smaller islands and islets.","This territory shares maritime borders with Malaysia to the north across a narrow strait and with Indonesia to the south.","Capital city starts with 'S'.","The Merlion statue, depicting a creature with a lion's head and a fish's body, has become an iconic symbol at the mouth of this territory's river."],"sources":["World Shipping Council — Container Port Rankings by Total Throughput · https://www.worldshipping.org/top-50-ports","CIA World Factbook — Singapore Geography · https://www.cia.gov/the-world-factbook/countries/singapore/","Britannica — Singapore: Land and Boundaries · https://www.britannica.com/place/Singapore","CIA World Factbook — Singapore Capital · https://www.cia.gov/the-world-factbook/countries/singapore/","Singapore Tourism Board — The Merlion · https://www.visitsingapore.com/see-do-singapore/recreation-leisure/viewpoints/merlion-park/"]},"Sint Maarten":{"clues":["This territory is one of only four constituent countries within the Kingdom of the Netherlands, holding autonomous status in internal affairs while the kingdom handles defense and foreign policy.","The territory occupies the southern portion of an island with a highest elevation of approximately 344 meters at Sentry Hill, featuring volcanic terrain and several salt ponds including the Great Salt Pond.","This territory shares a land border with the French overseas collectivity of Saint Martin on the same island, surrounded by the Caribbean Sea.","Capital city starts with 'P'.","Princess Juliana International Airport is famous worldwide for its dramatic low-altitude aircraft approaches directly over Maho Beach, making it a legendary aviation spotting location."],"sources":["Government of the Netherlands — Constitutional Status of Caribbean Countries · https://www.government.nl/topics/caribbean-parts-of-the-kingdom/the-caribbean-parts-of-the-kingdom-of-the-netherlands","Britannica — Sint Maarten Geography and Terrain · https://www.britannica.com/place/Sint-Maarten","CIA World Factbook — Sint Maarten Borders and Maritime Claims · https://www.cia.gov/the-world-factbook/countries/sint-maarten/","Government of Sint Maarten — Philipsburg as Capital · https://www.sintmaartengov.org/","Travel + Leisure — Maho Beach and Princess Juliana Airport · https://www.travelandleisure.com/travel-guide/st-maarten/maho-beach"]},"Slovakia":{"clues":["This landlocked nation joined the Eurozone in 2009 and became the world's largest per-capita car producer by 2018, with major plants from Volkswagen, Peugeot, Kia, and Jaguar Land Rover.","The Carpathian Mountains dominate the northern landscape, while the Danube River forms much of its southern border before turning sharply north at Štúrovo.","This country shares borders with Poland to the north and Hungary to the south.","Capital city starts with 'B'.","The iconic Spiš Castle, one of Europe's largest castle complexes, overlooks the countryside from its hilltop position and appears on the UNESCO World Heritage List."],"sources":["CIA World Factbook — Slovakia economy and automotive industry data · https://www.cia.gov/the-world-factbook/countries/slovakia/","Britannica — Slovakia physical geography, Carpathian Mountains and Danube River · https://www.britannica.com/place/Slovakia/Relief","CIA World Factbook — Slovakia international borders and neighboring countries · https://www.cia.gov/the-world-factbook/countries/slovakia/","Britannica — Bratislava capital city of Slovakia · https://www.britannica.com/place/Bratislava","UNESCO World Heritage Centre — Spiš Castle and associated cultural monuments · https://whc.unesco.org/en/list/620/"]},"Slovenia":{"clues":["This former Yugoslav republic was the first to declare independence in 1991 and had the shortest Ten-Day War before achieving sovereignty.","The Julian Alps dominate the northwestern landscape, including Mount Triglav at 2,864 meters, the highest peak in the eastern range of this mountain system.","Borders Italy to the west and Austria to the north.","Capital city starts with 'L'.","Lake Bled, featuring a picturesque island church and medieval clifftop castle, is one of Europe's most photographed alpine lakes."],"sources":["Britannica — Slovenia's declaration of independence on June 25, 1991 and the Ten-Day War · https://www.britannica.com/place/Slovenia/Independence","Britannica — Mount Triglav in the Julian Alps as Slovenia's highest peak at 2,864 meters · https://www.britannica.com/place/Slovenia/Relief","CIA World Factbook — Slovenia borders Italy, Austria, Hungary, and Croatia · https://www.cia.gov/the-world-factbook/countries/slovenia/","CIA World Factbook — Ljubljana as the capital of Slovenia · https://www.cia.gov/the-world-factbook/countries/slovenia/","Britannica — Lake Bled as a major tourist attraction with island church and castle · https://www.britannica.com/place/Lake-Bled"]},"Solomon Islands":{"clues":["This nation switched diplomatic recognition from Taiwan to the People's Republic of China in 2019, receiving substantial infrastructure investment in return.","This archipelago contains over 900 volcanic islands stretching across a double chain formation, with several active volcanoes including Kavachi, an undersea volcano.","This archipelago lies to the east of the world's second-largest island across open water, and northwest of Vanuatu, scattered across the southwestern Pacific Ocean.","Capital city starts with 'H'.","During World War II, the Battle of Guadalcanal was fought here from 1942-1943, marking a major turning point in the Pacific theater."],"sources":["BBC News — Solomon Islands switches ties from Taiwan to China · https://www.bbc.com/news/world-asia-49700090","Britannica — Solomon Islands geography and volcanic formation · https://www.britannica.com/place/Solomon-Islands","CIA World Factbook — Solomon Islands location and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/solomon-islands/","Britannica — Honiara capital city of Solomon Islands · https://www.britannica.com/place/Honiara","National WWII Museum — Battle of Guadalcanal history · https://www.nationalww2museum.org/war/articles/battle-guadalcanal"]},"Somalia":{"clues":["This nation hosts one of the world's most active piracy zones, with the International Maritime Bureau documenting hundreds of incidents in its waters during the peak years of 2008-2012.","The territory features the longest coastline on mainland Africa, stretching approximately 3,025 kilometers along the Indian Ocean and Gulf of Aden.","This country shares borders with Kenya to the southwest and Djibouti to the northwest.","Capital city starts with 'M'.","This nation is considered the historic origin of frankincense and myrrh, aromatic resins that were among the most valuable trade goods in the ancient world."],"sources":["International Maritime Bureau — Piracy and Armed Robbery Report documenting East African maritime security incidents · https://www.icc-ccs.org/","CIA World Factbook — Somalia geography entry noting 3,025 km coastline measurement · https://www.cia.gov/the-world-factbook/countries/somalia/","CIA World Factbook — Somalia border countries listing Kenya and Djibouti · https://www.cia.gov/the-world-factbook/countries/somalia/","Britannica — Somalia country profile identifying Mogadishu as capital · https://www.britannica.com/place/Somalia","Britannica — Frankincense and myrrh historical trade from Horn of Africa region · https://www.britannica.com/plant/frankincense"]},"Somaliland":{"clues":["This self-declared state issues its own currency, the shilling, and maintains its own military despite lacking international recognition since 1991.","The Golis mountain range runs east-west through the interior, with the Daallo escarpment rising sharply from the coastal plains along the Gulf of Aden.","It borders Ethiopia to the south and west, and Djibouti to the northwest.","Capital city starts with 'H'.","Ancient rock art depicting cattle, giraffes, and other animals dating back thousands of years can be found at the Laas Geel cave complex."],"sources":["BBC News — Somaliland profile: Self-declared state's political status and institutions · https://www.bbc.com/news/world-africa-14115069","Britannica — Geography and topography of the Horn of Africa region including mountain ranges · https://www.britannica.com/place/Somalia/Relief","CIA World Factbook — International borders and neighboring countries · https://www.cia.gov/the-world-factbook/countries/somalia/","Britannica — Capital city identification · https://www.britannica.com/place/Hargeysa","UNESCO — Laas Geel rock art site and Neolithic cave paintings · https://whc.unesco.org/en/tentativelists/5589/"]},"South Africa":{"clues":["This nation is the only country in the world to have voluntarily dismantled its nuclear weapons program, completing the process in 1991.","The Drakensberg mountain range forms a natural barrier along its eastern border, with peaks exceeding 3,000 meters in elevation.","It shares borders with Namibia to the northwest and Mozambique to the northeast.","Capital city starts with 'P'.","Table Mountain, overlooking one of its major coastal cities, is one of the most photographed landmarks on the continent."],"sources":["Arms Control Association — South Africa and the Nuclear Non-Proliferation Treaty · https://www.armscontrol.org/factsheets/safricanuclear","Encyclopædia Britannica — Drakensberg Mountains · https://www.britannica.com/place/Drakensberg","CIA World Factbook — South Africa Geography · https://www.cia.gov/the-world-factbook/countries/south-africa/","Encyclopædia Britannica — Pretoria · https://www.britannica.com/place/Pretoria","UNESCO World Heritage Centre — Table Mountain · https://whc.unesco.org/en/tentativelists/1741/"]},"South Georgia and the Islands":{"clues":["This territory was the site of a critical battle in 1982 when British forces retook it from occupying forces during a South Atlantic conflict.","Mountainous and glaciated, this territory features the Allardyce Range with peaks exceeding 2,900 meters and deeply indented fjord-like bays along its coastline.","Located in the South Atlantic Ocean, approximately 1,400 kilometers east-southeast of the Falkland Islands.","The capital settlement starts with 'K'.","This remote territory is home to massive colonies of king penguins and elephant seals, making it one of the world's most important wildlife sanctuaries in the subantarctic region."],"sources":["Britannica — South Georgia and the South Sandwich Islands history and 1982 conflict · https://www.britannica.com/place/South-Georgia-and-the-South-Sandwich-Islands","CIA World Factbook — South Georgia and South Sandwich Islands terrain and geography · https://www.cia.gov/the-world-factbook/countries/south-georgia-and-south-sandwich-islands/","CIA World Factbook — South Georgia and South Sandwich Islands location relative to Falkland Islands · https://www.cia.gov/the-world-factbook/countries/south-georgia-and-south-sandwich-islands/","Britannica — King Edward Point administrative center · https://www.britannica.com/place/South-Georgia-and-the-South-Sandwich-Islands","South Georgia Heritage Trust — Wildlife including king penguins and elephant seals · https://www.sght.org/south-georgia/wildlife/"]},"South Korea":{"clues":["This territory hosts the world's most heavily fortified border, a 4-kilometer-wide demilitarized zone established by the 1953 armistice agreement that technically left two nations still at war.","The mountainous Taebaek range runs along the eastern coast, while the territory's western plains are fed by the Han River flowing into the Yellow Sea.","This peninsula territory borders China across the Yellow Sea to the west and is separated from the Japanese archipelago to the southeast by a narrow strait.","Capital city starts with 'S'.","This territory is the birthplace of K-pop, taekwondo, and kimchi, a fermented vegetable dish recognized by UNESCO as Intangible Cultural Heritage."],"sources":["Britannica — Korean Demilitarized Zone article describing the 1953 armistice and 4-km wide buffer zone · https://www.britannica.com/place/demilitarized-zone-Korean-peninsula","CIA World Factbook — South Korea geography section detailing Taebaek Mountains and Han River · https://www.cia.gov/the-world-factbook/countries/korea-south/","CIA World Factbook — South Korea geography section listing maritime boundaries with Yellow Sea and Korea Strait · https://www.cia.gov/the-world-factbook/countries/korea-south/","CIA World Factbook — South Korea capital listing Seoul · https://www.cia.gov/the-world-factbook/countries/korea-south/","UNESCO — Kimjang inscribed on Representative List of Intangible Cultural Heritage · https://ich.unesco.org/en/RL/kimjang-making-and-sharing-kimchi-in-the-republic-of-korea-00881"]},"South Sudan":{"clues":["This nation became the world's newest internationally recognized sovereign state when it gained independence through a referendum in 2011.","The White Nile flows northward through this territory, fed by tributaries including the Bahr el Ghazal and Sobat rivers, creating vast wetlands known as the Sudd.","This territory shares borders with Uganda to the south and Ethiopia to the east.","Capital city starts with 'J'.","This nation's flag features a blue triangle representing the Nile, which is a lifeline for its predominantly rural population."],"sources":["Britannica — South Sudan independence and 2011 referendum · https://www.britannica.com/place/South-Sudan","CIA World Factbook — South Sudan geography, White Nile and Sudd wetlands · https://www.cia.gov/the-world-factbook/countries/south-sudan/","CIA World Factbook — South Sudan international borders with neighboring countries · https://www.cia.gov/the-world-factbook/countries/south-sudan/","Britannica — Juba as capital of South Sudan · https://www.britannica.com/place/Juba","Britannica — South Sudan flag symbolism and national symbols · https://www.britannica.com/topic/flag-of-South-Sudan"]},"Southern Patagonian Ice Field":{"clues":["This transboundary ice mass is the world's second-largest temperate glacier system outside Antarctica and Greenland, spanning approximately 16,800 square kilometers between two South American nations.","The ice field feeds dozens of outlet glaciers including Perito Moreno, Upsala, and O'Higgins, with many terminating in glacial lakes such as Lago Argentino and Lago Viedma on the eastern side.","This frozen expanse straddles the border between Chile and Argentina along the southern Andes mountain range.","The largest settlement on the Argentine side starts with 'E'.","One of its outlet glaciers is famous for its dramatic calving events where massive ice chunks crash into turquoise waters, attracting thousands of tourists annually to witness the spectacle from viewing platforms."],"sources":["Britannica — Southern Patagonian Ice Field overview and geographical extent · https://www.britannica.com/place/Patagonian-Ice-Field","NASA Earth Observatory — Glaciers of the Southern Patagonian Ice Field including Perito Moreno, Upsala, and O'Higgins glaciers · https://earthobservatory.nasa.gov/images/85592/glaciers-of-southern-patagonia","World Wildlife Fund — Patagonian Ice Fields location along Chile-Argentina border · https://www.worldwildlife.org/ecoregions/nt0607","Lonely Planet — El Calafate as gateway to Southern Patagonian Ice Field · https://www.lonelyplanet.com/argentina/the-lake-district/el-calafate","UNESCO — Los Glaciares National Park featuring Perito Moreno Glacier calving events · https://whc.unesco.org/en/list/145"]},"Spain":{"clues":["This country is the world's leading producer of olive oil, accounting for over 40% of global production.","The Pyrenees mountain range forms a natural barrier along its northeastern border, with peaks exceeding 3,400 meters.","It shares borders with Portugal to the west and France to the northeast.","Capital city starts with 'M'.","Flamenco dancing and paella are iconic cultural traditions originating from this nation."],"sources":["International Olive Council — World olive oil figures: Spain produces 44.3% of global olive oil · https://www.internationaloliveoil.org/what-we-do/economic-affairs-promotion-unit/","Britannica — Pyrenees: Mountain range forming natural border with highest peak Aneto at 3,404m · https://www.britannica.com/place/Pyrenees","CIA World Factbook — Spain: Border countries listed as France and Portugal · https://www.cia.gov/the-world-factbook/countries/spain/","CIA World Factbook — Spain: Capital identified as Madrid · https://www.cia.gov/the-world-factbook/countries/spain/","UNESCO — Flamenco inscribed as Intangible Cultural Heritage of Humanity from Spain · https://ich.unesco.org/en/RL/flamenco-00363"]},"Spratly Islands":{"clues":["This territory is claimed in whole or in part by six different nations, making it one of the most disputed areas in international maritime law.","The territory consists of over 100 small islands, reefs, and atolls scattered across approximately 425,000 square kilometers of ocean.","Located in the South China Sea, it lies west of the Philippines and east of Vietnam.","The largest naturally occurring feature starts with 'I'.","Several claimant nations have built artificial islands and military installations on various features throughout this archipelago."],"sources":["CIA World Factbook — Spratly Islands territorial disputes involving six claimants · https://www.cia.gov/the-world-factbook/countries/spratly-islands/","Britannica — Geographic description of Spratly Islands extent and composition · https://www.britannica.com/place/Spratly-Islands","CIA World Factbook — Location in South China Sea relative to Philippines and Vietnam · https://www.cia.gov/the-world-factbook/countries/spratly-islands/","Britannica — Itu Aba as the largest natural island in the Spratlys · https://www.britannica.com/place/Spratly-Islands","Council on Foreign Relations — Territorial disputes and island-building activities in the South China Sea · https://www.cfr.org/global-conflict-tracker/conflict/territorial-disputes-south-china-sea"]},"Sri Lanka":{"clues":["This island nation was the world's largest tea exporter by the 1960s and remains one of the top four tea producers globally, with the beverage accounting for roughly 15% of export earnings.","A teardrop-shaped island featuring a mountainous south-central region with peaks exceeding 2,500 meters, surrounded by coastal plains and over 1,300 kilometers of coastline.","Located in the Indian Ocean, separated from India by the Palk Strait to the northwest.","Capital city starts with 'S'.","This island is home to the ancient rock fortress of Sigiriya, a UNESCO World Heritage Site featuring fifth-century frescoes and gardens built atop a 200-meter granite column."],"sources":["Food and Agriculture Organization of the United Nations — Tea production and export statistics · https://www.fao.org/economic/est/est-commodities/tea/en/","Encyclopaedia Britannica — Geography and physical features of Sri Lanka · https://www.britannica.com/place/Sri-Lanka","CIA World Factbook — Sri Lanka location and boundaries · https://www.cia.gov/the-world-factbook/countries/sri-lanka/","CIA World Factbook — Sri Lanka capital city information · https://www.cia.gov/the-world-factbook/countries/sri-lanka/","UNESCO World Heritage Centre — Ancient City of Sigiriya · https://whc.unesco.org/en/list/202/"]},"Sudan":{"clues":["This country split in 2011, losing approximately three-quarters of its oil reserves to its newly independent southern neighbor.","The Blue Nile and White Nile converge here, forming the world's longest river as it flows northward through the Sahara.","This nation shares its longest border with South Sudan to the south and also borders Egypt to the north.","Capital city starts with 'K'.","The ancient Nubian pyramids at Meroë, numbering over 200, stand as UNESCO World Heritage Sites predating their Egyptian counterparts by centuries."],"sources":["BBC News — South Sudan country profile explaining the 2011 independence and oil reserve distribution · https://www.bbc.com/news/world-africa-14019202","Britannica — Article on the Nile River describing the confluence of the Blue and White Nile at Khartoum · https://www.britannica.com/place/Nile-River","CIA World Factbook — Sudan country page listing border countries and lengths · https://www.cia.gov/the-world-factbook/countries/sudan/","CIA World Factbook — Sudan country page identifying Khartoum as the capital · https://www.cia.gov/the-world-factbook/countries/sudan/","UNESCO — World Heritage List entry for Archaeological Sites of the Island of Meroe · https://whc.unesco.org/en/list/1336/"]},"Suriname":{"clues":["This country is the world's largest exporter of bauxite per capita and holds massive reserves that drive its economy.","The Wilhelmina Mountains rise in the center of this territory, which is over 90% covered by pristine tropical rainforest.","This nation borders Guyana to the west and French Guiana to the east along the Atlantic coast.","Capital city starts with 'P'.","Dutch is the sole official language of this South American nation, making it unique on the continent."],"sources":["Observatory of Economic Complexity — Suriname bauxite exports and economic data · https://oec.world/en/profile/country/sur","Encyclopaedia Britannica — Suriname geography and Wilhelmina Mountains · https://www.britannica.com/place/Suriname","CIA World Factbook — Suriname borders with Guyana and French Guiana · https://www.cia.gov/the-world-factbook/countries/suriname/","CIA World Factbook — Paramaribo capital city information · https://www.cia.gov/the-world-factbook/countries/suriname/","CIA World Factbook — Suriname official language Dutch · https://www.cia.gov/the-world-factbook/countries/suriname/"]},"Sweden":{"clues":["This country is the world's seventh-largest iron ore exporter and was historically the primary source of high-grade iron ore for Nazi Germany during World War II.","The Scandinavian Mountains run along its western border, while it contains over 95,000 lakes and approximately 24,000 islands along its extensive Baltic coastline.","It shares land borders with Norway to the west and Finland to the northeast, while being separated from Denmark by narrow straits.","Capital city starts with 'S'.","This nation is the birthplace of IKEA, the Nobel Prize, and the pop group ABBA."],"sources":["Observatory of Economic Complexity — Sweden Iron Ore Exports Data · https://oec.world/en/profile/bilateral-product/iron-ore/reporter/swe","Britannica — Sweden Geography: Lakes, Islands, and Mountain Ranges · https://www.britannica.com/place/Sweden/Relief","CIA World Factbook — Sweden: Borders with Norway, Finland, and Maritime Boundaries · https://www.cia.gov/the-world-factbook/countries/sweden/","Britannica — Stockholm: Capital of Sweden · https://www.britannica.com/place/Stockholm","Britannica — Sweden Cultural Institutions: Nobel Prize and ABBA Museum · https://www.britannica.com/place/Sweden/Cultural-life"]},"Switzerland":{"clues":["This nation hosts the Bank for International Settlements, often called the 'central bank of central banks,' established in 1930 in Basel.","The Matterhorn, one of the highest peaks in the Alps at 4,478 meters, straddles the border with Italy in this mountainous country.","It shares borders with Germany to the north and Austria to the east.","Capital city starts with 'B'.","This country is world-famous for producing luxury watches, milk chocolate, and maintaining centuries of armed neutrality."],"sources":["Bank for International Settlements — About BIS history and headquarters location · https://www.bis.org/about/index.htm","Britannica — Matterhorn mountain description and elevation · https://www.britannica.com/place/Matterhorn","CIA World Factbook — Switzerland geography and border countries · https://www.cia.gov/the-world-factbook/countries/switzerland/","Britannica — Bern as capital of Switzerland · https://www.britannica.com/place/Switzerland","Britannica — Swiss culture, watchmaking, chocolate, and neutrality · https://www.britannica.com/place/Switzerland"]},"Syria":{"clues":["This country hosts Russia's only Mediterranean naval facility at Tartus, established in 1971 during the Cold War.","The Anti-Lebanon mountain range forms a natural barrier along its western border, with Mount Hermon rising to 2,814 meters.","This territory shares borders with Lebanon to the west and Iraq to the east.","Capital city starts with 'D'.","The ancient city of Palmyra, with its iconic colonnaded streets and Temple of Bel, was a major caravan stop on the Silk Road."],"sources":["Center for Strategic and International Studies — Analysis of Russian Naval Presence in the Mediterranean · https://www.csis.org/analysis/russias-military-presence-syria","Britannica — Anti-Lebanon Mountain Range Geographic Description · https://www.britannica.com/place/Anti-Lebanon-Mountains","CIA World Factbook — Syria Border Countries · https://www.cia.gov/the-world-factbook/countries/syria/","CIA World Factbook — Syria Capital City Information · https://www.cia.gov/the-world-factbook/countries/syria/","UNESCO World Heritage Centre — Site of Palmyra · https://whc.unesco.org/en/list/23/"]},"São Tomé and Príncipe":{"clues":["This country was the world's largest cocoa producer per capita during the early 20th century, earning it the nickname 'Chocolate Islands' before independence in 1975.","Two volcanic islands rise from the Cameroon Line, with Pico de São Tomé reaching 2,024 meters as the highest point in a territory spanning just 1,001 square kilometers.","Located in the Gulf of Guinea, this archipelago lies approximately 250 kilometers off the western coast of Gabon and 255 kilometers off Equatorial Guinea.","Capital city starts with 'S'.","The smallest Portuguese-speaking nation on Earth produces some of the world's finest organic chocolate from heirloom cacao varieties."],"sources":["Britannica — São Tomé and Príncipe historical economy and cocoa production · https://www.britannica.com/place/Sao-Tome-and-Principe","CIA World Factbook — São Tomé and Príncipe geography and terrain · https://www.cia.gov/the-world-factbook/countries/sao-tome-and-principe/","CIA World Factbook — São Tomé and Príncipe geographic coordinates and location · https://www.cia.gov/the-world-factbook/countries/sao-tome-and-principe/","CIA World Factbook — São Tomé and Príncipe capital city · https://www.cia.gov/the-world-factbook/countries/sao-tome-and-principe/","UNESCO — São Tomé and Príncipe cocoa and chocolate production · https://whc.unesco.org/en/tentativelists/6186/"]},"Taiwan":{"clues":["This territory is the world's largest producer of advanced semiconductors, manufacturing over 90% of the most cutting-edge chips under 10 nanometers.","A mountain range running north to south dominates the eastern two-thirds of the island, with over 260 peaks exceeding 3,000 meters in elevation.","Separated from mainland China by a strait approximately 180 kilometers wide at its widest point, facing the East China Sea to the north and the South China Sea to the south.","Capital city starts with 'T'.","Bubble tea, also known as boba or pearl milk tea, originated here in the 1980s and has become a global phenomenon."],"sources":["Bloomberg — Taiwan's Dominance in Advanced Chip Manufacturing · https://www.bloomberg.com/news/articles/2023-01-25/taiwan-chipmakers-dominate-advanced-semiconductor-production","Britannica — Taiwan Physical Geography and Mountain Ranges · https://www.britannica.com/place/Taiwan/Land","CIA World Factbook — Taiwan Geography and Maritime Boundaries · https://www.cia.gov/the-world-factbook/countries/taiwan/","Britannica — Taipei as Capital City · https://www.britannica.com/place/Taipei","CNN Travel — The Origins of Bubble Tea in Taiwan · https://www.cnn.com/travel/article/bubble-tea-boba-taiwan-origins/index.html"]},"Tajikistan":{"clues":["This nation hosts over 60% of the world's glacial water reserves outside the polar regions, making it a critical freshwater source for Central Asia.","The Pamir Mountains dominate over 90% of the territory, with peaks exceeding 7,000 meters including Ismoil Somoni Peak at 7,495 meters.","It shares borders with Afghanistan to the south and Kyrgyzstan to the north.","Capital city starts with 'D'.","Plov, a rice dish with meat and vegetables cooked in a single pot, is considered the national dish and ceremonial centerpiece of hospitality."],"sources":["United Nations Development Programme — Tajikistan's glacier resources and water security challenges · https://www.undp.org/tajikistan/publications/glaciers-tajikistan","Britannica — Geography and terrain of Tajikistan including the Pamir Mountains · https://www.britannica.com/place/Tajikistan/Relief","CIA World Factbook — Tajikistan border countries · https://www.cia.gov/the-world-factbook/countries/tajikistan/","CIA World Factbook — Tajikistan capital city Dushanbe · https://www.cia.gov/the-world-factbook/countries/tajikistan/","UNESCO — Traditional knowledge and practices of plov in Central Asian culture · https://ich.unesco.org/en/RL/oshi-palav-a-traditional-meal-and-its-social-and-cultural-contexts-in-tajikistan-01791"]},"Thailand":{"clues":["This founding member of ASEAN has maintained a constitutional monarchy continuously since 1932, making it the only Southeast Asian nation never colonized by European powers.","The Chao Phraya River flows southward through a vast central plain before emptying into the Gulf that shares its name with a neighboring country.","This nation shares land borders with Myanmar to the west and Cambodia to the east.","Capital city starts with 'B'.","Home to over 40,000 Buddhist temples, this nation is famous for its ornate golden shrines including the Grand Palace and Wat Phra Kaew."],"sources":["CIA World Factbook — Thailand History and Government · https://www.cia.gov/the-world-factbook/countries/thailand/","Britannica — Chao Phraya River geographic description · https://www.britannica.com/place/Chao-Phraya-River","CIA World Factbook — Thailand border countries · https://www.cia.gov/the-world-factbook/countries/thailand/","CIA World Factbook — Thailand capital city · https://www.cia.gov/the-world-factbook/countries/thailand/","Tourism Authority — Buddhist temples and cultural sites · https://www.tourismthailand.org/About-Thailand/Culture-and-Heritage"]},"The Bahamas":{"clues":["This archipelagic nation served as a major base for blockade runners supplying the Confederacy during the American Civil War, with Nassau becoming a crucial transshipment point for cotton and weapons.","Comprising over 700 islands and 2,400 cays spread across approximately 100,000 square miles of ocean, this low-lying coral archipelago features the world's third-longest barrier reef and several deep oceanic trenches including one exceeding 4,000 meters.","This island nation lies in the Atlantic Ocean southeast of Florida and northeast of Cuba, with its nearest point just 50 miles from the coast of the United States.","Capital city starts with 'N'.","This destination is famous for its swimming pigs at Exuma, pink sand beaches colored by coral particles, and as a major cruise ship port visited by millions annually."],"sources":["Britannica — The Bahamas' role in the American Civil War as a blockade-running base · https://www.britannica.com/place/The-Bahamas/History","CIA World Factbook — Geography of The Bahamas including island count and marine features · https://www.cia.gov/the-world-factbook/countries/bahamas-the/","CIA World Factbook — The Bahamas location relative to Florida and Cuba · https://www.cia.gov/the-world-factbook/countries/bahamas-the/","CIA World Factbook — Capital city of The Bahamas · https://www.cia.gov/the-world-factbook/countries/bahamas-the/","Britannica — Tourism and cultural features of The Bahamas including beaches and wildlife · https://www.britannica.com/place/The-Bahamas"]},"Togo":{"clues":["This nation was the only German colonial territory in Africa to be administered under League of Nations mandate by France rather than Britain after World War I.","The country's terrain rises from a narrow Atlantic coastal plain through plateaus to the Atakora mountain range in the northwest, reaching elevations over 900 meters.","This territory shares its eastern border with Benin and its western border with Ghana.","Capital city starts with 'L'.","This country is one of the world's leading exporters of phosphates, with major mining operations that have shaped its economy since the 1960s."],"sources":["Britannica — Togo history and League of Nations mandate administration · https://www.britannica.com/place/Togo/History","CIA World Factbook — Togo geography and terrain features · https://www.cia.gov/the-world-factbook/countries/togo/","CIA World Factbook — Togo international boundaries and neighboring countries · https://www.cia.gov/the-world-factbook/countries/togo/","Britannica — Lomé capital city of Togo · https://www.britannica.com/place/Lome","CIA World Factbook — Togo economy and phosphate exports · https://www.cia.gov/the-world-factbook/countries/togo/"]},"Tonga":{"clues":["This kingdom is the only Pacific island nation that was never formally colonized by a European power, maintaining its indigenous monarchy continuously since 1845.","The territory consists of 169 islands spread across a vast oceanic area, with only 36 inhabited, characterized by both volcanic peaks and low-lying coral atolls.","Located in the South Pacific Ocean, this archipelago lies east of Fiji and south of Samoa.","Capital city starts with 'N'.","This Polynesian nation is renowned for producing some of the world's most successful rugby union players relative to its small population."],"sources":["Britannica — Tonga history and constitutional monarchy · https://www.britannica.com/place/Tonga","CIA World Factbook — Tonga geography and island composition · https://www.cia.gov/the-world-factbook/countries/tonga/","CIA World Factbook — Tonga location and neighboring countries · https://www.cia.gov/the-world-factbook/countries/tonga/","CIA World Factbook — Tonga capital city information · https://www.cia.gov/the-world-factbook/countries/tonga/","Britannica — Tonga culture and sports · https://www.britannica.com/place/Tonga"]},"Trinidad and Tobago":{"clues":["This nation is the world's leading exporter of ammonia and methanol, with its Point Lisas Industrial Estate forming the backbone of the Caribbean's petrochemical industry.","Two main islands are separated by a narrow strait, with the larger northern island featuring three parallel mountain ranges including the Northern Range that rises to over 900 meters.","Located just 11 kilometers off the northeastern coast of Venezuela across the Gulf of Paria.","Capital city starts with 'P'.","Steelpan, the only acoustic instrument invented in the 20th century, originated here and is central to its world-famous Carnival celebrations."],"sources":["Observatory of Economic Complexity — Trinidad and Tobago ammonia and methanol export rankings · https://oec.world/en/profile/country/tto","Encyclopaedia Britannica — Geography of Trinidad and Tobago, Northern Range · https://www.britannica.com/place/Trinidad-and-Tobago/Land","CIA World Factbook — Trinidad and Tobago geography, location relative to Venezuela · https://www.cia.gov/the-world-factbook/countries/trinidad-and-tobago/","Encyclopaedia Britannica — Port of Spain as capital of Trinidad and Tobago · https://www.britannica.com/place/Port-of-Spain","UNESCO — Steelpan origin and cultural significance · https://ich.unesco.org/en/RL/steelpan-craftsmanship-and-music-01200"]},"Tunisia":{"clues":["This nation was the birthplace of the Arab Spring in 2010, when a street vendor's self-immolation sparked revolutions across the region.","The Atlas Mountains extend through the northern part of this territory, while the Sahara Desert covers much of its southern region.","This country shares borders with Algeria to the west and Libya to the southeast.","Capital city starts with 'T'.","Ancient Carthage, once Rome's greatest rival in the Punic Wars, was located in this territory."],"sources":["Britannica — Arab Spring origins and timeline · https://www.britannica.com/event/Arab-Spring","CIA World Factbook — Geography and terrain features · https://www.cia.gov/the-world-factbook/countries/tunisia/","CIA World Factbook — Border countries · https://www.cia.gov/the-world-factbook/countries/tunisia/","CIA World Factbook — Capital city information · https://www.cia.gov/the-world-factbook/countries/tunisia/","Britannica — Ancient Carthage history · https://www.britannica.com/place/Carthage-ancient-city-Tunisia"]},"Turkey":{"clues":["This nation controls the strategic Bosporus and Dardanelles straits, which connect the Black Sea to the Mediterranean and handle approximately 48,000 vessel transits annually.","Mount Ararat, a dormant volcanic massif rising to 5,137 meters, dominates the eastern highlands near the border with Armenia and Iran.","This country shares land borders with Greece, Bulgaria, Georgia, Armenia, Iran, Iraq, Syria, and Azerbaijan.","Capital city starts with 'A'.","The ancient city of Troy, immortalized in Homer's epic poems, lies near the Aegean coast in the northwest of this country."],"sources":["World Bank — Turkish Straits Maritime Traffic Analysis · https://www.worldbank.org/en/region/eca/brief/turkish-straits","Britannica — Mount Ararat Geography and Location · https://www.britannica.com/place/Mount-Ararat","CIA World Factbook — Turkey Geographic Boundaries · https://www.cia.gov/the-world-factbook/countries/turkey/","Britannica — Ankara Capital City · https://www.britannica.com/place/Ankara","UNESCO — Archaeological Site of Troy · https://whc.unesco.org/en/list/849/"]},"Turkmenistan":{"clues":["This country holds the world's fourth-largest reserves of natural gas and operates a state-controlled system where gas exports primarily flow through a single pipeline to China.","The Karakum Desert covers approximately 70% of the land area, while the Kopet Dag mountain range forms a natural barrier along the southern border.","This nation shares borders with Kazakhstan to the northwest and Iran to the south.","Capital city starts with 'A'.","The Darvaza gas crater, known as the 'Door to Hell,' has been burning continuously since 1971 in the desert."],"sources":["U.S. Energy Information Administration — Turkmenistan holds world's fourth-largest natural gas reserves · https://www.eia.gov/international/analysis/country/TKM","Britannica — Karakum Desert covers most of Turkmenistan and Kopet Dag mountains · https://www.britannica.com/place/Turkmenistan","CIA World Factbook — Turkmenistan borders Kazakhstan and Iran · https://www.cia.gov/the-world-factbook/countries/turkmenistan/","CIA World Factbook — Capital is Ashgabat · https://www.cia.gov/the-world-factbook/countries/turkmenistan/","National Geographic — Darvaza gas crater burning since 1971 · https://www.nationalgeographic.com/travel/article/darvaza-gas-crater-door-to-hell-turkmenistan"]},"Turks and Caicos Islands":{"clues":["This British Overseas Territory operates as a major offshore financial center with no income tax, corporate tax, or capital gains tax, hosting over 40,000 registered companies.","The territory consists of 40 low-lying coral islands and cays with a highest natural point of only 49 meters above sea level on Flamingo Hill.","Located in the Atlantic Ocean approximately 37 miles southeast of the Bahamas and 575 miles southeast of Miami, Florida.","Capital city starts with 'C'.","Grace Bay Beach has been repeatedly voted one of the world's best beaches and is a prime destination for luxury tourism and scuba diving."],"sources":["CIA World Factbook — Economy overview noting absence of direct taxation and financial services sector · https://www.cia.gov/the-world-factbook/countries/turks-and-caicos-islands/","Britannica — Geography describing coral islands and elevation at Flamingo Hill · https://www.britannica.com/place/Turks-and-Caicos-Islands","CIA World Factbook — Geographic coordinates and location relative to Bahamas · https://www.cia.gov/the-world-factbook/countries/turks-and-caicos-islands/","CIA World Factbook — Capital city identification · https://www.cia.gov/the-world-factbook/countries/turks-and-caicos-islands/","World Travel Awards — Grace Bay Beach recognition and tourism prominence · https://www.worldtravelawards.com/"]},"Tuvalu":{"clues":["This nation joined the United Nations in 2000 as its 189th member state and has been a vocal advocate for climate change action at international forums.","The territory consists of nine coral atolls with a total land area of only 26 square kilometers, making it the fourth-smallest country by land area in the world.","Located in the Pacific Ocean roughly midway between Hawaii and Australia, it is surrounded by ocean with Kiribati to the north and Fiji to the south.","Capital city starts with 'F'.","This Pacific island nation's .tv internet domain has been a significant source of government revenue, leased to technology and media companies worldwide."],"sources":["United Nations — Member States: Growth in United Nations membership, 1945-present · https://www.un.org/en/about-us/growth-in-un-membership","CIA World Factbook — Tuvalu Geography: Area comparative and geographic features · https://www.cia.gov/the-world-factbook/countries/tuvalu/","Britannica — Tuvalu: Location and neighboring territories in the Pacific · https://www.britannica.com/place/Tuvalu","CIA World Factbook — Tuvalu: Capital city information · https://www.cia.gov/the-world-factbook/countries/tuvalu/","Britannica — Tuvalu Economy: Domain name revenue and economic resources · https://www.britannica.com/place/Tuvalu/Economy"]},"US Naval Base Guantanamo Bay":{"clues":["This territory was leased in perpetuity under a 1903 treaty for $4,085 annually, a payment that the controlling government refuses to cash.","The territory features a shallow harbor protected by hills rising up to 400 feet, with a dry climate receiving less than 24 inches of annual rainfall.","This enclave is surrounded on land by Cuba and bordered to the south by the Caribbean Sea.","The main settlement starts with 'G'.","This installation has housed a controversial detention facility since 2002 following operations in Afghanistan."],"sources":["U.S. Department of State — Treaty Relations Between the United States and Cuba · https://2001-2009.state.gov/r/pa/ho/time/ip/108483.htm","Naval History and Heritage Command — Guantanamo Bay Geographic and Climate Information · https://www.history.navy.mil/content/history/nhhc/research/library/online-reading-room/title-list-alphabetically/g/guantanamo-bay-cuba.html","CIA World Factbook — Geographic Location and Boundaries · https://www.cia.gov/the-world-factbook/","National Geographic — Naval Station Geographic Names · https://www.nationalgeographic.com/","Britannica — Detention Facility History and Operations · https://www.britannica.com/place/Guantanamo-Bay-detention-camp"]},"Uganda":{"clues":["This country was the first in Sub-Saharan Africa to establish a sovereign wealth fund from coffee export revenues in 2015.","The Rwenzori Mountains along its western border include Africa's third-highest peak, Mount Stanley, rising to 5,109 meters.","It shares its longest border with Tanzania to the south and Kenya to the east.","Capital city starts with 'K'.","This nation is often called the 'Pearl of Africa' and is home to the source of the Nile at Lake Victoria."],"sources":["African Development Bank — Uganda Coffee Sovereign Wealth Fund Analysis · https://www.afdb.org/en/documents/uganda-economic-outlook","Encyclopedia Britannica — Rwenzori Mountains Geography and Elevation · https://www.britannica.com/place/Ruwenzori-Range","CIA World Factbook — Uganda Border Countries and Geography · https://www.cia.gov/the-world-factbook/countries/uganda/","CIA World Factbook — Uganda Capital City Information · https://www.cia.gov/the-world-factbook/countries/uganda/","UNESCO — Source of the Nile World Heritage Nomination · https://whc.unesco.org/en/tentativelists/5341/"]},"Ukraine":{"clues":["This country is the world's fifth-largest exporter of wheat and was historically known as the 'breadbasket' of the Soviet Union.","The Carpathian Mountains form a natural arc across the western region, while the Dnieper River flows southward through the center to the Black Sea.","This territory borders Romania to the southwest and Russia to the east and northeast.","Capital city starts with 'K'.","Borscht, a vibrant beetroot soup, is a traditional dish deeply rooted in the culinary heritage of this nation."],"sources":["Food and Agriculture Organization of the United Nations — World wheat exports by country · https://www.fao.org/worldfoodsituation/csdb/en/","Britannica — Dnieper River geographic overview and path through Eastern Europe · https://www.britannica.com/place/Dnieper-River","CIA World Factbook — Border countries and geographic neighbors · https://www.cia.gov/the-world-factbook/countries/ukraine/","CIA World Factbook — Capital city information · https://www.cia.gov/the-world-factbook/countries/ukraine/","UNESCO — Borscht cooking culture intangible cultural heritage · https://ich.unesco.org/en/RL/culture-of-ukrainian-borscht-cooking-01745"]},"United Arab Emirates":{"clues":["This federation hosts the headquarters of the International Renewable Energy Agency (IRENA), established in 2009 to promote sustainable energy transitions globally.","The Hajar Mountains form a rugged spine along the eastern border, with Jebel Jais reaching 1,934 meters as the highest peak in this low-lying desert nation.","This territory shares land borders with Oman to the east and Saudi Arabia to the south and west.","Capital city starts with 'A'.","The Burj Khalifa, standing at 828 meters, is the world's tallest building and dominates the skyline of the largest city."],"sources":["IRENA — About IRENA: Headquarters and establishment · https://www.irena.org/About","Britannica — Hajar Mountains: Geography and topography · https://www.britannica.com/place/Hajar-Mountains","CIA World Factbook — Bordering countries and location · https://www.cia.gov/the-world-factbook/countries/united-arab-emirates/","CIA World Factbook — Capital city information · https://www.cia.gov/the-world-factbook/countries/united-arab-emirates/","Guinness World Records — Tallest building: Burj Khalifa · https://www.guinnessworldrecords.com/world-records/tallest-building"]},"United Kingdom":{"clues":["This permanent member of the UN Security Council voted to leave the European Union in a 2016 referendum, formally withdrawing in 2020.","The archipelago contains Ben Nevis, the highest peak in the British Isles at 1,345 meters, located in the Scottish Highlands.","Separated from continental Europe by the English Channel and the North Sea, with the Celtic Sea to the southwest.","Capital city starts with 'L'.","Home to the iconic Big Ben clock tower, Buckingham Palace, and the tradition of afternoon tea with scones and clotted cream."],"sources":["Council on Foreign Relations — Brexit: What You Need to Know About the UK Leaving the EU · https://www.cfr.org/backgrounder/what-brexit-means","Encyclopaedia Britannica — Ben Nevis: Mountain, Scotland · https://www.britannica.com/place/Ben-Nevis","CIA World Factbook — United Kingdom Geography · https://www.cia.gov/the-world-factbook/countries/united-kingdom/","Encyclopaedia Britannica — London: Capital of the United Kingdom · https://www.britannica.com/place/London","VisitBritain — British Food and Drink · https://www.visitbritain.com/gb/en/food-and-drink"]},"Tanzania":{"clues":["This nation is the world's fourth-largest producer of gold in Africa and hosts one of the continent's most significant natural gas reserves in its offshore Mafia Deep basin.","The Great Rift Valley splits this territory, creating a chain of lakes along its western border while the eastern branch holds the alkaline waters of a famous soda lake that attracts millions of flamingos.","This country shares its longest land border with Kenya to the north and touches the waters of Lake Malawi to the southwest.","Capital city starts with 'D'.","Mount Kilimanjaro, Africa's highest peak at 5,895 meters, rises within this country's borders and attracts thousands of climbers annually."],"sources":["U.S. Geological Survey — Mineral Commodity Summaries 2024, Gold Production Statistics · https://www.usgs.gov/centers/national-minerals-information-center/gold-statistics-and-information","Britannica — Great Rift Valley: Geography and Lake Systems of East Africa · https://www.britannica.com/place/Great-Rift-Valley","CIA World Factbook — Tanzania: Geography and International Boundaries · https://www.cia.gov/the-world-factbook/countries/tanzania/","Britannica — Dodoma: Capital of Tanzania · https://www.britannica.com/place/Dodoma","UNESCO — Kilimanjaro National Park World Heritage Site · https://whc.unesco.org/en/list/403/"]},"United States Minor Outlying Islands":{"clues":["These scattered territories include the only land mass where the Guano Islands Act of 1856 still grants U.S. mining rights without formal incorporation as states or territories.","The atolls and islands span across both the Pacific and Caribbean, with coral reef formations rising barely above sea level and several being submerged at high tide.","The territories are surrounded by the Pacific Ocean, with the nearest neighbors including Kiribati, the Marshall Islands, and Hawaii to varying distances across vast ocean expanses.","The largest settlement begins with 'W'.","Midway Atoll, part of this territory group, was the site of the pivotal World War II naval battle that turned the tide in the Pacific theater in June 1942."],"sources":["CIA World Factbook — United States Pacific Island Wildlife Refuges: Government and Economy sections describing Guano Islands Act application · https://www.cia.gov/the-world-factbook/countries/united-states-pacific-island-wildlife-refuges/","Britannica — Wake Island: Geography section describing coral atoll formation and low elevation · https://www.britannica.com/place/Wake-Island","CIA World Factbook — United States Pacific Island Wildlife Refuges: Geography section listing Pacific Ocean location and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/united-states-pacific-island-wildlife-refuges/","CIA World Factbook — Wake Island: People and Society section identifying Wake Island settlement · https://www.cia.gov/the-world-factbook/countries/wake-island/","Britannica — Battle of Midway: Historical account of June 1942 naval battle at Midway Atoll · https://www.britannica.com/event/Battle-of-Midway"]},"United States Virgin Islands":{"clues":["This territory was purchased from Denmark in 1917 for $25 million in gold to prevent potential German submarine bases during World War I.","The three main islands feature volcanic mountainous terrain, with the highest point reaching 1,556 feet on Crown Mountain.","This Caribbean archipelago lies immediately east of Puerto Rico and shares the island of Saint Martin with a European territory to the north.","Capital city starts with 'C'.","Blackbeard's Castle and the 99 Steps are famous landmarks in a historic port town that once served as a major Caribbean pirate haven."],"sources":["CIA World Factbook — Background history of the territory's acquisition from Denmark in 1917 · https://www.cia.gov/the-world-factbook/countries/virgin-islands/","Britannica — Physical geography describing volcanic terrain and Crown Mountain elevation · https://www.britannica.com/place/United-States-Virgin-Islands","CIA World Factbook — Geographic location relative to Puerto Rico and nearby territories · https://www.cia.gov/the-world-factbook/countries/virgin-islands/","Britannica — Charlotte Amalie identified as capital city · https://www.britannica.com/place/Charlotte-Amalie","National Park Service — Historic sites including Blackbeard's Castle and 99 Steps in Charlotte Amalie · https://www.nps.gov/viis/learn/historyculture/index.htm"]},"United States":{"clues":["This territory holds a permanent seat on the United Nations Security Council and possesses the world's largest economy by nominal GDP.","The Rocky Mountains extend over 3,000 miles through the western portion of this territory, while the Mississippi River forms one of the world's largest drainage basins.","This territory shares its northern border with Canada and its southern border with Mexico.","Capital city starts with 'W'.","The Statue of Liberty stands on an island in New York Harbor as one of the world's most recognizable monuments."],"sources":["United Nations — UN Security Council Members · https://www.un.org/securitycouncil/content/current-members","Britannica — Rocky Mountains: Mountain Range, North America · https://www.britannica.com/place/Rocky-Mountains","CIA World Factbook — North America: Borders and Geography · https://www.cia.gov/the-world-factbook/","Britannica — Washington: Capital of United States · https://www.britannica.com/place/Washington-DC","National Park Service — Statue of Liberty National Monument · https://www.nps.gov/stli/"]},"Uruguay":{"clues":["This nation was the first in the world to constitutionally guarantee free public Wi-Fi internet access as a fundamental right in 2012.","The landscape is dominated by gently rolling grasslands and plains with the Cuchilla Grande being the principal interior upland range.","This territory shares land borders with Brazil to the north and Argentina to the west.","Capital city starts with 'M'.","This country is famous for its yerba mate drinking culture and has won two FIFA World Cup championships."],"sources":["International Telecommunication Union — Digital Development and Public Policy Innovation · https://www.itu.int/en/ITU-D/Statistics/Pages/default.aspx","Encyclopaedia Britannica — Geography and Physical Features of South American Nations · https://www.britannica.com/place/Uruguay","CIA World Factbook — International Borders and Neighboring Countries · https://www.cia.gov/the-world-factbook/countries/uruguay/","CIA World Factbook — Capital Cities of the World · https://www.cia.gov/the-world-factbook/countries/uruguay/","FIFA — World Cup Champions and Football History · https://www.fifa.com/tournaments/mens/worldcup/history"]},"Uzbekistan":{"clues":["One of only two doubly landlocked countries in the world, surrounded entirely by other landlocked nations.","The vast Kyzylkum Desert covers much of the northwestern portion of the territory, while the Tian Shan mountains rise in the east.","Shares borders with Kazakhstan to the north and Afghanistan to the south.","Capital city starts with 'T'.","The Registan Square in Samarkand, adorned with three madrasahs covered in intricate blue tilework, is one of Central Asia's most iconic architectural ensembles."],"sources":["CIA World Factbook — Landlocked status classification · https://www.cia.gov/the-world-factbook/countries/uzbekistan/","Britannica — Geography and physical features of Uzbekistan · https://www.britannica.com/place/Uzbekistan/Relief","CIA World Factbook — Border countries of Uzbekistan · https://www.cia.gov/the-world-factbook/countries/uzbekistan/","CIA World Factbook — Capital city information · https://www.cia.gov/the-world-factbook/countries/uzbekistan/","UNESCO World Heritage Centre — Samarkand Crossroad of Cultures · https://whc.unesco.org/en/list/603/"]},"Vanuatu":{"clues":["This archipelago nation was jointly administered by Britain and France as a unique condominium from 1906 until independence in 1980, creating parallel legal and administrative systems.","This Y-shaped chain of approximately 83 volcanic and coral islands stretches over 1,300 kilometers in the South Pacific, with active volcanoes including Mount Yasur on Tanna Island.","Located in the South Pacific Ocean, this nation lies east of Australia and northeast of New Caledonia.","Capital city starts with 'P'.","Mount Yasur is one of the world's most accessible active volcanoes, where visitors can stand at function getDailyIndex(total) {
  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  let s = seed; s ^= s << 13; s ^= s >> 17; s ^= s << 5;
  return Math.abs(s) % total;
}

function drawGrid() {
  const g = document.getElementById('grid');
  const t = document.getElementById('ticks');
  const ns = 'http://www.w3.org/2000/svg';
  for (let i = 0; i <= 11; i++) {
    ['h','v'].forEach(dir => {
      const l = document.createElementNS(ns, 'line');
      if (dir === 'h') { l.setAttribute('x1',0); l.setAttribute('y1',i*20); l.setAttribute('x2',220); l.setAttribute('y2',i*20); }
      else             { l.setAttribute('x1',i*20); l.setAttribute('y1',0); l.setAttribute('x2',i*20); l.setAttribute('y2',220); }
      l.setAttribute('stroke','#1a1a1a'); l.setAttribute('stroke-width','0.5');
      g.appendChild(l);
    });
  }
  [[4,4],[216,4],[4,216],[216,216]].forEach(([x,y]) => {
    const ns2 = 'http://www.w3.org/2000/svg';
    [['h',x-5,y,x+5,y],['v',x,y-5,x,y+5]].forEach(([,x1,y1,x2,y2]) => {
      const l = document.createElementNS(ns2,'line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1);
      l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('stroke','#1a1a1a'); l.setAttribute('stroke-width','1');
      t.appendChild(l);
    });
  });
}

function detectNameProp(features) {
  const candidates = ['ADMIN','name','NAME','admin','COUNTRY','sovereignt','NAME_LONG'];
  for (const k of candidates) {
    if (features.some(f => f.properties && typeof f.properties[k] === 'string' && f.properties[k].length > 1)) {
      return k;
    }
  }
  return null;
}

const GEO_URLS = [
  'https://cdn.jsdelivr.net/gh/datasets/geo-countries@master/data/countries.geojson',
  'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson',
  '__WORLD_ATLAS__',
];

async function fetchGeoJSON() {
  for (const url of GEO_URLS) {
    if (url === '__WORLD_ATLAS__') return await fetchWorldAtlas();
    try {
      const res = await fetch(url, { mode: 'cors' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      if (json.features && json.features.length > 10) {
        debugLog(`Loaded from: ${url.slice(0,50)} (${json.features.length} features)`);
        return json;
      }
    } catch (e) {
      debugLog(`Failed: ${url.slice(0,50)} — ${e.message}`);
    }
  }
  throw new Error('All geo sources failed');
}

  drawGrid();
  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  // Data is already embedded — skip the fetch, just initialize
  PUZZLE_COUNTRIES = Object.keys(CLUES_DB);
  debugLog(`Clues loaded: ${PUZZLE_COUNTRIES.length} territories`);

  let geojson;
  try {
    geojson = await fetchGeoJSON();
  } catch (err) {
    showError('Could not load map data. Please check your internet connection and try again.');
    return;
  }

  const nameProp = detectNameProp(geojson.features);
  if (!nameProp) {
    showError('Unrecognised geodata format — could not find country names.');
    return;
  }

  allFeatures = geojson.features
    .filter(f => f.geometry && f.properties?.[nameProp])
    .map(f => {
      const raw  = f.properties[nameProp];
      const name = GEO_NAME_MAP[raw] ?? raw;
      return { ...f, name };
    });

  const uniqueCount = new Set(allFeatures.map(f => f.name)).size;
  document.getElementById('country-count').textContent = `${uniqueCount} TERRITORIES ✓`;

  eligible = allFeatures.filter(f => PUZZLE_COUNTRIES.includes(f.name));
  if (!eligible.length) {
    showError(`No eligible countries found. Sample names: ${[...new Set(allFeatures.map(f=>f.name))].slice(0,5).join(', ')}`);
    return;
  }

  puzzleIndex = getDailyIndex(eligible.length);
  updateTestBanner();
  loadPuzzle();
  initBordersThemes();
}

function loadPuzzle() {
  guesses  = [];
  revealed = 0;
  phase    = 'loading';

  document.getElementById('clues-wrap').innerHTML  = '';
  document.getElementById('chips-wrap').innerHTML  = '';
  document.getElementById('guess-input').value     = '';
  hideSuggestions();

  const resultBox = document.getElementById('result-box');
  resultBox.style.display = 'none';
  resultBox.className = '';
  const path = document.getElementById('country-path');
  path.classList.remove('won');
  path.setAttribute('d', '');

  document.getElementById('scan-line').style.display = 'block';
  document.getElementById('scan-label').style.display = 'block';

  const feature = eligible[puzzleIndex];

  let proj;
  try { proj = d3.geoNaturalEarth1().fitExtent([[8,8],[212,212]], feature); }
  catch { proj = d3.geoMercator().fitExtent([[8,8],[212,212]], feature); }

  puzzle = { name: feature.name, svgPath: d3.geoPath(proj)(feature) || '' };
  path.setAttribute('d', puzzle.svgPath);
  document.getElementById('scan-line').style.display = 'none';
  document.getElementById('scan-label').style.display = 'none';

  startPlaying();
}

function nextPuzzle() {
  puzzleIndex = (puzzleIndex + 1) % eligible.length;
  updateTestBanner();
  loadPuzzle();
}

function updateTestBanner() {
  const todayStart = getDailyIndex(eligible.length);
  const offset = ((puzzleIndex - todayStart) % eligible.length + eligible.length) % eligible.length;
  document.getElementById('puzzle-counter').textContent =
    `PUZZLE ${offset + 1} / ${eligible.length}`;
}

function showError(msg) {
  document.getElementById('scan-line').style.display = 'none';
  document.getElementById('scan-label').style.display = 'none';
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function startPlaying() {
  phase = 'playing';
  document.getElementById('counter').style.display = 'block';
  document.getElementById('input-wrap').style.display = 'block';
  document.getElementById('guess-input').focus();
  updateCounter();
}

function updateCounter() {
  const rem = MAX_GUESSES - guesses.length;
  const numEl = document.getElementById('remaining-num');
  numEl.textContent = rem;
  numEl.className = 'num' + (rem <= 2 ? ' danger' : '');
  document.getElementById('counter').lastChild.textContent =
    ' ' + (rem === 1 ? 'GUESS REMAINING' : 'GUESSES REMAINING');
}

function resolveGuess(raw) {
  if (!raw) return null;
  const q = raw.trim().toLowerCase();
  if (ALIASES[q]) return ALIASES[q];
  return allFeatures.find(f => f.name.toLowerCase() === q)?.name ?? null;
}

function submitGuess(raw) {
  const name = resolveGuess(raw);
  if (!name || guesses.includes(name) || phase !== 'playing') return;
  guesses.push(name);
  document.getElementById('guess-input').value = '';
  hideSuggestions();

  if (name.toLowerCase() === puzzle.name.toLowerCase()) {
    endGame(true); return;
  }

  const chip = document.createElement('div');
  chip.className = 'chip';
  chip.textContent = '✗ ' + name;
  document.getElementById('chips-wrap').appendChild(chip);

  const clues = CLUES_DB[puzzle.name]?.clues ?? [];
  if (revealed < clues.length && revealed < MAX_GUESSES - 1) {
    addClue(clues[revealed], revealed + 1);
    revealed++;
  }

  updateCounter();

  if (guesses.length >= MAX_GUESSES) { endGame(false); return; }

  const row = document.getElementById('input-row');
  row.classList.add('shake');
  setTimeout(() => row.classList.remove('shake'), 500);
  document.getElementById('guess-input').focus();
}

function addClue(text, num) {
  const div = document.createElement('div');
  div.className = 'clue';
  div.innerHTML = `<span class="clue-num">${num}.</span><span>${text}</span>`;
  document.getElementById('clues-wrap').appendChild(div);
}

function endGame(won) {
  phase = won ? 'won' : 'lost';
  document.getElementById('counter').style.display = 'none';
  document.getElementById('input-wrap').style.display = 'none';

  if (won) {
    document.getElementById('country-path').classList.add('won');
  } else {
    const clues = CLUES_DB[puzzle.name]?.clues ?? [];
    while (revealed < clues.length) { addClue(clues[revealed], revealed + 1); revealed++; }
  }

  const box = document.getElementById('result-box');
  box.className = won ? 'won' : 'lost';
  box.style.display = 'block';
  document.getElementById('result-title').textContent   = won ? 'CORRECT' : 'GAME OVER';
  document.getElementById('result-country').textContent = won ? `🗺️ ${puzzle.name}` : `The answer was: ${puzzle.name}`;
  document.getElementById('result-sub').textContent     = won
    ? `Solved in ${guesses.length} of ${MAX_GUESSES} guesses`
    : 'Better luck on the next one';
}

function showSuggestions(q) {
  const box = document.getElementById('suggestions');
  box.innerHTML = '';
  if (!q) { box.style.display = 'none'; return; }
  const names = [...new Set(allFeatures.map(f => f.name))];
  const starts   = names.filter(n => n.toLowerCase().startsWith(q) && !guesses.includes(n));
  const contains = names.filter(n => !n.toLowerCase().startsWith(q) && n.toLowerCase().includes(q) && !guesses.includes(n));
  const matches  = [...starts, ...contains].slice(0, 7);
  if (!matches.length) { box.style.display = 'none'; return; }
  matches.forEach(name => {
    const div = document.createElement('div');
    div.className = 'sug-item';
    div.textContent = name;
    div.addEventListener('mousedown', e => { e.preventDefault(); submitGuess(name); });
    box.appendChild(div);
  });
  box.style.display = 'block';
}
function hideSuggestions() { document.getElementById('suggestions').style.display = 'none'; }

function openShare() {
  const boxes = guesses.map(g => g.toLowerCase() === puzzle.name.toLowerCase() ? '🟩' : '🟥');
  while (boxes.length < MAX_GUESSES) boxes.push('⬜');
  const score = phase === 'won' ? `${guesses.length}/${MAX_GUESSES}` : `X/${MAX_GUESSES}`;
  const text  = `BORDERS 🗺️\n${puzzle.name.toUpperCase()}\n${boxes.join('')} ${score}\nnewpress.com/borders`;
  const ta    = document.getElementById('share-textarea');
  ta.value    = text;
  try { navigator.clipboard.writeText(text).catch(() => {}); } catch {}
  document.getElementById('share-overlay').classList.add('open');
  setTimeout(() => { ta.focus(); ta.select(); }, 80);
}
function closeShare() { document.getElementById('share-overlay').classList.remove('open'); }

document.getElementById('guess-input').addEventListener('input', e => showSuggestions(e.target.value.trim().toLowerCase()));
document.getElementById('guess-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const v = document.getElementById('guess-input').value;
    const first = document.querySelector('.sug-item');
    submitGuess(resolveGuess(v) ?? first?.textContent ?? null);
  }
  if (e.key === 'Escape') hideSuggestions();
});
document.getElementById('guess-input').addEventListener('blur', () => setTimeout(hideSuggestions, 150));
document.getElementById('guess-btn').addEventListener('click', () => {
  const v = document.getElementById('guess-input').value;
  const first = document.querySelector('.sug-item');
  submitGuess(resolveGuess(v) ?? first?.textContent ?? null);
});
document.getElementById('next-btn').addEventListener('click', nextPuzzle);
document.getElementById('next-result-btn').addEventListener('click', nextPuzzle);
document.getElementById('share-btn').addEventListener('click', openShare);
document.getElementById('dismiss-btn').addEventListener('click', closeShare);
document.getElementById('share-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('share-overlay')) closeShare();
});

boot();
</script>
</body>
</html>
