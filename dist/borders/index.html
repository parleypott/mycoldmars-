 Trois Pitons National Park (includes Boiling Lake) · https://whc.unesco.org/en/list/814/","CIA World Factbook — Dominica geographic location and neighboring territories · https://www.cia.gov/the-world-factbook/countries/dominica/","CIA World Factbook — Dominica capital city Roseau · https://www.cia.gov/the-world-factbook/countries/dominica/","Caribbean Tourism Organization — Dominica nature tourism and whale watching · https://www.onecaribbean.org/content/dominica"]},"Dominican Republic":{"clues":["This nation produces the world's largest quantity of organic cacao and was the site of Christopher Columbus's first permanent European settlement in the Americas, established in 1496.","The Cordillera Central mountain range dominates the interior, featuring Pico Duarte at 3,098 meters, the highest peak in the Caribbean.","This territory shares the island of Hispaniola with Haiti to the west and is bordered by the Atlantic Ocean to the north.","Capital city starts with 'S'.","Merengue and bachata music originated here, and the nation is renowned for producing Major League Baseball superstars including Sammy Sosa and David Ortiz."],"sources":["CIA World Factbook — Dominican Republic economy and history · https://www.cia.gov/the-world-factbook/countries/dominican-republic/","Britannica — Geography of the Dominican Republic, Cordillera Central and Pico Duarte · https://www.britannica.com/place/Dominican-Republic/Relief","CIA World Factbook — Dominican Republic location and borders · https://www.cia.gov/the-world-factbook/countries/dominican-republic/","Britannica — Santo Domingo capital city · https://www.britannica.com/place/Santo-Domingo","UNESCO — Merengue intangible cultural heritage · https://ich.unesco.org/en/RL/merengue-in-the-dominican-republic-01290"]},"Ecuador":{"clues":["This country is a founding member of OPEC and remains one of the smallest oil producers in the organization, with significant reserves concentrated in the Amazon basin.","The Andes mountain range splits this territory into three distinct regions: coastal lowlands, highlands with numerous volcanoes including Cotopaxi, and eastern Amazon rainforest.","This nation shares borders with Colombia to the north and Peru to the east and south.","Capital city starts with 'Q'.","The Galápagos Islands, located about 1,000 kilometers off the mainland coast, inspired Charles Darwin's theory of evolution by natural selection."],"sources":["OPEC — Member Countries: Ecuador · https://www.opec.org/opec_web/en/about_us/146.htm","Britannica — Ecuador: Land · https://www.britannica.com/place/Ecuador/Land","CIA World Factbook — Ecuador: Geography · https://www.cia.gov/the-world-factbook/countries/ecuador/","CIA World Factbook — Ecuador: Government · https://www.cia.gov/the-world-factbook/countries/ecuador/","UNESCO World Heritage Centre — Galápagos Islands · https://whc.unesco.org/en/list/1"]},"East Timor":{"clues":["This nation became the first new sovereign state of the 21st century when it gained independence in 2002 after a UN-supervised referendum.","The territory features rugged mountainous terrain with peaks reaching over 2,900 meters, including Mount Ramelau, the highest point on the island.","It shares its only land border with Indonesia and lies across the Wetar Strait from Australia to the south.","Capital city starts with 'D'.","This country is one of only two predominantly Roman Catholic nations in Asia, with over 97% of the population practicing the faith."],"sources":["United Nations — UN Transitional Administration and independence of Timor-Leste in 2002 · https://peacekeeping.un.org/en/mission/past/etimor/etimor.htm","Britannica — Geography and Mount Ramelau (Tatamailau) at 2,963 meters · https://www.britannica.com/place/East-Timor","CIA World Factbook — Timor-Leste borders Indonesia and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/timor-leste/","CIA World Factbook — Capital city Dili · https://www.cia.gov/the-world-factbook/countries/timor-leste/","CIA World Factbook — Religious composition showing 97.6% Roman Catholic · https://www.cia.gov/the-world-factbook/countries/timor-leste/"]},"Egypt":{"clues":["This nation controls the Suez Canal, through which approximately 12% of global trade and 30% of container ship traffic passes annually.","The Eastern Desert stretches between the Nile River valley and the Red Sea coast, characterized by wadis and granite mountains reaching over 2,000 meters.","This country borders Libya to the west and Sudan to the south.","Capital city starts with 'C'.","The Great Pyramid of Giza, one of the Seven Wonders of the Ancient World, stands on the outskirts of this nation's capital."],"sources":["Suez Canal Authority — Official statistics on annual transit and global trade percentage · https://www.suezcanal.gov.eg/English/About/SuezCanal/Pages/CanalHistory.aspx","Britannica — Geography of Egypt: Eastern Desert topography and elevation · https://www.britannica.com/place/Egypt/The-Eastern-Desert","CIA World Factbook — Egypt: International boundaries and neighboring countries · https://www.cia.gov/the-world-factbook/countries/egypt/","CIA World Factbook — Egypt: Capital city information · https://www.cia.gov/the-world-factbook/countries/egypt/","UNESCO World Heritage Centre — Memphis and its Necropolis: Pyramid Fields from Giza to Dahshur · https://whc.unesco.org/en/list/86/"]},"El Salvador":{"clues":["This nation is the only Central American country without a Caribbean coastline, and was the site of the 1969 'Football War' with a neighboring nation over immigration and land reform tensions.","The Lempa River, the longest river flowing entirely within Central American borders, runs through this territory before emptying into the Pacific Ocean.","Bordered by Guatemala to the west and Honduras to the north and east.","Capital city starts with 'S'.","This country is the birthplace of pupusas, thick corn tortillas stuffed with cheese, beans, or pork, considered the national dish."],"sources":["Britannica — El Salvador: The Football War · https://www.britannica.com/place/El-Salvador/The-Football-War","CIA World Factbook — El Salvador Geography · https://www.cia.gov/the-world-factbook/countries/el-salvador/","CIA World Factbook — El Salvador: Introduction · https://www.cia.gov/the-world-factbook/countries/el-salvador/","Britannica — San Salvador, national capital, El Salvador · https://www.britannica.com/place/San-Salvador-national-capital-El-Salvador","UNESCO — Pupusas, emblematic dish of El Salvador · https://ich.unesco.org/en/decisions/13.COM/10.B.28"]},"Equatorial Guinea":{"clues":["This nation became sub-Saharan Africa's first major oil exporter in the 1990s, yet remains among the continent's most economically unequal despite having one of the highest per-capita GDPs.","The territory consists of a continental region plus five volcanic islands, with the largest island dominated by three striking volcanic peaks including Pico Basile rising over 3,000 meters.","It shares land borders with Cameroon to the north and Gabon to the south and east.","Capital city starts with 'M'.","Spanish is an official language here, making this one of the only places in sub-Saharan Africa where Spanish holds official status."],"sources":["CIA World Factbook — Equatorial Guinea Economy Overview: oil production and GDP data · https://www.cia.gov/the-world-factbook/countries/equatorial-guinea/","Britannica — Geography of Equatorial Guinea: volcanic islands and Pico Basile · https://www.britannica.com/place/Equatorial-Guinea","CIA World Factbook — Equatorial Guinea: land boundaries with Cameroon and Gabon · https://www.cia.gov/the-world-factbook/countries/equatorial-guinea/","CIA World Factbook — Equatorial Guinea: capital city Malabo · https://www.cia.gov/the-world-factbook/countries/equatorial-guinea/","Britannica — Equatorial Guinea: Spanish as official language · https://www.britannica.com/place/Equatorial-Guinea"]},"Eritrea":{"clues":["This nation has operated under a state of emergency since 1998, with no elections held since independence, making it one of the world's most restrictive states for press freedom and civil liberties.","The territory features a dramatic escarpment that rises from coastal desert lowlands near the Red Sea to a highland plateau exceeding 2,000 meters in elevation.","It shares borders with Sudan to the northwest and Djibouti to the southeast.","Capital city starts with 'A'.","The capital's Art Deco architecture and Italian-style cafes reflect decades of colonial influence, earning it the nickname 'Little Rome' of Africa."],"sources":["Freedom House — Freedom in the World 2024: Eritrea Country Report · https://freedomhouse.org/country/eritrea/freedom-world/2024","Britannica — Eritrea: Relief and Drainage · https://www.britannica.com/place/Eritrea/Relief-and-drainage","CIA World Factbook — Eritrea Geography · https://www.cia.gov/the-world-factbook/countries/eritrea/","CIA World Factbook — Eritrea Capital · https://www.cia.gov/the-world-factbook/countries/eritrea/","UNESCO — Asmara: A Modernist African City · https://whc.unesco.org/en/list/1550/"]},"Estonia":{"clues":["This nation hosts NATO's Cooperative Cyber Defence Centre of Excellence, established following a massive 2007 cyberattack on government and financial institutions.","Over 1,500 islands dot its Baltic coastline, with Saaremaa and Hiiumaa being the two largest, and roughly half the country is covered by forest.","This country shares land borders with Latvia to the south and Russia to the east, while sitting across the Gulf of Finland from a Nordic neighbor.","Capital city starts with 'T'.","This country pioneered e-residency and became famous for Skype, which was developed here and launched globally in 2003."],"sources":["NATO Cooperative Cyber Defence Centre of Excellence — Official website describing establishment in Tallinn following 2007 cyber attacks · https://ccdcoe.org/about-us/","CIA World Factbook — Geography section describing Estonian islands and forest coverage · https://www.cia.gov/the-world-factbook/countries/estonia/","Britannica — Estonia geography describing borders with Latvia and Russia · https://www.britannica.com/place/Estonia","CIA World Factbook — Estonia capital city information · https://www.cia.gov/the-world-factbook/countries/estonia/","e-Residency Official — Government program launched as world's first digital residency, and Skype origin history · https://e-resident.gov.ee/"]},"Ethiopia":{"clues":["This nation is the headquarters of the African Union and hosts more than 130 diplomatic missions, making it Africa's diplomatic capital.","The Great Rift Valley runs through the center of this territory, creating a dramatic escarpment with peaks exceeding 4,500 meters in the Simien Mountains.","This country shares borders with Eritrea to the north and Kenya to the south.","Capital city starts with 'A'.","This is considered the birthplace of coffee, where the arabica bean was first cultivated and the traditional coffee ceremony remains central to daily life."],"sources":["African Union — About the African Union Headquarters in Addis Ababa · https://au.int/en/headquarters","Britannica — Ethiopian Highlands and Great Rift Valley geographic features · https://www.britannica.com/place/Ethiopia/Relief","CIA World Factbook — Ethiopia country borders and neighboring nations · https://www.cia.gov/the-world-factbook/countries/ethiopia/","Britannica — Addis Ababa as capital city of Ethiopia · https://www.britannica.com/place/Addis-Ababa","National Coffee Association — History of coffee origins in Ethiopian highlands · https://www.ncausa.org/about-coffee/history-of-coffee"]},"Faroe Islands":{"clues":["This autonomous territory within the Kingdom of Denmark has its own currency, the króna, despite not being part of the European Union or eurozone.","The archipelago consists of 18 volcanic islands characterized by dramatic cliffs reaching over 700 meters high and deeply carved fjords.","Located in the North Atlantic Ocean between Iceland and Norway, roughly equidistant from both nations.","Capital city starts with 'T'.","Traditional grindadráp whale hunts have been practiced here for centuries, remaining a source of both sustenance and international controversy."],"sources":["CIA World Factbook — Faroe Islands economy and currency information · https://www.cia.gov/the-world-factbook/countries/faroe-islands/","Britannica — Faroe Islands physical geography and topography · https://www.britannica.com/place/Faroe-Islands","CIA World Factbook — Faroe Islands geographic location · https://www.cia.gov/the-world-factbook/countries/faroe-islands/","CIA World Factbook — Faroe Islands capital city Tórshavn · https://www.cia.gov/the-world-factbook/countries/faroe-islands/","Britannica — Faroe Islands whaling traditions and culture · https://www.britannica.com/place/Faroe-Islands"]},"Falkland Islands":{"clues":["This territory was the subject of a 1982 war between the United Kingdom and Argentina that lasted 74 days and resulted in British victory.","The terrain consists of two main islands with rugged, treeless moorland and over 700 smaller islands, with Mount Usborne reaching 705 meters as the highest point.","Located in the South Atlantic Ocean, approximately 480 kilometers east of the Patagonian coast of South America.","Capital city starts with 'S'.","The islands are home to five species of penguins, including large colonies of rockhopper and Magellanic penguins that attract wildlife tourists."],"sources":["Britannica — Falkland Islands War historical overview · https://www.britannica.com/event/Falkland-Islands-War","CIA World Factbook — Falkland Islands geography and terrain · https://www.cia.gov/the-world-factbook/countries/falkland-islands-islas-malvinas/","CIA World Factbook — Falkland Islands location and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/falkland-islands-islas-malvinas/","CIA World Factbook — Falkland Islands capital city · https://www.cia.gov/the-world-factbook/countries/falkland-islands-islas-malvinas/","Falklands Conservation — Penguin species and wildlife tourism · https://www.falklandsconservation.com/wildlife/penguins/"]},"Federated States of Micronesia":{"clues":["This nation operates under a Compact of Free Association with the United States, granting Washington defense authority while maintaining sovereignty since 1986.","The territory comprises 607 islands spread across four main states, scattered over more than 2,700 kilometers of the western Pacific Ocean.","Located in the Caroline Islands, this territory lies north of Papua New Guinea and east of Palau in the Pacific.","Capital city starts with 'P'.","These islands are famous for the ancient stone money disks called Rai, some weighing up to four metric tons and still used ceremonially today."],"sources":["U.S. Department of the Interior — Office of Insular Affairs: Compact of Free Association · https://www.doi.gov/oia/compact-of-free-association","CIA World Factbook — Micronesia, Federated States of Geography · https://www.cia.gov/the-world-factbook/countries/micronesia-federated-states-of/","Encyclopaedia Britannica — Federated States of Micronesia Location · https://www.britannica.com/place/Federated-States-of-Micronesia","CIA World Factbook — Micronesia, Federated States of Capital · https://www.cia.gov/the-world-factbook/countries/micronesia-federated-states-of/","UNESCO — Nan Madol: Ceremonial Centre of Eastern Micronesia · https://whc.unesco.org/en/list/1503/"]},"Fiji":{"clues":["This nation served as a major supply and training base for Allied forces during World War II, with thousands of troops stationed here before campaigns in the Solomon Islands and Guadalcanal.","The archipelago comprises over 330 islands formed by volcanic activity along the Pacific Ring of Fire, with only about 110 permanently inhabited.","Located in the South Pacific Ocean, this territory lies northeast of Vanuatu and west of Tonga.","Capital city starts with 'S'.","This destination is world-renowned for fire walking ceremonies and as a honeymoon paradise with luxury resorts on coral-fringed islands."],"sources":["New Zealand History — Fiji in World War II · https://nzhistory.govt.nz/war/fiji-in-world-war-ii","Encyclopædia Britannica — Fiji: Land · https://www.britannica.com/place/Fiji-republic-Pacific-Ocean/Land","CIA World Factbook — Fiji: Geography · https://www.cia.gov/the-world-factbook/countries/fiji/","CIA World Factbook — Fiji: Government · https://www.cia.gov/the-world-factbook/countries/fiji/","Encyclopædia Britannica — Fiji: Cultural Life · https://www.britannica.com/place/Fiji-republic-Pacific-Ocean/Cultural-life"]},"France":{"clues":["This permanent member of the UN Security Council possesses the world's third-largest nuclear arsenal and maintains veto power over international resolutions.","The territory encompasses the highest peak in the Alps, Mont Blanc, which rises to 4,808 meters at its triple border.","It shares borders with Belgium to the north and Italy to the southeast.","Capital city starts with 'P'.","The Eiffel Tower, completed in 1889 as the entrance arch to the World's Fair, stands as one of the most visited monuments globally."],"sources":["United Nations Security Council — List of permanent members with veto power · https://www.un.org/securitycouncil/content/current-members","Encyclopaedia Britannica — Mont Blanc: Height and location in the Alps · https://www.britannica.com/place/Mont-Blanc","CIA World Factbook — France: Border countries and geographic relations · https://www.cia.gov/the-world-factbook/countries/france/","Encyclopaedia Britannica — Paris: Capital city of France · https://www.britannica.com/place/Paris","Encyclopaedia Britannica — Eiffel Tower: History and significance · https://www.britannica.com/topic/Eiffel-Tower-Paris-France"]},"Finland":{"clues":["This nation holds the rotating presidency of the Arctic Council until 2027, leading governance of the polar region alongside seven other Arctic states.","Approximately 188,000 lakes dot this heavily forested landscape, which lies largely on ancient Precambrian bedrock of the Fennoscandian Shield.","It shares its longest land border with Russia to the east and touches Sweden and Norway to the northwest.","Capital city starts with 'H'.","This country is widely considered the birthplace of the sauna tradition, with an estimated 3 million saunas for a population of 5.5 million people."],"sources":["Arctic Council — Member States and Permanent Participants · https://arctic-council.org/about/states/","Britannica — Finland: Land and Climate · https://www.britannica.com/place/Finland/Land","CIA World Factbook — Finland: Geography · https://www.cia.gov/the-world-factbook/countries/finland/","CIA World Factbook — Finland: Government · https://www.cia.gov/the-world-factbook/countries/finland/","Visit Finland — Sauna Culture · https://www.visitfinland.com/en/articles/everything-you-need-to-know-about-finnish-sauna-culture/"]},"French Southern and Antarctic Lands":{"clues":["This territory was established as a distinct administrative unit in 1955, consolidating several scattered island groups and a sector of Antarctica claimed since 1924.","The islands feature active volcanic peaks, with one reaching 1,090 meters above sea level and displaying persistent fumarolic activity.","The territory's islands lie in the southern Indian Ocean, positioned between Madagascar and Antarctica.","The administrative capital starts with 'S'.","This territory is home to one of the world's largest populations of king penguins, with colonies numbering in the hundreds of thousands."],"sources":["Encyclopædia Britannica — French Southern and Antarctic Lands historical formation and administrative status · https://www.britannica.com/place/French-Southern-and-Antarctic-Lands","Global Volcanism Program, Smithsonian Institution — Heard Island volcano elevation and activity · https://volcano.si.edu/volcano.cfm?vn=234010","CIA World Factbook — French Southern and Antarctic Lands geographic location · https://www.cia.gov/the-world-factbook/countries/french-southern-and-antarctic-lands/","Government of France — French Southern and Antarctic Lands administrative headquarters at Saint-Pierre · https://www.taaf.fr/","UNESCO World Heritage Centre — King penguin populations in the French sub-Antarctic islands · https://whc.unesco.org/en/list/745/"]},"French Polynesia":{"clues":["This overseas collectivity was the site of 193 nuclear weapons tests conducted between 1966 and 1996, including the first atmospheric test codenamed Aldébaran.","The territory comprises 118 islands and atolls spread across five archipelagos, with 67 of them being coral atolls formed around sunken volcanic peaks.","This territory lies in the South Pacific Ocean, roughly halfway between South America and Australia, with no land borders.","Capital city starts with 'P'.","This destination is famous for its overwater bungalows, black pearl farms, and the dramatic volcanic peaks of its most visited island."],"sources":["Comprehensive Nuclear-Test-Ban Treaty Organization — French nuclear testing in the Pacific · https://www.ctbto.org/specials/testing-times/16-july-1945-the-trinity-test-new-mexico-usa/france","Encyclopædia Britannica — French Polynesia geography and island composition · https://www.britannica.com/place/French-Polynesia","CIA World Factbook — French Polynesia location and geography · https://www.cia.gov/the-world-factbook/countries/french-polynesia/","CIA World Factbook — French Polynesia capital city information · https://www.cia.gov/the-world-factbook/countries/french-polynesia/","UNESCO — Cultural and tourism features of the Society Islands · https://whc.unesco.org/en/tentativelists/6566/"]},"Gabon":{"clues":["This nation is OPEC's fifth-smallest oil producer by volume, yet petroleum revenues account for roughly 80% of its export earnings.","The Crystal Mountains rise along the country's western interior, separating the coastal plains from the Congo River basin plateau.","This territory shares its longest border with the Republic of the Congo to the east and south.","Capital city starts with 'L'.","Over 88% of this country's land area is covered by tropical rainforest, one of the highest percentages in the world."],"sources":["OPEC — Annual Statistical Bulletin 2023, production data and member state profiles · https://www.opec.org/opec_web/en/publications/202.htm","Britannica — Gabon: Relief and drainage, Crystal Mountains description · https://www.britannica.com/place/Gabon/Relief-and-drainage","CIA World Factbook — Gabon: Geography, international boundaries · https://www.cia.gov/the-world-factbook/countries/gabon/","CIA World Factbook — Gabon: Government, capital information · https://www.cia.gov/the-world-factbook/countries/gabon/","World Bank — Forest area percentage of land area, Gabon data · https://data.worldbank.org/indicator/AG.LND.FRST.ZS?locations=GA"]},"Gambia":{"clues":["This nation ranks among the world's smallest mainland African countries yet paradoxically formed a confederation with its much larger neighbor from 1982 to 1989.","The territory follows a nearly straight river valley for approximately 470 kilometers inland from the Atlantic, creating an unusually narrow east-west oriented shape rarely wider than 50 kilometers north to south.","It is almost entirely surrounded by Senegal, except for a short Atlantic coastline.","Capital city starts with 'B'.","Kora music, featuring a 21-stringed bridge-harp played by hereditary griots, is recognized internationally as a distinctive musical tradition from this region."],"sources":["Britannica — Article on Senegambia Confederation (1982-1989) · https://www.britannica.com/place/Senegambia","CIA World Factbook — Geography section describing river-based territorial configuration · https://www.cia.gov/the-world-factbook/countries/gambia/","CIA World Factbook — Geography section listing Senegal as sole land border · https://www.cia.gov/the-world-factbook/countries/gambia/","CIA World Factbook — Capital city information · https://www.cia.gov/the-world-factbook/countries/gambia/","UNESCO — Intangible Cultural Heritage of kora music tradition · https://ich.unesco.org/en/RL/kora-musical-tradition-00733"]},"Georgia":{"clues":["This nation hosts a breakaway region that fought a war in 2008 resulting in Russian military recognition of its independence.","The Greater Caucasus mountain range forms a natural northern boundary, with peaks exceeding 5,000 meters including Mount Kazbek.","It shares borders with Turkey to the southwest and Armenia to the south.","Capital city starts with 'T'.","This country is considered the birthplace of wine, with archaeological evidence of winemaking dating back 8,000 years."],"sources":["BBC News — South Ossetia profile covering the 2008 war and Russian recognition · https://www.bbc.com/news/world-europe-18269210","Britannica — Geography of Georgia describing the Greater Caucasus mountain system · https://www.britannica.com/place/Georgia/Relief","CIA World Factbook — Georgia page listing Turkey and Armenia among bordering countries · https://www.cia.gov/the-world-factbook/countries/georgia/","CIA World Factbook — Georgia capital city information · https://www.cia.gov/the-world-factbook/countries/georgia/","National Geographic — Article on Georgia as the birthplace of wine with 8,000-year history · https://www.nationalgeographic.com/culture/article/georgia-wine-8000-year-history"]},"Germany":{"clues":["This territory hosts the European Central Bank headquarters in Frankfurt, which sets monetary policy for the eurozone's 20 member states.","The Rhine River flows 865 kilometers through this territory from south to north, passing through a dramatic gorge with steep vineyard-covered slopes.","This territory shares its eastern border with Poland and the Czech Republic.","Capital city starts with 'B'.","Oktoberfest, the world's largest folk festival attracting over 6 million visitors annually, takes place in Munich every autumn."],"sources":["European Central Bank — Official ECB location and mandate information · https://www.ecb.europa.eu/ecb/html/index.en.html","Britannica — Rhine River geography and course through Germany · https://www.britannica.com/place/Rhine-River","CIA World Factbook — Germany border countries · https://www.cia.gov/the-world-factbook/countries/germany/","Britannica — Berlin as capital of Germany · https://www.britannica.com/place/Berlin","Oktoberfest Official — Annual attendance and festival information · https://www.oktoberfest.de/en"]},"Gibraltar":{"clues":["This territory was ceded to Britain by the Treaty of Utrecht in 1713 following the War of Spanish Succession.","The famous limestone promontory rising 426 meters above sea level dominates this territory's landscape.","It borders Spain to the north and sits at the entrance to the Mediterranean Sea.","Capital city starts with 'G'.","The territory is home to the only wild monkey population in Europe, the Barbary macaques."],"sources":["Britannica — Treaty of Utrecht and Gibraltar's cession to Britain · https://www.britannica.com/place/Gibraltar/History","Britannica — The Rock of Gibraltar physical geography and elevation · https://www.britannica.com/place/Gibraltar","CIA World Factbook — Gibraltar's location and borders · https://www.cia.gov/the-world-factbook/countries/gibraltar/","CIA World Factbook — Gibraltar capital city · https://www.cia.gov/the-world-factbook/countries/gibraltar/","Britannica — Barbary macaques population in Gibraltar · https://www.britannica.com/place/Gibraltar"]},"Greece":{"clues":["This country's sovereign debt crisis in 2009-2010 threatened the stability of the eurozone and led to three international bailout programs totaling over €280 billion.","The Pindus mountain range forms the geological spine of this country's mainland, while over 6,000 islands and islets dot its coastline along three seas.","It shares land borders with Albania, North Macedonia, Bulgaria, and Turkey.","Capital city starts with 'A'.","The ancient Parthenon temple sits atop the Acropolis overlooking the capital, and this country is widely considered the birthplace of Western democracy and the Olympic Games."],"sources":["International Monetary Fund — Greece and the IMF: Overview of bailout programs and economic crisis · https://www.imf.org/en/Countries/GRC","Britannica — Geography of Greece: Pindus Mountains and island topography · https://www.britannica.com/place/Greece/Relief","CIA World Factbook — Greece: Bordering countries and geographic location · https://www.cia.gov/the-world-factbook/countries/greece/","CIA World Factbook — Greece: Capital city information · https://www.cia.gov/the-world-factbook/countries/greece/","UNESCO World Heritage Centre — Acropolis, Athens: Cultural heritage site description · https://whc.unesco.org/en/list/404/"]},"Greenland":{"clues":["This territory hosts the U.S. Pituffik Space Base, formerly Thule Air Base, a crucial installation for ballistic missile early warning and space surveillance in the Arctic.","The world's largest island contains about 80% ice sheet coverage, with the ice reaching depths of over 3 kilometers in central regions.","The Davis Strait separates this territory from Baffin Island to the west, while the Denmark Strait lies between it and Iceland to the east.","Capital city starts with 'N'.","The massive ice sheet here contains enough frozen water to raise global sea levels by approximately 7 meters if completely melted."],"sources":["U.S. Space Force — Pituffik Space Base official designation and Arctic mission details · https://www.spaceforce.mil/About-Us/Fact-Sheets/Article/2197689/pituffik-space-base/","National Snow and Ice Data Center — Greenland Ice Sheet facts and coverage statistics · https://nsidc.org/cryosphere/glaciers/questions/located.html","Britannica — Greenland geography and surrounding waters · https://www.britannica.com/place/Greenland","CIA World Factbook — Greenland capital city information · https://www.cia.gov/the-world-factbook/countries/greenland/","NASA — Greenland Ice Sheet sea level rise potential · https://climate.nasa.gov/news/2361/greenland-antarctica-melting-six-times-faster-than-in-the-1990s/"]},"Grenada":{"clues":["In 1983, this island nation was invaded by U.S. forces in Operation Urgent Fury following a coup that killed its Prime Minister Maurice Bishop.","This volcanic island features the crater lake Grand Etang at 530 meters elevation, surrounded by lush rainforest in its mountainous interior.","This Caribbean island nation lies in the Lesser Antilles, bordered by the Caribbean Sea to the west and the Atlantic Ocean to the east.","Capital city starts with 'S'.","Known as the 'Spice Isle,' this nation produces nearly one-third of the world's nutmeg supply."],"sources":["Britannica — Grenada: U.S. Invasion and Its Aftermath · https://www.britannica.com/place/Grenada/U-S-invasion-and-its-aftermath","CIA World Factbook — Grenada Geography · https://www.cia.gov/the-world-factbook/countries/grenada/","CIA World Factbook — Grenada Geography: Location · https://www.cia.gov/the-world-factbook/countries/grenada/","CIA World Factbook — Grenada: Capital · https://www.cia.gov/the-world-factbook/countries/grenada/","Britannica — Grenada: Economy and Agriculture · https://www.britannica.com/place/Grenada"]},"Guam":{"clues":["This territory hosts Andersen Air Force Base, a critical strategic bomber hub for U.S. Indo-Pacific Command operations.","The island's highest point is Mount Lamlam at 406 meters, part of a volcanic chain with steep limestone cliffs along the southern coastline.","Located in the western Pacific Ocean, this territory lies in the Philippine Sea east of the Philippines.","Capital city starts with 'H'.","Chamorro culture thrives here, where ancient latte stone pillars mark historic village sites across the island."],"sources":["U.S. Air Force — Andersen Air Force Base mission and strategic role · https://www.andersen.af.mil/About-Us/","Britannica — Geography and topography of Guam including Mount Lamlam · https://www.britannica.com/place/Guam","CIA World Factbook — Guam location and adjacent seas · https://www.cia.gov/the-world-factbook/countries/guam/","CIA World Factbook — Guam capital city Hagåtña · https://www.cia.gov/the-world-factbook/countries/guam/","National Park Service — Latte stone structures and Chamorro heritage · https://www.nps.gov/parkhistory/online_books/npswapa/extContent/wapa/guides/guam/gtmguam.htm"]},"Guatemala":{"clues":["This country was the heart of the CIA-orchestrated Operation PBSUCCESS in 1954, which overthrew the democratically elected government of Jacobo Árbenz.","The Sierra Madre mountain range runs through this territory, and Lake Atitlán—formed in a massive volcanic caldera—is considered one of the deepest lakes in Central America.","This nation shares borders with Mexico to the north and west, and Belize to the northeast.","Capital city starts with 'G'.","The ancient ruins of Tikal, one of the largest archaeological sites of the pre-Columbian Maya civilization, lie within this country's rainforests."],"sources":["History.com — CIA Overthrows Government of Guatemala · https://www.history.com/this-day-in-history/cia-overthrows-government-of-guatemala","Britannica — Lake Atitlán geographic and volcanic formation · https://www.britannica.com/place/Lake-Atitlan","CIA World Factbook — Guatemala international borders · https://www.cia.gov/the-world-factbook/countries/guatemala/","CIA World Factbook — Guatemala capital city information · https://www.cia.gov/the-world-factbook/countries/guatemala/","UNESCO World Heritage Centre — Tikal National Park · https://whc.unesco.org/en/list/64/"]},"Guernsey":{"clues":["This Crown dependency operates as an offshore financial center and is not part of the United Kingdom, though the British monarch serves as its head of state.","The territory comprises one main island and several smaller islets with dramatic cliff coastlines reaching up to 90 meters high on the southern shores.","Located in the English Channel, it sits approximately 30 miles west of the Normandy coast of France.","Capital city starts with 'S'.","This island is famous for its distinctive breed of dairy cattle that produces rich, golden-colored milk with high butterfat content."],"sources":["CIA World Factbook — Guernsey Government and Political Status · https://www.cia.gov/the-world-factbook/countries/guernsey/","Britannica — Guernsey Geography and Terrain · https://www.britannica.com/place/Guernsey-island-English-Channel","CIA World Factbook — Guernsey Location and Geography · https://www.cia.gov/the-world-factbook/countries/guernsey/","Britannica — Saint Peter Port as Capital of Guernsey · https://www.britannica.com/place/Saint-Peter-Port","Britannica — Guernsey Cattle Breed and Characteristics · https://www.britannica.com/animal/Guernsey-cattle"]},"Guinea":{"clues":["This country is the world's second-largest producer of bauxite, the primary ore used in aluminum production.","The Fouta Djallon highlands in the central region serve as the source of major West African rivers including the Niger, Gambia, and Senegal.","This territory shares borders with Sierra Leone to the south and Mali to the northeast.","Capital city starts with 'C'.","This nation is home to Mount Nimba, a UNESCO World Heritage Site shared with neighboring countries and known for its unique biodiversity including viviparous toads."],"sources":["U.S. Geological Survey — Mineral Commodity Summaries 2024: Bauxite and Alumina · https://pubs.usgs.gov/periodicals/mcs2024/mcs2024-bauxite.pdf","Britannica — Fouta Djallon highlands as source of West African rivers · https://www.britannica.com/place/Fouta-Djallon","CIA World Factbook — Guinea country borders and neighboring nations · https://www.cia.gov/the-world-factbook/countries/guinea/","CIA World Factbook — Guinea capital city information · https://www.cia.gov/the-world-factbook/countries/guinea/","UNESCO World Heritage Centre — Mount Nimba Strict Nature Reserve · https://whc.unesco.org/en/list/155/"]},"Guinea-Bissau":{"clues":["This country experienced one of Africa's first successful military coups against a colonial power in 1974, triggering the Carnation Revolution in the metropole.","The Bijagós Archipelago comprises over 80 islands along its coast, creating one of West Africa's most extensive island systems.","It shares borders with Senegal to the north and Guinea to the south and east.","Capital city starts with 'B'.","Cashew nuts are the leading export crop, with this nation ranking among the world's top six producers."],"sources":["Britannica — Guinea-Bissau history and the 1974 independence war that influenced Portugal's regime change · https://www.britannica.com/place/Guinea-Bissau/History","UNESCO — Bolama Bijagós Biosphere Reserve describing the archipelago of over 80 islands · https://en.unesco.org/biosphere/africa/bolama-bijagos","CIA World Factbook — Guinea-Bissau geography showing borders with Senegal and Guinea · https://www.cia.gov/the-world-factbook/countries/guinea-bissau/","CIA World Factbook — Guinea-Bissau capital city Bissau · https://www.cia.gov/the-world-factbook/countries/guinea-bissau/","Food and Agriculture Organization — Cashew production statistics for West African nations · https://www.fao.org/3/ca8753en/ca8753en.pdf"]},"Guyana":{"clues":["This country is the only member of both CARICOM and the Commonwealth of Nations in mainland South America, and has an ongoing territorial dispute with its western neighbor over the Essequibo region.","The Kaieteur Falls on the Potaro River plunges 226 meters in a single drop, making it one of the world's most powerful waterfalls by volume.","This territory borders Brazil to the south and Suriname to the east.","Capital city starts with 'G'.","This country is home to the massive Stabroek Block offshore oil discovery, which began production in 2019 and transformed its economy into one of the world's fastest-growing."],"sources":["CARICOM Secretariat — Member States and Associate Members · https://caricom.org/member-states-and-associate-members/","World Waterfall Database — Kaieteur Falls · https://www.worldwaterfalldatabase.com/waterfall/Kaieteur-Falls-253/","CIA World Factbook — Guyana Geography · https://www.cia.gov/the-world-factbook/countries/guyana/","Britannica — Guyana Capital · https://www.britannica.com/place/Guyana","U.S. Energy Information Administration — Guyana Country Analysis · https://www.eia.gov/international/analysis/country/GUY"]},"Haiti":{"clues":["This territory was forced to pay 150 million francs in independence debt to France from 1825 until 1947, crippling its economy for over a century.","The Massif de la Selle mountain range dominates the southern peninsula, with Pic la Selle reaching 2,680 meters as the highest point.","This territory shares the island of Hispaniola with the Dominican Republic to the east.","Capital city starts with 'P'.","This territory is widely recognized as the birthplace of the world's first successful slave revolution, which culminated in independence in 1804."],"sources":["The New York Times — France's Colonial Tax on Haiti and Its Lasting Economic Impact · https://www.nytimes.com/2022/05/20/world/americas/haiti-history-colonized-france.html","Britannica — Haiti Geography: Massif de la Selle and Pic la Selle · https://www.britannica.com/place/Haiti/Relief","CIA World Factbook — Haiti: Geographic Location and Borders · https://www.cia.gov/the-world-factbook/countries/haiti/","CIA World Factbook — Haiti: Capital City Information · https://www.cia.gov/the-world-factbook/countries/haiti/","Britannica — Haitian Revolution and Independence 1804 · https://www.britannica.com/topic/Haitian-Revolution"]},"Heard Island and McDonald Islands":{"clues":["This territory was transferred from British to Australian sovereignty in 1947 and remains one of the most remote external territories in the world.","The landscape is dominated by Big Ben, a 2,745-meter active stratovolcano that last erupted in 2016, making it one of the few active volcanoes in Australian-administered territory.","Located in the southern Indian Ocean, approximately 4,100 kilometers southwest of Perth, Australia.","Capital city starts with 'N'.","This uninhabited volcanic territory is home to thousands of breeding pairs of king penguins and elephant seals, making it one of the most important sub-Antarctic wildlife refuges."],"sources":["Australian Antarctic Division — Heard Island and McDonald Islands History and Sovereignty · https://www.antarctica.gov.au/about-antarctica/people-in-antarctica/heard-island-and-mcdonald-islands/","Smithsonian Institution Global Volcanism Program — Big Ben Volcano Summary · https://volcano.si.edu/volcano.cfm?vn=234010","CIA World Factbook — Heard Island and McDonald Islands Geography · https://www.cia.gov/the-world-factbook/countries/heard-island-and-mcdonald-islands/","Australian Government Department of Agriculture, Water and the Environment — Territory Administration · https://www.antarctica.gov.au/about-antarctica/people-in-antarctica/heard-island-and-mcdonald-islands/","UNESCO — Heard and McDonald Islands World Heritage Site · https://whc.unesco.org/en/list/577/"]},"Honduras":{"clues":["This country was the original 'banana republic,' a term coined in 1904 after American fruit companies gained enormous political and economic influence over its government.","The Mosquito Coast stretches along its Caribbean shoreline, while the inland terrain is dominated by rugged mountains that reach over 2,800 meters at Cerro Las Minas.","It shares borders with Guatemala to the west, El Salvador to the southwest, and Nicaragua to the southeast.","Capital city starts with 'T'.","The ancient Maya ruins of Copán, a UNESCO World Heritage Site, feature intricately carved stelae and the famous Hieroglyphic Stairway with over 1,200 glyphs."],"sources":["Britannica — Banana republic historical context and economic history · https://www.britannica.com/place/Honduras/Economy","CIA World Factbook — Honduras geography and terrain features · https://www.cia.gov/the-world-factbook/countries/honduras/","CIA World Factbook — Honduras border countries · https://www.cia.gov/the-world-factbook/countries/honduras/","CIA World Factbook — Honduras capital city · https://www.cia.gov/the-world-factbook/countries/honduras/","UNESCO — Copán Maya Site World Heritage listing · https://whc.unesco.org/en/list/129/"]},"Hong Kong S.A.R.":{"clues":["This Special Administrative Region operates under the 'one country, two systems' principle established by the 1984 Sino-British Joint Declaration, maintaining its own legal system and currency until at least 2047.","The territory consists of over 260 islands plus a mainland peninsula, with Victoria Peak rising 552 meters above one of the world's deepest natural harbors.","It borders Guangdong Province to the north and the South China Sea to the south, east, and west.","Capital city starts with 'C'.","This global financial hub is famous for its iconic skyline featuring the Bank of China Tower and its Star Ferry crossing the harbor between Kowloon and the island."],"sources":["CIA World Factbook — Hong Kong Special Administrative Region background and government type · https://www.cia.gov/the-world-factbook/countries/hong-kong/","Britannica — Hong Kong geography and terrain description · https://www.britannica.com/place/Hong-Kong/Relief","CIA World Factbook — Hong Kong geographic coordinates and borders · https://www.cia.gov/the-world-factbook/countries/hong-kong/","Britannica — City of Victoria as capital of Hong Kong · https://www.britannica.com/place/Victoria-Hong-Kong-China","Britannica — Hong Kong landmarks and harbor features · https://www.britannica.com/place/Hong-Kong"]},"Hungary":{"clues":["This landlocked nation joined NATO in 1999 as part of the alliance's first post-Cold War expansion alongside Poland and the Czech Republic.","The Danube River flows through this country for approximately 417 kilometers, dividing it into the Great Plain in the east and the Transdanubian region in the west.","This country shares its longest border with Romania to the east and also borders Austria to the west.","Capital city starts with 'B'.","This country is famous for its thermal baths and spa culture, with goulash being its most internationally recognized national dish."],"sources":["NATO — NATO's relations with Hungary · https://www.nato.int/cps/en/natohq/topics_48866.htm","Britannica — Hungary: The land · https://www.britannica.com/place/Hungary/The-land","CIA World Factbook — Hungary: Geography · https://www.cia.gov/the-world-factbook/countries/hungary/","Britannica — Budapest · https://www.britannica.com/place/Budapest","UNESCO — Budapest, including the Banks of the Danube · https://whc.unesco.org/en/list/400/"]},"Iceland":{"clues":["This island nation withdrew its European Union membership application in 2015, citing concerns over fisheries management and sovereignty after economic recovery from the 2008 financial crisis.","The Mid-Atlantic Ridge runs directly through this volcanic island, creating a rift valley where the North American and Eurasian tectonic plates are actively diverging.","This territory sits in the North Atlantic Ocean, positioned between Greenland to the northwest and Norway to the east.","Capital city starts with 'R'.","This destination is renowned for the Blue Lagoon geothermal spa and frequent displays of the aurora borealis during winter months."],"sources":["BBC News — Iceland withdraws EU membership application · https://www.bbc.com/news/world-europe-31830980","National Park Service — Plate Tectonics and Volcanic Activity in Iceland · https://www.nps.gov/articles/plate-tectonics-and-volcanic-activity-in-iceland.htm","CIA World Factbook — Iceland Geography · https://www.cia.gov/the-world-factbook/countries/iceland/","Britannica — Reykjavik, capital of Iceland · https://www.britannica.com/place/Reykjavik","UNESCO — Vatnajökull National Park and aurora borealis tourism · https://whc.unesco.org/en/tentativelists/5542/"]},"India":{"clues":["This nation is the world's largest producer of milk, accounting for over 23% of global production as of recent years.","The Deccan Plateau dominates the southern interior, while the Himalayas form the northern mountain barrier reaching elevations above 8,000 meters.","This territory shares borders with Pakistan to the northwest and Bangladesh to the east.","Capital city starts with 'N'.","The Taj Mahal, a white marble mausoleum built in the 17th century, stands as one of the world's most recognized monuments."],"sources":["Food and Agriculture Organization of the United Nations — World milk production statistics · https://www.fao.org/dairy-production-products/production/en/","Britannica — Article on the Deccan Plateau and Himalayan mountain system · https://www.britannica.com/place/India","CIA World Factbook — Border countries listing · https://www.cia.gov/the-world-factbook/countries/india/","CIA World Factbook — Capital city information · https://www.cia.gov/the-world-factbook/countries/india/","UNESCO World Heritage Centre — Taj Mahal inscription details · https://whc.unesco.org/en/list/252/"]},"Indian Ocean Territories":{"clues":["This territory was established in 1965 when it was administratively separated from Mauritius by the United Kingdom, later becoming the subject of ongoing sovereignty disputes at the International Court of Justice.","The archipelago comprises seven atolls with over 1,000 individual islands, most lying just a few meters above sea level in the tropical waters of the Chagos Archipelago.","Located approximately 500 kilometers south of the Maldives in the central Indian Ocean, surrounded entirely by international waters.","Capital settlement starts with 'D'.","The territory hosts one of the world's largest marine protected areas, covering over 640,000 square kilometers of pristine coral reefs and ocean."],"sources":["International Court of Justice — Advisory Opinion on the Legal Consequences of the Separation of the Chagos Archipelago from Mauritius in 1965 · https://www.icj-cij.org/case/169","Britannica — British Indian Ocean Territory geographic and physical features · https://www.britannica.com/place/British-Indian-Ocean-Territory","CIA World Factbook — British Indian Ocean Territory location and geography · https://www.cia.gov/the-world-factbook/countries/british-indian-ocean-territory/","CIA World Factbook — British Indian Ocean Territory capital information · https://www.cia.gov/the-world-factbook/countries/british-indian-ocean-territory/","UK Government — Chagos Marine Protected Area designation and extent · https://www.gov.uk/government/news/chagos-marine-protected-area"]},"Indonesia":{"clues":["This archipelagic nation is the world's largest exporter of palm oil and a founding member of ASEAN.","Over 17,000 islands stretch across the equator between two oceans, with more than 400 volcanoes including Krakatoa.","This country shares land borders with Papua New Guinea, Malaysia, and Timor-Leste.","Capital city starts with 'J'.","Home to the ancient Buddhist temple complex of Borobudur, one of the world's largest Buddhist monuments."],"sources":["United States Department of Agriculture — Indonesia: Leading Global Palm Oil Producer and Exporter · https://www.fas.usda.gov/data/indonesia-oilseeds-and-products-annual-6","Smithsonian Global Volcanism Program — Volcanoes of Indonesia · https://volcano.si.edu/faq/index.cfm?question=countries","CIA World Factbook — Indonesia: Geography and Borders · https://www.cia.gov/the-world-factbook/countries/indonesia/","Britannica — Jakarta, capital of Indonesia · https://www.britannica.com/place/Jakarta","UNESCO World Heritage Centre — Borobudur Temple Compounds · https://whc.unesco.org/en/list/592/"]},"Iran":{"clues":["This nation is the world's second-largest producer of natural gas after the United States and holds approximately 17% of global proven gas reserves.","The Zagros Mountains, stretching over 1,500 kilometers in a northwest-southeast direction, form the country's most extensive mountain range and contain numerous peaks exceeding 4,000 meters.","This territory shares borders with Turkmenistan to the northeast and Pakistan to the southeast.","Capital city starts with 'T'.","Persepolis, the ceremonial capital of the ancient Achaemenid Empire founded by Darius I around 518 BCE, remains one of the world's most significant archaeological sites."],"sources":["U.S. Energy Information Administration — Iran holds world's second-largest natural gas reserves · https://www.eia.gov/international/analysis/country/IRN","Britannica — Zagros Mountains geographic description and extent · https://www.britannica.com/place/Zagros-Mountains","CIA World Factbook — Iran country borders and neighboring states · https://www.cia.gov/the-world-factbook/countries/iran/","Britannica — Tehran as capital city · https://www.britannica.com/place/Tehran","UNESCO World Heritage Centre — Persepolis archaeological site · https://whc.unesco.org/en/list/114/"]},"Iraq":{"clues":["This country contains the world's second-largest proven petroleum reserves, holding approximately 145 billion barrels as of recent estimates.","The Tigris and Euphrates rivers converge in the southern region to form the Shatt al-Arab waterway before emptying into the Persian Gulf.","This territory shares borders with Kuwait to the south and Turkey to the north.","Capital city starts with 'B'.","Ancient Babylon, one of the Seven Wonders of the Ancient World featuring the Hanging Gardens, was located in this country's territory."],"sources":["OPEC — Annual Statistical Bulletin: Iraq proven crude oil reserves · https://www.opec.org/opec_web/en/data_graphs/330.htm","Britannica — Shatt al-Arab: Geography and formation from Tigris-Euphrates confluence · https://www.britannica.com/place/Shatt-al-Arab","CIA World Factbook — Iraq: Border countries and geographic relationships · https://www.cia.gov/the-world-factbook/countries/iraq/","UN Data — Iraq: Capital city information · http://data.un.org/CountryProfile.aspx?crName=iraq","UNESCO — Babylon: World Heritage Site description and historical significance · https://whc.unesco.org/en/list/278/"]},"Ireland":{"clues":["This territory was the first in the world to introduce a nationwide smoking ban in workplaces in 2004, including bars and restaurants.","The Burren, a unique karst limestone landscape covering over 250 square kilometers, dominates the western region with its moon-like terrain of bare rock pavements.","Bordered by the Atlantic Ocean to the west and the Irish Sea to the east.","Capital city starts with 'D'.","This island is famously associated with St. Patrick's Day celebrations, shamrocks, and the legendary Blarney Stone."],"sources":["World Health Organization — Smoke-free policies in Ireland · https://www.who.int/tobacco/media/en/ireland.pdf","Britannica — The Burren karst region description · https://www.britannica.com/place/the-Burren","CIA World Factbook — Ireland geography and borders · https://www.cia.gov/the-world-factbook/countries/ireland/","Britannica — Dublin as capital city · https://www.britannica.com/place/Dublin","Britannica — St. Patrick's Day and Irish cultural traditions · https://www.britannica.com/topic/Saint-Patricks-Day"]},"Isle of Man":{"clues":["This self-governing Crown Dependency operates its own low-tax economy and is not part of the United Kingdom or European Union, though the UK handles its defense and foreign affairs.","A central mountain range culminates in Snaefell, rising 621 meters above sea level and offering views across surrounding waters on clear days.","Located in the Irish Sea, positioned roughly equidistant between England, Scotland, Northern Ireland, and Wales.","Capital city starts with 'D'.","The annual TT motorcycle races, held since 1907, transform public roads into one of the world's most dangerous racing circuits."],"sources":["CIA World Factbook — Isle of Man Government and Economy · https://www.cia.gov/the-world-factbook/countries/isle-of-man/","Britannica — Isle of Man Physical Geography and Snaefell · https://www.britannica.com/place/Isle-of-Man","CIA World Factbook — Isle of Man Location in Irish Sea · https://www.cia.gov/the-world-factbook/countries/isle-of-man/","Britannica — Douglas as Capital of Isle of Man · https://www.britannica.com/place/Douglas-Isle-of-Man","Britannica — Isle of Man TT Races History · https://www.britannica.com/sports/Tourist-Trophy"]},"Israel":{"clues":["This territory joined the OECD in 2010, becoming the organization's first new member from the Middle East region.","The Dead Sea, Earth's lowest elevation on land at approximately 430 meters below sea level, lies along this territory's eastern border.","This territory borders Lebanon to the north and Egypt to the southwest.","Capital city starts with 'J'.","The Western Wall in Jerusalem draws millions of pilgrims and visitors annually as one of the holiest sites in Judaism."],"sources":["OECD — Israel becomes OECD's 34th Member country · https://www.oecd.org/en/about/news/press-releases/2010/09/israel-becomes-oecds-34th-member-country.html","Britannica — Dead Sea: Earth's lowest point on land · https://www.britannica.com/place/Dead-Sea","CIA World Factbook — Israel: Geography and borders · https://www.cia.gov/the-world-factbook/countries/israel/","Britannica — Jerusalem: capital of Israel · https://www.britannica.com/place/Jerusalem","Britannica — Western Wall: Jewish holy site in Jerusalem · https://www.britannica.com/topic/Western-Wall"]},"Italy":{"clues":["This founding member of the European Coal and Steel Community signed the Treaty of Rome in 1957, establishing the European Economic Community.","The Apennine mountain range forms a backbone extending roughly 1,200 kilometers down the length of a peninsula, with the Po River valley dominating the northern lowlands.","This territory shares land borders with France, Switzerland, Austria, and Slovenia.","Capital city starts with 'R'.","The Colosseum, a massive ancient amphitheater completed in 80 AD, stands as one of the world's most recognizable landmarks."],"sources":["Britannica — Treaty of Rome and European Economic Community founding · https://www.britannica.com/event/Treaty-of-Rome","CIA World Factbook — Italy Geography: Apennines mountain range and Po River valley · https://www.cia.gov/the-world-factbook/countries/italy/","CIA World Factbook — Italy borders with France, Switzerland, Austria, and Slovenia · https://www.cia.gov/the-world-factbook/countries/italy/","Britannica — Rome as capital city of Italy · https://www.britannica.com/place/Rome","UNESCO World Heritage Centre — Colosseum completion date and significance · https://whc.unesco.org/en/list/91/"]},"Côte d'Ivoire":{"clues":["This nation is the world's leading producer and exporter of cocoa beans, supplying over 40% of global output.","The Comoé River flows through its northern savanna region before emptying into the Ébrié Lagoon system along the southern coast.","It shares borders with Liberia to the west and Ghana to the east.","Capital city starts with 'Y'.","This country is famous for its football prowess, having won the Africa Cup of Nations multiple times with legendary players like Didier Drogba."],"sources":["International Cocoa Organization — World Cocoa Production Statistics · https://www.icco.org/statistics/","Britannica — Geography of Ivory Coast: Rivers and Lagoons · https://www.britannica.com/place/Cote-dIvoire","CIA World Factbook — Ivory Coast: Geography and Boundaries · https://www.cia.gov/the-world-factbook/countries/cote-divoire/","CIA World Factbook — Ivory Coast: Capital Information · https://www.cia.gov/the-world-factbook/countries/cote-divoire/","BBC Sport — Africa Cup of Nations History and Winners · https://www.bbc.com/sport/africa/football"]},"Jamaica":{"clues":["This nation was the world's leading exporter of bauxite ore in the 1970s and remains one of the top global producers of alumina today.","The Blue Mountains rise to over 2,200 meters in the eastern portion of this island, creating a dramatic spine that runs roughly east-west across the territory.","The Caribbean Sea surrounds this island nation, which lies about 145 kilometers south of Cuba.","Capital city starts with 'K'.","This island is the birthplace of reggae music and was home to legendary musician Bob Marley."],"sources":["United States Geological Survey — Bauxite and Alumina Statistics and Information · https://www.usgs.gov/centers/national-minerals-information-center/bauxite-and-alumina-statistics-and-information","Britannica — Blue Mountains, mountain range description and elevation · https://www.britannica.com/place/Blue-Mountains-mountains-Jamaica","CIA World Factbook — Geographic location and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/jamaica/","CIA World Factbook — Capital city information · https://www.cia.gov/the-world-factbook/countries/jamaica/","UNESCO — Reggae music of Jamaica inscribed on Representative List of Intangible Cultural Heritage · https://ich.unesco.org/en/RL/reggae-music-of-jamaica-01398"]},"Japan":{"clues":["This nation holds the world's third-largest economy by nominal GDP and is the only country to have experienced nuclear weapons in warfare.","This archipelago consists of four main islands and approximately 6,800 smaller islands, with over 70% of its terrain being mountainous and largely uninhabitable.","This archipelago nation lies at the eastern edge of the Eurasian continent, flanked by the Pacific Ocean to the east and bounded by four major straits connecting it to the Korean Peninsula and mainland Asia to the west.","Capital city starts with 'T'.","This country is famous for cherry blossoms, sushi, and Mount Fuji."],"sources":["CIA World Factbook — Japan economic and historical overview · https://www.cia.gov/the-world-factbook/countries/japan/","Britannica — Japan geography and terrain · https://www.britannica.com/place/Japan","CIA World Factbook — Japan geographic location and surrounding waters · https://www.cia.gov/the-world-factbook/countries/japan/","CIA World Factbook — Japan capital city information · https://www.cia.gov/the-world-factbook/countries/japan/","Japan National Tourism Organization — Cultural landmarks and traditions · https://www.japan.travel/"]},"Jersey":{"clues":["This Crown Dependency operates as an international finance center with over 13,000 registered companies and is not part of the United Kingdom or European Union, though it maintains a special relationship with both.","The territory consists of a main island surrounded by smaller islets, with dramatic coastal cliffs rising up to 143 meters at its northern headland and extensive sandy bays along its southern shore.","Located in the English Channel, this territory lies approximately 22 kilometers from the Cotentin Peninsula of France.","Capital city starts with 'S'.","This island is famous for a breed of dairy cattle that produces exceptionally rich milk with high butterfat content, recognized worldwide for premium dairy products."],"sources":["CIA World Factbook — Jersey Government and Economy · https://www.cia.gov/the-world-factbook/countries/jersey/","Britannica — Jersey Geography and Topography · https://www.britannica.com/place/Jersey-dependency-United-Kingdom","CIA World Factbook — Jersey Location and Geography · https://www.cia.gov/the-world-factbook/countries/jersey/","Britannica — Saint Helier Capital of Jersey · https://www.britannica.com/place/Saint-Helier","Britannica — Jersey Cattle Breed · https://www.britannica.com/animal/Jersey-cattle"]},"Jordan":{"clues":["This kingdom hosts the lowest point on Earth's land surface at over 430 meters below sea level.","The Great Rift Valley runs through this territory, creating dramatic escarpments and the deepest hypersaline lake on the planet.","This country borders Israel to the west and Saudi Arabia to the south and east.","Capital city starts with 'A'.","The ancient rock-carved city of Petra, one of the New Seven Wonders of the World, lies within this desert kingdom."],"sources":["Britannica — Dead Sea article describing it as Earth's lowest point on land at 430.5 meters below sea level on the Jordan-Israel border · https://www.britannica.com/place/Dead-Sea","NASA Earth Observatory — Article on the Dead Sea and Great Rift Valley geography including escarpments · https://earthobservatory.nasa.gov/images/4795/the-dead-sea","CIA World Factbook — Jordan page listing border countries as Iraq, Israel, Saudi Arabia, Syria, and West Bank · https://www.cia.gov/the-world-factbook/countries/jordan/","Britannica — Jordan country article identifying Amman as the capital city · https://www.britannica.com/place/Jordan","UNESCO World Heritage Centre — Petra inscription as World Heritage Site and New Seven Wonders listing · https://whc.unesco.org/en/list/326/"]},"Kazakhstan":{"clues":["This nation is the world's largest landlocked country by area and was the last Soviet republic to declare independence in December 1991.","The Caspian Sea forms its western border, while the Altai Mountains rise along its eastern edge.","It shares borders with Russia to the north and China to the east.","Capital city starts with 'A'.","The Baikonur Cosmodrome, the world's first and largest operational space launch facility, is located here."],"sources":["CIA World Factbook — Kazakhstan country profile noting largest landlocked country status and December 16, 1991 independence · https://www.cia.gov/the-world-factbook/countries/kazakhstan/","Britannica — Kazakhstan physical geography describing Caspian Sea western boundary and Altai Mountains · https://www.britannica.com/place/Kazakhstan/Land","CIA World Factbook — Kazakhstan border countries listing Russia and China among neighbors · https://www.cia.gov/the-world-factbook/countries/kazakhstan/","Britannica — Astana (formerly Nur-Sultan) identified as capital of Kazakhstan · https://www.britannica.com/place/Astana","UNESCO — Baikonur Cosmodrome description as world's first space launch facility · https://whc.unesco.org/en/tentativelists/6059/"]},"Kenya":{"clues":["This country hosts the headquarters of the United Nations Environment Programme and UN-Habitat, the only UN headquarters in the Global South.","The Great Rift Valley runs directly through this territory from north to south, creating dramatic escarpments and containing numerous lakes along its floor.","This nation shares its longest border with Tanzania to the south.","Capital city starts with 'N'.","This territory is renowned worldwide for the annual wildebeest migration through the Maasai Mara ecosystem, one of the Seven Natural Wonders of Africa."],"sources":["United Nations Environment Programme — UNEP Headquarters location · https://www.unep.org/about-un-environment/why-does-un-environment-matter","Britannica — Great Rift Valley geography and features in East Africa · https://www.britannica.com/place/Great-Rift-Valley","CIA World Factbook — Kenya border countries and lengths · https://www.cia.gov/the-world-factbook/countries/kenya/","Britannica — Nairobi as capital city · https://www.britannica.com/place/Kenya","UNESCO — Maasai Mara wildebeest migration natural wonder · https://whc.unesco.org/en/tentativelists/6237/"]},"Kiribati":{"clues":["This nation is the only country in the world to lie in all four hemispheres, spanning both sides of the equator and the International Date Line.","The territory consists of 33 coral atolls and reef islands scattered across more than 3.5 million square kilometers of ocean, with most land barely rising 2 meters above sea level.","Located in the central Pacific Ocean, it is surrounded by international waters with the nearest neighboring nations being Tuvalu to the west and the Marshall Islands to the northwest.","Capital city starts with 'T'.","This Pacific island nation is one of the countries most threatened by rising sea levels due to climate change, with some islands already experiencing regular flooding at high tide."],"sources":["CIA World Factbook — Geography section noting unique position spanning all hemispheres · https://www.cia.gov/the-world-factbook/countries/kiribati/","Britannica — Physical geography describing 33 atolls across 3.5 million sq km with low elevation · https://www.britannica.com/place/Kiribati","CIA World Factbook — Geographic location in central Pacific with nearest neighbors · https://www.cia.gov/the-world-factbook/countries/kiribati/","CIA World Factbook — Capital city information listing Tarawa · https://www.cia.gov/the-world-factbook/countries/kiribati/","United Nations — Climate change vulnerability and sea level rise impacts on Pacific islands · https://www.un.org/en/climatechange/science/climate-issues/small-islands"]},"Kosovo":{"clues":["This territory unilaterally declared independence in 2008 and is recognized by approximately 100 UN member states but not by Serbia, Russia, or China.","The Sharr Mountains form a natural border along the southern edge of this landlocked territory, with peaks exceeding 2,700 meters.","It shares borders with Serbia to the north and North Macedonia to the south.","Capital city starts with 'P'.","The 14th-century Visoki Dečani Monastery, a UNESCO World Heritage Site, contains well-preserved Byzantine frescoes and is one of four medieval Serbian Orthodox monuments in this territory."],"sources":["CIA World Factbook — Kosovo declaration of independence and recognition status · https://www.cia.gov/the-world-factbook/countries/kosovo/","Britannica — Sharr Mountains geographic description and elevation · https://www.britannica.com/place/Shar-Mountains","CIA World Factbook — Kosovo international borders · https://www.cia.gov/the-world-factbook/countries/kosovo/","CIA World Factbook — Kosovo capital city · https://www.cia.gov/the-world-factbook/countries/kosovo/","UNESCO — Visoki Dečani Monastery World Heritage designation · https://whc.unesco.org/en/list/724/"]},"Kuwait":{"clues":["This nation controls nearly 6% of the world's proven oil reserves and was the first Gulf state to draft a written constitution, ratified in 1962.","The terrain consists almost entirely of flat to slightly undulating desert plains with the highest point reaching only 306 meters above sea level.","This territory shares borders with Iraq to the north and Saudi Arabia to the south.","Capital city starts with 'K'.","This country was invaded by Iraq in 1990, sparking the Gulf War when coalition forces intervened to restore its independence."],"sources":["CIA World Factbook — Kuwait country profile including economic history · https://www.cia.gov/the-world-factbook/countries/kuwait/","CIA World Factbook — Kuwait geography and terrain description · https://www.cia.gov/the-world-factbook/countries/kuwait/","CIA World Factbook — Kuwait international boundaries and neighboring countries · https://www.cia.gov/the-world-factbook/countries/kuwait/","CIA World Factbook — Kuwait capital city information · https://www.cia.gov/the-world-factbook/countries/kuwait/","Encyclopedia Britannica — Kuwait Gulf War and Iraqi invasion · https://www.britannica.com/place/Kuwait"]},"Kyrgyzstan":{"clues":["This nation hosts the Manas Air Base, a critical U.S. military transit center for operations in Afghanistan that was controversially closed in 2014 after diplomatic pressure.","The Tian Shan mountain range dominates over 80% of the terrain, with peaks exceeding 7,000 meters including Jengish Chokusu on the northern border.","This landlocked country shares borders with Kazakhstan to the north and China to the east.","Capital city starts with 'B'.","Issyk-Kul, the world's second-largest alpine lake, never freezes despite its high elevation in the mountains."],"sources":["Council on Foreign Relations — Analysis of Central Asian military basing and U.S.-Russia competition · https://www.cfr.org/backgrounder/central-asias-strategic-importance","Encyclopædia Britannica — Kyrgyzstan geography and Tian Shan mountain system · https://www.britannica.com/place/Kyrgyzstan/Land","CIA World Factbook — Kyrgyzstan international borders and neighboring countries · https://www.cia.gov/the-world-factbook/countries/kyrgyzstan/","CIA World Factbook — Kyrgyzstan capital city information · https://www.cia.gov/the-world-factbook/countries/kyrgyzstan/","UNESCO — Issyk-Kul Biosphere Reserve description and characteristics · https://en.unesco.org/biosphere/eu-na/issyk-kul"]},"Laos":{"clues":["This landlocked nation is the most heavily bombed country per capita in history, with over 2 million tons of ordnance dropped during a covert nine-year campaign.","The Annamite Range forms the eastern border of this country, while the Mekong River flows through its western lowlands for approximately 1,900 kilometers.","This Southeast Asian nation shares borders with Vietnam to the east and Thailand to the west.","Capital city starts with 'V'.","This country is home to the ancient Plain of Jars, containing thousands of mysterious stone vessels dating back over 2,000 years."],"sources":["Legacies of War — Cluster Munitions and Unexploded Ordnance in Laos · https://legaciesofwar.org/about-laos/secret-war-laos/","Britannica — Laos Geography and Landscape · https://www.britannica.com/place/Laos/Relief","CIA World Factbook — Laos Bordering Countries · https://www.cia.gov/the-world-factbook/countries/laos/","CIA World Factbook — Laos Capital · https://www.cia.gov/the-world-factbook/countries/laos/","UNESCO — Megalithic Jar Sites in Xiengkhuang Plain of Jars · https://whc.unesco.org/en/list/1587/"]},"Latvia":{"clues":["This country joined both NATO and the European Union in 2004, completing a historic realignment away from Soviet influence during the so-called 'Big Bang' enlargement.","The Gulf of Riga forms a large bay along this nation's western coast, while the Daugava River flows through its center before emptying into the Baltic Sea.","This country shares its longest border with Estonia to the north and also borders Lithuania to the south.","Capital city starts with 'R'.","This nation is famous for its Art Nouveau architecture, particularly concentrated in the historic center of its capital, which contains over 800 such buildings."],"sources":["NATO — Member Countries · https://www.nato.int/cps/en/natohq/topics_52044.htm","Britannica — Daugava River · https://www.britannica.com/place/Daugava-River","CIA World Factbook — Country Borders and Geography · https://www.cia.gov/the-world-factbook/","UNESCO — Historic Centre (Riga) · https://whc.unesco.org/en/list/852/","Britannica — Art Nouveau Architecture in Riga · https://www.britannica.com/place/Riga"]},"Lebanon":{"clues":["This country hosts one of the world's highest per-capita refugee populations, with over 1.5 million Syrian refugees within its borders since 2011.","The mountain range running parallel to its Mediterranean coast reaches elevations above 3,000 meters and historically provided winter snow for ancient ice trade.","This territory borders Syria to the north and east, and Israel to the south.","Capital city starts with 'B'.","This country is famous for its ancient cedar trees, which appear on its national flag and were prized by pharaohs and biblical kings for shipbuilding and temples."],"sources":["UNHCR — Lebanon hosts the highest number of refugees per capita globally, with 1.5 million Syrian refugees · https://www.unhcr.org/lebanon","Britannica — Mount Lebanon range parallels the Mediterranean coast, with Qurnat as Sawda reaching 3,088 meters · https://www.britannica.com/place/Lebanon","CIA World Factbook — Lebanon borders Syria 403 km and Israel 81 km · https://www.cia.gov/the-world-factbook/countries/lebanon/","CIA World Factbook — Capital is Beirut · https://www.cia.gov/the-world-factbook/countries/lebanon/","UNESCO — The Cedars of God forest contains ancient cedar trees, national symbol featured on the flag since antiquity · https://whc.unesco.org/en/list/295/"]},"Lesotho":{"clues":["This enclave nation has one of the world's highest rates of HIV prevalence and relies heavily on textile exports to the United States under AGOA trade preferences.","The entire territory lies above 1,400 meters elevation, earning it the distinction of having the highest lowest point of any country in the world.","This landlocked nation is completely surrounded by South Africa.","Capital city starts with 'M'.","Visitors come to ski at Afriski Mountain Resort, the only ski destination in southern Africa, and to see the distinctive conical Basotho hat that inspired the design of traditional rondavel dwellings."],"sources":["UNAIDS — HIV and AIDS estimates for Lesotho · https://www.unaids.org/en/regionscountries/countries/lesotho","CIA World Factbook — Lesotho Geography: lowest point 1,400 m · https://www.cia.gov/the-world-factbook/countries/lesotho/","Britannica — Lesotho: landlocked enclave surrounded by South Africa · https://www.britannica.com/place/Lesotho","CIA World Factbook — Lesotho capital Maseru · https://www.cia.gov/the-world-factbook/countries/lesotho/","Afriski Mountain Resort — Southern Africa's only ski resort in Lesotho · https://www.afriski.net/"]},"Liberia":{"clues":["Founded by freed American slaves in 1822, this nation became Africa's first republic in 1847 and has a constitution modeled after the United States.","Four distinct physiographic regions extend from sandy coastal plains through rolling hills to the Guinea Highlands, with Mount Wuteve reaching 1,380 meters as the highest peak.","Bordered by Sierra Leone to the northwest and Côte d'Ivoire to the east, with Guinea forming its northern boundary.","Capital city starts with 'M'.","The national flag features eleven horizontal stripes and a single white star on a blue canton, symbolizing the founding by freed slaves."],"sources":["Britannica — Liberia History and Independence · https://www.britannica.com/place/Liberia/History","CIA World Factbook — Liberia Geography · https://www.cia.gov/the-world-factbook/countries/liberia/","CIA World Factbook — Liberia Geographic Boundaries · https://www.cia.gov/the-world-factbook/countries/liberia/","Britannica — Monrovia Capital of Liberia · https://www.britannica.com/place/Monrovia","Britannica — Flag of Liberia · https://www.britannica.com/topic/flag-of-Liberia"]},"Libya":{"clues":["This country possesses Africa's largest proven oil reserves and was a founding member of OPEC in 1962.","The Tibesti Mountains rise in the south near the border, while over 90% of the land consists of the Sahara Desert.","This territory borders Egypt to the east and Tunisia to the northwest.","Capital city starts with 'T'.","The ancient Roman ruins of Leptis Magna, one of the Mediterranean's most spectacular archaeological sites, are located along this country's coast."],"sources":["U.S. Energy Information Administration — Libya holds the largest proven oil reserves in Africa · https://www.eia.gov/international/analysis/country/LBY","Britannica — Libya: Tibesti Mountains and Sahara Desert geography · https://www.britannica.com/place/Libya/Land","CIA World Factbook — Libya borders Egypt and Tunisia · https://www.cia.gov/the-world-factbook/countries/libya/","CIA World Factbook — Tripoli is the capital of Libya · https://www.cia.gov/the-world-factbook/countries/libya/","UNESCO World Heritage Centre — Archaeological Site of Leptis Magna · https://whc.unesco.org/en/list/183/"]},"Liechtenstein":{"clues":["One of only two doubly landlocked countries in the world, surrounded entirely by nations that are themselves landlocked.","The entire territory lies within the Alps, with elevations ranging from approximately 430 meters along the Rhine valley to 2,599 meters at Grauspitz peak.","Borders Switzerland to the west and south, and Austria to the east and north.","Capital city starts with 'V'.","This constitutional monarchy is the world's leading producer of false teeth and has more registered companies than citizens."],"sources":["CIA World Factbook — Liechtenstein geography overview noting doubly landlocked status · https://www.cia.gov/the-world-factbook/countries/liechtenstein/","Britannica — Liechtenstein relief and drainage describing Alpine terrain and elevation range · https://www.britannica.com/place/Liechtenstein/Relief-and-drainage","CIA World Factbook — Liechtenstein bordering countries listing Switzerland and Austria · https://www.cia.gov/the-world-factbook/countries/liechtenstein/","Britannica — Liechtenstein capital city Vaduz · https://www.britannica.com/place/Liechtenstein","BBC News — Liechtenstein country profile describing dental industry and business registration · https://www.bbc.com/news/world-europe-17611647"]},"Lithuania":{"clues":["This nation joined NATO in 2004 and was one of the first former Soviet republics to adopt the euro currency in 2015.","The Curonian Spit, a 98-kilometer curved sand-dune peninsula shared with a neighboring country, separates the Curonian Lagoon from the Baltic Sea.","This country borders Poland to the southwest and Belarus to the east.","Capital city starts with 'V'.","Basketball is considered the national sport here, with the country having won three EuroBasket championships and producing numerous NBA players."],"sources":["European Commission — Lithuania and the euro · https://economy-finance.ec.europa.eu/euro/eu-countries-and-euro/lithuania-and-euro_en","UNESCO World Heritage Centre — Curonian Spit · https://whc.unesco.org/en/list/994/","CIA World Factbook — Lithuania Geography · https://www.cia.gov/the-world-factbook/countries/lithuania/","Britannica — Vilnius, national capital, Lithuania · https://www.britannica.com/place/Vilnius","FIBA — EuroBasket History and Lithuania's championships · https://www.fiba.basketball/eurobasket/history"]},"Luxembourg":{"c
