lues":["This founding member of the European Coal and Steel Community hosts the European Court of Justice and serves as one of the three official capitals of the European Union.","The Moselle River forms part of its eastern border, while the Ardennes plateau extends across its northern region.","It shares borders with Belgium to the west and north, and Germany to the east.","Capital city starts with 'L'.","This tiny nation is famous for its medieval castles and is one of the world's wealthiest countries per capita."],"sources":["European Union — About the EU institutions and bodies · https://european-union.europa.eu/institutions-law-budget/institutions-and-bodies_en","Britannica — Luxembourg: Relief and drainage · https://www.britannica.com/place/Luxembourg/Relief-and-drainage","CIA World Factbook — Luxembourg: Geography · https://www.cia.gov/the-world-factbook/countries/luxembourg/","CIA World Factbook — Luxembourg: Government · https://www.cia.gov/the-world-factbook/countries/luxembourg/","World Bank — GDP per capita ranking · https://data.worldbank.org/indicator/NY.GDP.PCAP.CD"]},"Macao S.A.R":{"clues":["This territory operates under the 'one country, two systems' principle and derives over 80% of its government revenue from gaming taxes, making it the world's largest gambling center by revenue.","The territory comprises a small peninsula and two islands connected by bridges, with a total land area of only 32.9 square kilometers, making it one of the world's most densely populated regions.","This territory borders Guangdong Province to the north and faces the South China Sea to the east and south.","Capital city starts with 'M'.","This former Portuguese colony is famous for its historic blend of European and Chinese architecture, Portuguese egg tarts, and the Ruins of St. Paul's."],"sources":["CIA World Factbook — Macau Economy Overview · https://www.cia.gov/the-world-factbook/countries/macau/","Britannica — Macau Geography and Land · https://www.britannica.com/place/Macau","CIA World Factbook — Macau Geography · https://www.cia.gov/the-world-factbook/countries/macau/","Britannica — Macau Capital Information · https://www.britannica.com/place/Macau","UNESCO World Heritage Centre — Historic Centre of Macao · https://whc.unesco.org/en/list/1110/"]},"Madagascar":{"clues":["This nation is the world's leading producer of natural vanilla, accounting for over 80% of global supply.","The interior features a vast highland plateau rising over 1,200 meters, with the Tsaratanana Massif containing peaks exceeding 2,800 meters.","This island nation lies in the Indian Ocean, separated from Mozambique by the Mozambique Channel.","Capital city starts with 'A'.","This island is home to lemurs, with over 100 species found nowhere else on Earth."],"sources":["Food and Agriculture Organization of the United Nations — Vanilla production statistics and market analysis · https://www.fao.org/markets-and-trade/commodities/vanilla/en/","Britannica — Geography of Madagascar, including central highlands and mountain ranges · https://www.britannica.com/place/Madagascar","CIA World Factbook — Madagascar location and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/madagascar/","CIA World Factbook — Madagascar capital city information · https://www.cia.gov/the-world-factbook/countries/madagascar/","World Wildlife Fund — Madagascar endemic species and lemur biodiversity · https://www.worldwildlife.org/places/madagascar"]},"Malawi":{"clues":["This landlocked nation was formerly known as Nyasaland and gained independence from British colonial rule in 1964.","The third-largest lake in Africa forms most of this country's eastern border, part of the East African Rift system.","This territory shares borders with Tanzania to the northeast and Mozambique wrapping around the east and south.","Capital city starts with 'L'.","Lake of Stars music festival takes place on the shores of the massive freshwater lake that gives this nation its historical name."],"sources":["Britannica — Malawi independence and colonial history · https://www.britannica.com/place/Malawi","CIA World Factbook — Malawi geography and Lake Malawi · https://www.cia.gov/the-world-factbook/countries/malawi/","CIA World Factbook — Malawi border countries · https://www.cia.gov/the-world-factbook/countries/malawi/","Britannica — Lilongwe capital of Malawi · https://www.britannica.com/place/Lilongwe","UNESCO — Lake Malawi National Park World Heritage Site · https://whc.unesco.org/en/list/289/"]},"Malaysia":{"clues":["This nation is the world's second-largest producer of palm oil, accounting for approximately 26% of global production and export.","The territory is divided into two distinct regions separated by the South China Sea, with a peninsula and a larger landmass on the island of Borneo.","This country shares land borders with Thailand to the north, Indonesia to the south, and Brunei on the island of Borneo.","Capital city starts with 'K'.","The Petronas Twin Towers held the title of world's tallest buildings from 1998 to 2004 and remain an iconic landmark connected by a skybridge."],"sources":["United States Department of Agriculture — Malaysia: Second Largest Palm Oil Producer · https://www.fas.usda.gov/data/malaysia-oilseeds-and-products-annual-5","Britannica — Malaysia Geography: Peninsular and East Malaysia separated by South China Sea · https://www.britannica.com/place/Malaysia","CIA World Factbook — Malaysia borders Thailand, Indonesia, and Brunei · https://www.cia.gov/the-world-factbook/countries/malaysia/","CIA World Factbook — Malaysia capital Kuala Lumpur · https://www.cia.gov/the-world-factbook/countries/malaysia/","Guinness World Records — Petronas Towers tallest buildings 1998-2004 · https://www.guinnessworldrecords.com/world-records/tallest-building"]},"Maldives":{"clues":["This nation became the first country to hold an underwater cabinet meeting in 2009 to highlight the threat of rising sea levels to low-lying island states.","Comprising 26 natural atolls and over 1,190 coral islands, this territory has an average ground elevation of just 1.5 meters above sea level, making it the world's lowest country.","Located in the Indian Ocean, this island nation lies southwest of India and Sri Lanka, positioned along major maritime trade routes between the Middle East and Asia.","Capital city starts with 'M'.","This tropical destination is renowned worldwide for its overwater bungalows, luxury resorts, and crystal-clear turquoise lagoons that attract honeymooners and divers."],"sources":["BBC News — Maldives holds underwater cabinet meeting to highlight climate change · https://www.bbc.com/news/world-south-asia-8311838","CIA World Factbook — Maldives Geography: lowest point and elevation extremes · https://www.cia.gov/the-world-factbook/countries/maldives/","Britannica — Maldives location and geography in the Indian Ocean · https://www.britannica.com/place/Maldives","CIA World Factbook — Maldives capital city information · https://www.cia.gov/the-world-factbook/countries/maldives/","Lonely Planet — Maldives tourism and travel guide featuring resorts and diving · https://www.lonelyplanet.com/maldives"]},"Mali":{"clues":["This nation was the heart of a 14th-century empire controlling the trans-Saharan gold trade, with its ruler's legendary pilgrimage to Mecca in 1324 causing gold devaluation across Mediterranean markets.","The Niger River flows northeast through the country before making a dramatic bend southward, creating an inland delta that floods seasonally and supports agriculture in otherwise arid Sahel terrain.","This country shares borders with Algeria to the north and Burkina Faso to the south.","Capital city starts with 'B'.","Timbuktu, located here, was a renowned center of Islamic scholarship and manuscript preservation, housing hundreds of thousands of ancient texts in family libraries and the Ahmed Baba Institute."],"sources":["Britannica — Mansa Musa's pilgrimage to Mecca and its economic impact on gold markets · https://www.britannica.com/biography/Musa-I-of-Mali","CIA World Factbook — Geography of Mali, describing the Niger River's inland delta · https://www.cia.gov/the-world-factbook/countries/mali/","CIA World Factbook — Mali border countries listing Algeria and Burkina Faso · https://www.cia.gov/the-world-factbook/countries/mali/","CIA World Factbook — Capital city Bamako · https://www.cia.gov/the-world-factbook/countries/mali/","UNESCO — Timbuktu's manuscript libraries and the Ahmed Baba Institute · https://whc.unesco.org/en/list/119/"]},"Malta":{"clues":["This nation holds observer status at the Commonwealth and joined the European Union during the 2004 enlargement alongside nine other states.","The territory consists of an archipelago with dramatic limestone cliffs rising over 250 meters along certain coastal sections and extensive harbor systems carved into the rock.","Located in the central Mediterranean Sea, this territory lies approximately 93 kilometers south of Sicily and 288 kilometers north of Libya.","Capital city starts with 'V'.","The ancient megalithic temples found here, including Ħaġar Qim and Mnajdra, predate Stonehenge and the Egyptian pyramids by over a thousand years."],"sources":["European Union — Malta Country Profile: EU accession 2004 · https://european-union.europa.eu/principles-countries-history/country-profiles/malta_en","Britannica — Malta: Geography and coastal features including limestone plateau terrain · https://www.britannica.com/place/Malta","CIA World Factbook — Malta: Geographic coordinates and location in Mediterranean Sea · https://www.cia.gov/the-world-factbook/countries/malta/","CIA World Factbook — Malta: Capital city Valletta · https://www.cia.gov/the-world-factbook/countries/malta/","UNESCO World Heritage Centre — Megalithic Temples of Malta dating to 3600-2500 BC · https://whc.unesco.org/en/list/132/"]},"Marshall Islands":{"clues":["This territory hosts the Ronald Reagan Ballistic Missile Defense Test Site, a critical U.S. strategic military facility used for intercepting intercontinental ballistic missiles.","Consisting of 29 coral atolls and 5 isolated coral islands, this territory comprises over 1,100 individual islands and islets scattered across nearly 750,000 square miles of ocean.","Located in the central Pacific Ocean, this territory lies roughly halfway between Hawaii and Australia, with the nearest substantial landmass being Kiribati to the southeast.","Capital city starts with 'M'.","Between 1946 and 1958, this territory was the site of 67 nuclear weapons tests conducted by the United States, including the Castle Bravo test, the largest nuclear detonation ever conducted by the U.S."],"sources":["U.S. Army — Ronald Reagan Ballistic Missile Defense Test Site Overview · https://www.smdc.army.mil/RTS/","Britannica — Marshall Islands Geography and Physical Features · https://www.britannica.com/place/Marshall-Islands","CIA World Factbook — Marshall Islands Location and Geography · https://www.cia.gov/the-world-factbook/countries/marshall-islands/","CIA World Factbook — Marshall Islands Capital Information · https://www.cia.gov/the-world-factbook/countries/marshall-islands/","Comprehensive Nuclear-Test-Ban Treaty Organization — Nuclear Testing in the Pacific · https://www.ctbto.org/specials/testing-times/16-july-1945-trinity-the-world-first-nuclear-bomb/pacific"]},"Mauritania":{"clues":["This nation operates one of the world's longest freight trains, stretching over 2.5 kilometers as it transports iron ore from inland mines to the Atlantic coast.","The Adrar Plateau rises dramatically from surrounding desert lowlands, featuring ancient sandstone formations and seasonal watercourses called wadis.","This territory shares its northern border with Western Sahara and its southern border with Senegal.","Capital city starts with 'N'.","The ancient caravan city of Chinguetti, founded in the 13th century, houses medieval manuscripts and is considered one of Islam's seven holy cities."],"sources":["Railway Technology — Mauritania's iron ore railway operates trains up to 3km long · https://www.railway-technology.com/projects/mauritania-iron-ore-railway/","Britannica — Adrar region features sandstone plateau rising from Saharan plains · https://www.britannica.com/place/Mauritania/Relief","CIA World Factbook — Mauritania borders Western Sahara to north and Senegal to south · https://www.cia.gov/the-world-factbook/countries/mauritania/","CIA World Factbook — Capital city is Nouakchott · https://www.cia.gov/the-world-factbook/countries/mauritania/","UNESCO — Chinguetti is a historic caravan trading center with ancient manuscripts · https://whc.unesco.org/en/list/750/"]},"Mauritius":{"clues":["This island nation was the only known habitat of the dodo bird, which became extinct in the late 17th century after Dutch colonization.","Volcanic in origin, this island features a central plateau surrounded by mountains, with the highest peak reaching 828 meters at Piton de la Petite Rivière Noire.","Located in the Indian Ocean approximately 900 kilometers east of Madagascar and 2,000 kilometers from the African mainland.","Capital city starts with 'P'.","This tropical island destination is renowned for its luxury beach resorts, coral reefs, and as the literary setting where Mark Twain claimed heaven was copied from."],"sources":["Britannica — Dodo bird extinction and habitat in Mauritius · https://www.britannica.com/animal/dodo-extinct-bird","CIA World Factbook — Mauritius geography and terrain features · https://www.cia.gov/the-world-factbook/countries/mauritius/","CIA World Factbook — Mauritius location in Indian Ocean · https://www.cia.gov/the-world-factbook/countries/mauritius/","Britannica — Port Louis as capital of Mauritius · https://www.britannica.com/place/Mauritius","UNESCO — Cultural and natural heritage of Mauritius tourism · https://whc.unesco.org/en/statesparties/mu"]},"Mexico":{"clues":["This country is the world's largest producer of silver and ranks among the top three producers of bismuth, fluorite, and celestite minerals.","The Sierra Madre mountain system forms three distinct ranges across this territory, with the highest peak reaching 5,636 meters above sea level.","This nation shares its longest border with the United States and has Guatemala as its southeastern neighbor.","Capital city starts with 'M'.","This country is globally renowned for tequila, mariachi music, and the ancient Mayan and Aztec civilizations."],"sources":["U.S. Geological Survey — Mineral Commodity Summaries 2023 · https://pubs.usgs.gov/periodicals/mcs2023/","Britannica — Sierra Madre mountain system geography · https://www.britannica.com/place/Sierra-Madre","CIA World Factbook — Country border information · https://www.cia.gov/the-world-factbook/countries/mexico/","CIA World Factbook — Capital cities reference · https://www.cia.gov/the-world-factbook/countries/mexico/","UNESCO — Intangible Cultural Heritage Lists · https://ich.unesco.org/"]},"Moldova":{"clues":["This landlocked nation is the only former Soviet republic that has never joined the Russia-led Collective Security Treaty Organization, maintaining a constitutional commitment to permanent neutrality since 1994.","The entire territory lies within the Prut and Dniester river valleys, with elevations rarely exceeding 430 meters in the Central Moldavian Plateau.","It borders Romania to the west and Ukraine to the north, east, and south.","Capital city starts with 'C'.","This country is internationally recognized as the birthplace of the traditional winemaking method using clay vessels called 'kvevri', with archaeological evidence of grape cultivation dating back over 7,000 years."],"sources":["CIA World Factbook — Moldova constitutional neutrality and non-membership in CSTO · https://www.cia.gov/the-world-factbook/countries/moldova/","Britannica — Moldova physical geography and topography of Prut-Dniester region · https://www.britannica.com/place/Moldova","CIA World Factbook — Moldova international borders with Romania and Ukraine · https://www.cia.gov/the-world-factbook/countries/moldova/","CIA World Factbook — Chisinau capital city of Moldova · https://www.cia.gov/the-world-factbook/countries/moldova/","UNESCO — Ancient Georgian traditional Qvevri wine-making method · https://ich.unesco.org/en/RL/ancient-georgian-traditional-qvevri-wine-making-method-00870"]},"Monaco":{"clues":["This sovereign state has the world's highest GDP per capita according to World Bank data and operates as a constitutional monarchy with a dense concentration of Ultra High Net Worth individuals per square kilometer.","The entire territory occupies a narrow rocky promontory along the Mediterranean coast, dominated by a steep escarpment known as 'The Rock' that rises approximately 60 meters above sea level.","This microstate is bordered entirely by France on three sides and the Mediterranean Sea to the south.","Capital city starts with 'M'.","This territory hosts one of Formula One's most prestigious and challenging street circuits, featuring the famous hairpin turn and tunnel section along the harbor."],"sources":["World Bank — GDP per capita ranking data and economic indicators · https://data.worldbank.org/indicator/NY.GDP.PCAP.CD","Encyclopaedia Britannica — Physical geography and topographical features of Monaco · https://www.britannica.com/place/Monaco","CIA World Factbook — Monaco international borders and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/monaco/","CIA World Factbook — Monaco capital city information · https://www.cia.gov/the-world-factbook/countries/monaco/","Formula 1 Official — Monaco Grand Prix circuit history and track characteristics · https://www.formula1.com/en/racing/2024/Monaco.html"]},"Mongolia":{"clues":["This landlocked nation transitioned from a Soviet satellite state to a multi-party democracy in 1990, maintaining neutrality between its two powerful neighbors while hosting the world's largest undeveloped copper-gold deposit at Oyu Tolgoi.","The Gobi Desert stretches across the southern third of this territory, while the Altai Mountains dominate the western region with peaks exceeding 4,000 meters.","This country shares its entire border with only two nations: Russia to the north and China to the south.","Capital city starts with 'U'.","This is the homeland of Genghis Khan, who founded the largest contiguous land empire in history during the 13th century."],"sources":["CIA World Factbook — Mongolia Economy Overview, mentions Oyu Tolgoi copper-gold mine and 1990 democratic transition · https://www.cia.gov/the-world-factbook/countries/mongolia/","Britannica — Mongolia Geography, describes Gobi Desert and Altai Mountains · https://www.britannica.com/place/Mongolia","CIA World Factbook — Mongolia Geography, lists bordering countries as Russia and China · https://www.cia.gov/the-world-factbook/countries/mongolia/","CIA World Factbook — Mongolia Capital Ulaanbaatar · https://www.cia.gov/the-world-factbook/countries/mongolia/","Britannica — Genghis Khan, founder of Mongol Empire · https://www.britannica.com/biography/Genghis-Khan"]},"Montenegro":{"clues":["This country became the 29th member of NATO in 2017, making it the alliance's smallest member state by population at the time of accession.","The Bay of Kotor, a winding fjord-like inlet on the Adriatic coast, is one of the Mediterranean's deepest natural harbors and is surrounded by limestone cliffs rising over 1,700 meters.","This territory shares borders with Serbia to the northeast and Albania to the southeast.","Capital city starts with 'P'.","The medieval walled city of Kotor, nestled between dramatic mountains and the Adriatic Sea, is a UNESCO World Heritage Site famous for its Venetian architecture and 1,350 steps leading to the fortress above."],"sources":["NATO — Montenegro joins NATO as 29th Ally · https://www.nato.int/cps/en/natohq/news_144647.htm","Britannica — Bay of Kotor geographic and physical description · https://www.britannica.com/place/Bay-of-Kotor","CIA World Factbook — Montenegro borders and geography · https://www.cia.gov/the-world-factbook/countries/montenegro/","UNESCO — Natural and Culturo-Historical Region of Kotor · https://whc.unesco.org/en/list/125/","UNESCO — Natural and Culturo-Historical Region of Kotor · https://whc.unesco.org/en/list/125/"]},"Montserrat":{"clues":["This British Overseas Territory experienced a devastating volcanic eruption in 1995 that buried the capital city and rendered the southern half of the island uninhabitable.","The active Soufrière Hills volcano dominates the southern portion of this small Caribbean island, which spans only about 40 square miles.","This island territory lies in the Leeward Islands of the Lesser Antilles, situated in the Caribbean Sea between Guadeloupe to the southeast and Antigua to the northeast.","Capital city starts with 'P'.","Known as the 'Emerald Isle of the Caribbean' due to its Irish heritage, this territory celebrates St. Patrick's Day as a public holiday commemorating a failed slave uprising in 1768."],"sources":["Britannica — Montserrat volcanic eruption history and impact on Plymouth · https://www.britannica.com/place/Montserrat-island","CIA World Factbook — Montserrat geography featuring Soufrière Hills volcano · https://www.cia.gov/the-world-factbook/countries/montserrat/","CIA World Factbook — Montserrat location in the Caribbean Sea and Leeward Islands · https://www.cia.gov/the-world-factbook/countries/montserrat/","CIA World Factbook — Montserrat capital Plymouth (abandoned) and current seat Brades · https://www.cia.gov/the-world-factbook/countries/montserrat/","Britannica — Montserrat Irish heritage and cultural identity · https://www.britannica.com/place/Montserrat-island"]},"Morocco":{"clues":["This kingdom hosts the world's largest operational solar power plant, the Noor-Ouarzazate complex, generating over 500 megawatts.","The Atlas Mountains stretch across this territory in three distinct ranges, with peaks exceeding 4,000 meters including North Africa's highest summit.","This nation borders Algeria to the east and the Atlantic Ocean along its western coastline.","Capital city starts with 'R'.","Fez is renowned worldwide for its ancient medina containing one of the oldest universities and its traditional leather tanneries with colorful dyeing vats."],"sources":["International Renewable Energy Agency — Noor-Ouarzazate Solar Complex project description and capacity · https://www.irena.org/Publications/2021/Jun/Renewable-Power-Generation-Costs-in-2020","Britannica — Atlas Mountains geography and elevation details · https://www.britannica.com/place/Atlas-Mountains","CIA World Factbook — Country borders and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/morocco/","CIA World Factbook — Capital city information · https://www.cia.gov/the-world-factbook/countries/morocco/","UNESCO World Heritage Centre — Medina of Fez cultural heritage site · https://whc.unesco.org/en/list/170/"]},"Mozambique":{"clues":["This nation was a founding member of the Southern African Development Community (SADC) in 1980 and hosts the headquarters of this regional economic bloc in its capital.","The Zambezi River flows through the central region and empties into the Indian Ocean through a vast delta system covering over 7,000 square miles.","It shares borders with Tanzania to the north and South Africa to the southwest.","Capital city starts with 'M'.","Peri-peri chicken, a spicy grilled dish with Portuguese culinary influence, is one of the most popular traditional foods throughout the country."],"sources":["SADC Official Website — Member States and SADC Headquarters Location · https://www.sadc.int/member-states","Britannica — Zambezi River: Physical Features and Delta Description · https://www.britannica.com/place/Zambezi-River","CIA World Factbook — Mozambique: Geography, Borders and Neighboring Countries · https://www.cia.gov/the-world-factbook/countries/mozambique/","CIA World Factbook — Mozambique: Capital City Information · https://www.cia.gov/the-world-factbook/countries/mozambique/","UNESCO — Intangible Cultural Heritage and Traditional Cuisine of Southern Africa · https://ich.unesco.org/en/lists"]},"Myanmar":{"clues":["This nation experienced a military coup in February 2021 that ousted the civilian government led by Aung San Suu Kyi.","The Irrawaddy River flows from north to south for over 2,000 kilometers through this country, forming a vast delta before emptying into the Andaman Sea.","This country shares its longest land border with China to the north and northeast.","Capital city starts with 'N'.","The ancient temples of Bagan, numbering over 2,000 Buddhist structures, are among the world's greatest archaeological sites."],"sources":["BBC News — Myanmar coup: What is happening and why? · https://www.bbc.com/news/world-asia-55902070","Britannica — Irrawaddy River description and geography · https://www.britannica.com/place/Irrawaddy-River","CIA World Factbook — Myanmar border countries and lengths · https://www.cia.gov/the-world-factbook/countries/burma/","Britannica — Naypyidaw capital of Myanmar · https://www.britannica.com/place/Nay-Pyi-Taw","UNESCO — Bagan archaeological zone and monuments · https://whc.unesco.org/en/list/1588/"]},"Namibia":{"clues":["This country was the first in the world to incorporate environmental protection into its constitution when it gained independence in 1990.","The Namib Desert, one of the oldest deserts on Earth at over 55 million years old, stretches along the entire Atlantic coastline of this territory.","This country shares borders with Angola to the north and Botswana to the east.","Capital city starts with 'W'.","Sossusvlei's iconic red sand dunes, among the tallest in the world at over 300 meters high, are a UNESCO World Heritage Site and major tourist attraction."],"sources":["United Nations Environment Programme — Namibia's Constitutional Environmental Protection · https://www.unep.org/news-and-stories/story/namibias-constitution-protecting-environment-30-years","Britannica — Namib Desert geological age and location · https://www.britannica.com/place/Namib","CIA World Factbook — Namibia borders and neighboring countries · https://www.cia.gov/the-world-factbook/countries/namibia/","CIA World Factbook — Namibia capital city Windhoek · https://www.cia.gov/the-world-factbook/countries/namibia/","UNESCO World Heritage Centre — Namib Sand Sea · https://whc.unesco.org/en/list/1430/"]},"Nauru":{"clues":["This country operates the world's only remaining operative phosphate mining railway and once had the highest per-capita GDP globally due to finite phosphate reserves that have now been substantially depleted.","This raised coral atoll island spans just 21 square kilometers with a fertile coastal strip surrounding a central plateau that reaches approximately 65 meters at its highest point.","Located in the Micronesian region of the Pacific Ocean, this island lies roughly 40 kilometers south of the equator with its nearest neighbor being Banaba Island of Kiribati, 300 kilometers to the east.","Capital city starts with 'Y'.","This island nation is the world's smallest independent republic and the only country without an official capital city, though government offices are located in the Yaren District."],"sources":["Britannica — Nauru phosphate mining history and economic impact · https://www.britannica.com/place/Nauru","CIA World Factbook — Nauru geography and terrain · https://www.cia.gov/the-world-factbook/countries/nauru/","CIA World Factbook — Nauru location and maritime claims · https://www.cia.gov/the-world-factbook/countries/nauru/","CIA World Factbook — Nauru capital information · https://www.cia.gov/the-world-factbook/countries/nauru/","Britannica — Nauru political status and size · https://www.britannica.com/place/Nauru"]},"Nepal":{"clues":["This landlocked nation hosts the secretariat of the South Asian Association for Regional Cooperation (SAARC), established in 1985 to promote economic and regional integration among member states.","Eight of the world's fourteen peaks exceeding 8,000 meters in elevation are located entirely or partially within this territory, including the planet's highest point at 8,849 meters above sea level.","This country shares its entire northern border with the Tibet Autonomous Region of China and its southern border with India.","Capital city starts with 'K'.","This territory is home to Mount Everest, the world's tallest mountain, which attracts thousands of climbers and trekkers annually to its base camps and summit routes."],"sources":["South Asian Association for Regional Cooperation — Official SAARC Charter and Secretariat Location · https://www.saarc-sec.org/index.php/about-saarc/saarc-charter","Britannica — Nepal: Geography and the Himalayas · https://www.britannica.com/place/Nepal","CIA World Factbook — Nepal: Geography and Borders · https://www.cia.gov/the-world-factbook/countries/nepal/","CIA World Factbook — Nepal: Capital Kathmandu · https://www.cia.gov/the-world-factbook/countries/nepal/","UNESCO World Heritage Centre — Sagarmatha National Park (Mount Everest) · https://whc.unesco.org/en/list/120/"]},"Netherlands":{"clues":["This country hosts the International Court of Justice, the principal judicial organ of the United Nations, in The Hague.","About one-quarter of this low-lying territory sits below sea level, protected by an extensive system of dikes, dams, and flood barriers.","This country shares land borders with Belgium to the south and Germany to the east.","Capital city starts with 'A'.","This nation is famous for its windmills, tulip fields, and extensive canal systems in cities like Amsterdam."],"sources":["International Court of Justice — About the Court: The ICJ has its seat at the Peace Palace in The Hague (Netherlands) · https://www.icj-cij.org/about","CIA World Factbook — Netherlands Geography: About 27% of the country lies below sea level, protected by dikes and polders · https://www.cia.gov/the-world-factbook/countries/netherlands/","CIA World Factbook — Netherlands: Border countries include Belgium 478 km and Germany 575 km · https://www.cia.gov/the-world-factbook/countries/netherlands/","Britannica — Netherlands: Amsterdam is the constitutional capital · https://www.britannica.com/place/Netherlands","UNESCO — Windmills at Kinderdijk-Elshout: The iconic Dutch windmills represent centuries of water management · https://whc.unesco.org/en/list/818/"]},"New Caledonia":{"clues":["This territory holds approximately 25% of the world's known nickel reserves, making it one of the planet's most significant sources of this strategic metal.","The main island features a mountainous spine with peaks exceeding 1,600 meters, surrounded by one of the world's largest lagoons enclosed by a barrier reef stretching over 1,600 kilometers.","Located in the Coral Sea, this territory lies east of Australia and northwest of Fiji.","Capital city starts with 'N'.","This Pacific territory is home to the Kanak people and features the iconic Heart of Voh, a natural heart-shaped mangrove clearing visible from above."],"sources":["U.S. Geological Survey — Mineral Commodity Summaries 2024: Nickel · https://pubs.usgs.gov/periodicals/mcs2024/mcs2024-nickel.pdf","UNESCO World Heritage Centre — Lagoons of New Caledonia: Reef Diversity and Associated Ecosystems · https://whc.unesco.org/en/list/1115/","Encyclopaedia Britannica — New Caledonia: Land and Location · https://www.britannica.com/place/New-Caledonia","CIA World Factbook — New Caledonia: Government · https://www.cia.gov/the-world-factbook/countries/new-caledonia/","UNESCO World Heritage Centre — New Caledonia Cultural Heritage · https://whc.unesco.org/en/statesparties/fr"]},"New Zealand":{"clues":["This nation was the first in the world to grant women the right to vote in parliamentary elections, achieving this milestone in 1893.","Two main landmasses are separated by Cook Strait, with the Southern Alps mountain range dominating one island and reaching heights over 3,700 meters.","Located in the southwestern Pacific Ocean, this territory lies approximately 2,000 kilometers southeast of Australia across the Tasman Sea.","Capital city starts with 'W'.","This country's indigenous Māori people perform the haka, a traditional ceremonial dance that has gained worldwide recognition through its national rugby team."],"sources":["Britannica — New Zealand women's suffrage history · https://www.britannica.com/place/New-Zealand/Government-and-society","CIA World Factbook — New Zealand geography and terrain · https://www.cia.gov/the-world-factbook/countries/new-zealand/","CIA World Factbook — New Zealand location and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/new-zealand/","CIA World Factbook — New Zealand capital city · https://www.cia.gov/the-world-factbook/countries/new-zealand/","Britannica — Māori culture and haka tradition · https://www.britannica.com/topic/haka"]},"Nicaragua":{"clues":["This country experienced a political crisis in 2018 when protests against social security reforms escalated into broader anti-government demonstrations, resulting in hundreds of deaths and international condemnation.","Two large lakes dominate the southwestern interior, with the larger one being the only freshwater lake in the world containing oceanic animals like sharks and sawfish.","This territory shares land borders with Honduras to the north and Costa Rica to the south, while facing both the Caribbean Sea and Pacific Ocean.","Capital city starts with 'M'.","This nation is famous for producing high-quality rum and cigars, and is the birthplace of the revolutionary poet Rubén Darío, considered the father of Spanish-American literary modernism."],"sources":["Human Rights Watch — Nicaragua Events of 2018: Protester Deaths and Government Crackdown · https://www.hrw.org/world-report/2019/country-chapters/nicaragua","Britannica — Lake Nicaragua: Geography and Unique Marine Life · https://www.britannica.com/place/Lake-Nicaragua","CIA World Factbook — Nicaragua: Geography and Boundaries · https://www.cia.gov/the-world-factbook/countries/nicaragua/","CIA World Factbook — Nicaragua: Capital Managua · https://www.cia.gov/the-world-factbook/countries/nicaragua/","Britannica — Rubén Darío: Nicaraguan Poet and Literary Modernism · https://www.britannica.com/biography/Ruben-Dario"]},"Niger":{"clues":["This nation experienced a significant coup d'état in July 2023, leading to the suspension of its security cooperation agreements with former colonial powers and a pivot toward new regional alliances.","The vast Air Mountains rise dramatically from the Sahara in the north-central region, while the Niger River curves through the southwestern corner creating a fertile agricultural zone.","This landlocked nation shares its longest border with Chad to the east and also borders Nigeria to the south.","Capital city starts with 'N'.","This country is home to the ancient mud-brick mosques and caravan trading centers of Agadez, a UNESCO World Heritage Site that served as a crucial Saharan crossroads for centuries."],"sources":["BBC News — Niger country profile covering the July 2023 military coup and political developments · https://www.bbc.com/news/world-africa-13945751","Britannica — Niger physical geography describing the Air Mountains and Niger River · https://www.britannica.com/place/Niger","CIA World Factbook — Niger border countries listing Chad and Nigeria among neighbors · https://www.cia.gov/the-world-factbook/countries/niger/","CIA World Factbook — Niger capital city information · https://www.cia.gov/the-world-factbook/countries/niger/","UNESCO World Heritage Centre — Historic Centre of Agadez inscription details · https://whc.unesco.org/en/list/1268/"]},"Nigeria":{"clues":["This country is Africa's largest crude oil producer and holds the continent's largest proven natural gas reserves, making it a founding member of OPEC.","The Niger River forms a distinctive delta covering over 36,000 square kilometers before emptying into the Gulf of Guinea through numerous distributaries.","This territory shares borders with Benin to the west and Cameroon to the east.","Capital city starts with 'A'.","Nollywood, based here, is the world's second-largest film industry by volume of annual productions, surpassing Hollywood."],"sources":["OPEC — Nigeria Facts and Figures · https://www.opec.org/opec_web/en/about_us/167.htm","Britannica — Niger River Delta · https://www.britannica.com/place/Niger-Delta","CIA World Factbook — Nigeria Geography · https://www.cia.gov/the-world-factbook/countries/nigeria/","Britannica — Abuja · https://www.britannica.com/place/Abuja","UNESCO — Nollywood: The Nigerian Film Industry · https://en.unesco.org/creativity/policy-monitoring-platform/nollywood-nigerian-film"]},"Niue":{"clues":["This self-governing state in free association with New Zealand is one of the world's smallest economies, heavily dependent on aid from Wellington and remittances from its diaspora population that far exceeds residents on the island.","This raised coral atoll features dramatic limestone cliffs rising up to 60 meters above sea level, surrounding a central plateau with no natural harbor or anchorage due to the fringing reef.","Located in the South Pacific Ocean, this territory lies roughly 2,400 kilometers northeast of New Zealand and 600 kilometers east of Tonga.","Capital city starts with 'A'.","This island nation sells novelty coin-shaped chocolates and markets colorful legal tender featuring popular characters, making numismatics a significant revenue source despite its tiny population of around 1,600 people."],"sources":["CIA World Factbook — Niue Economy Overview · https://www.cia.gov/the-world-factbook/countries/niue/","Britannica — Niue Land and Climate · https://www.britannica.com/place/Niue","CIA World Factbook — Niue Geography · https://www.cia.gov/the-world-factbook/countries/niue/","CIA World Factbook — Niue Capital · https://www.cia.gov/the-world-factbook/countries/niue/","New Zealand Treasury — Niue Economic and Fiscal Update · https://www.treasury.govt.nz/publications/efu/niue-economic-and-fiscal-update-2023"]},"Norfolk Island":{"clues":["This territory was established as a penal settlement in 1788 to accommodate the overflow from Britain's Australian colonies, operating until 1855 before briefly hosting Pitcairn Islander descendants.","The volcanic island features rugged coastal cliffs rising dramatically to Mount Bates at 319 meters, with two smaller uninhabited islands lying offshore to the south.","Located in the Pacific Ocean approximately 1,400 kilometers east of Australia and 900 kilometers northwest of New Zealand.","The capital settlement starts with 'K'.","The local population is largely descended from Bounty mutineers and their Tahitian companions, maintaining a unique Creole language blending 18th-century English with Tahitian."],"sources":["Britannica — Norfolk Island History and Penal Settlement · https://www.britannica.com/place/Norfolk-Island","CIA World Factbook — Norfolk Island Geography and Terrain · https://www.cia.gov/the-world-factbook/countries/norfolk-island/","CIA World Factbook — Norfolk Island Location and Geographic Coordinates · https://www.cia.gov/the-world-factbook/countries/norfolk-island/","CIA World Factbook — Norfolk Island Capital Kingston · https://www.cia.gov/the-world-factbook/countries/norfolk-island/","Britannica — Norfolk Island People and Pitcairn Descendants · https://www.britannica.com/place/Norfolk-Island"]},"North Korea":{"clues":["This territory operates the Punggye-ri Nuclear Test Site, where six underground nuclear tests were conducted between 2006 and 2017.","The Taebaek Mountains run along the eastern spine of this peninsula territory, with Mount Paektu reaching 2,744 meters at its northern volcanic peak.","This territory shares land borders with China, Russia, and one other divided nation to the south.","Capital city starts with 'P'.","This territory is the birthplace of taekwondo, a martial art that became an official Olympic sport in 2000."],"sources":["Arms Control Association — North Korea's Nuclear Tests Overview · https://www.armscontrol.org/factsheets/dprkchron","Britannica — North Korea Physical Geography and Terrain · https://www.britannica.com/place/North-Korea/Relief","CIA World Factbook — North Korea Borders and Neighboring Countries · https://www.cia.gov/the-world-factbook/countries/korea-north/","CIA World Factbook — North Korea Capital City Information · https://www.cia.gov/the-world-factbook/countries/korea-north/","World Taekwondo — History and Origins of Taekwondo · https://www.worldtaekwondo.org/about-wt/about-taekwondo/olimpic.html"]},"North Macedonia":{"clues":["This landlocked nation was admitted to the United Nations in 1993 under a provisional reference due to a naming dispute with a southern neighbor that lasted until 2019.","The mountainous terrain includes the Šar Mountains along the northwestern border and Lake Ohrid, one of Europe's oldest and deepest lakes, along the southwestern frontier.","It shares borders with Kosovo to the northwest and Greece to the south.","Capital city starts with 'S'.","Mother Teresa, the Nobel Peace Prize-winning Catholic nun and missionary, was born in this country's capital in 1910."],"sources":["United Nations — General Assembly Resolution 47/225 (1993) on admission under provisional reference · https://www.un.org/en/ga/search/view_doc.asp?symbol=A/RES/47/225","Britannica — Lake Ohrid: one of the oldest and deepest lakes in Europe · https://www.britannica.com/place/Lake-Ohrid","CIA World Factbook — North Macedonia: borders with Greece and Kosovo · https://www.cia.gov/the-world-factbook/countries/north-macedonia/","Britannica — Skopje: capital of North Macedonia · https://www.britannica.com/place/Skopje","Britannica — Mother Teresa: born in Skopje in 1910 · https://www.britannica.com/biography/Mother-Teresa"]},"Northern Cyprus":{"clues":["This self-declared state is recognized as legitimate by only one UN member nation, which maintains over 30,000 troops stationed within its borders.","The Kyrenia mountain range runs parallel to the northern coast, with peaks exceeding 1,000 meters and forming a natural barrier across the territory.","It borders the Republic of Cyprus to the south and is surrounded by the Mediterranean Sea to the north.","Capital city starts with 'N'.","The ancient harbor city of Kyrenia features a striking Venetian castle that has guarded the coastline since the Byzantine era."],"sources":["BBC News — Turkish troops in Cyprus and recognition status · https://www.bbc.com/news/world-europe-17217956","Britannica — Kyrenia Mountains geography and physical features · https://www.britannica.com/place/Kyrenia-Mountains","CIA World Factbook — Cyprus geographic borders and surrounding waters · https://www.cia.gov/the-world-factbook/countries/cyprus/","Britannica — Nicosia as capital of Cyprus · https://www.britannica.com/place/Nicosia","UNESCO — Kyrenia Castle historical significance · https://whc.unesco.org/en/tentativelists/5887/"]},"Northern Mariana Islands":{"clues":["This territory was the site of intense fighting during Operation Forager in 1944, including the largest banzai charge of the Pacific War at Tanapag.","The archipelago consists of 14 volcanic and coral islands stretching approximately 450 miles north-south, with the southernmost islands being the largest and most populated.","Located in the western Pacific Ocean, this territory lies east of the Philippine Sea and directly north of Guam.","Capital city starts with 'S'.","The Chamorro people are indigenous to these islands, sharing cultural and linguistic ties with their neighbors to the immediate south."],"sources":["National Park Service — Battle of Saipan Overview · https://www.nps.gov/articles/000/battle-of-saipan.htm","CIA World Factbook — Northern Mariana Islands Geography · https://www.cia.gov/the-world-factbook/countries/northern-mariana-islands/","Britannica — Northern Mariana Islands Location and Seas · https://www.britannica.com/place/Northern-Mariana-Islands","CIA World Factbook — Northern Mariana Islands Government · https://www.cia.gov/the-world-factbook/countries/northern-mariana-islands/","Britannica — Chamorro People and Culture · https://www.britannica.com/topic/Chamorro"]},"Norway":{"clues":["This country manages the world's largest sovereign wealth fund, worth over $1.4 trillion, built primarily from offshore petroleum revenues.","Glaciers carved thousands of deep coastal inlets called fjords along its dramatic mountainous western coastline, with Sognefjord extending over 200 kilometers inland.","It shares land borders with Sweden, Finland, and Russia in northern Scandinavia.","Capital city starts with 'O'.","Vikings originated from this land, and their historical longships and seafaring culture are celebrated in museums and heritage sites."],"sources":["Norges Bank Investment Management — Official site of the Government Pension Fund Global, the world's largest sovereign wealth fund · https://www.nbim.no/en/","Britannica — Sognefjord description and Norwegian fjord geography · https://www.britannica.com/place/Sognefjorden","CIA World Factbook — Norway border countries listed as Sweden, Finland, and Russia · https://www.cia.gov/the-world-factbook/countries/norway/","CIA World Factbook — Norway capital city Oslo · https://www.cia.gov/the-world-factbook/countries/norway/","UNESCO — Bryggen and Viking heritage sites in Scandinavia · https://whc.unesco.org/en/list/59/"]},"Oman":{"clues":["This nation controls the strategic Strait of Hormuz chokepoint through which approximately 21% of global petroleum liquids transit.","The Hajar Mountains form a dramatic backbone through this country, with Jebel Shams reaching 3,009 meters as the highest peak.","This territory borders the United Arab Emirates and shares a maritime boundary with Iran across the Strait of Hormuz.","Capital city starts with 'M'.","Frankincense trees have grown naturally in this land for millennia, making it the historic center of the ancient frankincense trade."],"sources":["CIA World Factbook — Oman country profile economic overview · https://www.cia.gov/the-world-factbook/countries/oman/","Encyclopedia Britannica — Oman physical geography and Hajar Mountains · https://www.britannica.com/place/Oman","CIA World Factbook — Oman geography and international boundaries · https://www.cia.gov/the-world-factbook/countries/oman/","CIA World Factbook — Oman government and capital city · https://www.cia.gov/the-world-factbook/countries/oman/","UNESCO — Land of Frankincense World Heritage Site description · https://whc.unesco.org/en/list/1010/"]},"Pakistan":{"clues":["This nation was the first modern state created explicitly as a homeland for Muslims, emerging from the partition of British India in 1947.","The world's second-highest mountain K2 stands in the Karakoram range within this territory, while five of the fourteen eight-thousanders are found here.","This country shares borders with both Afghanistan to the west and India to the east.","Capital city starts with 'I'.","The ancient Indus Valley Civilization, one of the world's earliest urban cultures, flourished here around 2500 BCE with sites like Mohenjo-daro."],"sources":["Britannica — Pakistan: The creation of Pakistan as an Islamic state in 1947 · https://www.britannica.com/place/Pakistan","Britannica — K2: Location in Karakoram Range and status as second-highest mountain · https://www.britannica.com/place/K2","CIA World Factbook — Pakistan: Border countries including Afghanistan and India · https://www.cia.gov/the-world-factbook/countries/pakistan/","CIA World Factbook — Pakistan: Capital city Islamabad · https://www.cia.gov/the-world-factbook/countries/pakistan/","UNESCO — Mohenjo-daro: Archaeological site of Indus Valley Civilization · https://whc.unesco.org/en/list/138/"]},"Palau":{"clues":["This nation became the first country to create a nuclear-free constitution in 1981 and established the world's first shark sanctuary in 2009.","The territory comprises over 500 limestone and volcanic islands, with the Rock Islands featuring distinctive mushroom-shaped formations rising from turquoise lagoons.","Located in the western Pacific Ocean, this archipelago lies east of the Philippines and north of Indonesia.","Capital city starts with 'N'.","The Jellyfish Lake contains millions of golden jellyfish that have lost their ability to sting due to the absence of predators."],"sources":["CIA World Factbook — Palau constitutional nuclear-free zone and marine sanctuary history · https://www.cia.gov/the-world-factbook/countries/palau/","UNESCO World Heritage Centre — Rock Islands Southern Lagoon description of limestone karst formations · https://whc.unesco.org/en/list/1386/","Encyclopaedia Britannica — Palau geographic location in Micronesia relative to Philippines and Indonesia · https://www.britannica.com/place/Palau","CIA World Factbook — Palau capital city Ngerulmud · https://www.cia.gov/the-world-factbook/countries/palau/","Smithsonian Ocean — Jellyfish Lake unique ecosystem with non-stinging golden jellyfish · https://ocean.si.edu/ocean-life/invertebrates/jellyfish-lake"]},"Palestine":{"clues":["This territory's governance is split between two rival administrations since 2007, with one controlling a coastal enclave and the other administering fragmented areas in the interior.","The terrain descends from central highlands reaching over 1,000 meters elevation to the lowest point on Earth's land surface at approximately 430 meters below sea level.","It borders Israel, Jordan, and Egypt.","Capital city starts with 'R'.","Olive trees covering these ancient hillsides produce oil that has been a cornerstone of local cuisine and trade for thousands of years."],"sources":["CIA World Factbook — Government overview describing administrative division since 2007 · https://www.cia.gov/the-world-factbook/countries/west-bank/","Britannica — Geography describing elevation from central hill country to Dead Sea depression · https://www.britannica.com/place/Palestine","CIA World Factbook — Geography section listing bordering countries · https://www.cia.gov/the-world-factbook/countries/gaza-strip/","Britannica — Ramallah as administrative capital · https://www.britannica.com/place/Ramallah","UNESCO — Intangible Cultural Heritage describing olive cultivation traditions · https://ich.unesco.org/en/RL/land-of-olives-and-vines-cultural-landscape-of-southern-jerusalem-battir-01186"]},"Panama":{"clues":["The United States transferred control of a strategic canal to this nation in 1999, ending nearly a century of American administration.","This narrow isthmus connects two continents and is bordered by both the Caribbean Sea and the Pacific Ocean, with the Cordillera Central mountain range running through its spine.","This country shares land borders with Costa Rica to the west and Colombia to the east.","Capital city starts with 'P'.","This country is home to one of the world's most important artificial waterways, allowing ships to transit between the Atlantic and Pacific oceans without sailing around South America."],"sources":["U.S. Department of State — Panama Canal Treaty Implementation · https://history.state.gov/milestones/1977-1980/panama-canal","Encyclopaedia Britannica — Panama: Land · https://www.britannica.com/place/Panama/Land","CIA World Factbook — Panama: Geography · https://www.cia.gov/the-world-factbook/countries/panama/","CIA World Factbook — Panama: Government · https://www.cia.gov/the-world-factbook/countries/panama/","Encyclopaedia Britannica — Panama Canal · https://www.britannica.com/topic/Panama-Canal"]},"Papua New Guinea":{"clues":["This nation hosts the world's largest copper and gold mine by reserves, the Grasberg mine, operated through a complex joint venture with Indonesia.","The Owen Stanley Range forms a rugged spine along the eastern peninsula, reaching over 4,000 meters and creating one of the most challenging terrains for overland travel in the Pacific.","This territory shares its only land border with Indonesia to the west and is surrounded by the Coral Sea to the south and the Bismarck Sea to the north.","Capital city starts with 'P'.","Over 800 languages are spoken here, making it the most linguistically diverse country on Earth per capita."],"sources":["Mining Technology — Grasberg Mine profile and reserves data · https://www.mining-technology.com/projects/grasberg-mine/","Britannica — Owen Stanley Range geographical description · https://www.britannica.com/place/Owen-Stanley-Range","CIA World Factbook — Papua New Guinea geography and borders · https://www.cia.gov/the-world-factbook/countries/papua-new-guinea/","CIA World Factbook — Papua New Guinea capital city information · https://www.cia.gov/the-world-factbook/countries/papua-new-guinea/","Ethnologue — Papua New Guinea linguistic diversity statistics · https://www.ethnologue.com/country/PG"]},"Paraguay":{"clues":["This landlocked nation fought the devastating War of the Triple Alliance from 1864-1870, losing over half its population in South America's bloodiest conflict.","The Río Pilcomayo forms part of its southern border, while the massive Pantanal wetlands extend into its northern region.","It shares borders with Bolivia to the north and Argentina to the south.","Capital city starts with 'A'.","This country is one of the world's largest producers of yerba mate, the caffeinated herb used to make the traditional drink sipped through a metal straw called a bombilla."],"sources":["Britannica — War of the Triple Alliance historical overview · https://www.britannica.com/event/War-of-the-Triple-Alliance","Britannica — Pilcomayo River geographic description · https://www.britannica.com/place/Pilcomayo-River","CIA World Factbook — Country border information · https://www.cia.gov/the-world-factbook/countries/paraguay/","CIA World Factbook — Capital city identification · https://www.cia.gov/the-world-factbook/countries/paraguay/","Britannica — Yerba mate production and cultural significance · https://www.britannica.com/topic/mate-beverage"]},"Peru":{"clues":["This country is the world's second-largest producer of copper and holds approximately 10% of global copper reserves.","The Andes mountain range runs the entire length of this territory from north to south, with peaks exceeding 6,000 meters including Huascarán.","This territory shares borders with Ecuador to the north and Chile to the south.","Capital city starts with 'L'.","Machu Picchu, the 15th-century Inca citadel set high in the mountains, is located here."],"sources":["U.S. Geological Survey — Mineral Commodity Summaries 2024: Copper production and reserves by country · https://www.usgs.gov/centers/national-minerals-information-center/copper-statistics-and-information","Britannica — Geography of the Andes mountain range and Huascarán peak elevation · https://www.britannica.com/place/Andes-Mountains","CIA World Factbook — International border information for South American countries · https://www.cia.gov/the-world-factbook/","CIA World Factbook — Capital cities of South American countries · https://www.cia.gov/the-world-factbook/","UNESCO World Heritage Centre — Historic Sanctuary of Machu Picchu · https://whc.unesco.org/en/list/274"]},"Philippines":{"clues":["This archipelagic nation hosts one of the world's largest populations of overseas workers, with remittances consistently accounting for over 9% of GDP and ranking among the top remittance-receiving countries globally.","The territory contains over 7,600 islands formed by the collision of the Eurasian, Pacific, and Indo-Australian tectonic plates, creating dramatic volcanic mountain ranges including over 20 active volcanoes.","This nation is bounded by the South China Sea to the west and the Pacific Ocean to the east.","Capital city starts with 'M'.","This country is the world's leading producer of coconuts and is famous for jeepneys, colorful public transport vehicles originally made from U.S. military jeeps left after World War II."],"sources":["World Bank — Personal remittances, received (% of GDP) - Philippines · https://data.worldbank.org/indicator/BX.TRF.PWKR.DT.GD.ZS?locations=PH","Britannica — Philippines: Relief and drainage features including volcanic activity · https://www.britannica.com/place/Philippines/Relief","CIA World Factbook — Philippines: Geography - Location and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/philippines/","CIA World Factbook — Philippines: Government - Capital city information · https://www.cia.gov/the-world-factbook/countries/philippines/","Food and Agriculture Organization of the United Nations — FAOSTAT: Philippines coconut production statistics · https://www.fao.org/faostat/en/#data/QCL"]},"Pitcairn Islands":{"clues":["This territory is the least populous national jurisdiction in the world, with a population that has remained below 100 residents since the 1990s.","The volcanic island terrain rises to a high point of 335 meters at Pawala Valley Ridge, with steep cliffs surrounding much of the coastline.","Located in the South Pacific Ocean, this territory lies roughly halfway between New Zealand and Peru, with no land borders to any other country.","Capital city starts with 'A'.","This territory is famous as the refuge of the HMS Bounty mutineers who settled here in 1790 after their rebellion against Captain Bligh."],"sources":["CIA World Factbook — Pitcairn Islands population data showing fewer than 50 inhabitants · https://www.cia.gov/the-world-factbook/countries/pitcairn-islands/","Britannica — Geographic description of Pitcairn Island's volcanic topography and elevation · https://www.britannica.com/place/Pitcairn-Island","CIA World Factbook — Geographic location coordinates in South Pacific Ocean · https://www.cia.gov/the-world-factbook/countries/pitcairn-islands/","Britannica — Adamstown as the capital settlement · https://www.britannica.com/place/Pitcairn-Island","Britannica — History of HMS Bounty mutineers settlement in 1790 · https://www.britannica.com/place/Pitcairn-Island"]},"Poland":{"clues":["This nation is home to the Wieliczka Salt Mine, a UNESCO World Heritage site that has been continuously operated since the 13th century and features underground chapels carved entirely from rock salt.","The Carpathian Mountains form a natural border along the southern region, while the Vistula River flows north through the heartland for over 1,000 kilometers to empty into the Baltic Sea.","This country shares its eastern border with Ukraine and its western border with Germany.","Capital city starts with 'W'.","This is the birthplace of Frédéric Chopin and the nation where pierogies are a beloved traditional dish."],"sources":["UNESCO — Wieliczka and Bochnia Royal Salt Mines World Heritage Site · https://whc.unesco.org/en/list/32/","Britannica — Vistula River: Longest river flowing through the country at 1,047 km · https://www.britannica.com/place/Vistula-River","CIA World Factbook — Country borders with Germany to west and Ukraine to east · https://www.cia.gov/the-world-factbook/countries/poland/","CIA World Factbook — Capital city is Warsaw · https://www.cia.gov/the-world-factbook/countries/poland/","Britannica — Frédéric Chopin birthplace and pierogi as traditional cuisine · https://www.britannica.com/place/Poland"]},"Portugal":{"clues":["This nation was the first European colonial power to establish trade routes to India via the Cape of Good Hope in 1498, fundamentally reshaping global maritime commerce.","The westernmost point of continental Europe lies within this territory, which features dramatic Atlantic coastline including Europe's tallest mainland sea cliffs at over 500 meters.","This country shares its only land border with Spain to the north and east.","Capital city starts with 'L'.","This country is the world's largest producer of cork, responsible for over half of global cork production used in wine bottles."],"sources":["Britannica — Vasco da Gama's voyage to India and the establishment of the sea route · https://www.britannica.com/biography/Vasco-da-Gama","UNESCO — Cabo Girão sea cliffs physical geography and Atlantic coastline features · https://whc.unesco.org/en/tentativelists/6მმ5/","CIA World Factbook — Portugal geographic borders and neighboring countries · https://www.cia.gov/the-world-factbook/countries/portugal/","Britannica — Lisbon as capital city of Portugal · https://www.britannica.com/place/Lisbon","WWF — Cork oak forests and global cork production statistics · https://www.worldwildlife.org/species/cork-oak"]},"Republic of the Congo":{"clues":["This former French colony was the first sub-Saharan African country to adopt Marxism-Leninism as its official ideology in 1969, maintained until 1992.","Dense equatorial rainforests cover over 60% of the land area, drained northward by one of Africa's great river systems before emptying into the Atlantic Ocean.","It shares its entire eastern border with a larger neighboring republic of the same name, separated primarily by one of Africa's greatest rivers and the Ubangi River.","Capital city starts with 'B'.","It is home to significant populations of western lowland gorillas in protected areas like Odzala-Kokoua National Park."],"sources":["Britannica — Republic of the Congo history and political development · https://www.britannica.com/place/Republic-of-the-Congo","CIA World Factbook — Republic of the Congo geography and terrain · https://www.cia.gov/the-world-factbook/countries/congo-republic-of-the/","CIA World Factbook — Republic of the Congo international boundaries · https://www.cia.gov/the-world-factbook/countries/congo-republic-of-the/","CIA World Factbook — Republic of the Congo capital city · https://www.cia.gov/the-world-factbook/countries/congo-republic-of-the/","UNESCO — Odzala-Kokoua National Park and western lowland gorillas · https://whc.unesco.org/en/tentativelists/6390/"]},"Romania":{"clues":["This country holds Europe's second-largest reserves of recoverable shale gas, estimated at over 1.4 trillion cubic meters, though extraction remains largely undeveloped.","The Carpathian Mountains form a dramatic arc through the center of this territory, enclosing the Transylvanian Plateau and containing peaks exceeding 2,500 meters.","This nation shares its longest border with Ukraine to the north and east, stretching over 600 kilometers.","Capital city starts with 'B'.","This country is the legendary home of Bran Castle, often associated with the Dracula vampire myth inspired by Vlad the Impaler."],"sources":["U.S. Energy Information Administration — Romania holds the second-largest shale gas resources in Europe · https://www.eia.gov/international/analysis/country/ROU","Britannica — The Carpathian Mountains arc through Romania, enclosing Transylvania with peaks over 2,500m · https://www.britannica.com/place/Romania/Relief","CIA World Factbook — Romania borders Ukraine for 601 km · https://www.cia.gov/the-world-factbook/countries/romania/","Britannica — Bucharest is the capital of Romania · https://www.britannica.com/place/Bucharest","Britannica — Bran Castle in Romania is associated with the Dracula legend and Vlad the Impaler · https://www.britannica.com/topic/Bran-Castle"]},"Russia":{"clues":["This territory is the world's largest exporter of natural gas and wheat, and is a founding member of the BRICS economic alliance.","The Ural Mountains run north-south through this territory, traditionally marking the continental divide between Europe and Asia.","This territory shares its longest land border with Kazakhstan and has coastlines on both the Black Sea and the Pacific Ocean.","Capital city starts with 'M'.","The Hermitage Museum, one of the world's largest art museums, and the onion-domed Saint Basil's Cathedral are iconic landmarks here."],"sources":["CIA World Factbook — Natural gas exports and wheat production statistics · https://www.cia.gov/the-world-factbook/countries/russia/","Britannica — Ural Mountains geographic description and continental divide · https://www.britannica.com/place/Ural-Mountains","CIA World Factbook — Border countries and maritime boundaries · https://www.cia.gov/the-world-factbook/countries/russia/","CIA World Factbook — Capital city information · https://www.cia.gov/the-world-factbook/countries/russia/","UNESCO World Heritage Centre — Historic Centre of Saint Petersburg and Related Groups of Monuments · https://whc.unesco.org/en/list/540/"]},"Rwanda":{"clues":["This nation experienced one of the fastest economic growth rates in Africa during the 2000s and 2010s, with GDP growth averaging over 7% annually while transitioning from agriculture to a service-based economy.","Known as the 'land of a thousand hills,' this landlocked country features a mountainous landscape with elevations ranging from 950 to 4,507 meters, including volcanic peaks in the northwest.","This territory shares borders with Uganda to the north and Tanzania to the east.","Capital city starts with 'K'.","This country is one of only two places in the world where endangered mountain gorillas can be visited in their natural habitat within protected volcanic mountain ranges."],"sources":["World Bank — Rwanda Overview: Economic growth and structural transformation · https://www.worldbank.org/en/country/rwanda/overview","Encyclopædia Britannica — Rwanda: Land and topography · https://www.britannica.com/place/Rwanda/Land","CIA World Factbook — Rwanda: Geography · https://www.cia.gov/the-world-factbook/countries/rwanda/","CIA World Factbook — Rwanda: Capital · https://www.cia.gov/the-world-factbook/countries/rwanda/","UNESCO World Heritage Centre — Bwindi Impenetrable National Park and mountain gorillas · https://whc.unesco.org/en/list/682/"]},"Saint Barthelemy":{"clues":["This overseas collectivity uses the euro as its currency despite being located in the Caribbean, reflecting its constitutional status within the European Union.","The territory consists of a single volcanic island covering just 25 square kilometers, with its highest point reaching 286 meters at Morne du Vitet.","Located in the northeastern Caribbean Sea, it lies approximately 15 miles southeast of another island and 140 miles north of Guadeloupe.","Capital city starts with 'G'.","This island is renowned for its luxury tourism industry, with high-end resorts and yacht harbors attracting celebrities and affluent visitors from around the world."],"sources":["CIA World Factbook — Saint Barthelemy Economy Overview · https://www.cia.gov/the-world-factbook/countries/saint-barthelemy/","Britannica — Saint Barthélemy Geography and Topography · https://www.britannica.com/place/Saint-Barthelemy","CIA World Factbook — Saint Barthelemy Geographic Location · https://www.cia.gov/the-world-factbook/countries/saint-barthelemy/","CIA World Factbook — Saint Barthelemy Capital · https://www.cia.gov/the-world-factbook/countries/saint-barthelemy/","Britannica — Saint Barthélemy Tourism and Economy · https://www.britannica.com/place/Saint-Barthelemy"]},"Saint Helena":{"clues":["This territory served as the final place of exile for Napoleon Bonaparte from 1815 until his death in 1821, following his defeat at Waterloo.","The island is dominated by a volcanic peak rising to 818 meters, with rugged cliffs dropping steeply to the ocean and deep valleys carved into the interior.","This remote island lies in the South Atlantic Ocean, over 1,200 miles from the nearest continental landmass of Africa.","Capital city starts with 'J'.","This isolated island is one of the most remote inhabited places on Earth and is famous as Napoleon's final prison."],"sources":["Britannica — Napoleon's exile on Saint Helena from 1815-1821 · https://www.britannica.com/biography/Napoleon-I/Exile-on-Saint-Helena","CIA World Factbook — Saint Helena terrain description with elevation of 818m · https://www.cia.gov/the-world-factbook/countries/saint-helena-ascension-and-tristan-da-cunha/","CIA World Factbook — Saint Helena location in South Atlantic Ocean · https://www.cia.gov/the-world-factbook/countries/saint-helena-ascension-and-tristan-da-cunha/","CIA World Factbook — Jamestown as capital of Saint Helena · https://www.cia.gov/the-world-factbook/countries/saint-helena-ascension-and-tristan-da-cunha/","Britannica — Saint Helena as one of most remote inhabited islands · https://www.britannica.com/place/Saint-Helena-island-South-Atlantic-Ocean"]},"Saint Kitts and Nevis":{"clues":["This federation achieved independence in 1983 and is the smallest sovereign state in the Western Hemisphere by both area and population.","The territory consists of two volcanic islands separated by a channel approximately 2 miles wide, with the highest peak reaching 3,792 feet above sea level.","Located in the Leeward Islands, this territory lies in the Caribbean Sea with the nearest neighbors being Antigua and Barbuda to the east and Sint Eustatius to the northwest.","Capital city starts with 'B'.","This dual-island nation is known for its historic Brimstone Hill Fortress, a UNESCO World Heritage Site sometimes called the 'Gibraltar of the West Indies'."],"sources":["CIA World Factbook — Saint Kitts and Nevis country summary noting 1983 independence and status as smallest sovereign state in Western Hemisphere · https://www.cia.gov/the-world-factbook/countries/saint-kitts-and-nevis/","Britannica — Geography of Saint Kitts and Nevis describing two volcanic islands separated by The Narrows channel and Mount Liamuiga elevation · https://www.britannica.com/place/Saint-Kitts-and-Nevis","CIA World Factbook — Saint Kitts and Nevis location in Leeward Islands with Caribbean Sea position · https://www.cia.gov/the-world-factbook/countries/saint-kitts-and-nevis/","CIA World Factbook — Capital city Basseterre listed for Saint Kitts and Nevis · https://www.cia.gov/the-world-factbook/countries/saint-kitts-and-nevis/","UNESCO World Heritage Centre — Brimstone Hill Fortress National Park designation and description · https://whc.unesco.org/en/list/910/"]},"Saint Lucia":{"clues":["This volcanic island nation is home to the world's only drive-in volcano, where visitors can enter the collapsed dome of a geothermal depression.","The island features two distinctive volcanic peaks called the Pitons, which rise sharply over 700 meters directly from the Caribbean Sea.","This Eastern Caribbean island lies between Martinique to the north and Saint Vincent to the south.","Capital city starts with 'C'.","This island is famous for producing premium cocoa and hosts an annual jazz festival that attracts international performers each May."],"sources":["UNESCO — Soufrière volcanic area with accessible geothermal features · https://whc.unesco.org/en/tentativelists/5930/","UNESCO World Heritage Centre — Gros Piton and Petit Piton volcanic spires description · https://whc.unesco.org/en/list/1161/","CIA World Factbook — Saint Lucia geographic location in Lesser Antilles · https://www.cia.gov/the-world-factbook/countries/saint-lucia/","Britannica — Castries as capital city · https://www.britannica.com/place/Saint-Lucia","Saint Lucia Tourism Authority — Annual jazz festival and cocoa production heritage · https://www.stlucia.org/"]},"Saint Martin":{"clues":["This territory is divided between two European nations under a unique arrangement dating to the 1648 Treaty of Concordia, making it the world's smallest landmass shared by two sovereign states.","The territory's highest point is Pic Paradis, reaching 424 meters above sea level and offering panoramic views of the surrounding Caribbean waters.","This territory is surrounded by the Caribbean Sea and shares its island with one other nation to the south.","Capital city starts with 'M'.","This Caribbean destination is famous for Maho Beach, where aircraft on final approach fly extremely low over sunbathers before landing at the adjacent international airport."],"sources":["Encyclopaedia Britannica — Saint Martin historical overview and Treaty of Concordia · https://www.britannica.com/place/Saint-Martin-island-West-Indies","PeakVisor — Pic Paradis elevation and geographic data · https://peakvisor.com/peak/pic-paradis.html","CIA World Factbook — Saint Martin geography and maritime borders · https://www.cia.gov/the-world-factbook/countries/saint-martin/","Government of Saint Martin — Marigot as territorial capital · https://www.com-saint-martin.fr/","CNN Travel — Maho Beach and Princess Juliana International Airport proximity · https://www.cnn.com/travel/article/maho-beach-st-maarten/index.html"]},"Saint Pierre and Miquelon":{"clues":["This archipelago is the last remaining territory of the once-vast colonial empire in North America that stretched from the Gulf of Mexico to the Arctic Circle.","Eight rocky islands of volcanic and sedimentary origin form this cold archipelago, with barren, windswept terrain and numerous small ponds dotting the landscape.","These islands lie in the North Atlantic Ocean, just south of the Canadian province of Newfoundland and Labrador.","Capital city starts with 'S'.","This territory is famous for its traditional French cuisine including dishes like cod au gratin and tourtière, along with colorful wooden houses lining the harbors."],"sources":["Britannica — Saint Pierre and Miquelon historical overview · https://www.britannica.com/place/Saint-Pierre-and-Miquelon","CIA World Factbook — Saint Pierre and Miquelon geography · https://www.cia.gov/the-world-factbook/countries/saint-pierre-and-miquelon/","CIA World Factbook — Saint Pierre and Miquelon location and geography · https://www.cia.gov/the-world-factbook/countries/saint-pierre-and-miquelon/","Britannica — Saint Pierre capital city · https://www.britannica.com/place/Saint-Pierre-and-Miquelon","UNESCO — French culinary traditions and Atlantic island culture · https://ich.unesco.org/en/RL/gastronomic-meal-of-the-french-00437"]},"Saint Vincent and the Grenadines":{"clues":["This island nation is a founding member of the Organisation of Eastern Caribbean States (OECS), established in 1981 to promote economic integration among seven small island economies.","The territory consists of 32 islands and cays stretching across approximately 60 kilometers, with the main island featuring the active La Soufrière volcano that last erupted in 2021.","Located in the Windward Islands of the Lesser Antilles, this territory lies between Saint Lucia to the south and Grenada to the north in the eastern Caribbean Sea.","Capital city starts with 'K'.","This Caribbean territory is known as the filming location for much of the Pirates of the Caribbean film series, with its dramatic coastlines doubling for fictional island settings."],"sources":["Organisation of Eastern Caribbean States — About OECS: Member States and History · https://www.oecs.org/en/who-we-are/about-oecs","Smithsonian Institution Global Volcanism Program — La Soufrière (Saint Vincent): Summary and Eruption History · https://volcano.si.edu/volcano.cfm?vn=360150","CIA World Factbook — Saint Vincent and the Grenadines: Geography · https://www.cia.gov/the-world-factbook/countries/saint-vincent-and-the-grenadines/","Britannica — Saint Vincent and the Grenadines: Kingstown · https://www.britannica.com/place/Saint-Vincent-and-the-Grenadines","Caribbean Tourism Organization — Film Tourism in the Caribbean: Production Locations · https://www.onecaribbean.org/content/files/PiratesCaribbean.pdf"]},"Samoa":{"clues":["This nation was the first Pacific Island country to gain independence in the 20th century, breaking free from New Zealand administration in 1962.","The territory consists of two main volcanic islands with rugged mountainous interiors, the highest peak reaching 1,857 meters on the larger western island.","This archipelago lies in the South Pacific Ocean, roughly halfway between Hawaii and New Zealand, with no land borders.","Capital city starts with 'A'.","Traditional tattooing here is called 'tatau' and gave the English language the word 'tattoo', representing an ancient cultural practice still widely performed today."],"sources":["CIA World Factbook — Samoa independence date and history · https://www.cia.gov/the-world-factbook/countries/samoa/","Britannica — Samoa physical geography and volcanic islands · https://www.britannica.com/place/Samoa-island-nation-Pacific-Ocean","CIA World Factbook — Samoa geographic location in South Pacific · https://www.cia.gov/the-world-factbook/countries/samoa/","CIA World Factbook — Samoa capital city information · https://www.cia.gov/the-world-factbook/countries/samoa/","Britannica — Samoan tattooing culture and etymology of tattoo · https://www.britannica.com/topic/tattoo-body-modification"]},"San Marino":{"clues":["One of only three countries in the world entirely surrounded by another single nation, it is the oldest surviving sovereign state and constitutional republic.","The entire territory sits atop Mount Titano in the Apennine mountain range, with its highest point reaching 749 meters above sea level.","This landlocked enclave is completely surrounded by Italy on all sides.","Capital city starts with 'S'.","This microstate is famous for its medieval fortresses and three distinctive towers perched on mountain peaks that appear on its flag and coat of arms."],"sources":["Encyclopaedia Britannica — San Marino constitutional history and sovereign state status · https://www.britannica.com/place/San-Marino","CIA World Factbook — San Marino geography and Mount Titano elevation data · https://www.cia.gov/the-world-factbook/countries/san-marino/","CIA World Factbook — San Marino border countries · https://www.cia.gov/the-world-factbook/countries/san-marino/","Encyclopaedia Britannica — San Marino capital city · https://www.britannica.com/place/San-Marino-national-capital-San-Marino","UNESCO World Heritage Centre — San Marino Historic Centre and Mount Titano · https://whc.unesco.org/en/list/1245/"]},"Saudi Arabia":{"clues":["This country is the world's largest oil exporter and a founding member of OPEC, established in 1960.","The Rub' al Khali, or Empty Quarter, covers much of the southern region and is one of the largest continuous sand deserts on Earth.","This territory shares borders with Jordan to the northwest and Yemen to the south.","Capital city starts with 'R'.","The holy cities of Mecca and Medina attract millions of Muslim pilgrims annually during the Hajj."],"sources":["OPEC — Member Countries: History and founding members of the Organization of the Petroleum Exporting Countries · https://www.opec.org/opec_web/en/about_us/24.htm","Britannica — Rub al Khali: Physical geography and characteristics of the Empty Quarter desert · https://www.britannica.com/place/Rub-al-Khali","CIA World Factbook — Middle East: Border countries and geographic relationships · https://www.cia.gov/the-world-factbook/countries/saudi-arabia/","Britannica — Riyadh: Capital city information · https://www.britannica.com/place/Riyadh","UNESCO — The Hajj: Pilgrimage sites and cultural significance of Mecca and Medina · https://whc.unesco.org/en/tentativelists/6084/"]},"Scarborough Reef":{"clues":["This feature is the subject of a 2016 arbitral tribunal ruling under UNCLOS that found no legal basis for historic rights to resources within the nine-dash line.","This submerged atoll reef lies approximately 160 nautical miles west of Subic Bay and consists of a triangular-shaped lagoon surrounded by coral formations that are mostly underwater at high tide.","Located in the South China Sea, it sits roughly equidistant between the western coast of Luzon and the Paracel Islands to the northwest.","This disputed feature has no permanent settlements and therefore no capital city.","This reef has been occupied at various times by naval vessels from multiple claim
