<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BORDERS · Test Build</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #f83500;
      --bg-panel:     rgba(248, 53, 0, 0.95);
      --bg-solid:     #f83500;
      --text:         #1a1a1a;
      --text-dim:     rgba(0, 0, 0, 0.55);
      --text-faint:   rgba(0, 0, 0, 0.3);
      --red:          #1a1a1a;
      --green:        #fffbe6;
      --border:       #1a1a1a;
      --border-light: rgba(0, 0, 0, 0.15);
      --font:         'Bebas Neue', 'Helvetica Neue', system-ui, sans-serif;
      --mono:         'Bebas Neue', 'Helvetica Neue', system-ui, sans-serif;
      --btn-bg:       #1a1a1a;
      --btn-text:     #f83500;
      --path-fill:    rgba(255, 251, 230, 0.12);
      --path-stroke:  #fffbe6;
      --glow-color:   rgba(255, 251, 230, 0.35);
      --glow-color-max: rgba(255, 251, 230, 0.75);
      --won-fill:     rgba(255, 251, 230, 0.25);
      --won-stroke:   #fffbe6;
      --won-glow:     rgba(255, 251, 230, 0.95);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 16px 60px;
      -webkit-font-smoothing: antialiased;
    }
    header {
      width: 100%; max-width: 560px;
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 28px 0 10px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 16px;
    }
    .logo {
      font-family: var(--font);
      font-size: 44px; letter-spacing: 5px;
      color: var(--text); line-height: 1;
    }
    .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .meta-line { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    #country-count { color: var(--text-dim); }

    #test-banner {
      width: 100%; max-width: 560px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; margin-bottom: 16px;
      border: 2px solid var(--border); background: var(--border-light);
      font-size: 10px; letter-spacing: 2px; color: var(--text-dim);
      text-transform: uppercase;
    }
    #test-banner-label { opacity: 0.7; }
    #puzzle-counter { font-weight: 600; }
    #next-btn {
      background: transparent; border: 2px solid var(--border); color: var(--text);
      font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
      padding: 5px 14px; cursor: pointer; text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    #next-btn:hover { background: var(--border-light); }

    .map-wrap {
      position: relative; display: flex; flex-direction: column;
      align-items: center; margin-bottom: 16px;
    }
    #map-svg {
      background: var(--bg-panel); border: 2px solid var(--border); display: block;
    }
    .scan-label {
      position: absolute; bottom: 8px; right: 8px;
      font-size: 9px; color: var(--text-dim); letter-spacing: 3px; opacity: 0.7;
    }
    #error-msg {
      font-size: 11px; color: var(--red); margin-top: 8px;
      letter-spacing: 1px; max-width: 400px; text-align: center;
      line-height: 1.6; display: none;
    }
    @keyframes scan {
      0%   { transform: translateY(0); }
      100% { transform: translateY(220px); }
    }
    .scan-line { animation: scan 1.4s linear infinite; }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 3px var(--glow-color)); }
      50%       { filter: drop-shadow(0 0 8px var(--glow-color-max)); }
    }
    #country-path {
      fill: var(--path-fill); stroke: var(--path-stroke);
      stroke-width: 1.5; stroke-linejoin: round;
      animation: pulse-glow 3.6s ease-in-out infinite;
      transition: fill 0.4s, stroke 0.4s;
    }
    #country-path.won {
      fill: var(--won-fill); stroke: var(--won-stroke); stroke-width: 2.5;
      filter: drop-shadow(0 0 12px var(--won-glow)) !important;
      animation: none;
    }

    #counter {
      font-size: 11px; letter-spacing: 3px; color: var(--text-dim);
      text-transform: uppercase; margin-bottom: 16px; display: none;
    }
    #counter .num { font-weight: 600; color: var(--text); }
    #counter .num.danger { color: var(--red); }

    #clues-wrap { width: 100%; max-width: 560px; margin-bottom: 16px; }
    .clue {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 9px 14px; border-left: 2px solid var(--border);
      margin-bottom: 7px; font-size: 12px; line-height: 1.6; color: var(--text-dim);
      background: var(--border-light);
      animation: clue-in 0.35s ease both;
    }
    @keyframes clue-in {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .clue-num { color: var(--text); font-weight: 600; min-width: 18px; font-size: 10px; padding-top: 2px; }

    #chips-wrap {
      width: 100%; max-width: 560px;
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
    }
    .chip {
      font-size: 10px; padding: 4px 10px;
      border: 2px solid var(--red); color: var(--red);
      letter-spacing: 1px; text-transform: uppercase;
    }

    #input-wrap { width: 100%; max-width: 560px; position: relative; display: none; }
    #input-row { display: flex; gap: 8px; }
    #input-row.shake { animation: shake 0.42s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-9px); }
      40%     { transform: translateX(9px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    #guess-input {
      flex: 1; background: var(--bg-panel); border: 2px solid var(--border);
      color: var(--text); font-family: var(--mono);
      font-size: 13px; padding: 11px 14px; outline: none; letter-spacing: 1px;
      transition: border-color 0.15s;
    }
    #guess-input:focus { border-color: var(--text); }
    #guess-input::placeholder { color: var(--text-faint); }
    #guess-btn {
      background: var(--btn-bg); border: none; color: var(--btn-text);
      font-family: var(--font); font-size: 20px; letter-spacing: 2px;
      padding: 0 22px; cursor: pointer; transition: opacity 0.15s;
    }
    #guess-btn:hover { opacity: 0.8; }
    #suggestions {
      position: absolute; top: 100%; left: 0; right: 48px;
      background: var(--bg-panel); border: 2px solid var(--border);
      border-top: none; z-index: 10; display: none;
    }
    .sug-item {
      padding: 8px 14px; font-size: 12px; letter-spacing: 1px;
      cursor: pointer; color: var(--text-dim); transition: background 0.1s, color 0.1s;
    }
    .sug-item:hover { background: var(--border-light); color: var(--text); }

    #result-box {
      width: 100%; max-width: 560px; padding: 24px 28px;
      margin-top: 8px; border: 2px solid var(--border); text-align: center; display: none;
      background: var(--bg-panel);
    }
    #result-box.won  { border-color: var(--green); }
    #result-box.lost { border-color: var(--red); }
    #result-title {
      font-family: var(--font);
      font-size: 34px; letter-spacing: 5px; margin-bottom: 4px;
    }
    #result-box.won  #result-title { color: var(--green); }
    #result-box.lost #result-title { color: var(--red); }
    #result-country { font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
    #result-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; margin-bottom: 18px; }
    .result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    #share-btn {
      background: transparent; border: 2px solid var(--border); color: var(--text);
      font-family: var(--mono); font-size: 12px; letter-spacing: 2px;
      padding: 8px 22px; cursor: pointer; text-transform: uppercase;
    }
    #share-btn:hover { background: var(--border-light); }
    #next-result-btn {
      background: var(--btn-bg); border: none; color: var(--btn-text);
      font-family: var(--font); font-size: 18px; letter-spacing: 3px;
      padding: 8px 22px; cursor: pointer; transition: opacity 0.15s;
    }
    #next-result-btn:hover { opacity: 0.8; }

    #share-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    #share-overlay.open { display: flex; }
    #share-box {
      background: var(--bg-solid); border: 2px solid var(--border);
      padding: 24px 28px; width: min(420px, 90vw);
      display: flex; flex-direction: column; gap: 12px;
    }
    #share-box h2 { font-family: var(--font); font-size: 24px; letter-spacing: 4px; color: var(--text); }
    #share-box p  { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
    #share-textarea {
      background: var(--bg-panel); border: 2px solid var(--border); color: var(--text);
      font-family: var(--mono); font-size: 14px; line-height: 1.8;
      padding: 12px 14px; resize: none; height: 120px; outline: none; letter-spacing: 1px;
    }
    .share-actions { display: flex; justify-content: space-between; align-items: center; }
    .share-hint { font-size: 10px; color: var(--text-faint); letter-spacing: 2px; }
    #dismiss-btn {
      background: transparent; border: 2px solid var(--border); color: var(--text-dim);
      font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
      padding: 6px 16px; cursor: pointer; text-transform: uppercase;
    }

    footer {
      margin-top: 24px; font-size: 10px; letter-spacing: 2px;
      color: var(--text-faint); font-family: var(--mono);
      text-transform: uppercase; text-align: center;
    }
    footer a { color: var(--text-dim); text-decoration: none; }
    footer a:hover { color: var(--text); }
    #debug { font-size: 10px; color: var(--text-faint); margin-top: 6px; letter-spacing: 1px; display: none; }

    /* ── VIBES Button ─────────────────────────── */
    #vibes-btn {
      position: fixed; bottom: 20px; left: 20px; z-index: 200;
      background: var(--btn-bg); color: var(--btn-text);
      border: none; padding: 10px 18px;
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      cursor: pointer; border-radius: 20px;
      transition: transform 0.15s cubic-bezier(0.34, 1.4, 0.64, 1), box-shadow 0.15s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    #vibes-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    #vibes-btn:active { transform: scale(0.95); }

    /* ── Neon Theme Overrides ─────────────────── */
    [data-theme="neon"] #map-svg,
    [data-theme="neon"] #result-box,
    [data-theme="neon"] #share-box {
      border: 1px solid #00ff41;
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.4), inset 0 0 8px rgba(0, 255, 65, 0.05);
    }
    [data-theme="neon"] #guess-btn,
    [data-theme="neon"] #next-btn,
    [data-theme="neon"] #next-result-btn,
    [data-theme="neon"] #share-btn,
    [data-theme="neon"] #dismiss-btn,
    [data-theme="neon"] #vibes-btn {
      border: 1px solid #00ff41;
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.5);
      color: #00ff41; background: #000000;
    }
    [data-theme="neon"] #vibes-btn:hover,
    [data-theme="neon"] #guess-btn:hover,
    [data-theme="neon"] #next-btn:hover,
    [data-theme="neon"] #next-result-btn:hover,
    [data-theme="neon"] #share-btn:hover {
      background: rgba(0, 255, 65, 0.1);
      box-shadow: 0 0 16px rgba(0, 255, 65, 0.8);
    }
    [data-theme="neon"] #guess-input {
      border: 1px solid #00ff41;
      box-shadow: inset 0 0 6px rgba(0, 255, 65, 0.1);
    }
    [data-theme="neon"] #guess-input:focus {
      box-shadow: 0 0 12px rgba(0, 255, 65, 0.5), inset 0 0 6px rgba(0, 255, 65, 0.1);
    }
    [data-theme="neon"] .clue {
      border-left-color: rgba(0, 255, 65, 0.5);
      background: rgba(0, 255, 65, 0.05);
    }
    [data-theme="neon"] .chip {
      border-color: #00ff41;
      box-shadow: 0 0 6px rgba(0, 255, 65, 0.3);
    }
  </style>
</head>
<body>

  <div id="share-overlay">
    <div id="share-box">
      <h2>YOUR RESULT</h2>
      <p>Copied to clipboard — or select &amp; copy manually</p>
      <textarea id="share-textarea" readonly></textarea>
      <div class="share-actions">
        <span class="share-hint">Cmd+A · Cmd+C</span>
        <button id="dismiss-btn">DISMISS ✕</button>
      </div>
    </div>
  </div>

  <header>
    <div class="logo">BORDERS</div>
    <div class="meta">
      <div class="meta-line">NEWPRESS · TEST BUILD</div>
      <div class="meta-line" id="country-count">LOADING…</div>
      <div class="meta-line" id="date-display"></div>
    </div>
  </header>

  <div id="test-banner">
    <span id="test-banner-label">▲ TEST MODE</span>
    <span id="puzzle-counter">PUZZLE — / —</span>
    <button id="next-btn">NEXT PUZZLE →</button>
  </div>

  <div class="map-wrap">
    <svg id="map-svg" viewBox="0 0 220 220" width="230" height="230">
      <g id="grid" opacity="0.4"></g>
      <g id="ticks"></g>
      <line id="scan-line" class="scan-line"
        x1="0" y1="0" x2="220" y2="0"
        stroke="var(--text-dim)" stroke-width="1.5"/>
      <path id="country-path" d=""/>
      <circle cx="110" cy="110" r="1.5" fill="var(--border)"/>
    </svg>
    <div class="scan-label" id="scan-label">ACQUIRING 10m GEODATA…</div>
    <div id="error-msg"></div>
    <div id="debug"></div>
  </div>

  <div id="counter"><span class="num" id="remaining-num">6</span> GUESSES REMAINING</div>
  <div id="clues-wrap"></div>
  <div id="chips-wrap"></div>

  <div id="input-wrap">
    <div id="input-row">
      <input id="guess-input" type="text" placeholder="Type a country name…" autocomplete="off" />
      <button id="guess-btn">→</button>
    </div>
    <div id="suggestions"></div>
  </div>

  <div id="result-box">
    <div id="result-title"></div>
    <div id="result-country"></div>
    <div id="result-sub"></div>
    <div class="result-actions">
      <button id="share-btn">SHARE RESULT</button>
      <button id="next-result-btn">NEXT PUZZLE →</button>
    </div>
  </div>

  <footer>
    <a href="https://newpress.com">Newpress</a> ·
    map: <a href="https://github.com/datasets/geo-countries">Natural Earth 10m via geo-countries</a>
  </footer>

  <button id="vibes-btn">VIBES</button>

<script>
// ─── THEME SYSTEM ─────────────────────────────────────────────────────────────
const BORDERS_THEMES = {
  bold: {
    css: {
      '--bg': '#f83500',
      '--bg-panel': 'rgba(248, 53, 0, 0.95)',
      '--bg-solid': '#f83500',
      '--text': '#1a1a1a',
      '--text-dim': 'rgba(0, 0, 0, 0.55)',
      '--text-faint': 'rgba(0, 0, 0, 0.3)',
      '--red': '#1a1a1a',
      '--green': '#fffbe6',
      '--border': '#1a1a1a',
      '--border-light': 'rgba(0, 0, 0, 0.15)',
      '--font': "'Bebas Neue', 'Helvetica Neue', system-ui, sans-serif",
      '--mono': "'Bebas Neue', 'Helvetica Neue', system-ui, sans-serif",
      '--btn-bg': '#1a1a1a',
      '--btn-text': '#f83500',
    },
    svg: {
      pathFill: 'rgba(255, 251, 230, 0.12)',
      pathStroke: '#fffbe6',
      glowColor: 'rgba(255, 251, 230, 0.35)',
      glowColorMax: 'rgba(255, 251, 230, 0.75)',
      wonFill: 'rgba(255, 251, 230, 0.25)',
      wonStroke: '#fffbe6',
      wonGlow: 'rgba(255, 251, 230, 0.95)',
      grid: '#1a1a1a',
      ticks: '#1a1a1a',
      scanStroke: 'rgba(26, 26, 26, 0.5)',
      center: '#1a1a1a',
    },
  },
  monochrome: {
    css: {
      '--bg': '#ffffff',
      '--bg-panel': 'rgba(255, 255, 255, 0.92)',
      '--bg-solid': '#ffffff',
      '--text': '#000000',
      '--text-dim': 'rgba(0, 0, 0, 0.4)',
      '--text-faint': 'rgba(0, 0, 0, 0.2)',
      '--red': '#ff0000',
      '--green': '#00e676',
      '--border': '#000000',
      '--border-light': 'rgba(0, 0, 0, 0.1)',
      '--font': "'Space Grotesk', 'Helvetica Neue', system-ui, sans-serif",
      '--mono': "'Space Mono', 'Courier New', monospace",
      '--btn-bg': '#000000',
      '--btn-text': '#ffffff',
    },
    svg: {
      pathFill: 'rgba(0, 0, 0, 0.05)',
      pathStroke: '#000000',
      glowColor: 'rgba(0, 0, 0, 0.15)',
      glowColorMax: 'rgba(0, 0, 0, 0.35)',
      wonFill: 'rgba(0, 230, 118, 0.1)',
      wonStroke: '#00e676',
      wonGlow: 'rgba(0, 230, 118, 0.95)',
      grid: 'rgba(0, 0, 0, 0.12)',
      ticks: 'rgba(0, 0, 0, 0.3)',
      scanStroke: 'rgba(0, 0, 0, 0.25)',
      center: 'rgba(0, 0, 0, 0.3)',
    },
  },
  neon: {
    css: {
      '--bg': '#000000',
      '--bg-panel': 'rgba(0, 0, 0, 0.92)',
      '--bg-solid': '#000000',
      '--text': '#00ff41',
      '--text-dim': 'rgba(0, 255, 65, 0.55)',
      '--text-faint': 'rgba(0, 255, 65, 0.25)',
      '--red': '#00ff41',
      '--green': '#00ff41',
      '--border': '#00ff41',
      '--border-light': 'rgba(0, 255, 65, 0.2)',
      '--font': "'Space Mono', 'Courier New', monospace",
      '--mono': "'Space Mono', 'Courier New', monospace",
      '--btn-bg': '#000000',
      '--btn-text': '#00ff41',
    },
    svg: {
      pathFill: 'rgba(0, 255, 65, 0.07)',
      pathStroke: '#00ff41',
      glowColor: 'rgba(0, 255, 65, 0.35)',
      glowColorMax: 'rgba(0, 255, 65, 0.75)',
      wonFill: 'rgba(0, 255, 65, 0.15)',
      wonStroke: '#00ff41',
      wonGlow: 'rgba(0, 255, 65, 0.95)',
      grid: 'rgba(0, 255, 65, 0.15)',
      ticks: 'rgba(0, 255, 65, 0.4)',
      scanStroke: 'rgba(0, 255, 65, 0.5)',
      center: 'rgba(0, 255, 65, 0.4)',
    },
  },
};

const BORDERS_THEME_ORDER = ['bold', 'monochrome', 'neon'];
let currentBordersTheme = 'bold';

function applyBordersTheme(name) {
  const theme = BORDERS_THEMES[name];
  if (!theme) return;
  currentBordersTheme = name;

  // Set CSS variables
  const root = document.documentElement;
  for (const [prop, value] of Object.entries(theme.css)) {
    root.style.setProperty(prop, value);
  }

  // Set SVG CSS vars
  const s = theme.svg;
  root.style.setProperty('--path-fill', s.pathFill);
  root.style.setProperty('--path-stroke', s.pathStroke);
  root.style.setProperty('--glow-color', s.glowColor);
  root.style.setProperty('--glow-color-max', s.glowColorMax);
  root.style.setProperty('--won-fill', s.wonFill);
  root.style.setProperty('--won-stroke', s.wonStroke);
  root.style.setProperty('--won-glow', s.wonGlow);

  // Set data-theme for CSS neon overrides
  document.body.dataset.theme = name;

  // Update SVG grid/tick/scan hardcoded colors
  document.querySelectorAll('#grid line').forEach(l => {
    l.setAttribute('stroke', s.grid);
  });
  document.querySelectorAll('#ticks line').forEach(l => {
    l.setAttribute('stroke', s.ticks);
  });
  const scanLine = document.getElementById('scan-line');
  if (scanLine) scanLine.setAttribute('stroke', s.scanStroke);
  const center = document.querySelector('#map-svg circle');
  if (center) center.setAttribute('fill', s.center);
}

function initBordersThemes() {
  const saved = localStorage.getItem('borders-theme');
  if (saved && BORDERS_THEMES[saved]) {
    currentBordersTheme = saved;
  }
  applyBordersTheme(currentBordersTheme);

  const btn = document.getElementById('vibes-btn');
  if (btn) {
    btn.addEventListener('click', () => {
      const idx = BORDERS_THEME_ORDER.indexOf(currentBordersTheme);
      const next = BORDERS_THEME_ORDER[(idx + 1) % BORDERS_THEME_ORDER.length];
      applyBordersTheme(next);
      localStorage.setItem('borders-theme', next);

      // Juicy feedback — brief scale pulse
      btn.style.transform = 'scale(1.15)';
      setTimeout(() => { btn.style.transform = ''; }, 150);
    });
  }
}

d Factbook — Barbados Geographic Coordinates and Location · https://www.cia.gov/the-world-factbook/countries/barbados/","CIA World Factbook — Barbados Capital City Information · https://www.cia.gov/the-world-factbook/countries/barbados/","BBC News — Rihanna Declared National Hero of Barbados · https://www.bbc.com/news/world-latin-america-59508345"]},"Baykonur Cosmodrome":{"clues":["This territory is leased to Russia until 2050 under a post-Soviet agreement, despite being located within another sovereign nation's borders.","The terrain consists of flat steppe and semi-arid desert landscape with minimal elevation variation across the area.","This territory is entirely surrounded by Kazakhstan on all sides.","The main settlement starts with 'B'.","This spaceport launched Yuri Gagarin, the first human in space, in 1961 and remains the world's oldest and largest operational space launch facility."],"sources":["BBC News — Russia extends lease of Baikonur Cosmodrome from Kazakhstan until 2050 · https://www.bbc.com/news/world-asia-26924416","Encyclopaedia Britannica — Baikonur Cosmodrome geographic and terrain description · https://www.britannica.com/place/Baikonur-Cosmodrome","NASA — Baikonur Cosmodrome location in Kazakhstan · https://www.nasa.gov/international-space-station/space-station-research-and-technology/baikonur-cosmodrome/","United Nations — Settlements and administrative divisions at Baikonur · https://www.un.org/geospatial/","NASA — Yuri Gagarin's 1961 launch from Baikonur and space launch history · https://www.nasa.gov/history/gagarin-first-human-in-space/"]},"Belgium":{"clues":["Home to the headquarters of both NATO and the European Union's main administrative institutions.","The Ardennes plateau dominates the southern region, while the Meuse and Scheldt rivers flow through lowlands in the north.","Shares borders with France to the south and the Netherlands to the north.","Capital city starts with 'B'.","World-renowned for producing over 220,000 tonnes of chocolate annually and famous for waffles served with powdered sugar."],"sources":["NATO — NATO Headquarters · https://www.nato.int/cps/en/natolive/topics_49284.htm","Britannica — Belgium: Relief and drainage · https://www.britannica.com/place/Belgium/Relief-drainage-and-soils","CIA World Factbook — Belgium: Geography · https://www.cia.gov/the-world-factbook/countries/belgium/","CIA World Factbook — Belgium: Government · https://www.cia.gov/the-world-factbook/countries/belgium/","International Cocoa Organization — Chocolate consumption and production statistics · https://www.icco.org/statistics/"]},"Belarus":{"clues":["This landlocked nation is a founding member of the Eurasian Economic Union, established in 2015 alongside Russia, Kazakhstan, Armenia, and Kyrgyzstan.","Over 40% of the land is covered by forests, with the Dnieper River flowing southward through the eastern portion of the territory.","It shares borders with Poland to the west and Ukraine to the south.","Capital city starts with 'M'.","The Mir Castle Complex, a UNESCO World Heritage Site featuring Gothic, Baroque, and Renaissance architecture, stands as one of the most visited landmarks."],"sources":["Eurasian Economic Union Official — Treaty on the Eurasian Economic Union signed by founding members · https://www.eaeunion.org/","CIA World Factbook — Belarus Geography: forest coverage and major rivers · https://www.cia.gov/the-world-factbook/countries/belarus/","CIA World Factbook — Belarus: border countries listed as Latvia, Lithuania, Poland, Russia, and Ukraine · https://www.cia.gov/the-world-factbook/countries/belarus/","Britannica — Minsk: capital and largest city of Belarus · https://www.britannica.com/place/Minsk","UNESCO World Heritage Centre — Mir Castle Complex inscribed 2000 · https://whc.unesco.org/en/list/625/"]},"Belize":{"clues":["This nation is the only Central American country where English serves as the sole official language.","The world's second-largest barrier reef system runs along its entire Caribbean coastline.","It shares land borders with Mexico to the north and Guatemala to the west and south.","Capital city starts with 'B'.","The Great Blue Hole, a giant marine sinkhole over 300 meters wide, is one of the world's most famous diving destinations."],"sources":["CIA World Factbook — Languages section listing English as official language · https://www.cia.gov/the-world-factbook/countries/belize/","UNESCO World Heritage Centre — Belize Barrier Reef Reserve System inscription · https://whc.unesco.org/en/list/764/","CIA World Factbook — Geography section detailing land boundaries with Mexico and Guatemala · https://www.cia.gov/the-world-factbook/countries/belize/","Britannica — Article on Belmopan as capital city · https://www.britannica.com/place/Belmopan","UNESCO World Heritage Centre — Description of the Great Blue Hole as part of Belize Barrier Reef Reserve System · https://whc.unesco.org/en/list/764/"]},"Benin":{"clues":["This former French colony was the birthplace of the powerful Dahomey Kingdom, which derived significant wealth from the Atlantic slave trade between the 17th and 19th centuries.","The coastal region features a narrow sandy shoreline along the Bight of Biafra, while the northern terrain transitions to savanna woodland and includes part of the Atakora mountain range.","This country shares its longest border with Nigeria to the east and also borders Togo to the west.","Capital city starts with 'P'.","The Royal Palaces of Abomey, former seat of the Dahomey Kingdom, are a UNESCO World Heritage Site featuring elaborate bas-reliefs and historical artifacts."],"sources":["Britannica — Dahomey: Historical kingdom of western Africa and its role in the slave trade · https://www.britannica.com/place/Dahomey-historical-kingdom-Africa","CIA World Factbook — Benin Geography: Coastal plain, savanna terrain, and Atakora Mountains · https://www.cia.gov/the-world-factbook/countries/benin/","CIA World Factbook — Benin: Land boundaries with Nigeria and Togo · https://www.cia.gov/the-world-factbook/countries/benin/","Britannica — Porto-Novo: Capital of Benin · https://www.britannica.com/place/Porto-Novo","UNESCO — Royal Palaces of Abomey World Heritage Site · https://whc.unesco.org/en/list/323/"]},"Bermuda":{"clues":["This self-governing British Overseas Territory operates as one of the world's leading offshore financial centers, with insurance and reinsurance companies managing over $350 billion in assets.","The territory consists of approximately 138 islands and islets formed from the eroded remains of an extinct volcanic seamount, with the main island featuring a distinctive fishhook shape.","Located in the western North Atlantic Ocean, it sits roughly 650 miles east of Cape Hatteras, North Carolina, isolated from any continental landmass.","Capital city starts with 'H'.","The territory is famous for its pink sand beaches, created by crushed shells and coral mixed with white calcium carbonate sand, and lends its name to a triangular region associated with mysterious disappearances."],"sources":["CIA World Factbook — Bermuda Economy Overview · https://www.cia.gov/the-world-factbook/countries/bermuda/","Britannica — Bermuda Land and Geology · https://www.britannica.com/place/Bermuda","CIA World Factbook — Bermuda Geography · https://www.cia.gov/the-world-factbook/countries/bermuda/","CIA World Factbook — Bermuda Government · https://www.cia.gov/the-world-factbook/countries/bermuda/","Britannica — Bermuda Pink Sand Beaches · https://www.britannica.com/place/Bermuda"]},"Bhutan":{"clues":["This nation measures prosperity through Gross National Happiness, an official economic development philosophy adopted in 1972 that prioritizes collective wellbeing over GDP.","The Eastern Himalayas dominate the landscape, with elevations rising from 160 meters in the south to peaks exceeding 7,500 meters along the northern border.","Sandwiched between India to the south and China to the north, this landlocked nation maintains diplomatic relations with only one of these neighbors.","Capital city starts with 'T'.","This is the only country in the world where the sale of tobacco is completely banned nationwide, a policy enforced since 2010."],"sources":["United Nations Development Programme — Bhutan's Gross National Happiness Index as alternative development metric · https://www.undp.org/bhutan/gross-national-happiness","Britannica — Bhutan Geography: Eastern Himalayas terrain and elevation ranges · https://www.britannica.com/place/Bhutan/Relief","CIA World Factbook — Bhutan borders with India and China · https://www.cia.gov/the-world-factbook/countries/bhutan/","CIA World Factbook — Thimphu capital city of Bhutan · https://www.cia.gov/the-world-factbook/countries/bhutan/","World Health Organization — Bhutan tobacco sales ban implementation · https://www.who.int/news/item/09-06-2021-who-congratulates-bhutan-for-banning-the-sale-of-tobacco"]},"Bir Tawil":{"clues":["This territory is claimed by neither of its two neighboring countries, making it one of the last remaining terra nullius regions on Earth.","The landscape consists of rocky desert terrain with scattered wadis in the Nubian Desert, sitting at approximately 2,000 feet above sea level.","This territory lies along the border between Egypt and Sudan.","There is no capital city or permanent settlement in this uninhabited territory.","This small quadrilateral of desert has been symbolically claimed by multiple individuals seeking to establish micronations, most famously by an American father who planted a flag to make his daughter a princess."],"sources":["BBC News — Article on the disputed status and terra nullius nature of Bir Tawil · https://www.bbc.com/news/magazine-23702086","The Guardian — Geographic description of Bir Tawil's desert terrain and location in the Nubian Desert · https://www.theguardian.com/world/2016/mar/03/welcome-to-the-land-that-no-country-wants-to-claim","Encyclopaedia Britannica — Entry describing Bir Tawil's location between Egypt and Sudan · https://www.britannica.com/place/Bir-Tawil","The New York Times — Report on the uninhabited nature of Bir Tawil · https://www.nytimes.com/2016/02/28/world/africa/bir-tawil-egypt-sudan.html","The Telegraph — Story of Jeremiah Heaton claiming Bir Tawil for his daughter · https://www.telegraph.co.uk/news/worldnews/africaandindianocean/egypt/10956598/American-claims-African-kingdom-so-daughter-can-be-a-princess.html"]},"Bolivia":{"clues":["One of only two landlocked nations in the Americas, this country lost its coastal territory to Chile in the 1879-1884 War of the Pacific.","The Altiplano plateau sits at over 3,600 meters elevation between two branches of the Andes, containing Lake Titicaca on its northern border.","This country shares borders with Brazil to the north and east, and Peru to the northwest.","Capital city starts with 'S'.","Home to the Salar de Uyuni, the world's largest salt flat spanning over 10,000 square kilometers."],"sources":["Encyclopædia Britannica — War of the Pacific and loss of coastal access · https://www.britannica.com/place/Bolivia/History","CIA World Factbook — Geography of Bolivia, Altiplano and Lake Titicaca · https://www.cia.gov/the-world-factbook/countries/bolivia/","CIA World Factbook — Bolivia border countries · https://www.cia.gov/the-world-factbook/countries/bolivia/","CIA World Factbook — Bolivia capital city Sucre · https://www.cia.gov/the-world-factbook/countries/bolivia/","Encyclopædia Britannica — Salar de Uyuni salt flat · https://www.britannica.com/place/Salar-de-Uyuni"]},"Bosnia and Herzegovina":{"clues":["This territory was divided into two highly autonomous entities by the 1995 Dayton Agreement, creating one of the world's most complex governmental structures.","The Dinaric Alps dominate the landscape, with the Neretva River carving a dramatic valley through the mountains toward the Adriatic coast.","This territory shares borders with Croatia to the north, west, and south, and Serbia to the east.","Capital city starts with 'S'.","The reconstructed Stari Most, a 16th-century Ottoman bridge in Mostar, is a UNESCO World Heritage site and symbol of reconciliation."],"sources":["Britannica — Overview of the Dayton Agreement and the division into the Federation and Republika Srpska · https://www.britannica.com/topic/Dayton-Accords","Britannica — Physical geography describing the Dinaric Alps and Neretva River · https://www.britannica.com/place/Bosnia-and-Herzegovina/Relief","CIA World Factbook — Border countries listed as Croatia and Serbia · https://www.cia.gov/the-world-factbook/countries/bosnia-and-herzegovina/","CIA World Factbook — Capital city Sarajevo · https://www.cia.gov/the-world-factbook/countries/bosnia-and-herzegovina/","UNESCO — World Heritage listing for the Old Bridge Area of the Old City of Mostar · https://whc.unesco.org/en/list/946/"]},"Botswana":{"clues":["This country hosts the world's largest concentration of African elephants and has leveraged diamond revenues to achieve one of Africa's highest GDP per capita rates since independence.","The Okavango Delta, one of the world's largest inland deltas, fans out across the northwest region, creating a vast wetland ecosystem in the midst of the Kalahari Desert.","This landlocked nation shares its northern border with Zambia and Zimbabwe.","Capital city starts with 'G'.","The setting for Alexander McCall Smith's popular 'No. 1 Ladies' Detective Agency' novels, this nation is known for its thriving wildlife tourism and significant populations of lions, cheetahs, and wild dogs."],"sources":["CIA World Factbook — Botswana Economy Overview · https://www.cia.gov/the-world-factbook/countries/botswana/","UNESCO — Okavango Delta World Heritage Site · https://whc.unesco.org/en/list/1432/","CIA World Factbook — Botswana Geography and Neighbors · https://www.cia.gov/the-world-factbook/countries/botswana/","Britannica — Gaborone, capital of Botswana · https://www.britannica.com/place/Gaborone","Britannica — Botswana Cultural Life and Tourism · https://www.britannica.com/place/Botswana"]},"Brazil":{"clues":["This country is the world's largest exporter of coffee, soybeans, and sugar, and contains the majority of the Amazon rainforest within its borders.","The Amazon River, the world's largest river by discharge volume, flows through this territory for over 4,000 kilometers before emptying into the Atlantic Ocean.","This nation shares its longest land border with Bolivia and also borders Uruguay to the south.","Capital city starts with 'B'.","Christ the Redeemer, one of the New Seven Wonders of the World, overlooks Rio de Janeiro from atop Corcovado mountain."],"sources":["Observatory of Economic Complexity — Brazil is the world's top exporter of soybeans, coffee, and sugar · https://oec.world/en/profile/country/bra","Britannica — Amazon River flows through South America and is the largest river by water volume · https://www.britannica.com/place/Amazon-River","CIA World Factbook — Brazil borders Uruguay, Argentina, Paraguay, Bolivia, Peru, Colombia, Venezuela, Guyana, Suriname, and French Guiana · https://www.cia.gov/the-world-factbook/countries/brazil/","Britannica — Brasília is the capital of Brazil · https://www.britannica.com/place/Brasilia","New7Wonders Foundation — Christ the Redeemer statue in Rio de Janeiro named one of New Seven Wonders of the World · https://world.new7wonders.com/wonders/christ-the-redeemer-1931-rio-de-janeiro-brazil/"]},"Brazilian Island":{"clues":["This Atlantic territory was a penal colony from 1737 until 1938, serving as a remote prison destination for convicted criminals from the mainland.","The volcanic archipelago rises steeply from the ocean with dramatic cliffs, reaching its highest point at 321 meters above sea level.","Located approximately 350 kilometers off the coast of South America in the Atlantic Ocean.","The main settlement's name starts with 'V'.","This archipelago is famous for being one of the best diving destinations in the South Atlantic, with crystal-clear waters and abundant marine life including sharks and sea turtles."],"sources":["Britannica — Fernando de Noronha historical overview including penal colony period · https://www.britannica.com/place/Fernando-de-Noronha","UNESCO World Heritage Centre — Description of volcanic formation and topography of Fernando de Noronha · https://whc.unesco.org/en/list/1000","CIA World Factbook — Brazil geography noting Atlantic island territories · https://www.cia.gov/the-world-factbook/countries/brazil/","Britannica — Fernando de Noronha main settlement Vila dos Remédios · https://www.britannica.com/place/Fernando-de-Noronha","UNESCO World Heritage Centre — Outstanding marine biodiversity and diving attractions · https://whc.unesco.org/en/list/1000"]},"British Indian Ocean Territory":{"clues":["This territory is at the center of a decades-long sovereignty dispute between the UK and Mauritius, with the International Court of Justice ruling in 2019 that decolonization was not lawfully completed.","The archipelago consists of seven atolls comprising over 1,000 individual coral islands, with the largest atoll covering approximately 60 square kilometers of shallow lagoon.","Located in the central Indian Ocean, roughly 500 kilometers south of the Maldives and 1,800 kilometers northeast of Mauritius.","The main settlement starts with 'D'.","Home to a major military base that has been used as a strategic staging post for operations in the Middle East and Afghanistan since the 1970s."],"sources":["International Court of Justice — Advisory Opinion on Legal Consequences of the Separation of the Chagos Archipelago from Mauritius in 1965 · https://www.icj-cij.org/case/169","Britannica — Geographic description of the Chagos Archipelago's atolls and coral islands · https://www.britannica.com/place/British-Indian-Ocean-Territory","CIA World Factbook — Geographic location relative to Maldives and Mauritius · https://www.cia.gov/the-world-factbook/countries/british-indian-ocean-territory/","CIA World Factbook — Capital information for Diego Garcia · https://www.cia.gov/the-world-factbook/countries/british-indian-ocean-territory/","Britannica — Diego Garcia military base history and strategic importance · https://www.britannica.com/place/Diego-Garcia"]},"British Virgin Islands":{"clues":["This offshore financial center has more registered companies than residents, with over 400,000 active business entities serving as a major tax haven for international corporations.","The archipelago comprises approximately 60 volcanic islands and cays, with the highest point reaching 521 meters at Mount Sage on the largest island.","Located in the Caribbean Sea, this territory lies directly east of Puerto Rico and immediately adjacent to the U.S. Virgin Islands.","Capital city starts with 'R'.","The Baths on Virgin Gorda feature massive granite boulders forming natural pools and grottos that rank among the Caribbean's most photographed beaches."],"sources":["BBC News — British Virgin Islands: A haven for the world's wealthy · https://www.bbc.com/news/world-latin-america-20958018","Britannica — British Virgin Islands geography and terrain · https://www.britannica.com/place/British-Virgin-Islands","CIA World Factbook — British Virgin Islands location and neighboring territories · https://www.cia.gov/the-world-factbook/countries/british-virgin-islands/","CIA World Factbook — British Virgin Islands capital Road Town · https://www.cia.gov/the-world-factbook/countries/british-virgin-islands/","Lonely Planet — The Baths, Virgin Gorda natural landmark · https://www.lonelyplanet.com/british-virgin-islands/virgin-gorda/attractions/the-baths/a/poi-sig/1526044/361063"]},"Brunei":{"clues":["One of the world's wealthiest nations per capita due to extensive petroleum and natural gas fields, this absolute monarchy operates under Malay Islamic Monarchy philosophy.","The territory is divided into two non-contiguous parts separated by the Limbang Valley, with a narrow coastal plain backed by hills that rise to over 1,800 meters in the interior rainforest.","Completely surrounded by the Malaysian state of Sarawak on the island of Borneo, with a northern coastline along the South China Sea.","Capital city starts with 'B'.","Home to Kampong Ayer, the world's largest water village built entirely on stilts over a river, with a settlement history spanning over a millennium."],"sources":["CIA World Factbook — Brunei economy and government overview · https://www.cia.gov/the-world-factbook/countries/brunei/","Britannica — Brunei physical geography and terrain · https://www.britannica.com/place/Brunei/Land","CIA World Factbook — Brunei geographic location and boundaries · https://www.cia.gov/the-world-factbook/countries/brunei/","CIA World Factbook — Brunei capital city information · https://www.cia.gov/the-world-factbook/countries/brunei/","UNESCO — Kampong Ayer water village cultural significance · https://whc.unesco.org/en/tentativelists/6389/"]},"Bulgaria":{"clues":["This country was a founding member of the Organization of the Black Sea Economic Cooperation in 1992 and hosts the organization's permanent secretariat in its largest city.","The Balkan Mountains stretch across the center of this territory from west to east, while the Rhodope Mountains form its southern highlands.","This country shares borders with Romania to the north and Greece to the south.","Capital city starts with 'S'.","This nation is famous for producing rose oil in the Valley of Roses, supplying a significant portion of the world's rose oil used in perfumes."],"sources":["Organization of the Black Sea Economic Cooperation — Official BSEC website confirms founding members and permanent secretariat location · https://www.bsec-organization.org/","Britannica — Geographic article on Balkan Peninsula mountain ranges and Bulgarian topography · https://www.britannica.com/place/Bulgaria/Relief","CIA World Factbook — Bulgaria country profile listing neighboring countries · https://www.cia.gov/the-world-factbook/countries/bulgaria/","CIA World Factbook — Bulgaria country profile identifying capital city Sofia · https://www.cia.gov/the-world-factbook/countries/bulgaria/","UNESCO — Intangible Cultural Heritage listing for rose oil production traditions · https://ich.unesco.org/en/RL/tradition-of-rose-oil-production-in-the-rose-valley-01969"]},"Burkina Faso":{"clues":["This landlocked nation was the world's fourth-largest producer of gold in Africa as of 2023, with mining accounting for over 15% of GDP.","The three major rivers flowing through this country are the Black Volta, White Volta, and Red Volta, which converge before flowing into Lake Volta.","This country shares its northern border with Mali and its southern border with Ghana.","Capital city starts with 'O'.","The country's name translates to 'Land of Upright People' or 'Land of Incorruptible People' in the local Mossi language."],"sources":["U.S. Geological Survey — 2023 Mineral Commodity Summaries: Gold production statistics for African nations · https://www.usgs.gov/centers/national-minerals-information-center/gold-statistics-and-information","Britannica — Burkina Faso: Geography and drainage systems including the Volta river system · https://www.britannica.com/place/Burkina-Faso/Plant-and-animal-life","CIA World Factbook — Burkina Faso: Geographic information on bordering countries · https://www.cia.gov/the-world-factbook/countries/burkina-faso/","CIA World Factbook — Burkina Faso: Capital and major cities information · https://www.cia.gov/the-world-factbook/countries/burkina-faso/","Britannica — Burkina Faso: Etymology and meaning of the country's name in Mossi language · https://www.britannica.com/place/Burkina-Faso"]},"Burundi":{"clues":["This nation experienced the world's longest civil war of the 20th century, lasting from 1993 to 2005 with ethnic tensions between two main groups causing an estimated 300,000 deaths.","The country lies along the northeastern shore of Lake Tanganyika, Africa's deepest lake and the world's second-deepest freshwater lake at over 1,400 meters.","This landlocked nation shares its longest border with Tanzania to the east and southeast.","Capital city starts with 'G'.","This small East African nation is famous for its traditional drumming performed by the Royal Drummers, a UNESCO-recognized cultural practice featuring massive drums called karyenda."],"sources":["Encyclopaedia Britannica — Burundi Civil War 1993-2005 history and casualties · https://www.britannica.com/place/Burundi/Civil-war","CIA World Factbook — Burundi geography and Lake Tanganyika details · https://www.cia.gov/the-world-factbook/countries/burundi/","CIA World Factbook — Burundi international boundaries and bordering countries · https://www.cia.gov/the-world-factbook/countries/burundi/","CIA World Factbook — Burundi capital city information · https://www.cia.gov/the-world-factbook/countries/burundi/","UNESCO — Royal Drummers of Burundi Intangible Cultural Heritage · https://ich.unesco.org/en/RL/ritual-dance-of-the-royal-drum-00989"]},"Cape Verde":{"clues":["This archipelago nation was uninhabited until Portuguese colonization in the 15th century and served as a crucial transatlantic slave trade hub between Africa and the Americas.","Ten volcanic islands and several islets form this Atlantic archipelago, with Pico do Fogo reaching 2,829 meters as an active stratovolcano that last erupted in 2014.","Located in the Atlantic Ocean approximately 570 kilometers west of Senegal and Mauritania, this island nation is part of the Macaronesia ecoregion.","Capital city starts with 'P'.","This nation is renowned for morna music, a melancholic genre popularized worldwide by singer Cesária Évora, known as the 'Barefoot Diva'."],"sources":["Britannica — Cape Verde history and slave trade role · https://www.britannica.com/place/Cape-Verde/History","CIA World Factbook — Cape Verde geography and volcanic terrain · https://www.cia.gov/the-world-factbook/countries/cabo-verde/","CIA World Factbook — Cape Verde location and neighboring waters · https://www.cia.gov/the-world-factbook/countries/cabo-verde/","CIA World Factbook — Cape Verde capital city · https://www.cia.gov/the-world-factbook/countries/cabo-verde/","Britannica — Cesária Évora and Cape Verdean music · https://www.britannica.com/biography/Cesaria-Evora"]},"Cambodia":{"clues":["This nation's economy depends heavily on garment exports, which account for over 80% of total export revenue and employ nearly 1 million workers.","The Mekong River flows through this country for approximately 500 kilometers before entering its vast floodplain delta region to the south.","This territory shares its eastern border with Vietnam and its western border with Thailand.","Capital city starts with 'P'.","Angkor Wat, the world's largest religious monument, was built here in the 12th century as a Hindu temple before becoming a Buddhist site."],"sources":["World Bank — Cambodia Economic Update: Restoring Growth · https://www.worldbank.org/en/country/cambodia/publication/cambodia-economic-update","Encyclopaedia Britannica — Mekong River: Geography and Course · https://www.britannica.com/place/Mekong-River","CIA World Factbook — Cambodia: Geography · https://www.cia.gov/the-world-factbook/countries/cambodia/","Encyclopaedia Britannica — Phnom Penh: Capital of Cambodia · https://www.britannica.com/place/Phnom-Penh","UNESCO World Heritage Centre — Angkor · https://whc.unesco.org/en/list/668/"]},"Canada":{"clues":["This territory is the world's second-largest producer of uranium, accounting for approximately 13% of global mine production as of recent years.","The world's longest coastline belongs to this territory, stretching over 202,080 kilometers including mainland and island shores across three ocean borders.","This territory shares its southern border with the United States and has a maritime boundary with Greenland to the northeast.","Capital city starts with 'O'.","This territory is famous for maple syrup production, accounting for over 70% of the world's supply."],"sources":["World Nuclear Association — World Uranium Mining Production · https://world-nuclear.org/information-library/nuclear-fuel-cycle/mining-of-uranium/world-uranium-mining-production.aspx","CIA World Factbook — Canada Geography · https://www.cia.gov/the-world-factbook/countries/canada/","CIA World Factbook — Canada Geography · https://www.cia.gov/the-world-factbook/countries/canada/","Britannica — Ottawa · https://www.britannica.com/place/Ottawa","Agriculture and Agri-Food Canada — The Canadian Maple Industry · https://agriculture.canada.ca/en/sector/horticulture/horticulture-sector-reports/statistical-overview-canadian-maple-industry-2022"]},"Cameroon":{"clues":["This nation is Africa's largest aluminum producer, with the Edéa smelter powered by hydroelectric dams on the Sanaga River.","The terrain ranges from dense equatorial rainforest in the south to semi-arid savanna in the north, with an active coastal stratovolcano on the Gulf of Guinea exceeding 4,000 meters — the highest peak in West Africa.","This territory borders Nigeria to the northwest and the Central African Republic to the east.","Capital city starts with 'Y'.","Home to the internationally famous Makossa music genre and considered the birthplace of bikutsi rhythms."],"sources":["CIA World Factbook — Economy overview including aluminum production · https://www.cia.gov/the-world-factbook/countries/cameroon/","Britannica — Mount Cameroon geographical description · https://www.britannica.com/place/Mount-Cameroon","CIA World Factbook — Geography and neighboring countries · https://www.cia.gov/the-world-factbook/countries/cameroon/","CIA World Factbook — Government and capital city information · https://www.cia.gov/the-world-factbook/countries/cameroon/","UNESCO — Intangible Cultural Heritage and African music traditions · https://ich.unesco.org"]},"Cayman Islands":{"clues":["This British Overseas Territory serves as the world's sixth-largest banking center by deposits, with over 100,000 registered companies despite a population under 70,000.","This Caribbean archipelago consists of three islands—one large and two smaller—surrounded by a shallow limestone shelf with fringing coral reefs.","Located in the western Caribbean Sea, approximately 240 kilometers south of Cuba and 268 kilometers northwest of Jamaica.","Capital city starts with 'G'.","Seven Mile Beach is consistently ranked among the world's best beaches and shares its name with a famous stretch of pristine white sand."],"sources":["CIA World Factbook — Economic overview noting financial services domination and company registration statistics · https://www.cia.gov/the-world-factbook/countries/cayman-islands/","Britannica — Geographic description of the three-island composition and coral reef formations · https://www.britannica.com/place/Cayman-Islands","CIA World Factbook — Geographic coordinates and location relative to Cuba and Jamaica · https://www.cia.gov/the-world-factbook/countries/cayman-islands/","CIA World Factbook — Capital city identification as George Town · https://www.cia.gov/the-world-factbook/countries/cayman-islands/","Britannica — Tourism section describing Seven Mile Beach as major attraction · https://www.britannica.com/place/Cayman-Islands"]},"Central African Republic":{"clues":["This landlocked nation experienced a coup in 2013 led by the Séléka rebel coalition, triggering a sectarian conflict that prompted UN peacekeeping intervention.","The Ubangi River forms much of the southern boundary of this territory, flowing westward as a major tributary of the Congo River system.","This nation shares its longest border with the Democratic Republic of the Congo to the south and also borders Chad to the north.","Capital city starts with 'B'.","This territory is home to the Dzanga-Sangha Reserve, where forest elephants gather at mineral-rich clearings called 'bais' that attract wildlife photographers from around the world."],"sources":["UN Security Council — Resolution 2149 establishing MINUSCA peacekeeping mission following 2013 Séléka coup · https://www.un.org/securitycouncil/content/repertoire/actions/2013/s_res_2149","Britannica — Geography of Central African Republic describing the Ubangi River as southern boundary · https://www.britannica.com/place/Central-African-Republic","CIA World Factbook — Central African Republic border countries listing DRC and Chad · https://www.cia.gov/the-world-factbook/countries/central-african-republic/","CIA World Factbook — Central African Republic capital city information · https://www.cia.gov/the-world-factbook/countries/central-african-republic/","UNESCO — Sangha Trinational World Heritage Site including Dzanga-Sangha Special Reserve · https://whc.unesco.org/en/list/1380/"]},"Chad":{"clues":["This landlocked nation is Africa's fifth-largest country by area yet has one of the world's lowest Human Development Index rankings, with over 40% of its population living in extreme poverty.","The northern third of this territory lies within the Sahara Desert, while the southern regions feature savanna grasslands drained by the Chari River system.","This nation borders Libya to the north and the Central African Republic to the south.","Capital city starts with 'N'.","The ancient Sultanate of Kanem-Bornu, one of the longest-lasting states in African history, was centered here for over a millennium and served as a major node on trans-Saharan trade routes."],"sources":["CIA World Factbook — Chad country profile including HDI ranking and poverty statistics · https://www.cia.gov/the-world-factbook/countries/chad/","Britannica — Chad physical geography and climate zones · https://www.britannica.com/place/Chad","CIA World Factbook — Chad border countries · https://www.cia.gov/the-world-factbook/countries/chad/","CIA World Factbook — Chad capital city information · https://www.cia.gov/the-world-factbook/countries/chad/","UNEP — Lake Chad shrinkage environmental assessment · https://www.unep.org/news-and-stories/story/saving-lake-chad"]},"Chile":{"clues":["This nation is the world's leading producer of copper, accounting for approximately 28% of global mine production as of recent years.","This territory extends over 4,300 kilometers from north to south while averaging only 180 kilometers in width, making it the longest north-south oriented country relative to its east-west span.","This country shares its entire eastern border with Argentina and has a shorter northern boundary with both Peru and Bolivia.","Capital city starts with 'S'.","The remote Easter Island, famous for its nearly 1,000 monumental moai statues carved by the Rapa Nui people, belongs to this country's territory."],"sources":["U.S. Geological Survey — Mineral Commodity Summaries 2024, Copper Statistics · https://www.usgs.gov/centers/national-minerals-information-center/copper-statistics-and-information","Britannica — Geographic description of country dimensions and distinctive narrow shape · https://www.britannica.com/place/Chile","CIA World Factbook — International boundary information listing neighboring countries · https://www.cia.gov/the-world-factbook/countries/chile/","CIA World Factbook — Capital city identification · https://www.cia.gov/the-world-factbook/countries/chile/","UNESCO World Heritage Centre — Rapa Nui National Park inscription details · https://whc.unesco.org/en/list/715/"]},"China":{"clues":["This permanent member of the UN Security Council operates the Belt and Road Initiative, a trillion-dollar infrastructure investment strategy spanning over 150 countries across Asia, Europe, and Africa.","The Himalayas form part of the southwestern border of this territory, which also contains the Taklamakan Desert, the Gobi Desert, and the Yangtze River—the third-longest river in the world.","This territory shares borders with 14 countries, including India to the southwest and Russia to the north.","Capital city starts with 'B'.","This territory is home to the Great Wall, a UNESCO World Heritage site stretching over 13,000 miles that was built over centuries to protect against invasions."],"sources":["Council on Foreign Relations — China's Massive Belt and Road Initiative · https://www.cfr.org/backgrounder/chinas-massive-belt-and-road-initiative","Britannica — Geography of China including Himalayas, Yangtze River, and major deserts · https://www.britannica.com/place/China/Land","CIA World Factbook — China borders and neighboring countries · https://www.cia.gov/the-world-factbook/countries/china/","Britannica — Beijing as capital city · https://www.britannica.com/place/Beijing","UNESCO World Heritage Centre — The Great Wall · https://whc.unesco.org/en/list/438/"]},"Clipperton Island":{"clues":["This uninhabited atoll was the site of a tragic mutiny and massacre in 1917 when a lighthouse keeper killed his workers and was then himself killed by the survivors.","The territory consists of a ring-shaped coral atoll surrounding a freshwater lagoon, with a land area of only 6 square kilometers and no natural harbor.","Located in the Pacific Ocean approximately 1,080 kilometers southwest of Mexico, it is one of the most isolated coral atolls in the world.","This territory has no permanent capital or settlement as it remains uninhabited.","The atoll is named after the French pirate who first claimed to have discovered it in the early 18th century, though earlier Spanish explorers may have sighted it."],"sources":["Britannica — Historical account of the 1917 Clipperton Island tragedy · https://www.britannica.com/place/Clipperton-Island","CIA World Factbook — Geography and physical features of Clipperton Island · https://www.cia.gov/the-world-factbook/countries/clipperton-island/","CIA World Factbook — Location and geographic coordinates relative to Mexico · https://www.cia.gov/the-world-factbook/countries/clipperton-island/","CIA World Factbook — Population and administrative information · https://www.cia.gov/the-world-factbook/countries/clipperton-island/","Britannica — Discovery and naming history of Clipperton Island · https://www.britannica.com/place/Clipperton-Island"]},"Colombia":{"clues":["This country is the world's leading producer of emeralds, accounting for approximately 70-90% of global production.","The Andes mountain range splits into three distinct cordilleras within this territory, creating deep valleys and diverse elevation zones.","This nation shares borders with Panama to the northwest and Venezuela to the east.","Capital city starts with 'B'.","This country is renowned worldwide for producing some of the finest arabica coffee beans, with its coffee culture recognized by UNESCO."],"sources":["International Gem Society — Colombia's Emerald Production and Global Market Dominance · https://www.gemsociety.org/article/colombian-emerald-mines/","Britannica — Andes Mountains in Colombia: Three Cordilleras System · https://www.britannica.com/place/Colombia/Relief","CIA World Factbook — Colombia Geography and International Boundaries · https://www.cia.gov/the-world-factbook/countries/colombia/","CIA World Factbook — Colombia Capital City Information · https://www.cia.gov/the-world-factbook/countries/colombia/","UNESCO — Coffee Cultural Landscape of Colombia World Heritage Site · https://whc.unesco.org/en/list/1121/"]},"Comoros":{"clues":["This archipelago nation joined the Arab League in 1993, making it the southernmost member and the only one located entirely in the Southern Hemisphere.","Three major volcanic islands and several smaller islets form this territory, with Mount Karthala, one of the world's most active volcanoes, dominating the landscape at 2,361 meters.","Located in the Mozambique Channel between the African mainland and Madagascar, this island nation lies northwest of the French territory of Mayotte.","Capital city starts with 'M'.","This nation is known as the 'Perfume Islands' due to its historic production of ylang-ylang, a fragrant flower used in many luxury perfumes including Chanel No. 5."],"sources":["CIA World Factbook — Comoros joined the Arab League in 1993, becoming its southernmost member · https://www.cia.gov/the-world-factbook/countries/comoros/","Britannica — Mount Karthala volcano information and elevation details · https://www.britannica.com/place/Comoros","CIA World Factbook — Geographic location in Mozambique Channel between Africa and Madagascar · https://www.cia.gov/the-world-factbook/countries/comoros/","Britannica — Moroni is the capital city of Comoros · https://www.britannica.com/place/Moroni","CIA World Factbook — Ylang-ylang production and 'Perfume Islands' reference · https://www.cia.gov/the-world-factbook/countries/comoros/"]},"Cook Islands":{"clues":["This self-governing territory in free association with New Zealand maintains its own citizenship and passport system while using the New Zealand dollar as official currency.","Spread across 15 volcanic and coral atoll islands spanning nearly 2 million square kilometers of ocean, the highest point reaches only 652 meters on the largest southern island.","Located in the South Pacific Ocean, positioned roughly equidistant between French Polynesia to the east and American Samoa to the west.","Capital city starts with 'A'.","Traditional dancers perform the energetic drum dance known as the 'ura pa'u,' which has become one of Polynesia's most recognized cultural exports at festivals worldwide."],"sources":["CIA World Factbook — Cook Islands Government and Economy · https://www.cia.gov/the-world-factbook/countries/cook-islands/","Britannica — Cook Islands Geography and Physical Features · https://www.britannica.com/place/Cook-Islands","CIA World Factbook — Cook Islands Location and Geography · https://www.cia.gov/the-world-factbook/countries/cook-islands/","CIA World Factbook — Cook Islands Capital · https://www.cia.gov/the-world-factbook/countries/cook-islands/","New Zealand Ministry for Culture and Heritage — Cook Islands Cultural Heritage · https://www.mch.govt.nz/pacific-culture/cook-islands"]},"Coral Sea Islands":{"clues":["This territory was the site of a major World War II naval battle in May 1942 that prevented Japanese forces from isolating Australia.","The territory consists of numerous small uninhabited sand cays, coral reefs, and atolls scattered across approximately 780,000 square kilometers of ocean.","Located in the Pacific Ocean northeast of Queensland, Australia, and east of Papua New Guinea.","The main administrative base starts with 'W'.","This territory encompasses part of the Great Barrier Reef, the world's largest coral reef system visible from space."],"sources":["Britannica — Battle of the Coral Sea historical overview · https://www.britannica.com/event/Battle-of-the-Coral-Sea","CIA World Factbook — Coral Sea Islands geography and terrain description · https://www.cia.gov/the-world-factbook/countries/coral-sea-islands/","CIA World Factbook — Coral Sea Islands geographic location and coordinates · https://www.cia.gov/the-world-factbook/countries/coral-sea-islands/","CIA World Factbook — Coral Sea Islands government and administrative center · https://www.cia.gov/the-world-factbook/countries/coral-sea-islands/","UNESCO — Great Barrier Reef World Heritage site information · https://whc.unesco.org/en/list/154/"]},"Costa Rica":{"clues":["This nation abolished its military in 1949 and redirected defense spending toward education and healthcare, enshrining demilitarization in its constitution.","The Cordillera de Talamanca mountain range forms a rugged spine through this territory, with Cerro Chirripó rising to 3,820 meters as the highest peak.","Bordered by Nicaragua to the north and Panama to the south, with coastlines on both the Caribbean Sea and Pacific Ocean.","Capital city starts with 'S'.","Famous for its rich biodiversity, this territory contains approximately 5% of the world's species despite covering only 0.03% of Earth's surface."],"sources":["Britannica — Costa Rica abolished its army in 1949 under President José Figueres Ferrer · https://www.britannica.com/place/Costa-Rica/Security","CIA World Factbook — Costa Rica geography features Cerro Chirripó at 3,820 meters elevation · https://www.cia.gov/the-world-factbook/countries/costa-rica/","CIA World Factbook — Costa Rica borders Nicaragua and Panama with Pacific and Caribbean coastlines · https://www.cia.gov/the-world-factbook/countries/costa-rica/","Britannica — San José is the capital of Costa Rica · https://www.britannica.com/place/Costa-Rica","UN Environment Programme — Costa Rica contains approximately 5% of world's biodiversity · https://www.unep.org/news-and-stories/story/how-costa-rica-reversed-deforestation"]},"Croatia":{"clues":["This country joined NATO in 2009, becoming part of the alliance's expansion into the Western Balkans following its independence war in the 1990s.","The Dinaric Alps run parallel to its extensive 1,777-kilometer Adriatic coastline, which includes over 1,200 islands and islets.","It shares borders with Slovenia to the northwest and Bosnia and Herzegovina to the east and south.","Capital city starts with 'Z'.","The medieval walled city of Dubrovnik served as a filming location for King's Landing in the television series Game of Thrones."],"sources":["NATO — Member countries: Croatia joined NATO on 1 April 2009 · https://www.nato.int/cps/en/natohq/nato_countries.htm","CIA World Factbook — Croatia Geography: coastline 1,777 km with Dinaric Alps · https://www.cia.gov/the-world-factbook/countries/croatia/","CIA World Factbook — Croatia: borders Slovenia 600 km, Bosnia and Herzegovina 956 km · https://www.cia.gov/the-world-factbook/countries/croatia/","Britannica — Zagreb, capital of Croatia · https://www.britannica.com/place/Zagreb","HBO — Game of Thrones filming locations in Dubrovnik · https://www.hbo.com/game-of-thrones"]},"Cuba":{"clues":["This nation was the site of a 1962 nuclear missile crisis that brought the world to the brink of thermonuclear war between two superpowers.","The largest island in the Caribbean features the Sierra Maestra mountain range in the southeast, reaching elevations over 1,900 meters.","Located in the northern Caribbean Sea, this territory lies south of the Florida Straits and approximately 140 kilometers north of Jamaica.","Capital city starts with 'H'.","This island is internationally renowned for its hand-rolled cigars and classic vintage American automobiles from the 1950s."],"sources":["Britannica — Cuban Missile Crisis historical overview · https://www.britannica.com/event/Cuban-Missile-Crisis","CIA World Factbook — Cuba geography and terrain features · https://www.cia.gov/the-world-factbook/countries/cuba/","CIA World Factbook — Cuba geographic location and neighboring waters · https://www.cia.gov/the-world-factbook/countries/cuba/","CIA World Factbook — Cuba capital city information · https://www.cia.gov/the-world-factbook/countries/cuba/","Britannica — Cuban cigar industry and cultural heritage · https://www.britannica.com/place/Cuba"]},"Curaçao":{"clues":["This constituent country of the Kingdom of the Netherlands processes Venezuelan crude oil at the Isla Refinery, one of the largest oil refineries in the Caribbean.","The island features volcanic formations along its northwestern coastline and limestone terraces in the southeast, with the highest point reaching 372 meters at Mount Christoffel.","Located in the southern Caribbean Sea, this territory lies approximately 65 kilometers north of the Venezuelan coast.","Capital city starts with 'W'.","This island is famous for its blue liqueur made from the dried peels of the laraha citrus fruit, found only on this territory."],"sources":["Encyclopedia Britannica — Curaçao economy and oil refining · https://www.britannica.com/place/Curacao","CIA World Factbook — Curaçao geography and terrain · https://www.cia.gov/the-world-factbook/countries/curacao/","CIA World Factbook — Curaçao location coordinates · https://www.cia.gov/the-world-factbook/countries/curacao/","CIA World Factbook — Curaçao capital city · https://www.cia.gov/the-world-factbook/countries/curacao/","Encyclopedia Britannica — Curaçao liqueur and laraha oranges · https://www.britannica.com/place/Curacao"]},"Cyprus":{"clues":["This island nation hosts British Sovereign Base Areas at Akrotiri and Dhekelia, remnants of colonial administration that remain UK territory despite the country's 1960 independence.","The Troodos Mountains dominate the interior, with Mount Olympus reaching 1,952 meters as the highest peak on this Mediterranean island.","Located in the eastern Mediterranean Sea, it lies south of Turkey and west of Syria and Lebanon.","Capital city starts with 'N'.","Halloumi cheese, a semi-hard brined cheese that can be grilled without melting, originated on this island and is a protected designation of origin product."],"sources":["CIA World Factbook — Cyprus Government · https://www.cia.gov/the-world-factbook/countries/cyprus/","Britannica — Cyprus Geography and Climate · https://www.britannica.com/place/Cyprus","CIA World Factbook — Cyprus Geography · https://www.cia.gov/the-world-factbook/countries/cyprus/","Britannica — Nicosia Cyprus Capital · https://www.britannica.com/place/Nicosia","BBC News — Halloumi cheese wins protected status · https://www.bbc.com/news/world-europe-48007146"]},"Czechia":{"clues":["This landlocked nation was peacefully dissolved from a federation on January 1, 1993, in what became known as the Velvet Divorce.","The Elbe River originates in the Krkonoše mountain range along its northern border before flowing through Germany to the North Sea.","Shares borders with Poland to the northeast and Austria to the south.","Capital city starts with 'P'.","Famous for producing some of the world's finest crystal glassware and being the birthplace of pilsner-style beer in 1842."],"sources":["Britannica — Dissolution of Czechoslovakia on January 1, 1993 · https://www.britannica.com/place/Czech-Republic/History","Britannica — Elbe River source in Krkonoše Mountains · https://www.britannica.com/place/Elbe-River","CIA World Factbook — Czechia borders Poland and Austria · https://www.cia.gov/the-world-factbook/countries/czechia/","CIA World Factbook — Capital is Prague · https://www.cia.gov/the-world-factbook/countries/czechia/","Britannica — Pilsner beer originated in Plzeň in 1842 · https://www.britannica.com/topic/beer/Bottom-fermented-beers"]},"Cyprus No Mans Area":{"clues":["This demilitarized buffer zone, established in 1974 and maintained by UN peacekeeping forces, stretches approximately 180 kilometers across an island and includes the last divided capital in the world.","The zone crosses the central Mesaoria Plain, running from Morphou Bay in the west to Famagusta Bay in the east, bisecting an island in the eastern Mediterranean Sea.","This territory separates two distinct administrations on an island located south of Turkey and west of Syria.","The divided capital city within this buffer zone starts with 'N'.","This UN-controlled buffer zone runs through the only divided capital where both sides claim the same city, famous for halloumi cheese production and ancient Venetian walls."],"sources":["United Nations Peacekeeping — UNFICYP Background: Details on the 1974 establishment and 180km buffer zone · https://peacekeeping.un.org/en/mission/unficyp","Britannica — Geography of the Mesaoria Plain and UN buffer zone extent from Morphou to Famagusta · https://www.britannica.com/place/Cyprus","CIA World Factbook — Geographic location relative to Turkey and Syria · https://www.cia.gov/the-world-factbook/countries/cyprus/","United Nations — Information on Nicosia as divided capital within buffer zone · https://unficyp.unmissions.org/","UNESCO — Cultural heritage of Nicosia's Venetian fortifications and traditional cheese production · https://whc.unesco.org/en/tentativelists/5567/"]},"DR Congo":{"clues":["This territory is the world's largest producer of cobalt, accounting for approximately 70% of global production.","The world's deepest river, reaching depths over 220 meters, cuts through this territory for roughly 4,700 kilometers, draining the vast equatorial rainforest basin at the heart of Africa.","This territory shares its eastern border with Rwanda and Burundi.","Capital city starts with 'K'.","Virunga National Park, Africa's oldest national park established in 1925, is home to critically endangered mountain gorillas."],"sources":["U.S. Geological Survey — Mineral Commodity Summaries 2024: Cobalt production statistics · https://www.usgs.gov/centers/national-minerals-information-center/cobalt-statistics-and-information","Britannica — Congo River: depth and length characteristics · https://www.britannica.com/place/Congo-River","CIA World Factbook — Central Africa: country borders and neighboring states · https://www.cia.gov/the-world-factbook/countries/","Britannica — Kinshasa: capital city information · https://www.britannica.com/place/Kinshasa","UNESCO World Heritage Centre — Virunga National Park: establishment date and mountain gorilla habitat · https://whc.unesco.org/en/list/63/"]},"Denmark":{"clues":["This constitutional monarchy holds the record for the oldest continuously used national flag in the world, officially adopted in 1625.","The territory consists of a peninsula and 443 named islands, with only 74 of them inhabited, creating a landscape dominated by low-lying coastal plains and no point higher than 171 meters above sea level.","The Jutland Peninsula shares its only land border with Germany to the south, while narrow straits separate it from Sweden to the northeast.","Capital city starts with 'C'.","This nation is the birthplace of LEGO bricks, invented in 1932 in the town of Billund, and is home to the original LEGOLAND theme park."],"sources":["Guinness World Records — Oldest continuously used national flag · https://www.guinnessworldrecords.com/world-records/oldest-flag","CIA World Factbook — Denmark Geography · https://www.cia.gov/the-world-factbook/countries/denmark/","Britannica — Denmark: Land and Borders · https://www.britannica.com/place/Denmark","CIA World Factbook — Denmark Capital · https://www.cia.gov/the-world-factbook/countries/denmark/","LEGO Group — Company History and Heritage · https://www.lego.com/en-us/aboutus/lego-group/the-lego-group-history"]},"Djibouti":{"clues":["This nation hosts military bases for France, the United States, China, Japan, and Italy, making it one of the world's most concentrated foreign military presences per square kilometer.","The Ardoukoba volcano last erupted in 1978, and the territory contains Lake Assal, a crater lake that sits 155 meters below sea level as the lowest point in Africa.","This territory borders Eritrea to the north and Ethiopia to the west and south.","Capital city starts with 'D'.","Lake Assal is nearly ten times saltier than the ocean, making it one of the saltiest bodies of water on Earth and a major salt extraction site."],"sources":["Council on Foreign Relations — Analysis of military basing in the Horn of Africa including multiple foreign installations · https://www.cfr.org/backgrounder/military-bases-africa","Smithsonian Institution Global Volcanism Program — Ardoukoba volcano eruption history and Lake Assal elevation data · https://volcano.si.edu/volcano.cfm?vn=231040","CIA World Factbook — Geographic borders and neighboring countries · https://www.cia.gov/the-world-factbook/countries/djibouti/","Britannica — Capital city information for East African nations · https://www.britannica.com/place/Djibouti-national-capital-Djibouti","UNESCO — Lake Assal salinity levels and geological significance · https://whc.unesco.org/en/tentativelists/5387/"]},"Dhekelia Sovereign Base Area":{"clues":["One of two British Overseas Territories on the island that retained sovereignty after the 1960 independence treaty, covering approximately 131 square kilometers including a power station and civilian farming villages.","The territory encompasses coastal plains along Larnaca Bay and includes the distinctive Ayios Nikolaos peninsula jutting into the Mediterranean Sea.","Bordered entirely by the Republic of Cyprus, with the Mediterranean Sea forming its southern coastline.","The main settlement and administrative headquarters starts with 'E'.","Home to RAF Akrotiri station and British military facilities that have operated continuously since 1960, making it a strategically important Mediterranean outpost."],"sources":["UK Government — Sovereign Base Areas of Akrotiri and Dhekelia official information · https://www.gov.uk/world/organisations/sovereign-base-areas-administration","Encyclopaedia Britannica — Akrotiri and Dhekelia geographic description · https://www.britannica.com/place/Akrotiri-and-Dhekelia","CIA World Factbook — Akrotiri and Dhekelia geographic location and borders · https://www.cia.gov/the-world-factbook/countries/akrotiri/","UK Sovereign Base Areas Administration — Episkopi administrative center information · https://www.sbaadministration.org/","Royal Air Force — RAF Akrotiri station history and operations · https://www.raf.mod.uk/our-organisation/stations/raf-akrotiri/"]},"Dominica":{"clues":["This territory hosts the world's only remaining population of the endangered Sisserou parrot, which appears on its national flag.","Over 300 rivers flow through this mountainous volcanic island, which features the boiling Boiling Lake, the second-largest thermally active lake in the world.","This island nation lies in the Caribbean Sea between the French islands of Guadeloupe to the north and Martinique to the south.","Capital city starts with 'R'.","Known as the 'Nature Island of the Caribbean,' this destination is famous for its pristine rainforests, numerous waterfalls, and year-round diving with sperm whales."],"sources":["Britannica — Dominica national symbols and endemic species · https://www.britannica.com/place/Dominica","UNESCO — Morne
