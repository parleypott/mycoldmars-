<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PinGlobe Feedback</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      padding: clamp(24px, 5vw, 60px);
    }
    .header {
      margin-bottom: 40px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .sub {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      letter-spacing: 0.08em;
    }
    .rule {
      width: 40px;
      height: 2px;
      background: #333;
      margin: 16px 0;
    }
    .count {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .empty {
      font-size: 13px;
      color: #444;
      margin-top: 40px;
    }
    .entries {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-top: 24px;
    }
    .entry {
      background: #111;
      padding: 20px 24px;
      border-left: 2px solid #222;
    }
    .entry-text {
      font-size: 14px;
      line-height: 1.7;
      color: #ccc;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .entry-meta {
      font-size: 10px;
      color: #444;
      margin-top: 12px;
      letter-spacing: 0.1em;
    }
    .clear-btn {
      margin-top: 32px;
      padding: 10px 20px;
      background: transparent;
      border: 1px solid #333;
      color: #555;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .clear-btn:hover {
      border-color: #888;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>PinGlobe Feedback</h1>
    <div class="rule"></div>
    <p class="sub">Feedback from players. Stored in browser localStorage.</p>
  </div>
  <div id="count" class="count"></div>
  <div id="entries" class="entries"></div>
  <p id="empty" class="empty hidden"></p>
  <button id="clear" class="clear-btn hidden">CLEAR ALL</button>

  <script>
    const entries = JSON.parse(localStorage.getItem('pg-feedback') || '[]');
    const container = document.getElementById('entries');
    const countEl = document.getElementById('count');
    const emptyEl = document.getElementById('empty');
    const clearBtn = document.getElementById('clear');

    function render(data) {
      container.innerHTML = '';
      if (data.length === 0) {
        countEl.textContent = '';
        emptyEl.textContent = 'No feedback yet.';
        emptyEl.classList.remove('hidden');
        clearBtn.classList.add('hidden');
        return;
      }

      emptyEl.classList.add('hidden');
      clearBtn.classList.remove('hidden');
      countEl.textContent = data.length + ' ENTR' + (data.length === 1 ? 'Y' : 'IES');

      // Show newest first
      [...data].reverse().forEach((e) => {
        const div = document.createElement('div');
        div.className = 'entry';

        const d = new Date(e.ts);
        const dateStr = d.toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric',
          hour: '2-digit', minute: '2-digit',
        });

        div.innerHTML =
          '<div class="entry-text">' + escHtml(e.text) + '</div>' +
          '<div class="entry-meta">' + dateStr + '</div>';
        container.appendChild(div);
      });
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    clearBtn.addEventListener('click', () => {
      if (confirm('Clear all feedback?')) {
        localStorage.removeItem('pg-feedback');
        render([]);
      }
    });

    render(entries);
  </script>
</body>
</html>
