<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,700;9..40,900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #f83500;
      --ivory: #faf7f2;
    }

    html, body {
      min-height: 100vh;
      background: var(--red);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
    }

    .back {
      position: fixed;
      top: 24px;
      left: 28px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ivory);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
      z-index: 200;
    }
    .back:hover { opacity: 1; }

    .page {
      padding: 80px 48px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 64px;
    }

    h1 {
      font-size: clamp(52px, 8vw, 110px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 0.9;
      color: var(--ivory);
      text-transform: uppercase;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 40px;
    }

    .frame {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .photo-wrap {
      background: var(--ivory);
      padding: 12px 12px 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
      position: relative;
      transform: rotate(-0.5deg);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), box-shadow 0.3s;
    }

    .frame:nth-child(2n) .photo-wrap { transform: rotate(0.8deg); }
    .frame:nth-child(3n) .photo-wrap { transform: rotate(-1.2deg); }
    .frame:nth-child(4n) .photo-wrap { transform: rotate(0.4deg); }

    .frame:hover .photo-wrap {
      transform: rotate(0deg) scale(1.02);
      box-shadow: 0 16px 56px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.25);
    }

    .photo-wrap img {
      width: 100%;
      display: block;
      aspect-ratio: 4/3;
      object-fit: cover;
    }

    .year-label {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #333;
    }

    @media (max-width: 600px) {
      .page { padding: 70px 20px 60px; }
      .gallery { grid-template-columns: 1fr; gap: 32px; }
    }
  </style>
</head>
<body>

  <a href="/" class="back">← Back</a>

  <div class="page">
    <header>
      <h1>Bedroom</h1>
    </header>

    <div class="gallery">

      <div class="frame">
        <div class="photo-wrap">
          <img src="./2018.jpeg" alt="2018">
          <span class="year-label">2018</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
