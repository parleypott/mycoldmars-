  'South Africa': 'M167.3,107.8L165.4,109.2L161.3,114.1L158.6,119.1L153.1,126.1L142.1,136.1L135.3,141.9L127.9,146.3L117.8,150.1L112.8,150.6L111.6,153.3L105.7,151.8L100.9,153.7L90.4,151.8L84.5,153.0L80.5,152.5L70.4,156.3L62.2,157.9L56.2,161.5L51.8,161.8L47.6,158.3L44.4,158.1L40.2,153.8L39.7,155.1L38.4,152.5L38.5,146.8L35.3,140.3L38.5,138.6L38.2,131.1L31.9,122.0L27.0,113.8L27.0,113.8L20.0,101.2L24.6,96.4L28.5,99.0L30.1,103.2L34.5,103.9L40.6,105.7L45.8,105.0L54.5,100.1L57.1,65.7L62.8,74.9L61.9,80.8L64.1,84.2L71.1,83.2L75.9,78.9L80.5,76.0L82.9,71.3L87.6,69.1L91.7,70.3L96.3,73.0L104.2,73.4L110.5,71.2L111.4,68.2L113.1,63.5L118.4,62.7L121.3,59.1L124.6,52.6L133.3,45.4L147.0,38.2L151.0,38.3L155.7,40.0L158.9,38.8L164.1,39.8L168.7,53.4L171.3,60.3L169.5,71.2L170.4,74.6L165.5,72.9L162.7,73.6L161.7,76.4L159.1,80.0L159.2,83.4L165.0,88.7L170.7,87.6L172.6,83.3L180.0,83.4L177.6,90.4L176.4,98.5L173.9,102.9Z',
};

const COUNTRY_NAMES = Object.keys(COUNTRY_PATHS);

// ── Canvas setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Game state ──
const TOTAL_BOUNCES = 13;
const PLATFORM_Y_FRAC = 0.68;
const BALL_R = 9;
const BASE_INTERVAL = 900; // ms between shape changes at start
const MIN_INTERVAL = 90;

let gameActive = false;
let ballY, ballVY, gravity;
let bounceCount = 0;
let platformY;
let shapeInterval = BASE_INTERVAL;
let shapeTimer = 0;
let lastTime = null;

let targetCountry = '';
let currentCountry = '';
let countries = [];
let countryIndex = 0;

let flashTimeout = null;
let answered = false;

// Pre-parse SVG paths
const parsedPaths = {};
for (const [name, pathStr] of Object.entries(COUNTRY_PATHS)) {
  parsedPaths[name] = new Path2D(pathStr);
}

function pickCountries() {
  const all = [...COUNTRY_NAMES];
  // shuffle
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all;
}

function startGame() {
  document.getElementById('result-screen').classList.remove('show');
  gameActive = true;
  answered = false;
  bounceCount = 0;
  shapeInterval = BASE_INTERVAL;
  shapeTimer = 0;
  lastTime = null;

  platformY = H * PLATFORM_Y_FRAC;
  ballY = platformY - 200;
  ballVY = 0;
  gravity = 0.45;

  countries = pickCountries();
  countryIndex = 0;
  currentCountry = countries[countryIndex];

  // Pick target — ensure it's in our list
  targetCountry = countries[Math.floor(Math.random() * Math.min(countries.length, 20))];

  document.getElementById('target-name').textContent = targetCountry;
  document.getElementById('bounces-left').textContent = `${TOTAL_BOUNCES} bounces`;
  requestAnimationFrame(loop);
}

function loop(ts) {
  if (!gameActive) return;
  const dt = lastTime ? Math.min(ts - lastTime, 50) : 16;
  lastTime = ts;

  // Physics
  ballVY += gravity;
  ballY += ballVY;

  // Bounce
  if (ballY >= platformY - BALL_R) {
    ballY = platformY - BALL_R;
    const restitution = 0.82 - bounceCount * 0.018;
    ballVY = -Math.abs(ballVY) * Math.max(restitution, 0.3);
    bounceCount++;

    // Increase speed
    shapeInterval = Math.max(MIN_INTERVAL, BASE_INTERVAL * Math.pow(0.78, bounceCount));

    const left = TOTAL_BOUNCES - bounceCount;
    document.getElementById('bounces-left').textContent =
      left > 0 ? `${left} bounce${left !== 1 ? 's' : ''} left` : '';

    if (bounceCount >= TOTAL_BOUNCES) {
      setTimeout(() => endGame(false, 'time'), 400);
      return;
    }
  }

  // Cycle country shape
  shapeTimer += dt;
  if (shapeTimer >= shapeInterval) {
    shapeTimer = 0;
    countryIndex = (countryIndex + 1) % countries.length;
    currentCountry = countries[countryIndex];
  }

  draw();
  requestAnimationFrame(loop);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Country shape (centered below platform)
  const shapeSize = Math.min(W * 0.55, H * 0.22);
  const shapeX = W / 2 - shapeSize / 2 - 10;
  const shapeY = platformY + 24;
  const path = parsedPaths[currentCountry];
  if (path) {
    ctx.save();
    ctx.translate(shapeX, shapeY);
    ctx.scale(shapeSize / 200, shapeSize / 200);
    ctx.fillStyle = 'rgba(250,247,242,0.12)';
    ctx.strokeStyle = 'rgba(250,247,242,0.55)';
    ctx.lineWidth = 200 / shapeSize * 1.2;
    ctx.fill(path);
    ctx.stroke(path);
    ctx.restore();
  }

  // Platform
  const platW = Math.min(W * 0.55, 320);
  const platX = W / 2 - platW / 2;
  ctx.beginPath();
  ctx.moveTo(platX, platformY);
  ctx.lineTo(platX + platW, platformY);
  ctx.strokeStyle = 'rgba(250,247,242,0.8)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Ball
  ctx.beginPath();
  ctx.arc(W / 2, ballY, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#faf7f2';
  ctx.shadowColor = 'rgba(250,247,242,0.7)';
  ctx.shadowBlur = 16;
  ctx.fill();
  ctx.shadowBlur = 0;
}

function flash(type) {
  const el = document.getElementById('flash');
  el.className = type;
  el.style.opacity = '1';
  clearTimeout(flashTimeout);
  flashTimeout = setTimeout(() => { el.style.opacity = '0'; el.className = ''; }, 300);
}

function endGame(won, reason) {
  gameActive = false;
  const screen = document.getElementById('result-screen');
  const title = document.getElementById('result-title');
  const sub = document.getElementById('result-sub');

  screen.classList.add('show');
  if (won) {
    title.textContent = 'GOT IT';
    title.className = 'win';
    sub.textContent = `You spotted ${targetCountry}\nat the right moment.`;
    flash('green');
  } else {
    title.textContent = 'MISSED';
    title.className = 'lose';
    if (reason === 'wrong') {
      sub.textContent = `That was ${currentCountry},\nnot ${targetCountry}.`;
    } else {
      sub.textContent = `${targetCountry} appeared but\nyou didn't tap in time.`;
    }
    flash('red');
  }
}

function onTap() {
  if (!gameActive || answered) return;
  if (currentCountry === targetCountry) {
    answered = true;
    endGame(true);
  } else {
    endGame(false, 'wrong');
  }
}

canvas.addEventListener('click', onTap);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onTap(); }, { passive: false });
document.getElementById('result-btn').addEventListener('click', startGame);

startGame();
</script>
