const LEVEL_META = [
  { title: 'The Obvious Ones', desc: 'Countries your grandma could name on a map.', bounces: 13, baseInterval: 1100 },
  { title: 'Dinner Party Tier', desc: 'Countries you confidently mention at dinner parties.\n(Even if you'd struggle to spell them.)', bounces: 13, baseInterval: 950 },
  { title: 'Actually Interesting', desc: 'Countries that don't make the news\nbut have incredible food.', bounces: 12, baseInterval: 800 },
  { title: 'Teacher Mentioned Once', desc: 'Your geography teacher brought these up.\nYou were on your phone.', bounces: 12, baseInterval: 680 },
  { title: 'Technically Countries', desc: 'These exist. They have flags and everything.\nWe checked.', bounces: 11, baseInterval: 540 },
  { title: 'We're Sorry', desc: 'We had to look some of these up.\nYou're on your own.', bounces: 10, baseInterval: 400 },
];

const TOTAL_LEVELS = 6;
const TOTAL_BOUNCES_DEFAULT = 13;
const BALL_R = 8;
const GRAVITY = 0.16;
const BASE_RESTITUTION = 0.88;
const MIN_INTERVAL = 85;

let currentLevel = 1;
let gameActive = false;
let answered = false;
let sessionResults = [];

let ballY, ballVY;
let bounceCount, totalBounces;
let platformY;
let shapeInterval, shapeTimer;
let lastTime = null;
let targetCountry, currentCountry, levelCountries, countryIndex;
let parsedPaths = {};
let flashTimeout = null;

// Canvas
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// Pre-parse paths
for (const [lvl, countries] of Object.entries(LEVELS)) {
  for (const c of countries) {
    if (!parsedPaths[c.name]) {
      try { parsedPaths[c.name] = new Path2D(c.path); }
      catch(e) { console.warn('Bad path for', c.name, e); }
    }
  }
}

// ── Level intro ──
function showLevelIntro(lvl) {
  const meta = LEVEL_META[lvl - 1];
  document.getElementById('level-num').textContent = `Level ${lvl} · of ${TOTAL_LEVELS}`;
  document.getElementById('level-title').textContent = meta.title;
  document.getElementById('level-desc').textContent = meta.desc;
  document.getElementById('level-screen').classList.add('show');
  document.getElementById('result-screen').classList.remove('show');
  buildScoreRow();
}

document.getElementById('level-btn').addEventListener('click', () => {
  document.getElementById('level-screen').classList.remove('show');
  startLevel(currentLevel);
});

function buildScoreRow() {
  const row = document.getElementById('score-row');
  row.innerHTML = '';
  for (let i = 0; i < TOTAL_LEVELS; i++) {
    const d = document.createElement('div');
    d.className = 'score-dot';
    if (i < sessionResults.length) {
      d.classList.add(sessionResults[i] ? 'won' : 'lost');
    }
    row.appendChild(d);
  }
}

// ── Start level ──
function startLevel(lvl) {
  const meta = LEVEL_META[lvl - 1];
  gameActive = true;
  answered = false;
  bounceCount = 0;
  totalBounces = meta.bounces;
  shapeInterval = meta.baseInterval;
  shapeTimer = 0;
  lastTime = null;

  platformY = H * 0.66;
  ballY = platformY - H * 0.38;
  ballVY = 0;

  levelCountries = LEVELS[lvl];
  // shuffle
  levelCountries = [...levelCountries].sort(() => Math.random() - 0.5);
  countryIndex = 0;
  currentCountry = levelCountries[0].name;
  targetCountry = levelCountries[Math.floor(Math.random() * levelCountries.length)].name;

  document.getElementById('hud-level').textContent = `Level ${lvl} — ${meta.title}`;
  document.getElementById('target-name').textContent = targetCountry;
  document.getElementById('bounces-left').textContent = `${totalBounces} bounces`;

  requestAnimationFrame(loop);
}

// ── Physics loop ──
function loop(ts) {
  if (!gameActive) return;
  const dt = lastTime ? Math.min(ts - lastTime, 50) : 16;
  lastTime = ts;

  ballVY += GRAVITY;
  ballY += ballVY;

  if (ballY >= platformY - BALL_R) {
    ballY = platformY - BALL_R;
    const r = BASE_RESTITUTION - bounceCount * 0.016;
    ballVY = -Math.abs(ballVY) * Math.max(r, 0.32);
    bounceCount++;

    const progress = bounceCount / totalBounces;
    shapeInterval = Math.max(MIN_INTERVAL,
      LEVEL_META[currentLevel - 1].baseInterval * Math.pow(0.76, bounceCount));

    const left = totalBounces - bounceCount;
    document.getElementById('bounces-left').textContent =
      left > 0 ? `${left} bounce${left !== 1 ? 's' : ''} left` : '';

    if (bounceCount >= totalBounces) {
      setTimeout(() => endLevel(false, 'time'), 350);
      return;
    }
  }

  shapeTimer += dt;
  if (shapeTimer >= shapeInterval) {
    shapeTimer = 0;
    countryIndex = (countryIndex + 1) % levelCountries.length;
    currentCountry = levelCountries[countryIndex].name;
  }

  draw();
  requestAnimationFrame(loop);
}

// ── Draw ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Country shape
  const shapeSize = Math.min(W * 0.52, H * 0.24);
  const path = parsedPaths[currentCountry];
  if (path) {
    ctx.save();
    ctx.translate(W / 2 - shapeSize / 2 - 10, platformY + 20);
    ctx.scale(shapeSize / 200, shapeSize / 200);
    ctx.fillStyle = 'rgba(250,247,242,0.1)';
    ctx.strokeStyle = 'rgba(250,247,242,0.6)';
    ctx.lineWidth = 200 / shapeSize * 1.3;
    ctx.fill(path);
    ctx.stroke(path);
    ctx.restore();
  }

  // Platform
  const platW = Math.min(W * 0.5, 300);
  ctx.beginPath();
  ctx.moveTo(W / 2 - platW / 2, platformY);
  ctx.lineTo(W / 2 + platW / 2, platformY);
  ctx.strokeStyle = 'rgba(250,247,242,0.75)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Ball
  ctx.beginPath();
  ctx.arc(W / 2, ballY, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#faf7f2';
  ctx.shadowColor = 'rgba(250,247,242,0.65)';
  ctx.shadowBlur = 18;
  ctx.fill();
  ctx.shadowBlur = 0;
}

// ── End level ──
function endLevel(won, reason) {
  gameActive = false;
  sessionResults.push(won);
  buildScoreRow();
  doFlash(won ? 'green' : 'red');

  const rt = document.getElementById('result-title');
  const rs = document.getElementById('result-sub');
  const nextBtn = document.getElementById('next-btn');

  rt.textContent = won ? 'GOT IT' : 'MISSED';
  rt.className = won ? 'win' : 'lose';

  if (won) {
    rs.textContent = `You spotted ${targetCountry} at the right moment.`;
  } else if (reason === 'wrong') {
    rs.textContent = `That was ${currentCountry}, not ${targetCountry}.`;
  } else {
    rs.textContent = `${targetCountry} appeared but\nyou didn't tap in time.`;
  }

  const hasNext = currentLevel < TOTAL_LEVELS;
  nextBtn.classList.toggle('hidden', !hasNext);
  nextBtn.textContent = hasNext ? `Level ${currentLevel + 1} →` : 'Finished';

  document.getElementById('result-screen').classList.add('show');
}

// ── Tap ──
function onTap() {
  if (!gameActive || answered) return;
  if (currentCountry === targetCountry) {
    answered = true;
    endLevel(true);
  } else {
    endLevel(false, 'wrong');
  }
}

canvas.addEventListener('click', onTap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onTap(); }, { passive: false });

document.getElementById('retry-btn').addEventListener('click', () => {
  document.getElementById('result-screen').classList.remove('show');
  sessionResults.pop();
  showLevelIntro(currentLevel);
});

document.getElementById('next-btn').addEventListener('click', () => {
  if (currentLevel < TOTAL_LEVELS) {
    currentLevel++;
    showLevelIntro(currentLevel);
  }
});

// ── Flash ──
function doFlash(type) {
  const el = document.getElementById('flash');
  el.className = type;
  el.style.opacity = '1';
  clearTimeout(flashTimeout);
  flashTimeout = setTimeout(() => { el.style.opacity = '0'; el.className = ''; }, 320);
}

// ── Start ──
showLevelIntro(1);
