<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>comment bank — newpress</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --ink: #121118;
  --warm: #f4f2e6;
  --warm-soft: rgba(244, 242, 230, 0.85);
  --warm-dim: rgba(244, 242, 230, 0.5);
  --warm-faint: rgba(244, 242, 230, 0.25);
  --line: rgba(244, 242, 230, 0.12);
  --line-strong: rgba(244, 242, 230, 0.3);
  --accent: #ffbf00;
  --burgundy: #520004;
  --font-head: "Instrument Serif", Georgia, serif;
  --font-body: "Space Mono", "Courier New", monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--ink);
  color: var(--warm);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; background: none; border: none; color: inherit; }
input, select { font: inherit; color: inherit; }

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(18, 17, 24, 0.94);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}

.brand {
  display: flex; align-items: baseline; gap: 14px;
  padding: 22px 40px 8px;
}
.brand .logo {
  font-family: var(--font-head);
  font-size: 32px; font-style: italic;
  letter-spacing: -0.01em;
  color: var(--warm);
}
.brand .sub {
  font-family: var(--font-body);
  font-size: 11px; letter-spacing: 0.16em;
  color: var(--warm-dim);
  text-transform: uppercase;
}
.brand .stats {
  margin-left: auto;
  font-size: 11px; letter-spacing: 0.1em;
  color: var(--warm-dim);
  text-transform: uppercase;
}

.tabs {
  display: flex; gap: 28px;
  padding: 4px 40px 0;
}
.tab {
  font-family: var(--font-body);
  font-size: 12px; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--warm-dim);
  padding: 12px 0 14px;
  border-bottom: 1px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  cursor: pointer;
}
.tab:hover { color: var(--warm-soft); }
.tab.on { color: var(--warm); border-bottom-color: var(--accent); }

/* ── GALLERY MODE ── */
.controls {
  padding: 22px 40px 12px;
  display: flex; flex-direction: column; gap: 12px;
  border-bottom: 1px solid var(--line);
}
.row {
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}
.search-wrap {
  flex: 1; min-width: 260px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--line);
  padding: 10px 14px;
  font-size: 13px;
  letter-spacing: 0.02em;
  border-radius: 0;
}
.search-wrap input:focus { outline: none; border-color: var(--warm-dim); }
.search-wrap input::placeholder { color: var(--warm-faint); }

select.sort {
  background: transparent;
  border: 1px solid var(--line);
  padding: 10px 14px;
  font-size: 13px;
  letter-spacing: 0.02em;
}

.chips {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.chip-label {
  font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--warm-faint);
  align-self: center;
  margin-right: 6px;
}
.chip {
  font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 1px solid var(--line);
  color: var(--warm-soft);
  background: transparent;
  border-radius: 0;
  transition: all 0.15s;
  user-select: none;
}
.chip:hover { border-color: var(--warm-dim); }
.chip.on {
  background: var(--accent);
  color: var(--ink);
  border-color: var(--accent);
  font-weight: 700;
}
.chip .ct {
  margin-left: 6px;
  color: var(--warm-faint);
  font-variant-numeric: tabular-nums;
}
.chip.on .ct { color: rgba(18,17,24,0.55); }

.toolbar {
  display: flex; gap: 12px; align-items: center;
}
.btn-primary {
  background: var(--accent); color: var(--ink);
  padding: 8px 14px;
  font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; font-weight: 700;
}
.btn-primary:disabled {
  background: transparent; color: var(--warm-faint);
  border: 1px solid var(--line); cursor: not-allowed;
}
.btn-ghost {
  padding: 8px 14px;
  font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase;
  border: 1px solid var(--line);
  color: var(--warm-soft);
}
.btn-ghost:hover { border-color: var(--warm-dim); }
.visible-count {
  margin-left: auto;
  font-size: 11px; letter-spacing: 0.1em;
  color: var(--warm-faint);
  text-transform: uppercase;
}

/* gallery grid */
#gallery {
  padding: 24px 40px 100px;
  column-count: 4;
  column-gap: 20px;
}
@media (max-width: 1400px) { #gallery { column-count: 3; } }
@media (max-width: 960px) { #gallery { column-count: 2; padding: 18px 22px 100px; } }
@media (max-width: 600px) { #gallery { column-count: 1; padding: 14px 16px 100px; } }

.card {
  break-inside: avoid;
  margin-bottom: 20px;
  position: relative;
  background: rgba(244,242,230,0.02);
  border: 1px solid var(--line);
  transition: border-color 0.15s;
}
.card:hover { border-color: var(--line-strong); }
.card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.card img {
  display: block; width: 100%; height: auto;
  cursor: zoom-in;
}
.card .meta {
  padding: 12px 14px 14px;
}
.card .text {
  font-size: 12px; line-height: 1.5;
  color: var(--warm-soft);
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card .tags {
  margin-top: 10px;
  display: flex; gap: 6px; flex-wrap: wrap;
  font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase;
}
.card .tag {
  color: var(--warm-faint);
  padding: 2px 0;
}
.card .tag.sent {
  color: var(--accent);
}
.card .select-box {
  position: absolute; top: 10px; left: 10px;
  width: 22px; height: 22px;
  background: rgba(18,17,24,0.85);
  border: 1px solid var(--line-strong);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  backdrop-filter: blur(4px);
}
.card.selected .select-box {
  background: var(--accent); color: var(--ink);
  border-color: var(--accent);
}
.card .quick-dl {
  position: absolute; top: 10px; right: 10px;
  padding: 4px 9px;
  font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase;
  background: rgba(18,17,24,0.85);
  border: 1px solid var(--line-strong);
  color: var(--warm-soft);
  opacity: 0;
  transition: opacity 0.15s;
  backdrop-filter: blur(4px);
}
.card:hover .quick-dl { opacity: 1; }
.card .quick-dl:hover { background: var(--accent); color: var(--ink); border-color: var(--accent); }

/* ── BROWSE MODE ── */
#browse {
  display: none;
  padding: 40px 40px 100px;
  flex-direction: column; align-items: center; gap: 24px;
  min-height: 70vh;
}
.browse-frame {
  width: 100%; max-width: 880px;
  display: flex; flex-direction: column; align-items: center; gap: 18px;
}
.browse-counter {
  font-size: 11px; letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--warm-dim);
  font-variant-numeric: tabular-nums;
}
.browse-img-wrap {
  width: 100%;
  background: rgba(244,242,230,0.03);
  border: 1px solid var(--line);
  padding: 20px;
  display: flex; justify-content: center;
}
.browse-img-wrap img {
  max-width: 100%; max-height: 60vh;
  object-fit: contain;
  cursor: zoom-in;
}
.browse-info {
  width: 100%;
  text-align: center;
  display: flex; flex-direction: column; gap: 14px;
}
.browse-text {
  font-family: var(--font-head);
  font-size: 22px; font-style: italic;
  line-height: 1.4;
  color: var(--warm);
  max-width: 720px;
  margin: 0 auto;
}
.browse-tags {
  display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
  font-size: 10px; letter-spacing: 0.16em;
  text-transform: uppercase;
}
.browse-tags .t { color: var(--warm-faint); }
.browse-tags .t.sent { color: var(--accent); }
.browse-date {
  font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--warm-faint);
}
.browse-nav {
  display: flex; gap: 12px; align-items: center; justify-content: center;
  margin-top: 8px;
}
.browse-nav button {
  border: 1px solid var(--line);
  padding: 10px 18px;
  font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase;
}
.browse-nav button:hover { border-color: var(--warm-dim); }
.browse-nav .keys {
  margin-left: 12px;
  font-size: 10px; letter-spacing: 0.16em;
  color: var(--warm-faint);
  text-transform: uppercase;
}

/* ── ASK MODE ── */
#ask {
  display: none;
  padding: 40px 40px 100px;
}
.ask-frame {
  max-width: 880px;
  margin: 0 auto;
}
.ask-intro {
  font-family: var(--font-head);
  font-style: italic;
  font-size: 26px;
  color: var(--warm);
  margin-bottom: 6px;
}
.ask-sub {
  font-size: 12px; letter-spacing: 0.04em;
  color: var(--warm-dim);
  margin-bottom: 28px;
}
.ask-examples {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 16px;
}
.ask-example {
  font-size: 11px;
  padding: 6px 10px;
  border: 1px solid var(--line);
  color: var(--warm-soft);
  letter-spacing: 0.02em;
}
.ask-example:hover { border-color: var(--warm-dim); }
.ask-input-wrap {
  display: flex; gap: 10px;
  border: 1px solid var(--line-strong);
  padding: 4px;
  margin-bottom: 28px;
}
.ask-input-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 10px 14px;
  font-size: 14px;
}
.ask-input-wrap input:focus { outline: none; }
.ask-input-wrap button {
  background: var(--accent); color: var(--ink);
  padding: 8px 18px;
  font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; font-weight: 700;
}
.ask-input-wrap button:disabled {
  background: transparent; color: var(--warm-faint);
}
.ask-status {
  font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--warm-dim);
  margin-bottom: 14px;
  min-height: 14px;
}
.ask-summary {
  font-family: var(--font-head);
  font-style: italic;
  font-size: 18px;
  color: var(--warm);
  border-left: 2px solid var(--accent);
  padding: 4px 0 4px 18px;
  margin-bottom: 28px;
  line-height: 1.5;
}
.ask-results {
  display: flex; flex-direction: column; gap: 18px;
}
.ask-result {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 18px;
  border: 1px solid var(--line);
  padding: 14px;
  background: rgba(244,242,230,0.02);
}
@media (max-width: 700px) { .ask-result { grid-template-columns: 1fr; } }
.ask-result img {
  width: 100%; height: auto;
  border: 1px solid var(--line);
  cursor: zoom-in;
}
.ask-result .why {
  font-size: 12px; color: var(--warm-soft);
  margin-bottom: 8px;
  line-height: 1.5;
}
.ask-result .quote {
  font-family: var(--font-head); font-style: italic;
  font-size: 16px; line-height: 1.4;
  color: var(--warm);
  margin-bottom: 8px;
}
.ask-result .row-mini {
  display: flex; gap: 12px; align-items: center;
  font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--warm-faint);
}
.ask-result .row-mini .sent { color: var(--accent); }

/* ── MODAL ── */
.modal {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(18,17,24,0.96);
  display: none; align-items: center; justify-content: center;
  padding: 40px;
}
.modal.open { display: flex; }
.modal-inner {
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  max-width: 90vw;
}
.modal img {
  max-width: 100%; max-height: 78vh;
  object-fit: contain;
}
.modal-text {
  max-width: 720px; text-align: center;
  font-family: var(--font-head); font-style: italic;
  font-size: 18px; line-height: 1.5;
  color: var(--warm);
}
.modal-actions { display: flex; gap: 12px; }
.modal-actions a {
  padding: 9px 16px;
  font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
}
.modal-actions .primary {
  background: var(--accent); color: var(--ink);
}
.modal-actions .secondary {
  border: 1px solid var(--line-strong);
  color: var(--warm-soft);
}
.close-x {
  position: absolute; top: 22px; right: 28px;
  font-size: 30px; color: var(--warm); cursor: pointer;
  font-family: var(--font-head);
}

/* ── EMPTY STATES ── */
.empty {
  text-align: center; padding: 80px 20px;
  font-family: var(--font-head); font-style: italic;
  font-size: 20px; color: var(--warm-dim);
}

/* hide gallery elements when not active */
.mode-hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="logo">comment bank</span>
    <span class="sub">newpress / youtube reception</span>
    <span class="stats" id="totalCount"></span>
  </div>
  <div class="tabs">
    <div class="tab on" data-mode="gallery">gallery</div>
    <div class="tab" data-mode="browse">browse</div>
    <div class="tab" data-mode="ask">ask</div>
  </div>
  <div class="controls" id="galleryControls">
    <div class="row">
      <div class="search-wrap">
        <input type="search" id="search" placeholder="search comments, usernames, themes…" />
      </div>
      <select class="sort" id="sort">
        <option value="newest">newest first</option>
        <option value="oldest">oldest first</option>
        <option value="sentiment">by sentiment</option>
      </select>
    </div>
    <div class="row">
      <span class="chip-label">sentiment</span>
      <div class="chips" id="sentimentChips"></div>
    </div>
    <div class="row">
      <span class="chip-label">themes</span>
      <div class="chips" id="themeChips"></div>
    </div>
    <div class="row toolbar">
      <button class="btn-primary" id="downloadSelected" disabled>download selected (0)</button>
      <button class="btn-ghost" id="selectAll">select all visible</button>
      <button class="btn-ghost" id="clearSelection">clear</button>
      <span class="visible-count" id="visibleCount"></span>
    </div>
  </div>
</header>

<main id="gallery"></main>

<section id="browse">
  <div class="browse-frame">
    <div class="browse-counter" id="browseCounter">— / —</div>
    <div class="browse-img-wrap"><img id="browseImg" alt="" /></div>
    <div class="browse-info">
      <div class="browse-text" id="browseText"></div>
      <div class="browse-tags" id="browseTags"></div>
      <div class="browse-date" id="browseDate"></div>
    </div>
    <div class="browse-nav">
      <button id="browsePrev">← prev</button>
      <button id="browseNext">next →</button>
      <button id="browseDownload">download original</button>
      <span class="keys">← / → / space</span>
    </div>
  </div>
</section>

<section id="ask">
  <div class="ask-frame">
    <h2 class="ask-intro">ask the comments</h2>
    <p class="ask-sub">natural-language search across every comment. ask for sentiments, vibes, topics, episodes — whatever.</p>
    <div class="ask-examples" id="askExamples"></div>
    <div class="ask-input-wrap">
      <input id="askInput" type="text" placeholder="what are people saying about…" />
      <button id="askGo">ask</button>
    </div>
    <div class="ask-status" id="askStatus"></div>
    <div class="ask-summary" id="askSummary" style="display:none"></div>
    <div class="ask-results" id="askResults"></div>
  </div>
</section>

<div class="modal" id="modal">
  <button class="close-x" id="closeX">×</button>
  <div class="modal-inner">
    <img id="modalImg" alt="" />
    <div class="modal-text" id="modalText"></div>
    <div class="modal-actions">
      <a class="primary" id="modalDownload" download>download original</a>
      <a class="secondary" id="modalSlack" target="_blank" rel="noopener">open in slack</a>
    </div>
  </div>
</div>

<script>
const SENTIMENTS = [
  "praise", "insightful", "funny", "critical",
  "personal_story", "question", "correction", "other"
];
const EXAMPLES = [
  "people who said they cried",
  "comments about cinematography",
  "questions about taiwan",
  "personal stories from viewers",
  "criticism of pacing",
  "moments people loved",
];

// Auto-detect base path so this file works at localhost:5454/ AND newpress.press/commentbank/
const BASE = location.pathname.replace(/\/index\.html$/, "").replace(/\/$/, "") || "";
const PREFIX = BASE.endsWith("/commentbank") ? BASE : "";
const ASK_ENDPOINT = PREFIX ? "/api/commentbank-ask" : "/api/ask";
function asset(rel) { return `${PREFIX}/${rel.replace(/^\//, "")}`; }

let comments = [];
let chrono = []; // sorted oldest → newest
let activeSents = new Set();
let activeThemes = new Set();
let selected = new Set();
let topThemes = [];
let browseIdx = 0;

const $ = sel => document.querySelector(sel);

async function load() {
  const res = await fetch(asset("comments.json"));
  if (!res.ok) {
    $("#gallery").innerHTML = '<div class="empty">no comments.json yet — run <code>bun analyze.ts</code> first</div>';
    return;
  }
  const arr = await res.json();
  comments = arr.filter(c => c.analysis && !c.analysis.skip);
  chrono = [...comments].sort((a, b) => parseFloat(a.slack_ts) - parseFloat(b.slack_ts));
  $("#totalCount").textContent = comments.length + " comments";
  computeTopThemes();
  renderChips();
  render();
  renderBrowse();
  renderExamples();
}

function computeTopThemes() {
  const counts = {};
  for (const c of comments) {
    for (const t of (c.analysis.themes || [])) {
      counts[t] = (counts[t] || 0) + 1;
    }
  }
  topThemes = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 20)
    .map(([t, n]) => ({ theme: t, count: n }));
}

function renderChips() {
  const sc = $("#sentimentChips"); sc.innerHTML = "";
  for (const s of SENTIMENTS) {
    const count = comments.filter(c => c.analysis.sentiment === s).length;
    if (!count) continue;
    const chip = document.createElement("button");
    chip.className = "chip" + (activeSents.has(s) ? " on" : "");
    chip.innerHTML = `${s.replace("_", " ")}<span class="ct">${count}</span>`;
    chip.onclick = () => {
      activeSents.has(s) ? activeSents.delete(s) : activeSents.add(s);
      renderChips(); render();
    };
    sc.appendChild(chip);
  }

  const tc = $("#themeChips"); tc.innerHTML = "";
  for (const { theme, count } of topThemes) {
    const chip = document.createElement("button");
    chip.className = "chip" + (activeThemes.has(theme) ? " on" : "");
    chip.innerHTML = `${theme}<span class="ct">${count}</span>`;
    chip.onclick = () => {
      activeThemes.has(theme) ? activeThemes.delete(theme) : activeThemes.add(theme);
      renderChips(); render();
    };
    tc.appendChild(chip);
  }
}

function filtered() {
  const q = $("#search").value.trim().toLowerCase();
  let out = comments.filter(c => {
    const a = c.analysis;
    if (activeSents.size && !activeSents.has(a.sentiment)) return false;
    if (activeThemes.size) {
      const hits = (a.themes || []).some(t => activeThemes.has(t));
      if (!hits) return false;
    }
    if (q) {
      const hay = [a.comment_text, a.commenter, a.video_hint, ...(a.themes || [])]
        .filter(Boolean).join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  const sort = $("#sort").value;
  if (sort === "newest") out.sort((a, b) => parseFloat(b.slack_ts) - parseFloat(a.slack_ts));
  else if (sort === "oldest") out.sort((a, b) => parseFloat(a.slack_ts) - parseFloat(b.slack_ts));
  else if (sort === "sentiment") out.sort((a, b) => SENTIMENTS.indexOf(a.analysis.sentiment) - SENTIMENTS.indexOf(b.analysis.sentiment));
  return out;
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}

function render() {
  const items = filtered();
  $("#visibleCount").textContent = items.length + " showing";
  const grid = $("#gallery");
  grid.innerHTML = "";
  if (!items.length) {
    grid.innerHTML = '<div class="empty">no matches</div>';
    return;
  }
  for (const c of items) {
    const card = document.createElement("div");
    card.className = "card" + (selected.has(c.id) ? " selected" : "");
    card.dataset.id = c.id;
    const a = c.analysis;
    const text = a.comment_text || "(no text extracted)";
    const tags = [
      `<span class="tag sent">${(a.sentiment || "").replace("_", " ")}</span>`,
      ...(a.themes || []).slice(0, 3).map(t => `<span class="tag">· ${t}</span>`),
    ].join("");

    card.innerHTML = `
      <div class="select-box" data-role="select">${selected.has(c.id) ? "✓" : ""}</div>
      <a class="quick-dl" href="${asset(c.local_path)}" download="${c.id}.${c.ext}" onclick="event.stopPropagation()">↓ orig</a>
      <img src="${asset(c.local_path)}" alt="" loading="lazy" data-role="open" />
      <div class="meta">
        <div class="text">${escapeHtml(text)}</div>
        <div class="tags">${tags}</div>
      </div>
    `;
    card.querySelector('[data-role="select"]').addEventListener("click", e => {
      e.stopPropagation(); toggleSelected(c.id);
    });
    card.querySelector('[data-role="open"]').addEventListener("click", () => openModal(c));
    grid.appendChild(card);
  }
}

function toggleSelected(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  refreshDownloadBtn(); render();
}
function refreshDownloadBtn() {
  $("#downloadSelected").textContent = `download selected (${selected.size})`;
  $("#downloadSelected").disabled = selected.size === 0;
}

function openModal(c) {
  const a = c.analysis;
  $("#modalImg").src = asset(c.local_path);
  $("#modalText").textContent = a.comment_text || "(no text extracted)";
  $("#modalDownload").href = asset(c.local_path);
  $("#modalDownload").download = `${c.id}.${c.ext}`;
  const slack = $("#modalSlack");
  if (c.slack_permalink) { slack.href = c.slack_permalink; slack.style.display = "inline-block"; }
  else { slack.style.display = "none"; }
  $("#modal").classList.add("open");
}

$("#closeX").onclick = () => $("#modal").classList.remove("open");
$("#modal").onclick = e => { if (e.target.id === "modal") $("#modal").classList.remove("open"); };
document.addEventListener("keydown", e => {
  if (e.key === "Escape") $("#modal").classList.remove("open");
});

$("#search").addEventListener("input", render);
$("#sort").addEventListener("change", render);
$("#selectAll").onclick = () => { for (const c of filtered()) selected.add(c.id); refreshDownloadBtn(); render(); };
$("#clearSelection").onclick = () => { selected.clear(); refreshDownloadBtn(); render(); };

$("#downloadSelected").onclick = async () => {
  if (!selected.size) return;
  const zip = new JSZip();
  const picks = comments.filter(c => selected.has(c.id));
  const btn = $("#downloadSelected");
  const origText = btn.textContent;
  let i = 0;
  for (const c of picks) {
    i++;
    btn.textContent = `zipping ${i}/${picks.length}`;
    const res = await fetch(asset(c.local_path));
    const buf = await res.arrayBuffer();
    zip.file(`${c.id}.${c.ext}`, buf);
  }
  const blob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `comment-bank-${new Date().toISOString().slice(0,10)}.zip`;
  a.click();
  URL.revokeObjectURL(url);
  btn.textContent = origText;
  refreshDownloadBtn();
};

/* ── MODE SWITCHING ── */
const modes = { gallery: ["#gallery", "#galleryControls"], browse: ["#browse"], ask: ["#ask"] };
function setMode(name) {
  for (const tab of document.querySelectorAll(".tab")) {
    tab.classList.toggle("on", tab.dataset.mode === name);
  }
  $("#gallery").style.display = name === "gallery" ? "" : "none";
  $("#galleryControls").style.display = name === "gallery" ? "" : "none";
  $("#browse").style.display = name === "browse" ? "flex" : "none";
  $("#ask").style.display = name === "ask" ? "" : "none";
  if (name === "browse") renderBrowse();
}
for (const tab of document.querySelectorAll(".tab")) {
  tab.onclick = () => setMode(tab.dataset.mode);
}

/* ── BROWSE MODE ── */
function renderBrowse() {
  if (!chrono.length) return;
  if (browseIdx < 0) browseIdx = 0;
  if (browseIdx >= chrono.length) browseIdx = chrono.length - 1;
  const c = chrono[browseIdx];
  const a = c.analysis;
  $("#browseCounter").textContent = `${browseIdx + 1} / ${chrono.length}`;
  $("#browseImg").src = asset(c.local_path);
  $("#browseImg").onclick = () => openModal(c);
  $("#browseText").textContent = a.comment_text || "(no text extracted)";
  const tags = [`<span class="t sent">${(a.sentiment || "").replace("_", " ")}</span>`]
    .concat((a.themes || []).map(t => `<span class="t">· ${t}</span>`))
    .join("");
  $("#browseTags").innerHTML = tags;
  const d = new Date(parseFloat(c.slack_ts) * 1000);
  $("#browseDate").textContent = d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
  $("#browseDownload").onclick = () => {
    const a2 = document.createElement("a");
    a2.href = asset(c.local_path); a2.download = `${c.id}.${c.ext}`; a2.click();
  };
}
$("#browsePrev").onclick = () => { browseIdx--; renderBrowse(); };
$("#browseNext").onclick = () => { browseIdx++; renderBrowse(); };

document.addEventListener("keydown", e => {
  const inBrowse = $("#browse").style.display === "flex";
  if (!inBrowse) return;
  if (document.activeElement && ["INPUT","TEXTAREA","SELECT"].includes(document.activeElement.tagName)) return;
  if (e.key === "ArrowLeft") { browseIdx--; renderBrowse(); e.preventDefault(); }
  if (e.key === "ArrowRight" || e.key === " ") { browseIdx++; renderBrowse(); e.preventDefault(); }
});

/* ── ASK MODE ── */
function renderExamples() {
  const el = $("#askExamples");
  el.innerHTML = "";
  for (const ex of EXAMPLES) {
    const b = document.createElement("button");
    b.className = "ask-example";
    b.textContent = ex;
    b.onclick = () => { $("#askInput").value = ex; runAsk(); };
    el.appendChild(b);
  }
}

$("#askGo").onclick = () => runAsk();
$("#askInput").addEventListener("keydown", e => { if (e.key === "Enter") runAsk(); });

async function runAsk() {
  const q = $("#askInput").value.trim();
  if (!q) return;
  const status = $("#askStatus");
  const summary = $("#askSummary");
  const results = $("#askResults");
  status.textContent = "asking claude…";
  summary.style.display = "none"; summary.textContent = "";
  results.innerHTML = "";
  $("#askGo").disabled = true;

  try {
    const payload = {
      question: q,
      comments: comments.map(c => ({
        id: c.id,
        text: c.analysis.comment_text,
        commenter: c.analysis.commenter,
        sentiment: c.analysis.sentiment,
        themes: c.analysis.themes,
        video_hint: c.analysis.video_hint,
      })),
    };
    const res = await fetch(ASK_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`server returned ${res.status}`);
    const data = await res.json();

    if (data.summary) {
      summary.textContent = data.summary;
      summary.style.display = "block";
    }
    const matches = (data.matches || []).map(m => {
      const c = comments.find(x => x.id === m.id);
      return c ? { c, why: m.why } : null;
    }).filter(Boolean);
    status.textContent = matches.length
      ? `${matches.length} match${matches.length === 1 ? "" : "es"}`
      : "no matches";
    for (const { c, why } of matches) {
      const a = c.analysis;
      const card = document.createElement("div");
      card.className = "ask-result";
      card.innerHTML = `
        <img src="${asset(c.local_path)}" alt="" loading="lazy" />
        <div>
          <div class="why">${escapeHtml(why || "")}</div>
          <div class="quote">"${escapeHtml(a.comment_text || "")}"</div>
          <div class="row-mini">
            <span class="sent">${(a.sentiment || "").replace("_", " ")}</span>
            ${(a.themes || []).map(t => `<span>· ${escapeHtml(t)}</span>`).join("")}
            <span style="margin-left:auto"><a href="${asset(c.local_path)}" download="${c.id}.${c.ext}">↓ download</a></span>
          </div>
        </div>
      `;
      card.querySelector("img").onclick = () => openModal(c);
      results.appendChild(card);
    }
  } catch (err) {
    status.textContent = `error: ${err.message}`;
  } finally {
    $("#askGo").disabled = false;
  }
}

load();
</script>
