<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>comment bank — newpress</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --ink: #121118;
  --ink-2: #1a1923;
  --warm: #f4f2e6;
  --warm-soft: rgba(244, 242, 230, 0.78);
  --warm-dim: rgba(244, 242, 230, 0.42);
  --warm-faint: rgba(244, 242, 230, 0.18);
  --warm-ghost: rgba(244, 242, 230, 0.08);
  --line: rgba(244, 242, 230, 0.08);
  --accent: #ffbf00;
  --font-head: "Instrument Serif", Georgia, serif;
  --font-body: "Space Mono", "Courier New", monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--ink);
  color: var(--warm);
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; background: none; border: none; color: inherit; }
input, select { font: inherit; color: inherit; }

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(18, 17, 24, 0.96);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
}

.bar {
  display: flex; align-items: baseline; gap: 24px;
  padding: 28px 56px 14px;
  flex-wrap: wrap;
}
.logo {
  font-family: var(--font-head);
  font-size: 38px;
  font-style: italic;
  letter-spacing: -0.015em;
  line-height: 1;
  color: var(--warm);
}
.tag {
  font-family: var(--font-body);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--warm-faint);
  align-self: center;
}
.count {
  margin-left: auto;
  font-family: var(--font-head);
  font-style: italic;
  font-size: 18px;
  color: var(--warm-dim);
  letter-spacing: 0.01em;
  align-self: center;
}

.nav {
  display: flex; align-items: center;
  padding: 0 56px;
  border-bottom: 1px solid var(--line);
  gap: 0;
}
.nav-spacer { flex: 1; }
.tab {
  font-family: var(--font-body);
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--warm-faint);
  padding: 14px 18px 16px;
  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
  transition: color 0.2s, border-color 0.2s;
}
.tab:first-child { padding-left: 0; }
.tab:hover { color: var(--warm-soft); }
.tab.on { color: var(--warm); border-bottom-color: var(--warm); }

/* ── CONTROLS ── */
.controls-row {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 56px;
  border-bottom: 1px solid var(--line);
}
.search-wrap {
  flex: 1;
  position: relative;
}
.search-wrap input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  padding: 8px 0;
  font-family: var(--font-head);
  font-style: italic;
  font-size: 18px;
  letter-spacing: 0.01em;
  color: var(--warm);
}
.search-wrap input:focus { outline: none; border-bottom-color: var(--warm-soft); }
.search-wrap input::placeholder { color: var(--warm-faint); font-style: italic; }

.icon-btn {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--warm-dim);
  padding: 8px 12px;
  border: 1px solid var(--line);
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.icon-btn:hover { color: var(--warm); border-color: var(--warm-dim); }
.icon-btn.on { color: var(--ink); background: var(--accent); border-color: var(--accent); }
.icon-btn .ct { font-variant-numeric: tabular-nums; opacity: 0.55; margin-left: 8px; }
.icon-btn .arrow { margin-left: 6px; font-size: 9px; opacity: 0.6; }

select.sort {
  background: transparent;
  border: 1px solid var(--line);
  padding: 8px 24px 8px 12px;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--warm-dim);
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--warm-dim) 50%), linear-gradient(135deg, var(--warm-dim) 50%, transparent 50%);
  background-position: calc(100% - 14px) center, calc(100% - 9px) center;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
}

/* ── FILTER DRAWER ── */
.filter-drawer {
  display: none;
  padding: 22px 56px 26px;
  border-bottom: 1px solid var(--line);
  background: var(--ink-2);
}
.filter-drawer.open { display: block; }
.filter-group {
  display: flex; align-items: flex-start; gap: 14px;
  margin-bottom: 18px;
}
.filter-group:last-child { margin-bottom: 0; }
.filter-label {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--warm-faint);
  padding-top: 7px;
  min-width: 78px;
}
.chips {
  display: flex; gap: 6px; flex-wrap: wrap; flex: 1;
}
.chip {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 11px;
  border: 1px solid var(--line);
  color: var(--warm-dim);
  background: transparent;
  transition: all 0.15s;
}
.chip:hover { color: var(--warm); border-color: var(--warm-dim); }
.chip.on {
  background: var(--warm);
  color: var(--ink);
  border-color: var(--warm);
  font-weight: 700;
}
.chip .ct {
  margin-left: 6px; opacity: 0.5;
  font-variant-numeric: tabular-nums;
}

/* ── SELECTION TOOLBAR ── */
.sel-bar {
  display: none;
  padding: 12px 56px;
  background: var(--accent);
  color: var(--ink);
  align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 60;
}
.sel-bar.on { display: flex; }
.sel-bar .label {
  font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; font-weight: 700;
}
.sel-bar .label span { font-variant-numeric: tabular-nums; }
.sel-bar button {
  font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; font-weight: 700;
  padding: 7px 14px;
  border: 1px solid rgba(18,17,24,0.4);
}
.sel-bar button:hover { background: var(--ink); color: var(--accent); border-color: var(--ink); }
.sel-bar .spacer { flex: 1; }

/* ── GALLERY ── */
#gallery {
  padding: 32px 56px 120px;
  column-count: 4;
  column-gap: 28px;
}
@media (max-width: 1500px) { #gallery { column-count: 3; column-gap: 24px; } }
@media (max-width: 1000px) { #gallery { column-count: 2; padding: 22px 28px 100px; column-gap: 18px; } }
@media (max-width: 640px) { #gallery { column-count: 1; padding: 16px 18px 100px; } }

.card {
  break-inside: avoid;
  margin-bottom: 28px;
  position: relative;
  cursor: zoom-in;
  transition: opacity 0.15s, transform 0.15s;
}
.card img {
  display: block; width: 100%; height: auto;
  border: 1px solid var(--line);
  transition: border-color 0.15s;
}
.card:hover img { border-color: rgba(244,242,230,0.18); }
.card.selected img { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

.card .sentiment-tag {
  position: absolute;
  bottom: 10px; left: 10px;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  background: rgba(18,17,24,0.85);
  color: var(--warm);
  padding: 4px 8px;
  backdrop-filter: blur(6px);
  font-weight: 700;
  opacity: 0;
  transition: opacity 0.15s;
}
.card:hover .sentiment-tag,
.card.selected .sentiment-tag { opacity: 1; }
.card .sentiment-tag.praise { color: var(--accent); }

.card .card-actions {
  position: absolute;
  top: 10px; right: 10px;
  display: flex; gap: 6px;
  opacity: 0;
  transition: opacity 0.15s;
}
.card:hover .card-actions,
.card.selected .card-actions { opacity: 1; }
.card .card-actions button,
.card .card-actions a {
  background: rgba(18,17,24,0.85);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(244,242,230,0.2);
  color: var(--warm);
  padding: 5px 10px;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
}
.card .card-actions button:hover,
.card .card-actions a:hover { background: var(--accent); color: var(--ink); border-color: var(--accent); }
.card.selected .select-btn { background: var(--accent); color: var(--ink); border-color: var(--accent); }

/* ── BROWSE (vertical scroll feed) ── */
#browse {
  display: none;
  padding: 48px 56px 160px;
}
.browse-stream {
  max-width: 760px;
  margin: 0 auto;
  display: flex; flex-direction: column;
  gap: 64px;
}
.browse-month {
  font-family: var(--font-head);
  font-style: italic;
  font-size: 32px;
  color: var(--warm-dim);
  letter-spacing: -0.01em;
  margin: 32px 0 -28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}
.browse-month:first-child { margin-top: 0; }
.browse-item {
  display: flex; flex-direction: column;
  gap: 14px;
  position: relative;
}
.browse-item img {
  display: block;
  width: 100%;
  height: auto;
  border: 1px solid var(--line);
  cursor: zoom-in;
  transition: border-color 0.2s;
}
.browse-item:hover img { border-color: rgba(244,242,230,0.18); }
.browse-item-meta {
  display: flex; gap: 14px; align-items: center;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--warm-faint);
  font-variant-numeric: tabular-nums;
}
.browse-item-meta .num { color: var(--warm-dim); }
.browse-item-meta .sentiment { color: var(--accent); }
.browse-item-meta .sep { opacity: 0.5; }
.browse-item-meta .spacer { flex: 1; }
.browse-item-meta a, .browse-item-meta button {
  color: var(--warm-dim);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-size: 9px;
}
.browse-item-meta a:hover, .browse-item-meta button:hover { color: var(--warm); }
.scroll-top {
  position: fixed;
  bottom: 28px; right: 36px;
  background: var(--ink-2);
  border: 1px solid var(--line);
  color: var(--warm-dim);
  padding: 11px 18px;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 40;
}
.scroll-top.on { opacity: 1; }
.scroll-top:hover { color: var(--warm); border-color: var(--warm-dim); }

/* ── ASK ── */
#ask {
  display: none;
  padding: 56px 56px 120px;
}
.ask-frame {
  max-width: 920px;
  margin: 0 auto;
}
.ask-headline {
  font-family: var(--font-head);
  font-style: italic;
  font-size: 48px;
  line-height: 1.1;
  letter-spacing: -0.01em;
  color: var(--warm);
  margin-bottom: 14px;
}
.ask-sub {
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--warm-dim);
  margin-bottom: 36px;
  max-width: 540px;
}
.ask-input-wrap {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--warm-dim);
  margin-bottom: 14px;
}
.ask-input-wrap input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 14px 0;
  font-family: var(--font-head);
  font-style: italic;
  font-size: 24px;
  color: var(--warm);
}
.ask-input-wrap input:focus { outline: none; }
.ask-input-wrap input::placeholder { color: var(--warm-faint); font-style: italic; }
.ask-input-wrap button {
  background: transparent;
  color: var(--warm-dim);
  padding: 14px 4px 14px 22px;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.ask-input-wrap button:hover { color: var(--warm); }
.ask-input-wrap button:disabled { color: var(--warm-faint); cursor: not-allowed; }

.ask-examples {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 36px;
}
.ask-example {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 6px 12px;
  border: 1px solid var(--line);
  color: var(--warm-dim);
}
.ask-example:hover { color: var(--warm); border-color: var(--warm-dim); }

.ask-status {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--warm-faint);
  min-height: 14px;
  margin-bottom: 18px;
}
.ask-summary {
  font-family: var(--font-head);
  font-style: italic;
  font-size: 22px;
  line-height: 1.4;
  color: var(--warm);
  border-left: 1px solid var(--accent);
  padding: 4px 0 4px 22px;
  margin-bottom: 36px;
  max-width: 720px;
}
.ask-results {
  display: flex; flex-direction: column; gap: 24px;
}
.ask-result {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
@media (max-width: 760px) { .ask-result { grid-template-columns: 1fr; } }
.ask-result img {
  width: 100%; height: auto;
  border: 1px solid var(--line);
  cursor: zoom-in;
}
.ask-result .why {
  font-family: var(--font-head);
  font-style: italic;
  font-size: 18px;
  line-height: 1.45;
  color: var(--warm);
  margin-bottom: 14px;
}
.ask-result .mini {
  display: flex; gap: 14px; align-items: center;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--warm-faint);
}
.ask-result .mini .sent { color: var(--accent); }
.ask-result .mini a:hover { color: var(--warm); }
.ask-result .mini .spacer { flex: 1; }

/* ── MODAL ── */
.modal {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(12, 11, 16, 0.97);
  display: none; align-items: center; justify-content: center;
  padding: 56px;
}
.modal.open { display: flex; }
.modal-inner {
  display: flex; flex-direction: column; align-items: center; gap: 24px;
  max-width: 90vw;
}
.modal img {
  max-width: 100%; max-height: 80vh;
  object-fit: contain;
}
.modal-actions {
  display: flex; gap: 10px;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.modal-actions a {
  padding: 9px 18px;
  border: 1px solid var(--line);
  color: var(--warm-dim);
}
.modal-actions a:hover { color: var(--warm); border-color: var(--warm-dim); }
.modal-actions a.primary { background: var(--accent); color: var(--ink); border-color: var(--accent); font-weight: 700; }
.modal-actions a.primary:hover { color: var(--ink); }
.close-x {
  position: absolute; top: 28px; right: 36px;
  font-size: 36px; color: var(--warm-dim);
  font-family: var(--font-head);
  font-style: italic;
}
.close-x:hover { color: var(--warm); }

/* ── EMPTY ── */
.empty {
  font-family: var(--font-head);
  font-style: italic;
  font-size: 24px;
  color: var(--warm-faint);
  padding: 80px 20px;
  text-align: center;
}

@media (max-width: 700px) {
  .bar, .nav, .controls-row, .filter-drawer, .sel-bar, #ask { padding-left: 22px; padding-right: 22px; }
  .logo { font-size: 30px; }
  .ask-headline { font-size: 36px; }
}
</style>
</head>
<body>

<header>
  <div class="bar">
    <span class="logo">comment bank</span>
    <span class="tag">an archive of reception</span>
    <span class="count" id="totalCount">—</span>
  </div>
  <div class="nav">
    <div class="tab on" data-mode="gallery">gallery</div>
    <div class="tab" data-mode="browse">browse</div>
    <div class="tab" data-mode="ask">ask</div>
    <div class="nav-spacer"></div>
  </div>
  <div class="controls-row" id="galleryControls">
    <div class="search-wrap">
      <input type="search" id="search" placeholder="search…" />
    </div>
    <button class="icon-btn" id="filterToggle">filter <span class="ct" id="filterCount">0</span><span class="arrow">▾</span></button>
    <select class="sort" id="sort">
      <option value="newest">newest first</option>
      <option value="oldest">oldest first</option>
      <option value="sentiment">by sentiment</option>
    </select>
  </div>
  <div class="filter-drawer" id="filterDrawer">
    <div class="filter-group">
      <span class="filter-label">sentiment</span>
      <div class="chips" id="sentimentChips"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">themes</span>
      <div class="chips" id="themeChips"></div>
    </div>
  </div>
  <div class="sel-bar" id="selBar">
    <span class="label"><span id="selCount">0</span> selected</span>
    <span class="spacer"></span>
    <button id="downloadSelected">download zip</button>
    <button id="selectAll">select all visible</button>
    <button id="clearSelection">clear</button>
  </div>
</header>

<main id="gallery"></main>

<section id="browse">
  <div class="browse-stream" id="browseStream"></div>
</section>
<button class="scroll-top" id="scrollTop">↑ top</button>

<section id="ask">
  <div class="ask-frame">
    <h2 class="ask-headline">ask the audience.</h2>
    <p class="ask-sub">natural-language search across every comment. ask for sentiments, vibes, topics, episodes — whatever you're hunting.</p>
    <div class="ask-input-wrap">
      <input id="askInput" type="text" placeholder="what are people saying about…" />
      <button id="askGo">ask →</button>
    </div>
    <div class="ask-examples" id="askExamples"></div>
    <div class="ask-status" id="askStatus"></div>
    <div class="ask-summary" id="askSummary" style="display:none"></div>
    <div class="ask-results" id="askResults"></div>
  </div>
</section>

<div class="modal" id="modal">
  <button class="close-x" id="closeX">×</button>
  <div class="modal-inner">
    <img id="modalImg" alt="" />
    <div class="modal-actions">
      <a class="primary" id="modalDownload" download>↓ download original</a>
      <a id="modalSlack" target="_blank" rel="noopener">open in slack</a>
    </div>
  </div>
</div>

<script>
const SENTIMENTS = [
  "praise", "insightful", "funny", "critical",
  "personal_story", "question", "correction", "other"
];
const EXAMPLES = [
  "people who said they cried",
  "comments about cinematography",
  "questions about taiwan",
  "criticism of pacing",
  "moments people loved",
  "music compliments",
];

const BASE = location.pathname.replace(/\/index\.html$/, "").replace(/\/$/, "") || "";
const PREFIX = BASE.endsWith("/commentbank") ? BASE : "";
const ASK_ENDPOINT = PREFIX ? "/api/commentbank-ask" : "/api/ask";
function asset(rel) { return `${PREFIX}/${rel.replace(/^\//, "")}`; }

let comments = [];
let chrono = [];
let activeSents = new Set();
let activeThemes = new Set();
let selected = new Set();
let topThemes = [];
let browseIdx = 0;
let filterOpen = false;

const $ = sel => document.querySelector(sel);

async function load() {
  const res = await fetch(asset("comments.json"));
  if (!res.ok) {
    $("#gallery").innerHTML = '<div class="empty">no data yet — run analyze first</div>';
    return;
  }
  const arr = await res.json();
  comments = arr.filter(c => c.analysis && !c.analysis.skip);
  chrono = [...comments].sort((a, b) => parseFloat(a.slack_ts) - parseFloat(b.slack_ts));
  $("#totalCount").textContent = comments.length.toLocaleString() + " comments";
  computeTopThemes();
  renderChips();
  render();
  renderBrowse();
  renderExamples();
}

function computeTopThemes() {
  const counts = {};
  for (const c of comments) {
    for (const t of (c.analysis.themes || [])) counts[t] = (counts[t] || 0) + 1;
  }
  topThemes = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 18)
    .map(([t, n]) => ({ theme: t, count: n }));
}

function renderChips() {
  const sc = $("#sentimentChips"); sc.innerHTML = "";
  for (const s of SENTIMENTS) {
    const count = comments.filter(c => c.analysis.sentiment === s).length;
    if (!count) continue;
    const chip = document.createElement("button");
    chip.className = "chip" + (activeSents.has(s) ? " on" : "");
    chip.innerHTML = `${s.replace("_", " ")}<span class="ct">${count}</span>`;
    chip.onclick = () => {
      activeSents.has(s) ? activeSents.delete(s) : activeSents.add(s);
      renderChips(); render(); updateFilterCount();
    };
    sc.appendChild(chip);
  }
  const tc = $("#themeChips"); tc.innerHTML = "";
  for (const { theme, count } of topThemes) {
    const chip = document.createElement("button");
    chip.className = "chip" + (activeThemes.has(theme) ? " on" : "");
    chip.innerHTML = `${theme}<span class="ct">${count}</span>`;
    chip.onclick = () => {
      activeThemes.has(theme) ? activeThemes.delete(theme) : activeThemes.add(theme);
      renderChips(); render(); updateFilterCount();
    };
    tc.appendChild(chip);
  }
  updateFilterCount();
}

function updateFilterCount() {
  $("#filterCount").textContent = activeSents.size + activeThemes.size;
}

function filtered() {
  const q = $("#search").value.trim().toLowerCase();
  let out = comments.filter(c => {
    const a = c.analysis;
    if (activeSents.size && !activeSents.has(a.sentiment)) return false;
    if (activeThemes.size && !(a.themes || []).some(t => activeThemes.has(t))) return false;
    if (q) {
      const hay = [a.comment_text, a.commenter, a.video_hint, ...(a.themes || [])]
        .filter(Boolean).join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  const sort = $("#sort").value;
  if (sort === "newest") out.sort((a, b) => parseFloat(b.slack_ts) - parseFloat(a.slack_ts));
  else if (sort === "oldest") out.sort((a, b) => parseFloat(a.slack_ts) - parseFloat(b.slack_ts));
  else if (sort === "sentiment") out.sort((a, b) => SENTIMENTS.indexOf(a.analysis.sentiment) - SENTIMENTS.indexOf(b.analysis.sentiment));
  return out;
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}

function render() {
  const items = filtered();
  const grid = $("#gallery");
  grid.innerHTML = "";
  if (!items.length) {
    grid.innerHTML = '<div class="empty">no matches</div>';
    return;
  }
  for (const c of items) {
    const card = document.createElement("div");
    card.className = "card" + (selected.has(c.id) ? " selected" : "");
    card.dataset.id = c.id;
    const a = c.analysis;
    const sent = (a.sentiment || "").replace("_", " ");
    const sentClass = (a.sentiment === "praise") ? " praise" : "";

    card.innerHTML = `
      <img src="${asset(c.local_path)}" alt="" loading="lazy" />
      <div class="sentiment-tag${sentClass}">${sent}</div>
      <div class="card-actions">
        <button class="select-btn" data-role="select">${selected.has(c.id) ? "✓ selected" : "select"}</button>
        <button data-role="similar">more like this</button>
        <a href="${asset(c.local_path)}" download="${c.id}.${c.ext}" onclick="event.stopPropagation()">↓</a>
      </div>
    `;
    card.querySelector('[data-role="select"]').addEventListener("click", e => {
      e.stopPropagation(); toggleSelected(c.id);
    });
    card.querySelector('[data-role="similar"]').addEventListener("click", e => {
      e.stopPropagation(); findSimilar(c);
    });
    card.querySelector("img").addEventListener("click", () => openModal(c));
    grid.appendChild(card);
  }
}

function toggleSelected(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  $("#selCount").textContent = selected.size;
  $("#selBar").classList.toggle("on", selected.size > 0);
  render();
}

function openModal(c) {
  $("#modalImg").src = asset(c.local_path);
  $("#modalDownload").href = asset(c.local_path);
  $("#modalDownload").download = `${c.id}.${c.ext}`;
  const slack = $("#modalSlack");
  if (c.slack_permalink) { slack.href = c.slack_permalink; slack.style.display = "inline-block"; }
  else { slack.style.display = "none"; }
  $("#modal").classList.add("open");
}

$("#closeX").onclick = () => $("#modal").classList.remove("open");
$("#modal").onclick = e => { if (e.target.id === "modal") $("#modal").classList.remove("open"); };
document.addEventListener("keydown", e => { if (e.key === "Escape") $("#modal").classList.remove("open"); });

$("#search").addEventListener("input", render);
$("#sort").addEventListener("change", render);
$("#filterToggle").onclick = () => {
  filterOpen = !filterOpen;
  $("#filterDrawer").classList.toggle("open", filterOpen);
  $("#filterToggle").classList.toggle("on", filterOpen);
};
$("#selectAll").onclick = () => {
  for (const c of filtered()) selected.add(c.id);
  $("#selCount").textContent = selected.size;
  $("#selBar").classList.toggle("on", selected.size > 0);
  render();
};
$("#clearSelection").onclick = () => {
  selected.clear();
  $("#selCount").textContent = 0;
  $("#selBar").classList.remove("on");
  render();
};
$("#downloadSelected").onclick = async () => {
  if (!selected.size) return;
  const zip = new JSZip();
  const picks = comments.filter(c => selected.has(c.id));
  const btn = $("#downloadSelected");
  const orig = btn.textContent;
  let i = 0;
  for (const c of picks) {
    i++;
    btn.textContent = `zipping ${i}/${picks.length}`;
    const res = await fetch(asset(c.local_path));
    zip.file(`${c.id}.${c.ext}`, await res.arrayBuffer());
  }
  const blob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `comment-bank-${new Date().toISOString().slice(0,10)}.zip`; a.click();
  URL.revokeObjectURL(url);
  btn.textContent = orig;
};

/* ── MODES ── */
function setMode(name) {
  for (const tab of document.querySelectorAll(".tab")) tab.classList.toggle("on", tab.dataset.mode === name);
  $("#gallery").style.display = name === "gallery" ? "block" : "none";
  $("#galleryControls").style.display = name === "gallery" ? "flex" : "none";
  $("#filterDrawer").style.display = name === "gallery" && filterOpen ? "block" : "none";
  $("#browse").style.display = name === "browse" ? "block" : "none";
  $("#ask").style.display = name === "ask" ? "block" : "none";
  if (name === "browse") renderBrowse();
  window.scrollTo({ top: 0, behavior: "instant" });
}
for (const tab of document.querySelectorAll(".tab")) tab.onclick = () => setMode(tab.dataset.mode);

/* ── BROWSE — vertical scroll feed, chronological, grouped by month ── */
let browseRendered = false;
function renderBrowse() {
  if (browseRendered) return;
  const stream = $("#browseStream");
  stream.innerHTML = "";
  if (!chrono.length) { stream.innerHTML = '<div class="empty">no comments yet</div>'; return; }
  // newest first so scrolling down goes back in time
  const ordered = [...chrono].reverse();
  let lastMonth = "";
  ordered.forEach((c, i) => {
    const d = new Date(parseFloat(c.slack_ts) * 1000);
    const monthKey = d.toLocaleDateString("en-US", { year: "numeric", month: "long" });
    if (monthKey !== lastMonth) {
      lastMonth = monthKey;
      const h = document.createElement("div");
      h.className = "browse-month";
      h.textContent = monthKey.toLowerCase();
      stream.appendChild(h);
    }
    const dateStr = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    const a = c.analysis;
    const num = String(ordered.length - i).padStart(3, "0");
    const sent = (a.sentiment || "").replace("_", " ");
    const item = document.createElement("div");
    item.className = "browse-item";
    item.innerHTML = `
      <img src="${asset(c.local_path)}" alt="" loading="lazy" />
      <div class="browse-item-meta">
        <span class="num">№ ${num}</span>
        <span class="sep">·</span>
        <span class="sentiment">${sent}</span>
        <span class="sep">·</span>
        <span>${dateStr}</span>
        <span class="spacer"></span>
        <button data-role="similar">more like this</button>
        <a href="${asset(c.local_path)}" download="${c.id}.${c.ext}">↓ download</a>
      </div>
    `;
    item.querySelector("img").onclick = () => openModal(c);
    item.querySelector('[data-role="similar"]').onclick = () => findSimilar(c);
    stream.appendChild(item);
  });
  browseRendered = true;
}

$("#scrollTop").onclick = () => window.scrollTo({ top: 0, behavior: "smooth" });
window.addEventListener("scroll", () => {
  $("#scrollTop").classList.toggle("on", window.scrollY > 800);
});

/* ── MORE LIKE THIS ── */
function findSimilar(source) {
  const text = source.analysis.comment_text || "(no text)";
  const snippet = text.length > 80 ? text.slice(0, 80) + "…" : text;
  setMode("ask");
  $("#askInput").value = `more like: "${snippet}"`;
  const question = `Find comments in the corpus that are most similar in tone, sentiment, and subject matter to this source comment.

SOURCE:
text: "${text}"
sentiment: ${source.analysis.sentiment}
themes: ${(source.analysis.themes || []).join(", ")}

Return up to 12 of the closest matches (do not include the source itself, id ${source.id}). For each, "why" should explain in one short sentence what makes it similar to the source.`;
  runAskWithQuery(question, `comments similar to "${snippet}"`);
}

/* ── ASK ── */
function renderExamples() {
  const el = $("#askExamples"); el.innerHTML = "";
  for (const ex of EXAMPLES) {
    const b = document.createElement("button");
    b.className = "ask-example"; b.textContent = ex;
    b.onclick = () => { $("#askInput").value = ex; runAsk(); };
    el.appendChild(b);
  }
}
$("#askGo").onclick = () => runAsk();
$("#askInput").addEventListener("keydown", e => { if (e.key === "Enter") runAsk(); });
async function runAsk() {
  const q = $("#askInput").value.trim();
  if (!q) return;
  await runAskWithQuery(q, q);
}
async function runAskWithQuery(question, displayLabel) {
  const status = $("#askStatus");
  const summary = $("#askSummary");
  const results = $("#askResults");
  status.textContent = "asking…";
  summary.style.display = "none"; summary.textContent = "";
  results.innerHTML = "";
  $("#askGo").disabled = true;
  try {
    const payload = {
      question: question,
      comments: comments.map(c => ({
        id: c.id, text: c.analysis.comment_text, commenter: c.analysis.commenter,
        sentiment: c.analysis.sentiment, themes: c.analysis.themes, video_hint: c.analysis.video_hint,
      })),
    };
    const res = await fetch(ASK_ENDPOINT, {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`server ${res.status}`);
    const data = await res.json();
    if (data.summary) { summary.textContent = data.summary; summary.style.display = "block"; }
    const matches = (data.matches || []).map(m => {
      const c = comments.find(x => x.id === m.id);
      return c ? { c, why: m.why } : null;
    }).filter(Boolean);
    status.textContent = matches.length ? `${matches.length} match${matches.length === 1 ? "" : "es"}` : "no matches";
    for (const { c, why } of matches) {
      const a = c.analysis;
      const card = document.createElement("div");
      card.className = "ask-result";
      card.innerHTML = `
        <img src="${asset(c.local_path)}" alt="" loading="lazy" />
        <div>
          <div class="why">"${escapeHtml(why || "")}"</div>
          <div class="mini">
            <span class="sent">${(a.sentiment || "").replace("_", " ")}</span>
            ${(a.themes || []).slice(0, 3).map(t => `<span>· ${escapeHtml(t)}</span>`).join("")}
            <span class="spacer"></span>
            <a href="${asset(c.local_path)}" download="${c.id}.${c.ext}">↓ download</a>
          </div>
        </div>
      `;
      card.querySelector("img").onclick = () => openModal(c);
      results.appendChild(card);
    }
  } catch (err) {
    status.textContent = `error: ${err.message}`;
  } finally {
    $("#askGo").disabled = false;
  }
}

load();
</script>
