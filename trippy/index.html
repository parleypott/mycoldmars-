<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>trippy — my cold mars</title>
  <meta name="theme-color" content="#000000">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000; color: #fff;
      overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      -webkit-font-smoothing: antialiased;
    }

    /* Two stacked canvases — show one at a time based on mode */
    canvas { position: fixed; inset: 0; display: block; width: 100% !important; height: 100% !important; }
    #milkdrop { z-index: 1; }
    #three    { z-index: 2; }
    body[data-mode="0"] #three     { display: none; }
    body[data-mode="1"] #milkdrop  { display: none; }
    body[data-mode="2"] #milkdrop  { display: none; }
    body[data-mode="3"] #milkdrop  { display: none; }
    body[data-mode="4"] #milkdrop  { display: none; }

    /* Ring shockwaves on every beat (DOM, overlay-blended on top of any canvas) */
    #rings {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }
    .ring {
      position: absolute;
      left: 50%; top: 50%;
      width: 40px; height: 40px;
      border: 5px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 1;
      box-shadow: 0 0 24px currentColor, inset 0 0 24px currentColor;
      will-change: width, height, opacity;
    }
    .ring.go {
      width: 220vmax; height: 220vmax;
      opacity: 0;
      transition:
        width 620ms cubic-bezier(0.16, 1, 0.3, 1),
        height 620ms cubic-bezier(0.16, 1, 0.3, 1),
        opacity 620ms cubic-bezier(0.4, 0, 0.6, 1);
    }

    /* Beat-strobe full-screen flash */
    #flash {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 4;
      background: white;
      opacity: 0;
      transition: opacity 220ms ease-out;
    }
    #flash.hit { opacity: 0.28; transition: opacity 0ms; }

    /* Big BEAT calibration text — flashes on every detected beat */
    #beat-text {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 8;
      font-size: clamp(48px, 11vw, 140px);
      font-weight: 900;
      letter-spacing: -0.06em;
      color: #fff;
      text-shadow: 0 0 40px #fff, 0 0 80px #fff;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 240ms ease-out, transform 240ms ease-out;
      mix-blend-mode: difference;
    }
    #beat-text.hit {
      opacity: 1;
      transform: scale(1.0);
      transition: opacity 0ms, transform 0ms;
    }

    /* Splash / source picker */
    #splash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 28px;
      background: radial-gradient(ellipse at center, #0a0014 0%, #000 70%);
      z-index: 30;
      transition: opacity 600ms ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash h1 {
      font-size: clamp(48px, 12vw, 140px);
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, #ff00aa, #00eaff, #aaff00, #ff00aa);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: hue 6s linear infinite;
      text-transform: lowercase;
    }
    #splash p {
      opacity: 0.55; font-size: 13px; letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    #sources { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; max-width: 720px; padding: 0 20px; }
    .src {
      appearance: none; border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.03);
      color: #fff; padding: 16px 24px;
      font: inherit; font-size: 14px; letter-spacing: 0.04em;
      cursor: pointer; border-radius: 2px;
      transition: all 200ms ease;
      backdrop-filter: blur(10px);
    }
    .src:hover { background: rgba(255,255,255,0.1); border-color: #fff; transform: translateY(-2px); }
    .src small { display: block; opacity: 0.5; font-size: 11px; margin-top: 4px; letter-spacing: 0; text-transform: none; }

    /* HUD */
    #hud {
      position: fixed; top: 16px; left: 16px;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      opacity: 0.85;
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: difference;
      line-height: 1.7;
    }
    #hud b { font-weight: 700; opacity: 1; }
    .meter {
      display: inline-block;
      width: 70px; height: 6px;
      background: rgba(255,255,255,0.1);
      vertical-align: middle;
      margin-left: 6px;
      position: relative;
      overflow: hidden;
    }
    .meter > i {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: #fff;
      width: 0%;
      transition: width 30ms linear;
    }
    .beat-dot {
      display: inline-block;
      width: 18px; height: 18px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
      vertical-align: middle;
      margin-left: 8px;
      transition: all 200ms ease-out;
    }
    .beat-dot.hit {
      background: #fff;
      box-shadow: 0 0 22px #fff, 0 0 44px #fff;
      transform: scale(1.9);
      transition: all 0ms;
    }

    #help {
      position: fixed; bottom: 16px; left: 16px;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      opacity: 0.45;
      z-index: 10;
      mix-blend-mode: difference;
      line-height: 1.8;
      pointer-events: none;
    }
    #preset-name {
      position: fixed; bottom: 16px; right: 16px;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      opacity: 0.45;
      z-index: 10;
      mix-blend-mode: difference;
      max-width: 50vw;
      text-align: right;
      pointer-events: none;
    }

    body.ui-hidden #hud,
    body.ui-hidden #help,
    body.ui-hidden #preset-name { opacity: 0; }

    @keyframes hue {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    #file-input { display: none; }

    .err {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(255,0,80,0.92); padding: 10px 18px; border-radius: 2px;
      font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
      z-index: 40;
    }
  </style>
</head>
<body data-mode="0">
  <canvas id="milkdrop"></canvas>
  <canvas id="three"></canvas>

  <div id="rings"></div>
  <div id="flash"></div>
  <div id="beat-text">BEAT</div>

  <div id="splash">
    <h1>trippy</h1>
    <p>choose an audio source</p>
    <div id="sources">
      <button class="src" data-src="mic">microphone<small>any sound in the room</small></button>
      <button class="src" data-src="tab">tab / system audio<small>chrome: share a tab with audio</small></button>
      <button class="src" data-src="file">audio file<small>mp3 / wav / flac</small></button>
      <button class="src" data-src="demo">demo tone<small>just look at it</small></button>
    </div>
    <input id="file-input" type="file" accept="audio/*">
  </div>

  <div id="hud">
    <div>mode <b id="mode-label">milkdrop</b></div>
    <div>beat<span class="beat-dot" id="beat-dot"></span></div>
    <div>bpm  <b id="bpm-label">—</b></div>
    <div>bass<span class="meter"><i id="m-bass"></i></span></div>
    <div>mid <span class="meter"><i id="m-mid"></i></span></div>
    <div>high<span class="meter"><i id="m-high"></i></span></div>
  </div>

  <div id="preset-name"></div>

  <div id="help">
    [1–5] mode &nbsp; [n] next preset &nbsp; [space] beat &nbsp; [h] hide ui &nbsp; [f] full &nbsp; [s] new source
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
