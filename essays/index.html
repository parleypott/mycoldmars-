<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Essays · Johnny Harris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f2ede4;
      --ink: #1a1714;
      --rule: rgba(26,23,20,0.12);
      --amber: #c8760a;
      --amber-bg: #f5e6c8;
      --mono: 'Space Mono', monospace;
      --serif: 'DM Serif Display', serif;
      --sans: 'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      min-height: 100%;
      transition: background 1.8s ease;
    }

    body.playing { background: var(--amber-bg); }

    /* Grain */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.032'/%3E%3C/svg%3E");
    }

    /* ── Layout ── */
    .page {
      display: grid;
      grid-template-columns: 48px 1fr;
      min-height: 100vh;
    }

    /* Vertical spine */
    .spine {
      border-right: 1px solid var(--rule);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 32px;
      position: relative;
    }
    .spine-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(26,23,20,0.25);
      user-select: none;
    }

    /* Main content */
    .content {
      display: flex;
      flex-direction: column;
    }

    /* ── Masthead ── */
    .masthead {
      padding: 36px 28px 28px;
      border-bottom: 2px solid var(--ink);
    }
    .masthead-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .masthead-name {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(26,23,20,0.45);
    }
    .masthead-tagline {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: rgba(26,23,20,0.3);
    }
    .masthead-title {
      font-family: var(--serif);
      font-size: clamp(52px, 14vw, 96px);
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    /* Thin rule */
    .rule { border: none; border-top: 1px solid var(--rule); }

    /* ── Essay list ── */
    #library { flex: 1; }

    .essay-row {
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }
    .essay-row:hover { background: rgba(26,23,20,0.03); }
    .essay-row.active {
      background: var(--ink);
      color: var(--paper);
    }
    .essay-row.active .row-number,
    .essay-row.active .row-duration,
    .essay-row.active .row-date,
    .essay-row.active .row-desc { color: rgba(242,237,228,0.5); }
    .essay-row.active .row-title { color: var(--paper); }

    .row-inner {
      padding: 20px 28px 18px;
    }

    .row-top {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 5px;
    }
    .row-number {
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(26,23,20,0.3);
      letter-spacing: 0.08em;
      flex-shrink: 0;
      min-width: 22px;
    }
    .row-title {
      font-family: var(--serif);
      font-size: clamp(22px, 6vw, 36px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.01em;
      flex: 1;
    }
    .row-title em { font-style: italic; }
    .row-play-indicator {
      flex-shrink: 0;
      display: flex; gap: 2px; align-items: flex-end;
      height: 18px;
    }
    .bar {
      width: 2px;
      background: var(--paper);
      border-radius: 1px;
      transform-origin: bottom;
    }
    .essay-row:not(.active) .bar { background: var(--amber); opacity: 0; }
    .essay-row.active .bar { opacity: 1; }
    @keyframes eq1 { 0%,100%{height:4px} 50%{height:16px} }
    @keyframes eq2 { 0%,100%{height:12px} 33%{height:5px} 66%{height:18px} }
    @keyframes eq3 { 0%,100%{height:8px} 25%{height:16px} 75%{height:3px} }
    @keyframes eq4 { 0%,100%{height:14px} 40%{height:4px} 80%{height:18px} }
    @keyframes eq5 { 0%,100%{height:6px} 50%{height:14px} }
    .bar-1 { animation: eq1 0.9s ease-in-out infinite; height: 4px; }
    .bar-2 { animation: eq2 1.1s ease-in-out infinite; height: 12px; }
    .bar-3 { animation: eq3 0.85s ease-in-out infinite; height: 8px; }
    .bar-4 { animation: eq4 1.3s ease-in-out infinite; height: 14px; }
    .bar-5 { animation: eq5 0.95s ease-in-out infinite; height: 6px; }
    .essay-row:not(.active) .bar-1,
    .essay-row:not(.active) .bar-2,
    .essay-row:not(.active) .bar-3,
    .essay-row:not(.active) .bar-4,
    .essay-row:not(.active) .bar-5 { animation: none; height: 3px; opacity: 0; }

    .row-meta {
      display: flex;
      align-items: center;
      gap: 18px;
      padding-left: 38px;
      margin-bottom: 4px;
    }
    .row-date, .row-duration {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: rgba(26,23,20,0.35);
    }
    .row-desc {
      font-family: var(--sans);
      font-size: 12px;
      color: rgba(26,23,20,0.45);
      font-weight: 300;
      line-height: 1.5;
      padding-left: 38px;
    }

    /* Progress bar — thin rule style */
    .row-progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: var(--amber);
      transition: width 0.3s linear;
      width: 0%;
    }
    .essay-row.active .row-progress { background: rgba(242,237,228,0.4); }

    /* Resume tag */
    .resume-tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--amber);
      color: var(--amber);
      padding: 1px 6px;
      border-radius: 2px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .essay-row.active .resume-tag {
      border-color: rgba(242,237,228,0.4);
      color: rgba(242,237,228,0.5);
    }

    /* ── Sticky player ── */
    #player {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--ink);
      color: var(--paper);
      padding: 14px 20px 14px 68px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      display: none;
      z-index: 100;
      border-top: 1px solid rgba(242,237,228,0.08);
    }
    #player.visible { display: block; }

    /* Scrub — thin rule */
    .scrub-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .t { font-family: var(--mono); font-size: 10px; color: rgba(242,237,228,0.4); min-width: 34px; font-variant-numeric: tabular-nums; }
    .t.r { text-align: right; }
    .scrub-track {
      flex: 1; height: 1px;
      background: rgba(242,237,228,0.15);
      position: relative; cursor: pointer;
    }
    .scrub-track:hover { height: 2px; }
    .scrub-fill { height: 100%; background: var(--paper); pointer-events: none; }
    .scrub-head {
      position: absolute; top: 50%; right: 0;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--paper); transform: translate(50%,-50%);
      opacity: 0; pointer-events: none; transition: opacity 0.15s;
    }
    .scrub-track:hover .scrub-head { opacity: 1; }

    /* Controls */
    .ctrl-row {
      display: flex; align-items: center; gap: 6px;
    }
    .cb {
      background: none; border: none; color: rgba(242,237,228,0.5);
      cursor: pointer; padding: 6px; border-radius: 4px;
      transition: color 0.15s; font-family: var(--mono); font-size: 10px;
      letter-spacing: 0.06em;
    }
    .cb:hover { color: var(--paper); }
    .cb svg { display: block; fill: currentColor; }

    .play-main {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid rgba(242,237,228,0.3);
      background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .play-main:hover { border-color: var(--paper); background: rgba(242,237,228,0.08); }
    .play-main svg { fill: var(--paper); }

    .spacer { flex: 1; }
    .spd {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
      color: rgba(242,237,228,0.4); background: none;
      border: 1px solid rgba(242,237,228,0.12);
      border-radius: 3px; padding: 3px 7px; cursor: pointer;
      transition: all 0.15s;
    }
    .spd:hover { color: var(--paper); border-color: rgba(242,237,228,0.3); }
    .spd.on { color: var(--paper); border-color: rgba(242,237,228,0.4); }

    .close-player {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(242,237,228,0.25);
      background: none; border: none; cursor: pointer;
      padding: 6px; transition: color 0.15s;
    }
    .close-player:hover { color: rgba(242,237,228,0.7); }

    /* Empty state */
    .empty {
      padding: 60px 28px;
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(26,23,20,0.2);
    }

    audio { display: none; }
  </style>
</head>
<body>

<div class="page">
  <div class="spine">
    <span class="spine-text">Johnny Harris · Essays · Audio</span>
  </div>
  <div class="content">

    <div class="masthead">
      <div class="masthead-top">
        <span class="masthead-name">Johnny Harris</span>
        <span class="masthead-tagline">Put your phone down and listen.</span>
      </div>
      <h1 class="masthead-title">Essays</h1>
    </div>

    <div id="library"></div>

  </div>
</div>

<div id="player">
  <div class="scrub-row">
    <span class="t" id="tc">0:00</span>
    <div class="scrub-track" id="st">
      <div class="scrub-fill" id="sf" style="width:0%"></div>
      <div class="scrub-head" id="sh"></div>
    </div>
    <span class="t r" id="tt">0:00</span>
  </div>
  <div class="ctrl-row">
    <button class="spd" id="spd">1×</button>
    <button class="cb" id="b15" title="−15s">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
    </button>
    <button class="play-main" id="bplay">
      <svg id="iplay" width="18" height="18" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="ipause" width="18" height="18" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <button class="cb" id="bf30" title="+30s">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z"/></svg>
    </button>
    <div class="spacer"></div>
    <button class="close-player" id="bclose">close</button>
  </div>
</div>

<audio id="audio"></audio>

<script>
const ESSAYS = [
  {
    id: 'night-market',
    title: 'Night Market',
    date: '2026-03-12',
    description: '',
    duration: '26:42',
    src: '/essays/audio/night-market.mp3',
  },
];

const audio = document.getElementById('audio');
let current = null, scrubbing = false;
const SPEEDS = [0.75, 1, 1.25, 1.5, 2];
let si = 1;

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
function save(id, t) { localStorage.setItem('ep_'+id, t); }
function load(id) { return parseFloat(localStorage.getItem('ep_'+id))||0; }
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function render() {
  const lib = document.getElementById('library');
  if (!ESSAYS.length) { lib.innerHTML = `<p class="empty">No essays yet</p>`; return; }
  lib.innerHTML = ESSAYS.map((e,i) => {
    const prog = load(e.id);
    const hasResume = prog > 10;
    return `<div class="essay-row" id="row-${e.id}" onclick="pick('${e.id}')">
      <div class="row-progress" id="rp-${e.id}" style="width:0%"></div>
      <div class="row-inner">
        <div class="row-top">
          <span class="row-number">0${i+1}</span>
          <span class="row-title">${e.title}${hasResume ? `<span class="resume-tag">${fmt(prog)}</span>` : ''}</span>
          <div class="row-play-indicator">
            <div class="bar bar-1"></div>
            <div class="bar bar-2"></div>
            <div class="bar bar-3"></div>
            <div class="bar bar-4"></div>
            <div class="bar bar-5"></div>
          </div>
        </div>
        <div class="row-meta">
          ${e.date ? `<span class="row-date">${fmtDate(e.date)}</span>` : ''}
          ${e.duration ? `<span class="row-duration">${e.duration}</span>` : ''}
        </div>
        ${e.description ? `<p class="row-desc">${e.description}</p>` : ''}
      </div>
    </div>`;
  }).join('');
}

function pick(id) {
  const essay = ESSAYS.find(e=>e.id===id);
  if (!essay) return;
  if (current===id) { toggle(); return; }
  if (current) deactivate(current);
  current = id;
  audio.src = essay.src;
  audio.load();
  const saved = load(id);
  if (saved > 10) audio.currentTime = saved;
  audio.play();
  document.getElementById(`row-${id}`)?.classList.add('active');
  document.getElementById('player').classList.add('visible');
  document.body.classList.add('playing');
  setMS(essay);
}

function deactivate(id) {
  document.getElementById(`row-${id}`)?.classList.remove('active');
}

function toggle() {
  audio.paused ? audio.play() : audio.pause();
}

function updateIcons(playing) {
  document.getElementById('iplay').style.display = playing?'none':'';
  document.getElementById('ipause').style.display = playing?'':'none';
}

audio.addEventListener('play', ()=>updateIcons(true));
audio.addEventListener('pause', ()=>updateIcons(false));
audio.addEventListener('ended', ()=>{ updateIcons(false); if(current)save(current,0); });

audio.addEventListener('timeupdate', ()=>{
  if (scrubbing||!current) return;
  const pct = audio.duration ? (audio.currentTime/audio.duration)*100 : 0;
  document.getElementById('sf').style.width = pct+'%';
  document.getElementById('tc').textContent = fmt(audio.currentTime);
  document.getElementById('tt').textContent = fmt(audio.duration);
  const rp = document.getElementById(`rp-${current}`);
  if (rp) rp.style.width = pct+'%';
  if (Math.floor(audio.currentTime)%5===0) save(current, audio.currentTime);
});

audio.addEventListener('loadedmetadata', ()=>{
  document.getElementById('tt').textContent = fmt(audio.duration);
});

// Scrub
const st = document.getElementById('st');
function scrubTo(e) {
  const r = st.getBoundingClientRect();
  const x = (e.touches?e.touches[0].clientX:e.clientX) - r.left;
  const pct = Math.max(0,Math.min(1,x/r.width));
  audio.currentTime = pct * (audio.duration||0);
  document.getElementById('sf').style.width = (pct*100)+'%';
}
st.addEventListener('mousedown', e=>{scrubbing=true;scrubTo(e);});
st.addEventListener('touchstart', e=>{scrubbing=true;scrubTo(e);},{passive:true});
document.addEventListener('mousemove', e=>{if(scrubbing)scrubTo(e);});
document.addEventListener('touchmove', e=>{if(scrubbing)scrubTo(e);},{passive:true});
document.addEventListener('mouseup', ()=>scrubbing=false);
document.addEventListener('touchend', ()=>scrubbing=false);

document.getElementById('bplay').addEventListener('click', toggle);
document.getElementById('b15').addEventListener('click', ()=>{ audio.currentTime=Math.max(0,audio.currentTime-15); });
document.getElementById('bf30').addEventListener('click', ()=>{ audio.currentTime=Math.min(audio.duration||0,audio.currentTime+30); });
document.getElementById('bclose').addEventListener('click', ()=>{
  audio.pause();
  if(current){ save(current,audio.currentTime); deactivate(current); current=null; }
  document.getElementById('player').classList.remove('visible');
  document.body.classList.remove('playing');
});

document.getElementById('spd').addEventListener('click', ()=>{
  si=(si+1)%SPEEDS.length;
  const s=SPEEDS[si];
  audio.playbackRate=s;
  const btn=document.getElementById('spd');
  btn.textContent=(s===1?'1×':s+'×');
  btn.classList.toggle('on',s!==1);
});

function setMS(essay) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({ title:essay.title, artist:'Johnny Harris', album:'Essays' });
  navigator.mediaSession.setActionHandler('play', ()=>audio.play());
  navigator.mediaSession.setActionHandler('pause', ()=>audio.pause());
  navigator.mediaSession.setActionHandler('seekbackward', ()=>{ audio.currentTime=Math.max(0,audio.currentTime-15); });
  navigator.mediaSession.setActionHandler('seekforward', ()=>{ audio.currentTime=Math.min(audio.duration,audio.currentTime+30); });
  navigator.mediaSession.setActionHandler('seekto', d=>{ if(d.seekTime!=null)audio.currentTime=d.seekTime; });
}

render();
</script>
</body>
</html>
