<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Essays · My Cold Mars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0d0b;
      --surface: #161410;
      --border: rgba(255,255,255,0.07);
      --text: #e8e0d0;
      --muted: rgba(232,224,208,0.4);
      --accent: #e8941a;
      --accent-dim: rgba(232,148,26,0.15);
      --radius: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100%; }

    /* ── Header ── */
    header {
      padding: 52px 20px 28px;
      max-width: 680px; margin: 0 auto;
    }
    .eyebrow {
      font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(232,148,26,0.6); margin-bottom: 10px;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(32px, 7vw, 52px);
      font-weight: 400; line-height: 1.05;
      color: var(--text);
      margin-bottom: 10px;
    }
    header p {
      font-size: 14px; color: var(--muted); font-weight: 300; line-height: 1.6;
    }
    .divider {
      max-width: 680px; margin: 0 auto 28px;
      border: none; border-top: 1px solid var(--border);
    }

    /* ── Library ── */
    #library {
      max-width: 680px; margin: 0 auto;
      padding: 0 20px 200px;
      display: flex; flex-direction: column; gap: 2px;
    }

    .essay-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .essay-card:hover { border-color: rgba(232,148,26,0.3); background: #1a1814; }
    .essay-card.active {
      border-color: rgba(232,148,26,0.5);
      background: #1c1a14;
    }

    .card-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; margin-bottom: 6px;
    }
    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 400; line-height: 1.2;
      color: var(--text);
    }
    .card-play {
      flex-shrink: 0;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid rgba(232,148,26,0.3);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .essay-card:hover .card-play,
    .essay-card.active .card-play {
      background: var(--accent);
      border-color: var(--accent);
    }
    .card-play svg { fill: var(--accent); transition: fill 0.2s; }
    .essay-card:hover .card-play svg,
    .essay-card.active .card-play svg { fill: #000; }
    .essay-card.active .card-play svg.icon-play { display: none; }
    .essay-card.active .card-play svg.icon-pause { display: block !important; }

    .card-meta {
      display: flex; gap: 14px; align-items: center;
    }
    .card-date { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
    .card-duration { font-size: 11px; color: var(--muted); }
    .card-desc {
      font-size: 13px; color: var(--muted); line-height: 1.5;
      margin-top: 6px; font-weight: 300;
    }

    /* Progress bar on card */
    .card-progress-wrap {
      margin-top: 12px;
      height: 2px; background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
    }
    .card-progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 0.5s;
    }
    .card-progress-label {
      font-size: 10px; color: rgba(232,148,26,0.6);
      margin-top: 5px; letter-spacing: 0.06em;
    }

    /* ── Sticky Player ── */
    #player {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(18,16,12,0.97);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-top: 1px solid rgba(232,148,26,0.2);
      padding: 14px 20px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      z-index: 100;
      display: none;
    }
    #player.visible { display: block; }

    .player-title {
      font-family: 'DM Serif Display', serif;
      font-size: 14px; color: var(--text);
      margin-bottom: 10px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Scrub bar */
    .scrub-wrap {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .time-label { font-size: 11px; color: var(--muted); min-width: 36px; font-variant-numeric: tabular-nums; }
    .time-label.right { text-align: right; }
    .scrub-track {
      flex: 1; height: 3px; background: rgba(255,255,255,0.12);
      border-radius: 3px; position: relative; cursor: pointer;
    }
    .scrub-fill {
      height: 100%; background: var(--accent);
      border-radius: 3px; pointer-events: none;
      transition: width 0.1s linear;
    }
    .scrub-thumb {
      position: absolute; top: 50%; right: 0;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent);
      transform: translate(50%, -50%);
      pointer-events: none;
      opacity: 0; transition: opacity 0.15s;
    }
    .scrub-track:hover .scrub-thumb,
    .scrub-track:active .scrub-thumb { opacity: 1; }

    /* Controls row */
    .controls {
      display: flex; align-items: center; justify-content: space-between;
    }
    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 6px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; transition: color 0.15s, background 0.15s;
    }
    .ctrl-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .ctrl-btn:active { background: rgba(255,255,255,0.1); }

    .ctrl-play-main {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--accent);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, opacity 0.15s;
    }
    .ctrl-play-main:active { transform: scale(0.93); }
    .ctrl-play-main svg { fill: #000; }

    .speed-btn {
      font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
      color: var(--muted); background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 5px; padding: 4px 8px;
      cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .speed-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .speed-btn.active-speed { color: var(--accent); border-color: rgba(232,148,26,0.4); }

    .hidden-audio { display: none; }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Johnny Harris</p>
  <h1>Essays</h1>
  <p>Long-form audio essays. Put your phone down and listen.</p>
</header>
<hr class="divider">

<div id="library"></div>

<!-- Sticky Player -->
<div id="player">
  <p class="player-title" id="player-title">—</p>
  <div class="scrub-wrap">
    <span class="time-label" id="time-current">0:00</span>
    <div class="scrub-track" id="scrub-track">
      <div class="scrub-fill" id="scrub-fill" style="width:0%"></div>
      <div class="scrub-thumb" id="scrub-thumb"></div>
    </div>
    <span class="time-label right" id="time-total">0:00</span>
  </div>
  <div class="controls">
    <button class="speed-btn" id="speed-btn" title="Playback speed">1×</button>
    <button class="ctrl-btn" id="btn-back15" title="Back 15s">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="8.5" y="14.5" font-size="5.5" font-family="sans-serif" font-weight="700" fill="currentColor">15</text></svg>
    </button>
    <button class="ctrl-play-main" id="btn-play-main" title="Play/Pause">
      <svg id="icon-play-main" width="22" height="22" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause-main" width="22" height="22" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <button class="ctrl-btn" id="btn-fwd30" title="Forward 30s">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v3l4-4-4-4v3c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z"/><text x="8.5" y="14.5" font-size="5.5" font-family="sans-serif" font-weight="700" fill="currentColor">30</text></svg>
    </button>
    <button class="ctrl-btn" id="btn-close" title="Close player" style="opacity:0.5">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
    </button>
  </div>
</div>

<audio id="audio" class="hidden-audio" preload="metadata"></audio>

<script>
// ── Essay data — add new essays here ──
const ESSAYS = [
  {
    id: 'night-market',
    title: 'Night Market',
    date: '2026-03-12',
    description: '',
    duration: '26:42',
    src: '/essays/audio/night-market.mp3',
  },
];

// ── State ──
const audio = document.getElementById('audio');
let currentId = null;
let isScrubbing = false;
const SPEEDS = [0.75, 1, 1.25, 1.5, 2];
let speedIdx = 1;

// ── Helpers ──
function fmtTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
function saveProgress(id, time) {
  localStorage.setItem(`essay_prog_${id}`, time);
}
function loadProgress(id) {
  return parseFloat(localStorage.getItem(`essay_prog_${id}`)) || 0;
}
function getEssay(id) { return ESSAYS.find(e => e.id === id); }

// ── Render library ──
function renderLibrary() {
  const lib = document.getElementById('library');
  if (!ESSAYS.length) {
    lib.innerHTML = `<div style="padding:40px 20px;text-align:center;color:rgba(232,224,208,0.25);font-size:13px;letter-spacing:0.1em;text-transform:uppercase">No essays yet</div>`;
    return;
  }
  lib.innerHTML = ESSAYS.map(e => {
    const prog = loadProgress(e.id);
    const pct = e.duration ? 0 : 0; // will update after metadata loads
    return `
    <div class="essay-card" id="card-${e.id}" onclick="selectEssay('${e.id}')">
      <div class="card-top">
        <div>
          <p class="card-title">${e.title}</p>
          <div class="card-meta" style="margin-top:4px">
            <span class="card-date">${formatDate(e.date)}</span>
            ${e.duration ? `<span class="card-duration">${e.duration}</span>` : ''}
          </div>
          ${e.description ? `<p class="card-desc">${e.description}</p>` : ''}
        </div>
        <div class="card-play" id="card-play-${e.id}">
          <svg class="icon-play" width="14" height="14" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" width="14" height="14" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </div>
      </div>
      ${prog > 5 ? `
        <div class="card-progress-wrap" id="prog-wrap-${e.id}">
          <div class="card-progress-fill" id="prog-fill-${e.id}" style="width:0%"></div>
        </div>
        <p class="card-progress-label">Resume from ${fmtTime(prog)}</p>
      ` : ''}
    </div>`;
  }).join('');
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── Select / play essay ──
function selectEssay(id) {
  const essay = getEssay(id);
  if (!essay) return;

  if (currentId === id) {
    togglePlay(); return;
  }

  // Deactivate old card
  if (currentId) {
    document.getElementById(`card-${currentId}`)?.classList.remove('active');
    const oldPlay = document.getElementById(`card-play-${currentId}`);
    if (oldPlay) { oldPlay.querySelector('.icon-play').style.display=''; oldPlay.querySelector('.icon-pause').style.display='none'; }
  }

  currentId = id;
  audio.src = essay.src;
  audio.load();

  const saved = loadProgress(id);
  if (saved > 5) audio.currentTime = saved;

  audio.play();

  // UI
  document.getElementById('player-title').textContent = essay.title;
  document.getElementById('player').classList.add('visible');
  document.getElementById(`card-${id}`)?.classList.add('active');
  updatePlayIcons(true);
  setMediaSession(essay);
}

function togglePlay() {
  if (audio.paused) { audio.play(); }
  else { audio.pause(); }
}

function updatePlayIcons(playing) {
  document.getElementById('icon-play-main').style.display = playing ? 'none' : '';
  document.getElementById('icon-pause-main').style.display = playing ? '' : 'none';
  if (currentId) {
    const cp = document.getElementById(`card-play-${currentId}`);
    if (cp) {
      cp.querySelector('.icon-play').style.display = playing ? 'none' : '';
      cp.querySelector('.icon-pause').style.display = playing ? '' : 'none';
    }
  }
}

// ── Audio events ──
audio.addEventListener('play', () => updatePlayIcons(true));
audio.addEventListener('pause', () => updatePlayIcons(false));
audio.addEventListener('ended', () => {
  updatePlayIcons(false);
  if (currentId) saveProgress(currentId, 0); // reset on finish
});

audio.addEventListener('timeupdate', () => {
  if (isScrubbing || !currentId) return;
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('scrub-fill').style.width = pct + '%';
  document.getElementById('time-current').textContent = fmtTime(audio.currentTime);
  document.getElementById('time-total').textContent = fmtTime(audio.duration);
  // Save every 5s
  if (Math.floor(audio.currentTime) % 5 === 0) saveProgress(currentId, audio.currentTime);
  // Update card progress
  const fill = document.getElementById(`prog-fill-${currentId}`);
  if (fill) fill.style.width = pct + '%';
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('time-total').textContent = fmtTime(audio.duration);
});

// ── Scrub bar ──
const scrubTrack = document.getElementById('scrub-track');
function scrubTo(e) {
  const rect = scrubTrack.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const pct = Math.max(0, Math.min(1, x / rect.width));
  audio.currentTime = pct * audio.duration;
  document.getElementById('scrub-fill').style.width = (pct * 100) + '%';
}
scrubTrack.addEventListener('mousedown', e => { isScrubbing = true; scrubTo(e); });
scrubTrack.addEventListener('touchstart', e => { isScrubbing = true; scrubTo(e); }, { passive: true });
document.addEventListener('mousemove', e => { if (isScrubbing) scrubTo(e); });
document.addEventListener('touchmove', e => { if (isScrubbing) scrubTo(e); }, { passive: true });
document.addEventListener('mouseup', () => { isScrubbing = false; });
document.addEventListener('touchend', () => { isScrubbing = false; });

// ── Controls ──
document.getElementById('btn-play-main').addEventListener('click', togglePlay);
document.getElementById('btn-back15').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
document.getElementById('btn-fwd30').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration, audio.currentTime + 30); });
document.getElementById('btn-close').addEventListener('click', () => {
  audio.pause();
  if (currentId) {
    saveProgress(currentId, audio.currentTime);
    document.getElementById(`card-${currentId}`)?.classList.remove('active');
    const cp = document.getElementById(`card-play-${currentId}`);
    if (cp) { cp.querySelector('.icon-play').style.display=''; cp.querySelector('.icon-pause').style.display='none'; }
    currentId = null;
  }
  document.getElementById('player').classList.remove('visible');
});

// ── Speed ──
const speedBtn = document.getElementById('speed-btn');
speedBtn.addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  const s = SPEEDS[speedIdx];
  audio.playbackRate = s;
  speedBtn.textContent = s === 1 ? '1×' : s + '×';
  speedBtn.classList.toggle('active-speed', s !== 1);
});

// ── MediaSession API (lock screen controls) ──
function setMediaSession(essay) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: essay.title,
    artist: 'Johnny Harris',
    album: 'Essays',
  });
  navigator.mediaSession.setActionHandler('play', () => audio.play());
  navigator.mediaSession.setActionHandler('pause', () => audio.pause());
  navigator.mediaSession.setActionHandler('seekbackward', () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
  navigator.mediaSession.setActionHandler('seekforward', () => { audio.currentTime = Math.min(audio.duration, audio.currentTime + 30); });
  navigator.mediaSession.setActionHandler('seekto', (d) => { if (d.seekTime != null) audio.currentTime = d.seekTime; });
}

// ── Init ──
renderLibrary();
</script>
</body>
</html>
