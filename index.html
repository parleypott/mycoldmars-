<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mycoldmars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #d42e05;
      --ivory: #f5f0e8;
      --ivory-bright: #faf7f2;
      --ivory-faint: rgba(245, 240, 232, 0.18);
      --mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
    }

    html { background: var(--red); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      min-height: 100vh;
      font-family: var(--mono);
      color: var(--ivory-bright);
      overflow: hidden;
      position: relative;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      mix-blend-mode: multiply;
    }

    /* ── Corner meta ── */
    .meta {
      position: fixed;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ivory-bright);
      z-index: 5;
    }
    .meta.tl { top: 24px; left: 24px; }
    .meta.tr { top: 24px; right: 24px; }
    .meta.bl { bottom: 24px; left: 24px; }
    .meta.br { bottom: 24px; right: 24px; color: rgba(245,240,232,0.5); }

    /* ── Center stage ── */
    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dots {
      display: flex;
      gap: clamp(14px, 1.6vw, 22px);
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 92vw;
      z-index: 4;
      position: relative;
    }
    .sep {
      width: 1.5px;
      height: clamp(36px, 4vw, 48px);
      background: var(--ivory-faint);
      margin: 0 clamp(4px, 0.6vw, 10px);
    }

    .dot {
      width: clamp(44px, 4.4vw, 56px);
      height: clamp(44px, 4.4vw, 56px);
    }

    .dot {
      border: 1.5px solid var(--ivory-bright);
      border-radius: 50%;
      background: transparent;
      position: relative;
      cursor: pointer;
      text-decoration: none;
      display: block;
      transition: background 0.25s ease, transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .dot:hover { background: var(--ivory-bright); transform: scale(1.06); }

    .dot-label {
      position: absolute;
      top: calc(100% + 18px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ivory-bright);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .dot:hover .dot-label { opacity: 1; }

    /* ── Bouncing globe ── */
    .globe-wrap {
      position: fixed;
      top: 0; left: 0;
      width: 88px; height: 88px;
      pointer-events: none;
      z-index: 2;
      will-change: transform;
    }
    .globe {
      width: 100%; height: 100%;
      animation: spin 6s linear infinite;
    }
    .globe path, .globe ellipse, .globe line { stroke: var(--ivory-bright); fill: none; stroke-width: 0.9; }
    .globe path.land { fill: var(--ivory-bright); stroke: none; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .meta { font-size: 10px; }
      .dots { flex-wrap: wrap; justify-content: center; gap: 18px; max-width: 320px; }
      .globe-wrap { width: 64px; height: 64px; }
    }
  </style>
</head>
<body>

  <div class="meta tl">mycoldmars</div>
  <div class="meta tr">tools</div>
  <div class="meta bl">2026</div>
  <div class="meta br">↗</div>

  <main>
    <nav class="dots">
      <a href="/translation/" class="dot"><span class="dot-label">interpreter</span></a>
      <a href="/hunter/" class="dot"><span class="dot-label">hunter</span></a>
      <a href="/hunter/#script" class="dot"><span class="dot-label">script copilot</span></a>
      <a href="/queen-scarlet-school/" class="dot"><span class="dot-label">queen scarlet's school</span></a>
      <a href="/mapkeys/" class="dot"><span class="dot-label">mapkeys</span></a>
      <a href="/animatedcrazy/" class="dot"><span class="dot-label">animatedcrazy</span></a>
      <span class="sep" aria-hidden="true"></span>
      <a href="/pinglobe/" class="dot"><span class="dot-label">pinglobe</span></a>
      <a href="/fascism/" class="dot"><span class="dot-label">fascism</span></a>
      <a href="/flyingmoney/" class="dot"><span class="dot-label">flying money</span></a>
      <a href="/modern-middle-east/" class="dot"><span class="dot-label">modern middle east</span></a>
      <a href="/hakka/" class="dot"><span class="dot-label">hakka</span></a>
      <a href="/night-market/" class="dot"><span class="dot-label">night market</span></a>
    </nav>
  </main>

  <!-- DVD-screensaver globe -->
  <div class="globe-wrap" id="globe">
    <svg class="globe" viewBox="0 0 100 100">
      <ellipse cx="50" cy="50" rx="48" ry="48"/>
      <ellipse cx="50" cy="50" rx="22" ry="48"/>
      <line x1="2" y1="50" x2="98" y2="50"/>
      <!-- continents (loose stylized blobs) -->
      <path class="land" d="M14 28 C18 22, 28 20, 36 22 C40 24, 44 27, 44 31 C44 35, 40 39, 34 41 C28 42, 22 40, 18 36 C15 32, 14 30, 14 28Z"/>
      <path class="land" d="M28 54 C32 52, 38 53, 40 57 C42 62, 41 70, 38 75 C35 78, 32 76, 30 71 C28 64, 27 58, 28 54Z"/>
      <path class="land" d="M52 24 C56 22, 60 24, 60 28 C60 32, 56 33, 53 31 C51 29, 51 26, 52 24Z"/>
      <path class="land" d="M55 38 C60 36, 66 39, 68 44 C70 50, 68 58, 64 62 C60 65, 56 62, 55 56 C54 50, 54 42, 55 38Z"/>
      <path class="land" d="M68 22 C73 20, 80 22, 82 26 C84 30, 80 34, 75 34 C70 33, 67 28, 68 22Z"/>
      <path class="land" d="M76 60 C80 58, 84 60, 84 64 C84 68, 80 70, 76 68 C73 66, 73 62, 76 60Z"/>
    </svg>
  </div>

  <script>
    // DVD-screensaver bounce. Random angle on load. Color flash on edge hits.
    (function() {
      const el = document.getElementById('globe');
      let x, y, vx, vy, w, h, size = 88;

      function reset() {
        const rect = el.getBoundingClientRect();
        size = rect.width || 88;
        w = window.innerWidth - size;
        h = window.innerHeight - size;
        x = Math.random() * w;
        y = Math.random() * h;
        const speed = 1.4;                     // px/frame; whimsical-but-not-frantic
        const angle = (Math.random() * 0.7 + 0.15) * Math.PI; // 27-153° to avoid pure horizontal
        vx = Math.cos(angle) * speed * (Math.random() < 0.5 ? -1 : 1);
        vy = Math.sin(angle) * speed * (Math.random() < 0.5 ? -1 : 1);
      }

      function tick() {
        x += vx; y += vy;
        let hit = false;
        if (x <= 0)      { x = 0;     vx = -vx; hit = true; }
        else if (x >= w) { x = w;     vx = -vx; hit = true; }
        if (y <= 0)      { y = 0;     vy = -vy; hit = true; }
        else if (y >= h) { y = h;     vy = -vy; hit = true; }
        el.style.transform = `translate(${x}px, ${y}px)`;
        if (hit) {
          // Tiny "blip" — slight scale pulse on edge hit, like the satisfying corner-tease
          el.animate(
            [{ filter: 'brightness(1)' }, { filter: 'brightness(1.4)' }, { filter: 'brightness(1)' }],
            { duration: 220, easing: 'ease-out' }
          );
        }
        requestAnimationFrame(tick);
      }

      window.addEventListener('resize', () => { w = window.innerWidth - size; h = window.innerHeight - size; });
      reset();
      tick();
    })();
  </script>

</body>
</html>
