<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cold Mars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700;9..40,900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #f83500;
      --orange: #ff5206;
      --ivory: #f5f0e8;
      --ivory-bright: #faf7f2;
      --ivory-mid: rgba(245, 240, 232, 0.5);
      --ivory-faint: rgba(245, 240, 232, 0.15);
    }

    html {
      background: var(--red);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    /* Grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
    }

    /* ── Outer ring ── */
    .ring {
      width: min(88vw, 88vh);
      height: min(88vw, 88vh);
      border-radius: 50%;
      border: 1.5px solid var(--ivory-bright);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: ringIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    /* ── Title ── */
    .title {
      font-weight: 900;
      font-size: clamp(26px, 6vw, 72px);
      letter-spacing: -0.04em;
      color: var(--ivory-bright);
      line-height: 1;
      margin-bottom: clamp(28px, 4.5vh, 56px);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
    }

    /* ── Button row ── */
    .dots {
      display: flex;
      align-items: center;
      gap: clamp(10px, 2vw, 24px);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.7s forwards;
    }

    /* ── Circle button ── */
    .dot {
      width: clamp(44px, 7vw, 72px);
      height: clamp(44px, 7vw, 72px);
      border-radius: 50%;
      background: var(--ivory-bright);
      border: none;
      cursor: pointer;
      position: relative;
      transition:
        background 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.5s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
    }

    .dot:hover {
      background: var(--orange);
      transform: scale(1.12);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
    }

    /* ── Label ── */
    .dot-label {
      position: absolute;
      bottom: calc(100% + clamp(8px, 1.5vh, 16px));
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: clamp(10px, 1.2vw, 14px);
      letter-spacing: 0.04em;
      color: var(--ivory-bright);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .dot:hover .dot-label {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Globe hover effect ── */
    .globe-icon {
      width: 75%;
      height: 75%;
      color: var(--red);
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .dot-globe {
      transition:
        background 1.2s ease,
        transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 1.2s ease;
    }

    .dot-globe:hover {
      background: var(--ivory-bright);
      transform: scale(1.06);
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
    }

    .dot-globe:hover .globe-icon {
      opacity: 0.25;
    }

    /* ── Disabled dots ── */
    .dot.off {
      opacity: 0.35;
      cursor: default;
    }

    .dot.off:hover {
      background: var(--ivory-bright);
      transform: none;
      box-shadow: none;
    }

    .dot.off:hover .dot-label {
      opacity: 0.5;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Ring labels ── */
    .ring-label {
      position: absolute;
      font-weight: 300;
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--ivory-faint);
    }

    .ring-label.top {
      top: clamp(16px, 4%, 36px);
      opacity: 0;
      animation: fadeIn 0.6s ease 1.1s forwards;
    }

    .ring-label.bottom {
      bottom: clamp(16px, 4%, 36px);
      opacity: 0;
      animation: fadeIn 0.6s ease 1.3s forwards;
    }

    /* ── Keyframes ── */
    @keyframes ringIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 600px) {
      .ring { width: 94vw; height: 94vw; }
      .dots { gap: clamp(8px, 3vw, 14px); }
      .dot-label { font-size: 9px; }
    }
  </style>
</head>
<body>

  <div class="ring">
    <span class="ring-label top">Games &amp; Experiments</span>

    <h1 class="title">My Cold Mars</h1>

    <nav class="dots">
      <a href="/pinglobe/" class="dot dot-globe">
        <svg class="globe-icon" viewBox="0 0 100 100" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <!-- North America -->
          <path d="M30 18 C32 16, 38 14, 42 15 C45 15, 48 17, 48 19 C50 19, 52 18, 53 20 C54 22, 52 24, 50 25 C49 27, 48 30, 46 32 C44 34, 40 36, 38 37 C36 38, 33 40, 31 39 C29 38, 28 35, 27 33 C25 30, 24 26, 25 23 C26 20, 28 19, 30 18Z"/>
          <!-- Central America -->
          <path d="M33 40 C34 41, 35 43, 36 45 C36 47, 35 48, 34 49 C33 49, 32 48, 32 47 C31 45, 31 42, 33 40Z"/>
          <!-- South America -->
          <path d="M35 51 C37 50, 40 50, 42 51 C44 52, 46 54, 47 57 C48 60, 48 64, 47 67 C46 70, 44 73, 42 75 C40 77, 38 78, 37 77 C35 76, 34 73, 33 70 C32 67, 31 63, 31 60 C31 56, 33 53, 35 51Z"/>
          <!-- Europe -->
          <path d="M55 18 C57 17, 60 17, 62 18 C63 19, 63 21, 62 22 C61 23, 59 24, 58 25 C56 26, 55 25, 54 23 C54 21, 54 19, 55 18Z"/>
          <!-- Africa -->
          <path d="M57 28 C59 27, 62 27, 64 28 C66 30, 67 33, 68 36 C68 40, 68 44, 67 48 C66 51, 64 54, 62 56 C60 57, 58 57, 57 55 C55 53, 54 49, 54 45 C54 41, 54 37, 55 33 C55 30, 56 29, 57 28Z"/>
          <!-- Greenland -->
          <path d="M38 10 C40 9, 43 9, 44 10 C45 11, 44 13, 43 14 C41 14, 39 13, 38 12 C38 11, 38 10, 38 10Z"/>
        </svg>
        <span class="dot-label">PinGlobe</span>
      </a>
      <a href="#" class="dot off">
        <span class="dot-label">Game Two</span>
      </a>
      <a href="#" class="dot off">
        <span class="dot-label">Game Three</span>
      </a>
      <a href="#" class="dot off">
        <span class="dot-label">Game Four</span>
      </a>
      <a href="#" class="dot off">
        <span class="dot-label">Game Five</span>
      </a>
    </nav>

    <span class="ring-label bottom">2026</span>
  </div>

</body>
</html>
