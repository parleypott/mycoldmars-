<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cold Mars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700;9..40,900&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #d42e05;
      --orange: #ff5206;
      --ivory: #f5f0e8;
      --ivory-bright: #faf7f2;
      --ivory-mid: rgba(245, 240, 232, 0.5);
      --ivory-faint: rgba(245, 240, 232, 0.15);
    }

    html {
      background: var(--red);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    /* Grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
    }

    /* ── Outer ring ── */
    .ring {
      width: min(88vw, 88vh);
      height: min(88vw, 88vh);
      border-radius: 50%;
      border: 1.5px solid var(--ivory-bright);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: ringIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    /* ── Title ── */
    .title {
      font-weight: 900;
      font-size: clamp(26px, 6vw, 72px);
      letter-spacing: -0.04em;
      color: var(--ivory-bright);
      line-height: 1;
      margin-bottom: clamp(28px, 4.5vh, 56px);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
    }

    /* ── Button row ── */
    .dots {
      display: flex;
      align-items: center;
      gap: clamp(10px, 2vw, 24px);
      opacity: 0;
      animation: fadeUp 0.8s ease 0.7s forwards;
    }

    /* ── Circle button ── */
    .dot {
      width: clamp(44px, 7vw, 72px);
      height: clamp(44px, 7vw, 72px);
      border-radius: 50%;
      background: var(--ivory-bright);
      border: none;
      cursor: pointer;
      position: relative;
      transition:
        background 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.5s ease;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
    }

    .dot:hover {
      background: var(--orange);
      transform: scale(1.12);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
    }

    /* ── Label ── */
    .dot-label {
      position: absolute;
      bottom: calc(100% + clamp(8px, 1.5vh, 16px));
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: clamp(10px, 1.2vw, 14px);
      letter-spacing: 0.04em;
      color: var(--ivory-bright);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .dot:hover .dot-label {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Globe hover effect ── */
    .globe-icon {
      width: 75%;
      height: 75%;
      color: var(--red);
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .dot-globe {
      transition:
        background 1.2s ease,
        transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 1.2s ease;
    }

    .dot-globe:hover {
      background: var(--ivory-bright);
      transform: scale(1.06);
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
    }

    .dot-globe:hover .globe-icon {
      opacity: 0.25;
    }

    /* ── Disabled dots ── */
    .dot.off {
      opacity: 0.35;
      cursor: default;
    }

    .dot.off:hover {
      background: var(--ivory-bright);
      transform: none;
      box-shadow: none;
    }

    .dot.off:hover .dot-label {
      opacity: 0.5;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Ring labels ── */
    .ring-label {
      position: absolute;
      font-weight: 300;
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--ivory-faint);
    }

    .ring-label.top {
      top: clamp(16px, 4%, 36px);
      opacity: 0;
      animation: fadeIn 0.6s ease 1.1s forwards;
    }

    .ring-label.bottom {
      bottom: clamp(16px, 4%, 36px);
      opacity: 0;
      animation: fadeIn 0.6s ease 1.3s forwards;
    }

    /* ── Keyframes ── */
    @keyframes ringIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Night market Chinese character ── */
    .dot-zh {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: clamp(22px, 3.5vw, 36px);
      color: var(--red);
      line-height: 1;
      opacity: 0.85;
      transition: opacity 0.4s ease;
    }

    .dot-nightmarket:hover .dot-zh {
      opacity: 1;
    }

    @media (max-width: 600px) {
      .ring { width: 94vw; height: 94vw; }
      .dots { gap: clamp(8px, 3vw, 14px); }
      .dot-label { font-size: 9px; }
    }

    /* ── Orbiting planet ── */
    .orbit-planet {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      border-radius: 50%;
      pointer-events: none;
      animation: orbitSpin 28s linear infinite;
      opacity: 0;
      animation: orbitSpin 28s linear infinite, fadeIn 0.6s ease 1.5s forwards;
    }

    .orbit-planet::after {
      content: '';
      position: absolute;
      top: -3px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ivory-bright);
      box-shadow:
        0 0 6px 2px rgba(245, 240, 232, 0.6),
        0 0 14px 4px rgba(245, 240, 232, 0.25);
    }

    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="ring">
    <span class="ring-label top">Games &amp; Experiments</span>
    <div class="orbit-planet"></div>

    <h1 class="title">My Cold Mars</h1>

    <nav class="dots">
      <a href="/pinglobe/" class="dot dot-globe">
        <svg class="globe-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Globe grid lines -->
          <ellipse cx="50" cy="50" rx="22" ry="45" stroke="currentColor" stroke-width="0.8"/>
          <line x1="6" y1="50" x2="94" y2="50" stroke="currentColor" stroke-width="0.8"/>
          <!-- North America -->
          <path d="M16 24 C20 19, 28 17, 34 18 C37 19, 40 21, 42 24 C44 22, 46 21, 47 23 C47 26, 44 30, 40 34 C37 37, 33 39, 29 39 C26 39, 23 37, 21 34 C19 31, 18 27, 16 24Z" fill="currentColor"/>
          <!-- South America -->
          <path d="M28 52 C32 50, 36 50, 38 53 C40 57, 41 63, 40 69 C39 73, 36 75, 34 74 C32 72, 30 66, 29 60 C28 56, 28 53, 28 52Z" fill="currentColor"/>
          <!-- Europe -->
          <path d="M53 18 C56 16, 61 17, 62 20 C62 23, 60 26, 57 26 C54 26, 53 22, 53 18Z" fill="currentColor"/>
          <!-- Africa -->
          <path d="M55 31 C59 29, 64 30, 67 34 C69 39, 69 45, 68 51 C67 55, 64 58, 61 59 C58 58, 56 54, 55 48 C54 42, 54 36, 55 31Z" fill="currentColor"/>
          <!-- Asia -->
          <path d="M66 16 C71 14, 78 16, 81 20 C83 24, 81 28, 77 30 C73 31, 69 28, 67 24 C65 21, 65 18, 66 16Z" fill="currentColor"/>
        </svg>
        <span class="dot-label">PinGlobe</span>
      </a>
      <a href="/borders/" class="dot">
        <span class="dot-label">Borders</span>
      </a>
      <a href="/flight/" class="dot">
        <span class="dot-label">Flight</span>
      </a>
      <a href="/bounce/" class="dot">
        <span class="dot-label">Bounce</span>
      </a>
      <a href="/the-human-element/" class="dot">
        <span class="dot-label">The Human Element</span>
      </a>
      <a href="/night-market/" class="dot dot-nightmarket">
        <span class="dot-zh">夜</span>
        <span class="dot-label">Night Market 夜市</span>
      </a>
      <a href="/zanyplans/" class="dot">
        <span class="dot-label">Zany Plans</span>
      </a>
      <a href="/spin/" class="dot">
        <span class="dot-label">Spin</span>
      </a>
    </nav>

    <span class="ring-label bottom">2026</span>
  </div>

</body>
</html>
