<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Growth — Newpress</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Mono', monospace;
      background: #F4F2E6;
      color: #121118;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .chart-container {
      max-width: 1000px;
      width: 100%;
    }

    .chart-wrapper {
      position: relative;
      width: 100%;
      height: 520px;
    }

    .controls {
      text-align: center;
      margin-top: 24px;
    }

    .grow-btn {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: #121118;
      color: #F4F2E6;
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .grow-btn:hover { opacity: 0.8; }
    .grow-btn:disabled { opacity: 0.4; cursor: default; }

    .chart-caption {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #aaa;
      margin-top: 16px;
      text-align: center;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="chart-container">
    <div class="chart-wrapper">
      <canvas id="growthChart"></canvas>
    </div>
    <div class="controls">
      <button class="grow-btn" id="growBtn" onclick="expandChart()">Show Full Growth</button>
    </div>
    <div class="chart-caption">
      YouTube subscribers from channel launch. Aligned by channel age to compare growth rates.
    </div>
  </div>

  <script>
    // ── Johnny Harris ──
    // Year 1 = Jan 2017
    const jhMilestones = [
      { m: 0, s: 2000 },
      { m: 6, s: 4000 },
      { m: 12, s: 8000 },
      { m: 18, s: 20000 },
      { m: 24, s: 55000 },
      { m: 30, s: 95000 },
      { m: 36, s: 200000 },
      { m: 39, s: 280000 },
      { m: 42, s: 390000 },
      { m: 44, s: 487000 },
      { m: 45, s: 572000 },
      { m: 47, s: 640000 },
      { m: 48, s: 702000 },
      { m: 50, s: 910000 },
      { m: 52, s: 1210000 },
      { m: 54, s: 1490000 },
      { m: 56, s: 1610000 },
      { m: 58, s: 1780000 },
      { m: 60, s: 2000000 },
      { m: 62, s: 2190000 },
      { m: 66, s: 2600000 },
      { m: 68, s: 2950000 },
      { m: 72, s: 3400000 },
      { m: 77, s: 3900000 },
      { m: 80, s: 4200000 },
      { m: 84, s: 4840000 },
      { m: 89, s: 5400000 },
      { m: 92, s: 5800000 },
      { m: 96, s: 6260000 },
      { m: 101, s: 6800000 },
      { m: 105, s: 7100000 },
      { m: 108, s: 7350000 },
      { m: 111, s: 7640000 },
    ];

    // ── Search Party (Sam Ellis) ──
    // Year 1 = Jul 2023
    const spMilestones = [
      { m: 0, s: 0 },
      { m: 1, s: 30000 },
      { m: 3, s: 100000 },
      { m: 5, s: 200000 },
      { m: 7, s: 303000 },
      { m: 8, s: 320000 },
      { m: 9, s: 340000 },
      { m: 10, s: 350000 },
      { m: 11, s: 365000 },
      { m: 12, s: 380000 },
      { m: 13, s: 457000 },
      { m: 14, s: 490000 },
      { m: 15, s: 511000 },
      { m: 16, s: 517000 },
      { m: 17, s: 522000 },
      { m: 18, s: 561000 },
      { m: 19, s: 599000 },
      { m: 20, s: 627000 },
      { m: 21, s: 645000 },
      { m: 22, s: 664000 },
      { m: 23, s: 685000 },
      { m: 24, s: 692000 },
      { m: 26, s: 719000 },
      { m: 28, s: 759000 },
      { m: 31, s: 840000 },
      { m: 33, s: 919000 },
    ];

    // ── Tunnel Vision (Christophe Haubursin) ──
    // Year 1 = Dec 2024
    const tvMilestones = [
      { m: 0, s: 0 },
      { m: 1, s: 35000 },
      { m: 2, s: 65000 },
      { m: 3, s: 95000 },
      { m: 4, s: 115000 },
      { m: 5, s: 135000 },
      { m: 6, s: 155000 },
      { m: 7, s: 175000 },
      { m: 8, s: 195000 },
      { m: 9, s: 215000 },
      { m: 10, s: 235000 },
      { m: 11, s: 255000 },
      { m: 12, s: 275000 },
      { m: 13, s: 290000 },
      { m: 14, s: 305000 },
      { m: 15, s: 320000 },
      { m: 16, s: 332000 },
    ];

    // ── The Bigger Picture (Max Fisher) ──
    // Year 1 = Jan 2026
    const mfMilestones = [
      { m: 0, s: 0 },
      { m: 1, s: 30000 },
      { m: 2, s: 80000 },
      { m: 3, s: 156000 },
      { m: 4, s: 185000 },
    ];

    // Interpolation
    function lerp(a, b, t) { return a + (b - a) * t; }

    function interpolate(milestones, maxMonth) {
      const data = [];
      for (let m = 0; m <= maxMonth; m++) {
        const lastM = milestones[milestones.length - 1].m;
        if (m > lastM) break;
        let before = milestones[0], after = milestones[milestones.length - 1];
        for (let i = 0; i < milestones.length - 1; i++) {
          if (m >= milestones[i].m && m <= milestones[i + 1].m) {
            before = milestones[i];
            after = milestones[i + 1];
            break;
          }
        }
        const span = after.m - before.m || 1;
        const t = (m - before.m) / span;
        data.push(Math.round(lerp(before.s, after.s, Math.max(0, Math.min(1, t)))));
      }
      return data;
    }

    const maxMonths = 111;
    const jhData = interpolate(jhMilestones, maxMonths);
    const spData = interpolate(spMilestones, maxMonths);
    const tvData = interpolate(tvMilestones, maxMonths);
    const mfData = interpolate(mfMilestones, maxMonths);
    const allData = [jhData, spData, tvData, mfData];

    const labels = [];
    for (let m = 0; m <= maxMonths; m++) labels.push(m);

    // Colors
    const red = '#C0392B';
    const blue = '#004CFF';
    const green = '#0D5921';
    const purple = '#7B2D8E';

    const colors = [red, blue, green, purple];
    const fills = [
      'rgba(192,57,43,0.08)',
      'rgba(0,76,255,0.08)',
      'rgba(13,89,33,0.08)',
      'rgba(123,45,142,0.08)',
    ];
    const channelLabels = [
      'JOHNNY HARRIS',
      '2ND CHANNEL: SEARCH PARTY',
      '3RD CHANNEL: TUNNEL VISION',
      '4TH CHANNEL: THE BIGGER PICTURE',
    ];

    // Line labels plugin
    const lineLabels = {
      id: 'lineLabels',
      afterDraw(chart) {
        const ctx = chart.ctx;
        const xMax = chart.scales.x.max;

        chart.data.datasets.forEach((ds, i) => {
          const meta = chart.getDatasetMeta(i);
          if (!meta || !meta.data.length) return;
          const dataArr = allData[i];

          // Find the last visible point
          let lastIdx = meta.data.length - 1;
          // Make sure it's within the visible x range
          while (lastIdx > 0 && labels[lastIdx] > xMax) lastIdx--;
          if (lastIdx < 0) return;

          const last = meta.data[lastIdx];
          if (!last) return;
          const lastVal = dataArr[Math.min(lastIdx, dataArr.length - 1)];
          const color = ds.borderColor;

          const valStr = lastVal >= 1000000
            ? (lastVal / 1e6).toFixed(1) + 'M'
            : Math.round(lastVal / 1000) + 'K';

          ctx.save();

          // Ring
          ctx.beginPath();
          ctx.arc(last.x, last.y, 5, 0, Math.PI * 2);
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.fillStyle = '#F4F2E6';
          ctx.fill();
          ctx.stroke();

          // Value + label
          ctx.font = "bold 12px 'Space Mono', monospace";
          ctx.fillStyle = color;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(valStr, last.x + 10, last.y - 2);

          ctx.font = "9px 'Space Mono', monospace";
          ctx.fillText(channelLabels[i], last.x + 10, last.y + 12);

          ctx.restore();
        });
      }
    };

    // Chart
    const ctx = document.getElementById('growthChart').getContext('2d');

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: allData.map((data, i) => ({
          label: channelLabels[i],
          data: data,
          borderColor: colors[i],
          backgroundColor: fills[i],
          borderWidth: 2.5,
          pointRadius: function(c) { return c.index % 12 === 0 ? 3.5 : 0; },
          pointBackgroundColor: colors[i],
          pointHoverRadius: 0,
          tension: 0.3,
          fill: true
        }))
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 20, right: 200 } },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(255,255,255,0.95)',
            titleColor: '#333',
            bodyColor: '#666',
            borderColor: '#e0e0e0',
            borderWidth: 1,
            titleFont: { family: "'Space Mono', monospace", weight: '700', size: 11 },
            bodyFont: { family: "'Space Mono', monospace", size: 11 },
            displayColors: true,
            callbacks: {
              title: function(items) {
                const m = items[0].parsed.x;
                const yr = Math.floor(m / 12) + 1;
                const mo = (m % 12) + 1;
                return `Year ${yr}, Month ${mo}`;
              },
              label: function(context) {
                if (context.parsed.y == null) return null;
                const v = context.parsed.y;
                const formatted = v >= 1000000
                  ? (v / 1e6).toFixed(1) + 'M'
                  : Math.round(v / 1000) + 'K';
                return ` ${context.dataset.label}: ${formatted}`;
              }
            }
          }
        },
        scales: {
          x: {
            min: 0,
            max: 24, // Start zoomed in: Year 1 + Year 2
            grid: { display: false },
            ticks: {
              font: { family: "'Space Mono', monospace", size: 12, weight: '700' },
              color: '#aaa',
              callback: function(value, index) {
                if (index % 12 === 0) return 'Year ' + ((index / 12) + 1);
                return '';
              },
              maxRotation: 0,
              autoSkip: false
            },
            border: { color: '#ddd' }
          },
          y: {
            beginAtZero: true,
            suggestedMax: 1000000, // Start with 1M max for zoomed view
            grid: { color: '#e8e5da' },
            border: { display: false },
            ticks: {
              font: { family: "'Space Mono', monospace", size: 12 },
              color: '#bbb',
              callback: function(v) {
                if (v === 0) return '0';
                return v >= 1000000 ? (v / 1e6) + 'M' : (v / 1000) + 'K';
              }
            }
          }
        },
        animation: { duration: 600, easing: 'easeInOutQuart' }
      },
      plugins: [lineLabels]
    });

    // Expand animation
    let expanded = false;

    function expandChart() {
      if (expanded) return;
      expanded = true;
      document.getElementById('growBtn').disabled = true;
      document.getElementById('growBtn').textContent = 'Expanding...';

      const totalSteps = 60;
      const duration = 2000;
      const startX = 24;
      const endX = maxMonths;
      const startY = 1000000;
      const endY = 8500000;
      let step = 0;

      function easeOut(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function tick() {
        step++;
        const t = easeOut(step / totalSteps);
        const currentX = Math.round(startX + (endX - startX) * t);
        const currentY = startY + (endY - startY) * t;

        chart.options.scales.x.max = currentX;
        chart.options.scales.y.suggestedMax = currentY;
        chart.update('none');

        if (step < totalSteps) {
          requestAnimationFrame(tick);
        } else {
          document.getElementById('growBtn').textContent = 'Full Growth';
        }
      }

      requestAnimationFrame(tick);
    }
  </script>
</body>
</html>
