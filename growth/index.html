<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Growth — Newpress</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Mono', monospace;
      background: #F4F2E6;
      color: #121118;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .chart-container {
      max-width: 1000px;
      width: 100%;
    }

    .chart-wrapper {
      position: relative;
      width: 100%;
      height: 520px;
    }

    .chart-caption {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #aaa;
      margin-top: 20px;
      text-align: center;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="chart-container">
    <div class="chart-wrapper">
      <canvas id="growthChart"></canvas>
    </div>
    <div class="chart-caption">
      YouTube subscribers from channel launch. Aligned by channel age to compare growth rates.
    </div>
  </div>

  <script>
    // ── Johnny Harris ──
    // Year 1 start = Jan 2017
    const jhMilestones = [
      { monthsIn: 0, subs: 2000 },      // Jan 2017
      { monthsIn: 6, subs: 4000 },      // Jul 2017
      { monthsIn: 12, subs: 8000 },     // Jan 2018
      { monthsIn: 18, subs: 20000 },    // Jul 2018
      { monthsIn: 24, subs: 55000 },    // Jan 2019
      { monthsIn: 30, subs: 95000 },    // Jul 2019
      { monthsIn: 36, subs: 200000 },   // Jan 2020
      { monthsIn: 39, subs: 280000 },
      { monthsIn: 42, subs: 390000 },
      { monthsIn: 44, subs: 487000 },
      { monthsIn: 45, subs: 572000 },
      { monthsIn: 47, subs: 640000 },
      { monthsIn: 48, subs: 702000 },   // Jan 2021
      { monthsIn: 50, subs: 910000 },
      { monthsIn: 52, subs: 1210000 },
      { monthsIn: 54, subs: 1490000 },
      { monthsIn: 56, subs: 1610000 },
      { monthsIn: 58, subs: 1780000 },
      { monthsIn: 60, subs: 2000000 },  // Jan 2022
      { monthsIn: 62, subs: 2190000 },
      { monthsIn: 66, subs: 2600000 },
      { monthsIn: 68, subs: 2950000 },
      { monthsIn: 72, subs: 3400000 },  // Jan 2023
      { monthsIn: 77, subs: 3900000 },
      { monthsIn: 80, subs: 4200000 },
      { monthsIn: 84, subs: 4840000 },  // Jan 2024
      { monthsIn: 89, subs: 5400000 },
      { monthsIn: 92, subs: 5800000 },
      { monthsIn: 96, subs: 6260000 },  // Jan 2025
      { monthsIn: 101, subs: 6800000 },
      { monthsIn: 105, subs: 7100000 },
      { monthsIn: 108, subs: 7350000 }, // Jan 2026
      { monthsIn: 111, subs: 7640000 }, // Apr 2026
    ];

    // ── Search Party ──
    // Year 1 start = Jul 2023 (channel launch)
    const spMilestones = [
      { monthsIn: 0, subs: 0 },          // Jul 2023
      { monthsIn: 1, subs: 30000 },
      { monthsIn: 3, subs: 100000 },
      { monthsIn: 5, subs: 200000 },
      { monthsIn: 7, subs: 303000 },     // Feb 2024
      { monthsIn: 8, subs: 320000 },
      { monthsIn: 9, subs: 340000 },
      { monthsIn: 10, subs: 350000 },
      { monthsIn: 11, subs: 365000 },
      { monthsIn: 12, subs: 380000 },    // Jul 2024
      { monthsIn: 13, subs: 457000 },
      { monthsIn: 14, subs: 490000 },
      { monthsIn: 15, subs: 511000 },
      { monthsIn: 16, subs: 517000 },
      { monthsIn: 17, subs: 522000 },
      { monthsIn: 18, subs: 561000 },    // Jan 2025
      { monthsIn: 19, subs: 599000 },
      { monthsIn: 20, subs: 627000 },
      { monthsIn: 21, subs: 645000 },
      { monthsIn: 22, subs: 664000 },
      { monthsIn: 23, subs: 685000 },
      { monthsIn: 24, subs: 692000 },    // Jul 2025
      { monthsIn: 26, subs: 719000 },
      { monthsIn: 28, subs: 759000 },
      { monthsIn: 31, subs: 840000 },
      { monthsIn: 33, subs: 919000 },    // Apr 2026
    ];

    // Interpolate milestones to monthly
    function lerp(a, b, t) { return a + (b - a) * t; }

    function interpolate(milestones, maxMonth) {
      const data = [];
      for (let m = 0; m <= maxMonth; m++) {
        let before = milestones[0], after = milestones[milestones.length - 1];
        for (let i = 0; i < milestones.length - 1; i++) {
          if (m >= milestones[i].monthsIn && m <= milestones[i + 1].monthsIn) {
            before = milestones[i];
            after = milestones[i + 1];
            break;
          }
        }
        if (m > milestones[milestones.length - 1].monthsIn) break;
        const span = after.monthsIn - before.monthsIn || 1;
        const t = (m - before.monthsIn) / span;
        data.push(Math.round(lerp(before.subs, after.subs, Math.max(0, Math.min(1, t)))));
      }
      return data;
    }

    const maxMonths = 111; // JH goes to month 111
    const jhData = interpolate(jhMilestones, maxMonths);
    const spData = interpolate(spMilestones, maxMonths);

    // X-axis labels: month numbers
    const labels = [];
    for (let m = 0; m <= maxMonths; m++) labels.push(m);

    // Colors
    const red = '#C0392B';
    const redLight = 'rgba(192, 57, 43, 0.08)';
    const blue = '#004CFF';
    const blueLight = 'rgba(0, 76, 255, 0.08)';

    // End callout plugin
    const endCallout = {
      id: 'endCallout',
      afterDraw(chart) {
        const ctx = chart.ctx;
        const chartArea = chart.chartArea;

        // JH callout
        const jhMeta = chart.getDatasetMeta(0);
        const jhLast = jhMeta.data[jhMeta.data.length - 1];
        if (jhLast) {
          const val = (jhData[jhData.length - 1] / 1e6).toFixed(1) + 'M';
          ctx.save();
          // Ring
          ctx.beginPath();
          ctx.arc(jhLast.x, jhLast.y, 6, 0, Math.PI * 2);
          ctx.strokeStyle = red;
          ctx.lineWidth = 2;
          ctx.fillStyle = '#F4F2E6';
          ctx.fill();
          ctx.stroke();
          // Number
          ctx.font = "bold 28px 'Instrument Serif', serif";
          ctx.fillStyle = red;
          ctx.textAlign = 'right';
          ctx.textBaseline = 'bottom';
          ctx.fillText(val, chartArea.right, chartArea.top - 8);
          // Label
          ctx.font = "bold 10px 'Space Mono', monospace";
          ctx.textBaseline = 'top';
          ctx.fillText('JOHNNY HARRIS', chartArea.right, chartArea.top - 6);
          ctx.restore();
        }

        // SP callout
        const spMeta = chart.getDatasetMeta(1);
        const spLast = spMeta.data[spMeta.data.length - 1];
        if (spLast) {
          const val = Math.round(spData[spData.length - 1] / 1000) + 'K';
          ctx.save();
          // Ring
          ctx.beginPath();
          ctx.arc(spLast.x, spLast.y, 6, 0, Math.PI * 2);
          ctx.strokeStyle = blue;
          ctx.lineWidth = 2;
          ctx.fillStyle = '#F4F2E6';
          ctx.fill();
          ctx.stroke();
          // Number + label next to the last point
          ctx.font = "bold 15px 'Space Mono', monospace";
          ctx.fillStyle = blue;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(val, spLast.x + 12, spLast.y);
          ctx.font = "10px 'Space Mono', monospace";
          ctx.fillText('SEARCH PARTY', spLast.x + 12, spLast.y + 16);
          ctx.restore();
        }
      }
    };

    // Tracing dot (traces both lines)
    let dotProgress = 0;
    let dotFinished = false;
    let dotStartTime = null;
    const DOT_DURATION = 12000;

    const tracingDot = {
      id: 'tracingDot',
      afterDraw(chart) {
        if (dotFinished) return;
        const ctx = chart.ctx;

        [0, 1].forEach(dsIndex => {
          const meta = chart.getDatasetMeta(dsIndex);
          if (!meta || !meta.data.length) return;
          const totalPoints = meta.data.length;
          const rawIndex = dotProgress * (totalPoints - 1);
          const currentIndex = Math.min(Math.floor(rawIndex), totalPoints - 1);
          const frac = rawIndex - currentIndex;

          let x, y;
          const pt = meta.data[currentIndex];
          if (currentIndex < totalPoints - 1) {
            const nextPt = meta.data[currentIndex + 1];
            x = pt.x + (nextPt.x - pt.x) * frac;
            y = pt.y + (nextPt.y - pt.y) * frac;
          } else {
            x = pt.x; y = pt.y;
          }

          const dataArr = dsIndex === 0 ? jhData : spData;
          let displaySubs;
          if (currentIndex < totalPoints - 1 && currentIndex < dataArr.length - 1) {
            displaySubs = Math.round(lerp(dataArr[currentIndex], dataArr[currentIndex + 1], frac));
          } else {
            displaySubs = dataArr[Math.min(currentIndex, dataArr.length - 1)];
          }

          const color = dsIndex === 0 ? red : blue;
          const subsStr = displaySubs >= 1000000
            ? (displaySubs / 1e6).toFixed(1).replace(/\.0$/, '') + 'M'
            : Math.round(displaySubs / 1000) + 'K';

          ctx.save();
          // Glow
          ctx.beginPath();
          ctx.arc(x, y, 10, 0, Math.PI * 2);
          ctx.fillStyle = dsIndex === 0 ? 'rgba(192,57,43,0.12)' : 'rgba(0,76,255,0.12)';
          ctx.fill();
          // Dot
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          // Label
          const chartArea = chart.chartArea;
          let labelX = x, textAlign = 'center';
          if (x < chartArea.left + 60) { labelX = x + 12; textAlign = 'left'; }
          else if (x > chartArea.right - 60) { labelX = x - 12; textAlign = 'right'; }

          ctx.font = "bold 13px 'Space Mono', monospace";
          ctx.fillStyle = color;
          ctx.textAlign = textAlign;
          ctx.textBaseline = 'bottom';
          ctx.fillText(subsStr, labelX, y - 14);
          ctx.restore();
        });
      }
    };

    function easeInOutQuart(t) {
      return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
    }

    function animateDot(chartInstance) {
      function tick(timestamp) {
        if (!dotStartTime) dotStartTime = timestamp;
        const elapsed = timestamp - dotStartTime;
        const linear = Math.min(elapsed / DOT_DURATION, 1);
        dotProgress = easeInOutQuart(linear);
        chartInstance.draw();
        if (linear >= 1) {
          dotFinished = true;
          chartInstance.draw();
          return;
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // Chart
    const ctx = document.getElementById('growthChart').getContext('2d');

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Johnny Harris',
            data: jhData,
            borderColor: red,
            backgroundColor: redLight,
            borderWidth: 2.5,
            pointRadius: function(ctx) {
              return ctx.index % 12 === 0 ? 4 : 0;
            },
            pointBackgroundColor: red,
            pointHoverRadius: 0,
            tension: 0.3,
            fill: true
          },
          {
            label: 'Search Party',
            data: spData,
            borderColor: blue,
            backgroundColor: blueLight,
            borderWidth: 2.5,
            pointRadius: function(ctx) {
              return ctx.index % 12 === 0 ? 4 : 0;
            },
            pointBackgroundColor: blue,
            pointHoverRadius: 0,
            tension: 0.3,
            fill: true
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 60, right: 80 } },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(255,255,255,0.95)',
            titleColor: '#333',
            bodyColor: '#666',
            borderColor: '#e0e0e0',
            borderWidth: 1,
            titleFont: { family: "'Space Mono', monospace", weight: '700' },
            bodyFont: { family: "'Space Mono', monospace" },
            displayColors: true,
            callbacks: {
              title: function(items) {
                const m = items[0].parsed.x;
                const yr = Math.floor(m / 12) + 1;
                const mo = m % 12;
                return `Year ${yr}, Month ${mo + 1}`;
              },
              label: function(context) {
                if (context.parsed.y == null) return null;
                const v = context.parsed.y;
                const name = context.dataset.label;
                const formatted = v >= 1000000
                  ? (v / 1e6).toFixed(1) + 'M'
                  : Math.round(v / 1000) + 'K';
                return `${name}: ${formatted}`;
              }
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: {
              font: { family: "'Space Mono', monospace", size: 12, weight: '700' },
              color: '#aaa',
              callback: function(value, index) {
                if (index % 12 === 0) {
                  const yr = (index / 12) + 1;
                  return 'Year ' + yr;
                }
                return '';
              },
              maxRotation: 0,
              autoSkip: false
            },
            border: { color: '#ddd' }
          },
          y: {
            beginAtZero: true,
            grid: { color: '#e8e5da' },
            border: { display: false },
            ticks: {
              font: { family: "'Space Mono', monospace", size: 12 },
              color: '#bbb',
              callback: function(v) {
                if (v === 0) return '0';
                return v >= 1000000 ? (v / 1e6) + 'M' : (v / 1000) + 'K';
              },
              stepSize: 1000000
            }
          }
        },
        animation: false
      },
      plugins: [endCallout, tracingDot]
    });

    animateDot(chart);
  </script>
</body>
</html>
