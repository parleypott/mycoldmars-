<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Growth — Newpress</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Mono', monospace;
      background: #F4F2E6;
      color: #121118;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .chart-container {
      max-width: 700px;
      width: 100%;
    }

    .chart-wrapper {
      position: relative;
      width: 100%;
      height: 520px;
    }

    /* Story overlay */
    .story-label {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: 10;
    }
    .story-label.visible { opacity: 1; }
    .story-label .story-inner {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .story-label .headshot {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid currentColor;
      flex-shrink: 0;
    }
    .story-label .text-col {
      text-align: left;
    }
    .story-label .ordinal {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .story-label .channel-name {
      font-family: 'Instrument Serif', serif;
      font-size: 32px;
      line-height: 1.1;
    }

    .controls {
      text-align: center;
      margin-top: 24px;
    }

    .grow-btn {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: #121118;
      color: #F4F2E6;
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
      opacity: 0;
    }
    .grow-btn.visible { opacity: 1; }
    .grow-btn:hover { opacity: 0.8; }
    .grow-btn:disabled { opacity: 0.4; cursor: default; }

    .chart-caption {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #aaa;
      margin-top: 16px;
      text-align: center;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="chart-container">
    <div class="chart-wrapper">
      <canvas id="growthChart"></canvas>
      <div class="story-label" id="storyLabel">
        <div class="story-inner">
          <img class="headshot" id="storyPhoto" src="" alt="">
          <div class="text-col">
            <div class="ordinal" id="storyOrdinal"></div>
            <div class="channel-name" id="storyName"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="grow-btn" id="growBtn" onclick="toggleChart()">Show Year 1–10</button>
    </div>
    <div class="chart-caption">
      YouTube subscribers from channel launch. Aligned by channel age to compare growth rates.
    </div>
  </div>

  <script>
    // ── Data ──
    const jhMilestones = [
      {m:0,s:2000},{m:6,s:4000},{m:12,s:8000},{m:18,s:20000},{m:24,s:55000},
      {m:30,s:95000},{m:36,s:200000},{m:39,s:280000},{m:42,s:390000},
      {m:44,s:487000},{m:45,s:572000},{m:47,s:640000},{m:48,s:702000},
      {m:50,s:910000},{m:52,s:1210000},{m:54,s:1490000},{m:56,s:1610000},
      {m:58,s:1780000},{m:60,s:2000000},{m:62,s:2190000},{m:66,s:2600000},
      {m:68,s:2950000},{m:72,s:3400000},{m:77,s:3900000},{m:80,s:4200000},
      {m:84,s:4840000},{m:89,s:5400000},{m:92,s:5800000},{m:96,s:6260000},
      {m:101,s:6800000},{m:105,s:7100000},{m:108,s:7350000},{m:111,s:7640000},
    ];
    const spMilestones = [
      {m:0,s:0},{m:1,s:30000},{m:3,s:100000},{m:5,s:200000},{m:7,s:303000},
      {m:8,s:320000},{m:9,s:340000},{m:10,s:350000},{m:11,s:365000},
      {m:12,s:380000},{m:13,s:457000},{m:14,s:490000},{m:15,s:511000},
      {m:16,s:517000},{m:17,s:522000},{m:18,s:561000},{m:19,s:599000},
      {m:20,s:627000},{m:21,s:645000},{m:22,s:664000},{m:23,s:685000},
      {m:24,s:692000},{m:26,s:719000},{m:28,s:759000},{m:31,s:840000},
      {m:33,s:919000},
    ];
    const tvMilestones = [
      {m:0,s:0},{m:1,s:35000},{m:2,s:65000},{m:3,s:95000},{m:4,s:115000},
      {m:5,s:135000},{m:6,s:155000},{m:7,s:175000},{m:8,s:195000},
      {m:9,s:215000},{m:10,s:235000},{m:11,s:255000},{m:12,s:275000},
      {m:13,s:290000},{m:14,s:305000},{m:15,s:320000},{m:16,s:332000},
    ];
    const mfMilestones = [
      {m:0,s:0},{m:1,s:30000},{m:2,s:80000},{m:3,s:156000},{m:3.5,s:185000},
      {m:4,s:196000},
    ];

    function lerp(a,b,t){return a+(b-a)*t}
    function interpolate(ms,max){
      const d=[];
      for(let m=0;m<=max;m++){
        if(m>ms[ms.length-1].m)break;
        let b=ms[0],a=ms[ms.length-1];
        for(let i=0;i<ms.length-1;i++){
          if(m>=ms[i].m&&m<=ms[i+1].m){b=ms[i];a=ms[i+1];break;}
        }
        const s=a.m-b.m||1;
        d.push(Math.round(lerp(b.s,a.s,Math.max(0,Math.min(1,(m-b.m)/s)))));
      }
      return d;
    }

    const maxMonths = 111;
    const fullData = [
      interpolate(jhMilestones, maxMonths),
      interpolate(spMilestones, maxMonths),
      interpolate(tvMilestones, maxMonths),
      interpolate(mfMilestones, maxMonths),
    ];

    const labels = [];
    for(let m=0;m<=maxMonths;m++) labels.push(m);

    const red='#C0392B', blue='#004CFF', green='#0D5921', purple='#7B2D8E';
    const colors = [red, blue, green, purple];
    const fillRGB = [[192,57,43],[0,76,255],[13,89,33],[123,45,142]];
    const fills = fillRGB.map(([r,g,b]) => `rgba(${r},${g},${b},0.08)`);
    const channelNames = ['Johnny Harris','Search Party','Tunnel Vision','The Bigger Picture'];
    const channelLabelsShort = [
      'JOHNNY HARRIS','2ND CHANNEL: SEARCH PARTY',
      '3RD CHANNEL: TUNNEL VISION','4TH CHANNEL: THE BIGGER PICTURE',
    ];
    const ordinals = [
      'Our first channel','Our second channel',
      'Our third channel','Our fourth channel',
    ];

    // ── Clip-mask reveal state ──
    // revealMonth[i] = fractional month position for clip edge, null = no clip
    const revealMonth = [null, null, null, null];

    // Plugin: clip mask for smooth line reveal
    const clipReveal = {
      id: 'clipReveal',
      beforeDatasetDraw(chart, args) {
        const i = args.index;
        if (revealMonth[i] === null) return;
        const xScale = chart.scales.x;
        const area = chart.chartArea;
        const clipX = xScale.getPixelForValue(revealMonth[i]);
        chart.ctx.save();
        chart.ctx.beginPath();
        chart.ctx.rect(area.left - 2, area.top - 10, clipX - area.left + 4, area.bottom - area.top + 20);
        chart.ctx.clip();
      },
      afterDatasetDraw(chart, args) {
        const i = args.index;
        if (revealMonth[i] === null) return;
        chart.ctx.restore();
      }
    };

    // Line labels plugin
    const lineLabels = {
      id: 'lineLabels',
      afterDraw(chart) {
        const ctx = chart.ctx;
        const xMax = chart.scales.x.max;
        chart.data.datasets.forEach((ds, i) => {
          const meta = chart.getDatasetMeta(i);
          if(!meta||!meta.data.length) return;
          const dataArr = ds.data;
          if(!dataArr||dataArr.length===0||dataArr.every(v=>v===null)) return;

          // During clip animation, show label at clip edge
          if (revealMonth[i] !== null) {
            const rm = revealMonth[i];
            if (rm < 0.5) return; // don't label at very start
            // Find the last valid data index
            let lastValidIdx = 0;
            for (let j = dataArr.length - 1; j >= 0; j--) {
              if (dataArr[j] !== null) { lastValidIdx = j; break; }
            }
            // Cap at actual data boundary
            const cappedRm = Math.min(rm, lastValidIdx);
            const floorIdx = Math.min(Math.floor(cappedRm), lastValidIdx);
            const ceilIdx = Math.min(floorIdx + 1, lastValidIdx);
            const frac = cappedRm - floorIdx;
            const p1 = meta.data[floorIdx];
            const p2 = meta.data[ceilIdx];
            if (!p1 || !p2) return;
            if (dataArr[floorIdx] === null) return;
            const lx = p1.x + (p2.x - p1.x) * frac;
            const ly = p1.y + (p2.y - p1.y) * frac;
            const v1 = dataArr[floorIdx] || 0;
            const v2 = dataArr[ceilIdx] || v1;
            const lv = lerp(v1, v2, frac);
            const color = ds.borderColor;
            const valStr = lv>=1e6?(lv/1e6).toFixed(1)+'M':Math.round(lv/1000)+'K';

            ctx.save();
            ctx.beginPath();
            ctx.arc(lx, ly, 5, 0, Math.PI*2);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.fillStyle = '#F4F2E6';
            ctx.fill();
            ctx.stroke();
            ctx.font = "bold 12px 'Space Mono', monospace";
            ctx.fillStyle = color;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(valStr, lx+10, ly-2);
            ctx.restore();
            return;
          }

          let lastIdx = -1;
          for(let j=meta.data.length-1;j>=0;j--){
            if(dataArr[j]!==null && labels[j]<=xMax){lastIdx=j;break;}
          }
          if(lastIdx<0) return;
          const last = meta.data[lastIdx];
          if(!last) return;
          const lastVal = dataArr[lastIdx];
          const color = ds.borderColor;
          const valStr = lastVal>=1e6?(lastVal/1e6).toFixed(1)+'M':Math.round(lastVal/1000)+'K';

          ctx.save();
          ctx.beginPath();
          ctx.arc(last.x, last.y, 5, 0, Math.PI*2);
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.fillStyle = '#F4F2E6';
          ctx.fill();
          ctx.stroke();

          // Position label above for Max Fisher (i=3) to avoid overlap
          const above = (i === 3);
          ctx.font = "bold 12px 'Space Mono', monospace";
          ctx.fillStyle = color;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          if (above) {
            ctx.fillText(valStr, last.x+10, last.y-18);
            ctx.font = "9px 'Space Mono', monospace";
            ctx.fillText(channelLabelsShort[i], last.x+10, last.y-32);
          } else {
            ctx.fillText(valStr, last.x+10, last.y-2);
            ctx.font = "9px 'Space Mono', monospace";
            ctx.fillText(channelLabelsShort[i], last.x+10, last.y+12);
          }
          ctx.restore();
        });
      }
    };

    // Chart — start with all datasets empty (nulls)
    const ctx = document.getElementById('growthChart').getContext('2d');
    const emptyRow = labels.map(()=>null);

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: fullData.map((_, i) => ({
          label: channelLabelsShort[i],
          data: [...emptyRow],
          borderColor: colors[i],
          backgroundColor: fills[i],
          borderWidth: 2.5,
          pointRadius: function(c){return c.raw!==null&&c.index%12===0?3.5:0;},
          pointBackgroundColor: colors[i],
          pointHoverRadius: 0,
          tension: 0.3,
          fill: true,
          spanGaps: false
        }))
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 60, right: 200 } },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(255,255,255,0.95)',
            titleColor: '#333', bodyColor: '#666',
            borderColor: '#e0e0e0', borderWidth: 1,
            titleFont: {family:"'Space Mono',monospace",weight:'700',size:11},
            bodyFont: {family:"'Space Mono',monospace",size:11},
            displayColors: true,
            filter: function(item){return item.raw!==null;},
            callbacks: {
              title: function(items){
                const m=items[0].parsed.x;
                return `Year ${Math.floor(m/12)+1}, Month ${(m%12)+1}`;
              },
              label: function(c){
                if(c.parsed.y==null)return null;
                const v=c.parsed.y;
                const f=v>=1e6?(v/1e6).toFixed(1)+'M':Math.round(v/1000)+'K';
                return ` ${c.dataset.label}: ${f}`;
              }
            }
          }
        },
        scales: {
          x: {
            min: 0, max: 24,
            grid: { display: false },
            ticks: {
              font:{family:"'Space Mono',monospace",size:12,weight:'700'},
              color: '#aaa',
              callback: function(v,i){return i%12===0?'Year '+((i/12)+1):'';},
              maxRotation: 0, autoSkip: false
            },
            border: { color: '#ddd' }
          },
          y: {
            beginAtZero: true,
            max: 60000,
            grid: { color: '#e8e5da' },
            border: { display: false },
            ticks: {
              font:{family:"'Space Mono',monospace",size:12},
              color: '#bbb',
              callback: function(v){
                if(v===0)return '0';
                if(v>=1e6) return Math.round(v/1e6)+'M';
                return Math.round(v/1000)+'K';
              }
            }
          }
        },
        animation: false
      },
      plugins: [clipReveal, lineLabels]
    });

    // ── Intro storytelling sequence ──
    const storyLabel = document.getElementById('storyLabel');
    const storyOrdinal = document.getElementById('storyOrdinal');
    const storyName = document.getElementById('storyName');
    const storyPhoto = document.getElementById('storyPhoto');

    const headshots = [
      'johnny-harris.jpeg',
      'sam-ellis.png',
      'christophe.png',
      'max-fisher.png',
    ];

    function showLabel(index) {
      storyOrdinal.textContent = ordinals[index];
      storyName.textContent = channelNames[index];
      storyOrdinal.style.color = colors[index];
      storyName.style.color = colors[index];
      storyPhoto.src = headshots[index];
      storyPhoto.style.borderColor = colors[index];
      storyLabel.classList.add('visible');
    }
    function hideLabel() {
      storyLabel.classList.remove('visible');
    }

    // Smooth y-axis transition (isolated from line drawing)
    function animateYAxis(targetY, duration) {
      return new Promise(resolve => {
        const startY = chart.options.scales.y.max;
        if (Math.abs(startY - targetY) / Math.max(startY, targetY) < 0.05) {
          chart.options.scales.y.max = targetY;
          chart.update('none');
          resolve();
          return;
        }
        const startTime = performance.now();
        function tick(now) {
          const t = Math.min((now - startTime) / duration, 1);
          const ss = t * t * (3 - 2 * t); // smoothstep
          chart.options.scales.y.max = lerp(startY, targetY, ss);
          chart.update('none');
          if (t < 1) requestAnimationFrame(tick);
          else resolve();
        }
        requestAnimationFrame(tick);
      });
    }

    // Fade in the fill shading after line draw completes (fire-and-forget)
    function fadeInFill(dsIndex, duration) {
      const [r,g,b] = fillRGB[dsIndex];
      const targetAlpha = 0.08;
      const startTime = performance.now();
      chart.data.datasets[dsIndex].backgroundColor = `rgba(${r},${g},${b},0)`;
      chart.data.datasets[dsIndex].fill = true;

      function tick(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const alpha = targetAlpha * (t * t * (3 - 2 * t)); // smoothstep fade
        chart.data.datasets[dsIndex].backgroundColor = `rgba(${r},${g},${b},${alpha.toFixed(4)})`;
        chart.update('none');
        if (t < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // Draw on one channel — clip-mask, no y-axis changes during draw
    function drawOnChannel(dsIndex, maxIdx) {
      return new Promise(resolve => {
        const src = fullData[dsIndex];
        const data = chart.data.datasets[dsIndex].data;
        const pointCount = Math.min(maxIdx + 1, src.length);
        const dataEndMonth = pointCount - 1; // actual last month with data

        // Pre-fill ALL data at once
        for (let j = 0; j < pointCount; j++) data[j] = src[j];

        // Disable fill during draw-on
        chart.data.datasets[dsIndex].fill = false;

        // Start with clip at month 0
        revealMonth[dsIndex] = 0;

        // Duration proportional to data length (min 2s, max 4.5s)
        const duration = Math.max(2000, (dataEndMonth / 24) * 4500);
        const startTime = performance.now();

        function tick(now) {
          const elapsed = now - startTime;
          const t = Math.min(elapsed / duration, 1);
          // Ease-out cubic for natural deceleration at end
          const easeOut = 1 - Math.pow(1 - t, 3);
          // Blend: 70% linear + 30% ease-out
          const progress = t * 0.7 + easeOut * 0.3;

          // Move clip edge to actual data end, NOT maxIdx
          revealMonth[dsIndex] = progress * dataEndMonth;

          chart.update('none');

          if (t < 1) {
            requestAnimationFrame(tick);
          } else {
            // Remove clip — start fill fade-in
            revealMonth[dsIndex] = null;
            fadeInFill(dsIndex, 700);
            chart.update('none');
            resolve();
          }
        }
        requestAnimationFrame(tick);
      });
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Compute target y-axis for channels 0..upTo
    function computeTargetY(upTo, maxIdx) {
      let peak = 0;
      for (let k = 0; k <= upTo; k++) {
        const d = fullData[k];
        const limit = Math.min(maxIdx + 1, d.length);
        for (let j = 0; j < limit; j++) {
          if (d[j] > peak) peak = d[j];
        }
      }
      return peak * 1.3;
    }

    async function introSequence() {
      const visibleMonths = 24;

      for (let i = 0; i < 4; i++) {
        const targetY = computeTargetY(i, visibleMonths);

        showLabel(i);

        // Animate y-axis BEFORE drawing (prevents stutter during line draw)
        const currentY = chart.options.scales.y.max;
        if (targetY > currentY * 1.3 || targetY < currentY * 0.6) {
          await animateYAxis(targetY, 600);
          await wait(250);
        } else {
          chart.options.scales.y.max = targetY;
          chart.update('none');
          await wait(500);
        }

        await drawOnChannel(i, visibleMonths);
        await wait(400);
        hideLabel();
        await wait(300);
      }

      // Show the button
      await wait(300);
      const btn = document.getElementById('growBtn');
      btn.classList.add('visible');
    }

    introSequence();

    // ── Toggle expand/collapse ──
    let expanded = false;
    let animating = false;

    function toggleChart() {
      if (animating) return;
      animating = true;
      const btn = document.getElementById('growBtn');
      btn.disabled = true;

      // Gentle ease for both directions
      function smoothStep(t) {
        return t * t * (3 - 2 * t);
      }

      if (!expanded) {
        // Fill in all full data beyond month 24
        for (let i = 0; i < 4; i++) {
          const src = fullData[i];
          const data = chart.data.datasets[i].data;
          for (let j = 0; j < src.length; j++) data[j] = src[j];
        }

        // Expand — 8 seconds, smooth
        const durationMs = 8000;
        const startX = 24, endX = maxMonths;
        const startY = chart.options.scales.y.max;
        const endY = 8500000;
        const t0 = performance.now();

        function tickExpand(now) {
          const t = smoothStep(Math.min((now - t0) / durationMs, 1));
          chart.options.scales.x.max = Math.round(startX + (endX - startX) * t);
          chart.options.scales.y.max = startY + (endY - startY) * t;
          chart.update('none');
          if ((now - t0) < durationMs) {
            requestAnimationFrame(tickExpand);
          } else {
            expanded = true;
            animating = false;
            btn.disabled = false;
            btn.textContent = 'Show Year 1\u20133';
          }
        }
        requestAnimationFrame(tickExpand);

      } else {
        // Collapse — 5 seconds, smooth
        const durationMs = 5000;
        const startX = maxMonths, endX = 24;
        const startY = 8500000, endY = 1000000;
        const t0 = performance.now();

        function tickCollapse(now) {
          const t = smoothStep(Math.min((now - t0) / durationMs, 1));
          chart.options.scales.x.max = Math.round(startX + (endX - startX) * t);
          chart.options.scales.y.max = startY + (endY - startY) * t;
          chart.update('none');
          if ((now - t0) < durationMs) {
            requestAnimationFrame(tickCollapse);
          } else {
            expanded = false;
            animating = false;
            btn.disabled = false;
            btn.textContent = 'Show Year 1\u201310';
          }
        }
        requestAnimationFrame(tickCollapse);
      }
    }
  </script>
</body>
</html>
