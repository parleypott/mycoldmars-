<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Growth — Newpress</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Mono', monospace;
      background: #F4F2E6;
      color: #121118;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .chart-container {
      max-width: 1000px;
      width: 100%;
    }

    .chart-wrapper {
      position: relative;
      width: 100%;
      height: 520px;
    }

    .chart-caption {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #aaa;
      margin-top: 20px;
      text-align: center;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="chart-container">
    <div class="chart-wrapper">
      <canvas id="growthChart"></canvas>
    </div>
    <div class="chart-caption">
      YouTube subscribers, Johnny Harris channel. [ Data via public tracking sites. ]
    </div>
  </div>

  <script>
    // Raw milestone data
    const milestones = [
      { date: '2018-01-01', subs: 15000 },
      { date: '2018-06-01', subs: 30000 },
      { date: '2018-12-01', subs: 55000 },
      { date: '2019-06-01', subs: 95000 },
      { date: '2019-12-01', subs: 170000 },
      { date: '2020-01-01', subs: 200000 },
      { date: '2020-04-01', subs: 280000 },
      { date: '2020-07-16', subs: 390000 },
      { date: '2020-08-24', subs: 487000 },
      { date: '2020-10-07', subs: 572000 },
      { date: '2020-12-01', subs: 640000 },
      { date: '2021-01-25', subs: 702000 },
      { date: '2021-03-10', subs: 910000 },
      { date: '2021-04-30', subs: 1210000 },
      { date: '2021-06-18', subs: 1490000 },
      { date: '2021-08-10', subs: 1610000 },
      { date: '2021-10-01', subs: 1780000 },
      { date: '2021-12-01', subs: 2000000 },
      { date: '2022-02-19', subs: 2190000 },
      { date: '2022-06-01', subs: 2600000 },
      { date: '2022-09-01', subs: 2950000 },
      { date: '2023-01-12', subs: 3400000 },
      { date: '2023-06-01', subs: 3900000 },
      { date: '2023-09-01', subs: 4200000 },
      { date: '2024-01-25', subs: 4840000 },
      { date: '2024-06-01', subs: 5400000 },
      { date: '2024-09-01', subs: 5800000 },
      { date: '2025-01-11', subs: 6260000 },
      { date: '2025-06-01', subs: 6800000 },
      { date: '2025-10-01', subs: 7100000 },
      { date: '2026-01-01', subs: 7350000 },
      { date: '2026-04-10', subs: 7640000 },
    ];

    // Interpolate to monthly
    function lerp(a, b, t) { return a + (b - a) * t; }
    function toTs(d) { return new Date(d).getTime(); }

    const monthlyData = [];
    const startDate = new Date('2018-01-01');
    const endDate = new Date('2026-04-01');
    let d = new Date(startDate);

    while (d <= endDate) {
      const ts = d.getTime();
      let before = milestones[0], after = milestones[milestones.length - 1];
      for (let i = 0; i < milestones.length - 1; i++) {
        if (ts >= toTs(milestones[i].date) && ts <= toTs(milestones[i + 1].date)) {
          before = milestones[i];
          after = milestones[i + 1];
          break;
        }
      }
      const t = (ts - toTs(before.date)) / (toTs(after.date) - toTs(before.date) || 1);
      const subs = Math.round(lerp(before.subs, after.subs, Math.max(0, Math.min(1, t))));
      monthlyData.push({ x: new Date(d), y: subs });
      d = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    }

    // Year-start data points for the dots (Jan of each year)
    const yearDots = monthlyData.filter(p => p.x.getMonth() === 0);

    // Colors
    const red = '#C0392B';
    const redLight = 'rgba(192, 57, 43, 0.08)';

    // Year labels: 2019 = Year 1
    const yearLabelMap = {};
    for (let yr = 2019; yr <= 2026; yr++) {
      yearLabelMap[yr] = 'Year ' + (yr - 2018);
    }

    // End-point callout plugin
    const endCallout = {
      id: 'endCallout',
      afterDraw(chart) {
        const meta = chart.getDatasetMeta(0);
        if (!meta || !meta.data.length) return;
        const lastPt = meta.data[meta.data.length - 1];
        const x = lastPt.x;
        const y = lastPt.y;
        const ctx = chart.ctx;
        const lastVal = monthlyData[monthlyData.length - 1].y;
        const label = (lastVal / 1e6).toFixed(1) + 'M';

        ctx.save();

        // Open circle (ring)
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.strokeStyle = red;
        ctx.lineWidth = 2;
        ctx.fillStyle = '#F4F2E6';
        ctx.fill();
        ctx.stroke();

        // Big number
        ctx.font = "bold 36px 'Instrument Serif', serif";
        ctx.fillStyle = red;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'bottom';
        ctx.fillText(label, chart.chartArea.right, chart.chartArea.top - 12);

        // "SUBSCRIBERS" label
        ctx.font = "bold 11px 'Space Mono', monospace";
        ctx.fillStyle = red;
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillText('SUBSCRIBERS', chart.chartArea.right, chart.chartArea.top - 10);

        ctx.restore();
      }
    };

    // Tracing dot
    let dotProgress = 0;
    let dotFinished = false;
    let dotStartTime = null;
    const DOT_DURATION = 12000;

    const tracingDot = {
      id: 'tracingDot',
      afterDraw(chart) {
        if (dotFinished) return;
        const meta = chart.getDatasetMeta(0);
        if (!meta || !meta.data.length) return;

        const ctx = chart.ctx;
        const totalPoints = meta.data.length;
        const rawIndex = dotProgress * (totalPoints - 1);
        const currentIndex = Math.min(Math.floor(rawIndex), totalPoints - 1);
        const frac = rawIndex - currentIndex;

        let x, y;
        const pt = meta.data[currentIndex];
        if (currentIndex < totalPoints - 1) {
          const nextPt = meta.data[currentIndex + 1];
          x = pt.x + (nextPt.x - pt.x) * frac;
          y = pt.y + (nextPt.y - pt.y) * frac;
        } else {
          x = pt.x;
          y = pt.y;
        }

        // Interpolated values
        const d1 = monthlyData[currentIndex];
        let displaySubs;
        if (currentIndex < totalPoints - 1) {
          const d2 = monthlyData[currentIndex + 1];
          displaySubs = Math.round(lerp(d1.y, d2.y, frac));
        } else {
          displaySubs = d1.y;
        }

        const subsStr = displaySubs >= 1000000
          ? (displaySubs / 1000000).toFixed(1).replace(/\.0$/, '') + 'M'
          : Math.round(displaySubs / 1000) + 'K';

        ctx.save();

        // Glow
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(192, 57, 43, 0.12)';
        ctx.fill();

        // Dot
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = red;
        ctx.fill();

        // Sub count label
        const chartArea = chart.chartArea;
        let labelX = x, textAlign = 'center';
        if (x < chartArea.left + 70) { labelX = x + 14; textAlign = 'left'; }
        else if (x > chartArea.right - 70) { labelX = x - 14; textAlign = 'right'; }

        ctx.font = "bold 15px 'Space Mono', monospace";
        ctx.fillStyle = red;
        ctx.textAlign = textAlign;
        ctx.textBaseline = 'bottom';
        ctx.fillText(subsStr, labelX, y - 16);

        ctx.restore();
      }
    };

    function easeInOutQuart(t) {
      return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
    }

    function animateDot(chartInstance) {
      function tick(timestamp) {
        if (!dotStartTime) dotStartTime = timestamp;
        const elapsed = timestamp - dotStartTime;
        const linear = Math.min(elapsed / DOT_DURATION, 1);
        dotProgress = easeInOutQuart(linear);
        chartInstance.draw();
        if (linear >= 1) {
          dotFinished = true;
          chartInstance.draw();
          return;
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // Chart
    const ctx = document.getElementById('growthChart').getContext('2d');

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        datasets: [
          // Main line
          {
            data: monthlyData,
            borderColor: red,
            backgroundColor: redLight,
            borderWidth: 2.5,
            pointRadius: 0,
            pointHoverRadius: 0,
            tension: 0.3,
            fill: true
          },
          // Yearly dots
          {
            data: yearDots,
            borderColor: red,
            backgroundColor: red,
            borderWidth: 0,
            pointRadius: 4,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: red,
            showLine: false,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: {
          padding: { top: 60, right: 10 }
        },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(255,255,255,0.95)',
            titleColor: '#333',
            bodyColor: '#666',
            borderColor: '#e0e0e0',
            borderWidth: 1,
            titleFont: { family: "'Space Mono', monospace", weight: '700' },
            bodyFont: { family: "'Space Mono', monospace" },
            displayColors: false,
            filter: function(item) { return item.datasetIndex === 0; },
            callbacks: {
              title: function(items) {
                const dt = new Date(items[0].parsed.x);
                const yr = dt.getFullYear();
                const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                const yearLabel = yearLabelMap[yr] ? ` (${yearLabelMap[yr]})` : '';
                return monthNames[dt.getMonth()] + ' ' + yr + yearLabel;
              },
              label: function(context) {
                const v = context.parsed.y;
                return v >= 1000000
                  ? (v / 1000000).toFixed(1) + 'M subscribers'
                  : Math.round(v / 1000) + 'K subscribers';
              }
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: 'year', displayFormats: { year: 'yyyy' } },
            grid: { display: false },
            ticks: {
              font: { family: "'Space Mono', monospace", size: 12, weight: '700' },
              color: '#aaa',
              callback: function(value) {
                const yr = new Date(value).getFullYear();
                if (yr < 2019) return '';
                return yearLabelMap[yr] || '';
              }
            },
            border: { color: '#ddd' }
          },
          y: {
            beginAtZero: true,
            grid: { color: '#e8e5da' },
            border: { display: false },
            ticks: {
              font: { family: "'Space Mono', monospace", size: 12 },
              color: '#bbb',
              callback: function(v) {
                if (v === 0) return '0';
                return v >= 1000000 ? (v / 1000000) + 'M' : (v / 1000) + 'K';
              },
              stepSize: 2000000
            }
          }
        },
        animation: false
      },
      plugins: [endCallout, tracingDot]
    });

    animateDot(chart);
  </script>
</body>
</html>
