<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapKeys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.css" rel="stylesheet">
</head>
<body>
  <div id="map"></div>

  <div id="topbar">
    <div id="brand">MAPKEYS</div>
    <label class="btn upload-btn">
      <input type="file" id="kml-file" accept=".kml,.kmz,.xml" hidden>
      Upload KML / KMZ
    </label>
    <button class="btn ghost hidden" id="clear-route">Clear Route</button>
    <span id="route-info"></span>

    <div id="route-style" class="hidden">
      <label class="rs-field">
        <span>Color</span>
        <input type="color" id="rs-color" value="#2b2a26">
      </label>
      <label class="rs-field">
        <span>Width</span>
        <input type="range" id="rs-width" min="1" max="12" step="0.5" value="3">
        <span class="rs-val" id="rs-width-val">3</span>
      </label>
      <label class="rs-field">
        <span>Opacity</span>
        <input type="range" id="rs-opacity" min="10" max="100" step="5" value="100">
        <span class="rs-val"><span id="rs-opacity-val">100</span>%</span>
      </label>
      <label class="rs-field">
        <span>Dashed</span>
        <input type="checkbox" id="rs-dashed">
      </label>
      <label class="rs-field">
        <span>Trail</span>
        <input type="checkbox" id="rs-trail" checked>
      </label>
    </div>
  </div>

  <div id="draw-bar" class="hidden">
    <span class="db-label">DRAW</span>
    <input type="range" id="draw-slider" min="0" max="1000" step="1" value="0">
    <span class="db-val"><span id="draw-val">0</span>%</span>
  </div>

  <div id="timeline">
    <div id="timeline-controls">
      <button class="btn primary" id="add-kf">+ Keyframe</button>
      <button class="btn" id="play-btn">▶ Play</button>
      <button class="btn ghost" id="reset-btn">⏮</button>
      <div id="time-display"><span id="time-cur">0.0</span> / <span id="time-total">0.0</span>s</div>
      <div class="spacer"></div>
      <button class="btn ghost" id="export-btn">Export JSON</button>
      <label class="btn ghost">
        <input type="file" id="import-file" accept=".json" hidden>
        Import JSON
      </label>
      <button class="btn primary" id="gif-btn">Render GIF</button>
    </div>

    <div id="kf-row">
      <div id="kf-list"></div>
    </div>

    <div id="kf-editor" class="hidden">
      <div class="ed-row">
        <label class="field">
          <span>Duration to next</span>
          <input type="number" id="kf-duration" min="0" step="0.1" value="2">
          <span class="suffix">s</span>
        </label>
        <label class="field">
          <span>Easing</span>
          <select id="kf-easing">
            <option value="linear">linear</option>
            <option value="easeIn">ease in</option>
            <option value="easeOut">ease out</option>
            <option value="easeInOut">ease in-out</option>
          </select>
        </label>
        <label class="field">
          <span>Route drawn at this kf</span>
          <input type="number" id="kf-progress" min="0" max="100" step="1" value="0">
          <span class="suffix">%</span>
        </label>
        <div class="field-note">
          Speed = Δprogress / duration · curved by easing.<br>
          Camera + route share this segment, so they're synced.
        </div>
        <div class="ed-actions">
          <button class="btn primary" id="kf-update-view">Update Keyframe</button>
          <button class="btn ghost danger" id="kf-delete">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div id="gif-modal" class="hidden">
    <div id="gif-card">
      <div id="gif-title">RENDER GIF</div>
      <div id="gif-rule"></div>

      <label class="gif-field">
        <span>Speed</span>
        <input type="range" id="gif-speed" min="10" max="400" step="5" value="100">
        <span class="gif-val"><span id="gif-speed-val">100</span>%</span>
      </label>

      <label class="gif-field">
        <span>Frames / sec</span>
        <input type="range" id="gif-fps" min="10" max="30" step="1" value="20">
        <span class="gif-val"><span id="gif-fps-val">20</span> fps</span>
      </label>

      <label class="gif-field">
        <span>Scale</span>
        <input type="range" id="gif-scale" min="25" max="100" step="5" value="60">
        <span class="gif-val"><span id="gif-scale-val">60</span>%</span>
      </label>

      <div class="gif-summary" id="gif-summary"></div>

      <div id="gif-progress" class="hidden">
        <div id="gif-progress-bar"><div id="gif-progress-fill"></div></div>
        <div id="gif-progress-label">Capturing frames…</div>
      </div>

      <div class="gif-actions">
        <button class="btn ghost" id="gif-cancel">Cancel</button>
        <button class="btn primary" id="gif-go">Render</button>
      </div>
    </div>
  </div>

  <div id="hint">
    <kbd>Space</kbd> play/pause &nbsp; <kbd>K</kbd> add &nbsp; <kbd>U</kbd> update &nbsp; <kbd>←</kbd>/<kbd>→</kbd> select &nbsp; <kbd>Delete</kbd> remove
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
