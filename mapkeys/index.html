<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapKeys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.css" rel="stylesheet">
</head>
<body>
  <div id="map"></div>

  <div id="topbar">
    <div id="brand">MAPKEYS</div>
    <label class="btn upload-btn">
      <input type="file" id="kml-file" accept=".kml,.xml" hidden>
      Upload KML
    </label>
    <button class="btn ghost hidden" id="clear-route">Clear Route</button>
    <span id="route-info"></span>
  </div>

  <div id="timeline">
    <div id="timeline-controls">
      <button class="btn primary" id="add-kf">+ Keyframe</button>
      <button class="btn" id="play-btn">▶ Play</button>
      <button class="btn ghost" id="reset-btn">⏮</button>
      <div id="time-display"><span id="time-cur">0.0</span> / <span id="time-total">0.0</span>s</div>
      <div class="spacer"></div>
      <button class="btn ghost" id="export-btn">Export JSON</button>
      <label class="btn ghost">
        <input type="file" id="import-file" accept=".json" hidden>
        Import JSON
      </label>
    </div>

    <div id="kf-row">
      <div id="kf-list"></div>
    </div>

    <div id="kf-editor" class="hidden">
      <div class="ed-row">
        <label class="field">
          <span>Duration to next</span>
          <input type="number" id="kf-duration" min="0" step="0.1" value="2">
          <span class="suffix">s</span>
        </label>
        <label class="field">
          <span>Easing</span>
          <select id="kf-easing">
            <option value="linear">linear</option>
            <option value="easeIn">ease in</option>
            <option value="easeOut">ease out</option>
            <option value="easeInOut">ease in-out</option>
          </select>
        </label>
        <label class="field">
          <span>Route progress</span>
          <input type="number" id="kf-progress" min="0" max="100" step="1" value="0">
          <span class="suffix">%</span>
        </label>
        <div class="ed-actions">
          <button class="btn" id="kf-update-view">Re-capture View</button>
          <button class="btn ghost danger" id="kf-delete">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div id="hint">
    <kbd>Space</kbd> play/pause &nbsp; <kbd>K</kbd> add keyframe &nbsp; <kbd>←</kbd>/<kbd>→</kbd> select
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
