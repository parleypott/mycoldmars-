<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sacred Sequencer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Monoton&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --rw-night:    #0a0526;
    --rw-deep:     #1a0044;
    --rw-cyan:     #b8f4ff;
    --rw-gold:     #ffe7a3;
    --rw-cream:    #fff7e6;
    --rw-halo:     #ffeec8;
    --rw-pink:     #ff8fdc;
    --rw-chrome:   #fbf6ff;
    --rw-ease:     cubic-bezier(0.23, 1, 0.32, 1);
    --mono:        'JetBrains Mono', 'GT Pressura Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--rw-chrome);
    background: radial-gradient(120% 80% at 50% 0%, rgba(255, 143, 220, 0.10) 0%, transparent 55%),
                radial-gradient(140% 100% at 50% 110%, rgba(184, 244, 255, 0.08) 0%, transparent 60%),
                var(--rw-night);
    padding: 18px 16px 22px;
    user-select: none;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* faint scanlines over everything */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(255, 247, 230, 0.025) 0 1px,
      transparent 1px 4px);
    mix-blend-mode: overlay;
    z-index: 1;
  }

  /* perspective grid floor — restrained for small panel */
  body::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    bottom: -55vh;
    height: 100vh;
    background:
      linear-gradient(180deg,
        transparent 0%,
        rgba(40, 20, 80, 0.45) 60%,
        rgba(10, 5, 38, 0.7) 100%),
      repeating-linear-gradient(to right,
        rgba(255, 231, 163, 0.22) 0 1px,
        transparent 1px 56px),
      repeating-linear-gradient(to bottom,
        rgba(255, 231, 163, 0.22) 0 1px,
        transparent 1px 40px);
    transform: perspective(380px) rotateX(60deg);
    transform-origin: 50% 0%;
    pointer-events: none;
    z-index: 0;
    filter: drop-shadow(0 -6px 14px rgba(255, 231, 163, 0.12));
  }

  .wrap { position: relative; z-index: 2; }

  h1 {
    font-family: 'Monoton', 'Major Mono Display', var(--mono);
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.06em;
    line-height: 0.95;
    text-transform: uppercase;
    margin-bottom: 6px;
    background: linear-gradient(180deg, #ffffff 0%, #fff5e0 38%, var(--rw-halo) 70%, #e8a890 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(255, 240, 210, 0.35));
  }

  .subtitle {
    font-family: 'Major Mono Display', var(--mono);
    font-size: 9px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255, 235, 200, 0.7);
    margin-bottom: 22px;
    padding-left: 0.4em;
  }

  .version-tag {
    color: var(--rw-cyan);
    letter-spacing: 0.2em;
  }

  .field { margin-bottom: 16px; }

  label {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(184, 244, 255, 0.72);
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    padding: 8px 10px;
    background: rgba(10, 5, 38, 0.55);
    border: 1px solid rgba(184, 244, 255, 0.18);
    border-radius: 2px;
    color: var(--rw-chrome);
    font-family: var(--mono);
    font-size: 12px;
    transition: border-color 220ms var(--rw-ease);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  input:focus, select:focus {
    outline: none;
    border-color: rgba(255, 231, 163, 0.55);
  }

  .btn {
    width: 100%;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    padding: 11px 14px;
    margin-bottom: 8px;
    border: 1px solid rgba(184, 244, 255, 0.32);
    border-radius: 2px;
    background: rgba(10, 5, 38, 0.4);
    color: rgba(255, 247, 230, 0.88);
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition:
      background 220ms var(--rw-ease),
      color 220ms var(--rw-ease),
      border-color 220ms var(--rw-ease),
      transform 140ms var(--rw-ease);
  }
  .btn:hover {
    background: rgba(184, 244, 255, 0.06);
    border-color: rgba(184, 244, 255, 0.55);
    color: #fff;
  }
  .btn:active { transform: scale(0.985); }

  .btn-primary {
    border-color: rgba(255, 231, 163, 0.55);
    color: var(--rw-halo);
    background: rgba(255, 231, 163, 0.06);
  }
  .btn-primary:hover {
    border-color: var(--rw-halo);
    background: rgba(255, 231, 163, 0.14);
    color: #fff;
  }
  .btn-primary:disabled {
    border-color: rgba(184, 244, 255, 0.14);
    color: rgba(255, 247, 230, 0.32);
    background: rgba(10, 5, 38, 0.3);
    cursor: default;
    transform: none;
  }
  .btn-secondary {} /* same as base .btn */

  #status {
    margin-top: 14px;
    padding: 10px 12px;
    border-radius: 2px;
    font-size: 11px;
    line-height: 1.55;
    display: none;
    font-family: var(--mono);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    white-space: pre-wrap;
  }
  #status.ok  { display: block; background: rgba(13, 89, 33, 0.22); border: 1px solid rgba(120, 220, 150, 0.45); color: #c8f4d4; }
  #status.err { display: block; background: rgba(221, 44, 30, 0.18); border: 1px solid rgba(255, 140, 130, 0.45); color: #ffc8c2; }
  #status.info{ display: block; background: rgba(184, 244, 255, 0.08); border: 1px solid rgba(184, 244, 255, 0.32); color: var(--rw-cyan); }

  .bite-count {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 235, 200, 0.6);
    margin-top: 8px;
  }

  #sequences {
    max-height: 160px;
    overflow-y: auto;
    border: 1px solid rgba(184, 244, 255, 0.12);
    background: rgba(10, 5, 38, 0.45);
    border-radius: 2px;
    padding: 4px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #sequences::-webkit-scrollbar { width: 5px; }
  #sequences::-webkit-scrollbar-thumb { background: rgba(184, 244, 255, 0.25); border-radius: 2px; }

  .seq-item {
    padding: 7px 10px;
    cursor: pointer;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(255, 247, 230, 0.78);
    border: 1px solid transparent;
    transition: background 180ms var(--rw-ease), border-color 180ms var(--rw-ease), color 180ms var(--rw-ease);
  }
  .seq-item:hover {
    background: rgba(184, 244, 255, 0.05);
    color: #fff;
    border-color: rgba(184, 244, 255, 0.18);
  }
  .seq-item.selected {
    background: rgba(255, 231, 163, 0.10);
    color: var(--rw-halo);
    border-color: rgba(255, 231, 163, 0.55);
  }

  /* diagnostic blocks */
  pre {
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.5;
    color: rgba(255, 200, 194, 0.92);
    background: rgba(221, 44, 30, 0.08);
    border: 1px solid rgba(255, 140, 130, 0.25);
    border-radius: 2px;
    padding: 8px 10px;
    margin: 6px 0;
    white-space: pre-wrap;
    word-break: break-word;
  }
  em { font-style: normal; }
  code {
    font-family: var(--mono);
    background: rgba(184, 244, 255, 0.08);
    padding: 1px 5px;
    border-radius: 2px;
    color: var(--rw-cyan);
  }

  hr.divider {
    border: 0;
    border-top: 1px solid rgba(184, 244, 255, 0.14);
    margin: 18px 0;
  }

  .preflight {
    border: 1px solid rgba(184, 244, 255, 0.12);
    background: rgba(10, 5, 38, 0.45);
    border-radius: 2px;
    padding: 6px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .pf-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 6px 8px;
    font-size: 11px;
    border-radius: 2px;
  }
  .pf-row + .pf-row { border-top: 1px solid rgba(184, 244, 255, 0.06); }
  .pf-name {
    color: rgba(255, 247, 230, 0.85);
    overflow-wrap: anywhere;
  }
  .pf-meta {
    flex-shrink: 0;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .pf-meta.found  { color: #c8f4d4; }
  .pf-meta.missing { color: #ffc8c2; }
  .pf-count {
    flex-shrink: 0;
    font-size: 10px;
    color: rgba(184, 244, 255, 0.55);
    letter-spacing: 0.12em;
  }
  .pf-clickable { cursor: pointer; transition: background 140ms var(--rw-ease); }
  .pf-clickable:hover { background: rgba(184, 244, 255, 0.04); }

  .pf-picker {
    border-top: 1px solid rgba(184, 244, 255, 0.10);
    padding: 8px 8px 10px;
    background: rgba(10, 5, 38, 0.55);
  }
  .pf-picker-label {
    font-size: 9px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(184, 244, 255, 0.62);
    margin-bottom: 6px;
  }
  .pf-search {
    width: 100%;
    padding: 6px 8px;
    background: rgba(10, 5, 38, 0.7);
    border: 1px solid rgba(184, 244, 255, 0.18);
    border-radius: 2px;
    color: var(--rw-chrome);
    font-family: var(--mono);
    font-size: 11px;
    margin-bottom: 6px;
  }
  .pf-search:focus {
    outline: none;
    border-color: rgba(255, 231, 163, 0.55);
  }
  .pf-pick-list {
    max-height: 160px;
    overflow-y: auto;
    border-radius: 2px;
  }
  .pf-pick-list::-webkit-scrollbar { width: 5px; }
  .pf-pick-list::-webkit-scrollbar-thumb { background: rgba(184, 244, 255, 0.20); border-radius: 2px; }
  .pf-pick {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    font-size: 11px;
    color: rgba(255, 247, 230, 0.78);
    cursor: pointer;
    border-radius: 2px;
    border: 1px solid transparent;
    transition: background 140ms var(--rw-ease), border-color 140ms var(--rw-ease), color 140ms var(--rw-ease);
  }
  .pf-pick:hover {
    background: rgba(255, 231, 163, 0.08);
    border-color: rgba(255, 231, 163, 0.35);
    color: var(--rw-halo);
  }
  .pf-suggest {
    flex-shrink: 0;
    font-size: 8px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--rw-cyan);
    background: rgba(184, 244, 255, 0.08);
    padding: 2px 6px;
    border-radius: 2px;
    margin-left: 8px;
  }
  .pf-clear {
    margin-top: 8px;
    width: 100%;
    background: transparent;
    border: 1px solid rgba(255, 140, 130, 0.35);
    color: rgba(255, 200, 194, 0.85);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 140ms var(--rw-ease), border-color 140ms var(--rw-ease), color 140ms var(--rw-ease);
  }
  .pf-clear:hover {
    background: rgba(221, 44, 30, 0.12);
    border-color: rgba(255, 140, 130, 0.7);
    color: #ffd6d0;
  }
</style>
</head>
<body>

<div class="wrap">

<h1>Sacred Sequencer</h1>
<p class="subtitle">nest &middot; arrange &middot; propagate <span class="version-tag">v2.1</span></p>

<div class="field">
  <label>Soundbites JSON</label>
  <button class="btn btn-secondary" id="load-btn">Load JSON file</button>
  <input type="file" id="file-input" accept=".json" hidden>
  <div class="bite-count" id="bite-count"></div>
</div>

<div class="field" id="preflight-field" style="display:none;">
  <label>Source Sequences</label>
  <div id="preflight" class="preflight"></div>
</div>

<button class="btn btn-primary" id="build-btn" disabled>Build Sacred Selects</button>

<div id="status"></div>

</div>

<script>
// ── Minimal CSInterface ──
// Adobe's CSInterface.js is large; we only need evalScript + getSystemPath.
// This is the minimal implementation for CEP panels.

function CSInterface() {}

CSInterface.prototype.evalScript = function(script, callback) {
  if (typeof callback !== 'function') callback = function() {};
  try {
    window.__adobe_cep__.evalScript(script, callback);
  } catch (e) {
    callback('EvalScript error: ' + e.message);
  }
};

CSInterface.prototype.getSystemPath = function(type) {
  return window.__adobe_cep__.getSystemPath(type);
};

// ── App ──

var cs = new CSInterface();
var soundbiteData = null;
var availableSequences = []; // names from the open Premiere project
var sequenceListReady = false;
var sequenceListError = null;
var mappings = loadMappings();      // { jsonName: premiereName } — persisted
var openPickerFor = null;           // which JSON name has its picker expanded

function loadMappings() {
  try {
    var raw = localStorage.getItem('sacred-mappings');
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}
function saveMappings() {
  try { localStorage.setItem('sacred-mappings', JSON.stringify(mappings)); } catch (e) {}
}

// Pick the best Premiere sequence to suggest for a given JSON-side name.
function suggestMatch(jsonName) {
  if (!jsonName) return null;
  // exact
  for (var i = 0; i < availableSequences.length; i++) {
    if (availableSequences[i] === jsonName) return availableSequences[i];
  }
  // Premiere name starts with JSON name — most common case (truncated speaker)
  for (var j = 0; j < availableSequences.length; j++) {
    if (availableSequences[j].indexOf(jsonName) === 0) return availableSequences[j];
  }
  // JSON name starts with Premiere name (other direction)
  for (var k = 0; k < availableSequences.length; k++) {
    if (jsonName.indexOf(availableSequences[k]) === 0) return availableSequences[k];
  }
  // contains
  for (var m = 0; m < availableSequences.length; m++) {
    if (availableSequences[m].indexOf(jsonName) !== -1 || jsonName.indexOf(availableSequences[m]) !== -1) return availableSequences[m];
  }
  return null;
}

// What sequence will the build actually use for this JSON name?
function resolveName(jsonName) {
  if (availableSequences.indexOf(jsonName) !== -1) return jsonName;
  if (mappings[jsonName] && availableSequences.indexOf(mappings[jsonName]) !== -1) return mappings[jsonName];
  return null;
}
// All-inline listSequences — no JSON (ES3). Two paths:
//   A) app.project.sequences.numSequences
//   B) walk projectItems via rootItem.children, test isSequence()
// Returns "OK|name1|name2|..." or "ERR|message".
var INLINE_LIST_SEQUENCES =
  '(function(){' +
  'try{' +
    'if(typeof app==="undefined"||!app.project){return "ERR|No project open.";}' +
    'var names=[];' +
    // Path A
    'try{' +
      'var seqs=app.project.sequences;' +
      'if(seqs&&typeof seqs.numSequences==="number"){' +
        'for(var i=0;i<seqs.numSequences;i++){' +
          'var s=seqs[i];' +
          'if(s&&s.name){names.push(s.name);}' +
        '}' +
      '}' +
    '}catch(eA){}' +
    // Path B (only if A found nothing) — recursive walk of project items
    'if(names.length===0&&app.project.rootItem){' +
      'var stack=[app.project.rootItem];' +
      'var guard=0;' +
      'while(stack.length>0&&guard<5000){' +
        'guard++;' +
        'var item=stack.pop();' +
        'if(!item||!item.children){continue;}' +
        'var n=item.children.numItems||0;' +
        'for(var ci=0;ci<n;ci++){' +
          'var ch=item.children[ci];' +
          'if(!ch){continue;}' +
          'try{' +
            'if(typeof ch.isSequence==="function"&&ch.isSequence()){' +
              'if(ch.name){names.push(ch.name);}' +
              'continue;' +
            '}' +
          '}catch(eB1){}' +
          'try{if(ch.children&&ch.children.numItems>0){stack.push(ch);}}catch(eB2){}' +
        '}' +
      '}' +
    '}' +
    'var out="OK";' +
    'for(var k=0;k<names.length;k++){out=out+"|"+names[k].replace(/\\|/g,"_");}' +
    'return out;' +
  '}catch(e){return "ERR|threw: "+e.message;}' +
  '})()';

function refreshSequences() {
  sequenceListReady = false;
  sequenceListError = null;

  cs.evalScript('1+1', function(bareResult) {
    cs.evalScript(INLINE_LIST_SEQUENCES, function(inlineResult) {
      if (!bareResult || String(bareResult).indexOf('error') !== -1) {
        sequenceListError = 'ExtendScript unavailable. Premiere 26 may have dropped CEP — message Johnny.';
        renderPreflight();
        return;
      }
      if (!inlineResult || String(inlineResult).indexOf('EvalScript error') !== -1) {
        sequenceListError = 'Could not list sequences (script error).';
        renderPreflight();
        return;
      }
      var parts = String(inlineResult).split('|');
      if (parts[0] === 'ERR') {
        sequenceListError = parts.slice(1).join('|');
        renderPreflight();
        return;
      }
      availableSequences = parts.slice(1);
      sequenceListReady = true;
      renderPreflight();
    });
  });
}

refreshSequences();

// Build a map of every sequence referenced in the loaded JSON, with counts.
function referencedSequences() {
  if (!soundbiteData) return [];
  var bites = Array.isArray(soundbiteData) ? soundbiteData : soundbiteData.soundbites;
  if (!bites) return [];
  var defaultName = (!Array.isArray(soundbiteData) && soundbiteData.sacredSequenceName) || null;
  var counts = {};
  for (var i = 0; i < bites.length; i++) {
    var name = bites[i].sequenceName || defaultName;
    if (!name) continue;
    counts[name] = (counts[name] || 0) + 1;
  }
  var rows = [];
  for (var k in counts) if (Object.prototype.hasOwnProperty.call(counts, k)) {
    rows.push({ name: k, count: counts[k] });
  }
  rows.sort(function(a, b) { return b.count - a.count; });
  return rows;
}

function renderPreflight() {
  var field = document.getElementById('preflight-field');
  var el = document.getElementById('preflight');

  if (!soundbiteData) {
    field.style.display = 'none';
    updateBuildBtn();
    return;
  }

  field.style.display = '';
  var rows = referencedSequences();

  if (!sequenceListReady && !sequenceListError) {
    el.innerHTML = '<div class="pf-row"><span class="pf-name" style="font-style:italic;color:rgba(184,244,255,0.55);">Reading project...</span></div>';
    updateBuildBtn();
    return;
  }

  if (sequenceListError) {
    el.innerHTML =
      '<div class="pf-row"><span class="pf-name" style="color:#ffc8c2;">' + escapeHtml(sequenceListError) + '</span></div>' +
      '<div class="pf-row" style="justify-content:flex-end;">' + refreshBtnSmall() + '</div>';
    bindRefreshSmall();
    updateBuildBtn();
    return;
  }

  var html = rows.map(function(r) {
    return renderPfRow(r);
  }).join('') + '<div class="pf-row" style="justify-content:flex-end;">' + refreshBtnSmall() + '</div>';
  el.innerHTML = html;
  bindRefreshSmall();
  bindPfRows();
  updateBuildBtn();
}

function renderPfRow(r) {
  var resolved = resolveName(r.name);
  var isMapped = resolved && resolved !== r.name;
  var isFound = resolved && !isMapped;
  var pickerOpen = openPickerFor === r.name;

  var statusHtml;
  if (isFound) {
    statusHtml = '<span class="pf-meta found">Found</span>';
  } else if (isMapped) {
    statusHtml = '<span class="pf-meta found" title="Mapped to ' + escapeHtml(resolved) + '">→ ' + escapeHtml(truncate(resolved, 22)) + '</span>';
  } else {
    statusHtml = '<span class="pf-meta missing">Missing</span>';
  }

  var rowHtml =
    '<div class="pf-row pf-clickable" data-name="' + escapeHtml(r.name) + '">' +
      '<span class="pf-name">' + escapeHtml(r.name) + '</span>' +
      '<span class="pf-count">' + r.count + '×</span>' +
      statusHtml +
    '</div>';

  if (pickerOpen) {
    rowHtml += renderPicker(r.name);
  }
  return rowHtml;
}

function renderPicker(jsonName) {
  var suggested = suggestMatch(jsonName);
  var ordered = availableSequences.slice();
  if (suggested) {
    ordered = [suggested].concat(ordered.filter(function(n) { return n !== suggested; }));
  }

  var listHtml = ordered.map(function(n, idx) {
    var isSuggested = idx === 0 && suggested === n;
    return '<div class="pf-pick" data-pick="' + escapeHtml(n) + '" data-for="' + escapeHtml(jsonName) + '">' +
      escapeHtml(n) +
      (isSuggested ? '<span class="pf-suggest">suggested</span>' : '') +
      '</div>';
  }).join('');

  var clearHtml = mappings[jsonName] ?
    '<button class="pf-clear" data-clear="' + escapeHtml(jsonName) + '">Clear mapping</button>' : '';

  return '<div class="pf-picker">' +
    '<div class="pf-picker-label">Map "' + escapeHtml(jsonName) + '" to:</div>' +
    '<input type="text" class="pf-search" data-search-for="' + escapeHtml(jsonName) + '" placeholder="Type to filter..." autofocus>' +
    '<div class="pf-pick-list">' + listHtml + '</div>' +
    clearHtml +
    '</div>';
}

function bindPfRows() {
  document.querySelectorAll('.pf-clickable').forEach(function(row) {
    row.addEventListener('click', function(e) {
      // Ignore clicks on inputs/buttons within an open picker
      if (e.target.closest && e.target.closest('.pf-picker')) return;
      var name = row.getAttribute('data-name');
      openPickerFor = (openPickerFor === name) ? null : name;
      renderPreflight();
    });
  });
  document.querySelectorAll('.pf-pick').forEach(function(item) {
    item.addEventListener('click', function(e) {
      e.stopPropagation();
      var jsonName = item.getAttribute('data-for');
      var pickName = item.getAttribute('data-pick');
      mappings[jsonName] = pickName;
      saveMappings();
      openPickerFor = null;
      renderPreflight();
    });
  });
  document.querySelectorAll('.pf-clear').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var jsonName = btn.getAttribute('data-clear');
      delete mappings[jsonName];
      saveMappings();
      renderPreflight();
    });
  });
  document.querySelectorAll('.pf-search').forEach(function(input) {
    input.addEventListener('click', function(e) { e.stopPropagation(); });
    input.addEventListener('input', function() {
      var q = input.value.toLowerCase();
      var list = input.parentNode.querySelector('.pf-pick-list');
      if (!list) return;
      list.querySelectorAll('.pf-pick').forEach(function(p) {
        var match = p.getAttribute('data-pick').toLowerCase().indexOf(q) !== -1;
        p.style.display = match ? '' : 'none';
      });
    });
  });
}

function truncate(s, n) {
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function refreshBtnSmall() {
  return '<button class="btn btn-secondary" id="refresh-btn-small" style="width:auto;padding:5px 12px;font-size:9px;margin:0;">Refresh</button>';
}
function bindRefreshSmall() {
  var b = document.getElementById('refresh-btn-small');
  if (b) b.addEventListener('click', refreshSequences);
}

// File input
document.getElementById('load-btn').addEventListener('click', function() {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      soundbiteData = JSON.parse(ev.target.result);

      var bites = Array.isArray(soundbiteData) ? soundbiteData : soundbiteData.soundbites;
      var count = bites ? bites.length : 0;
      var refRows = referencedSequences();
      var seqCount = refRows.length;

      document.getElementById('bite-count').textContent =
        count + ' soundbite' + (count !== 1 ? 's' : '') +
        ' across ' + seqCount + ' sequence' + (seqCount !== 1 ? 's' : '');

      renderPreflight();
      showStatus('info', count + ' soundbites loaded from ' + file.name);
    } catch (err) {
      showStatus('err', 'Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// Build button
document.getElementById('build-btn').addEventListener('click', function() {
  if (!soundbiteData) return;

  var bites = Array.isArray(soundbiteData) ? soundbiteData : soundbiteData.soundbites;
  if (!bites || bites.length === 0) return;

  var defaultSeqName = (!Array.isArray(soundbiteData) && soundbiteData.sacredSequenceName) || '';
  var outputName = (!Array.isArray(soundbiteData) && soundbiteData.outputName) ||
                   (defaultSeqName ? defaultSeqName + '_Sacred Selects' : 'Sacred Selects');
  var gapSeconds = (!Array.isArray(soundbiteData) && soundbiteData.gapSeconds) || 0.5;

  // Preflight check — every referenced sequence must resolve (directly or via mapping).
  var rows = referencedSequences();
  var missing = [];
  for (var ri = 0; ri < rows.length; ri++) {
    if (!resolveName(rows[ri].name)) missing.push(rows[ri].name);
  }
  if (missing.length > 0) {
    showStatus('err', 'Missing or unmapped sequence(s):\n' + missing.join('\n') + '\n\nClick the missing rows above to map them.');
    return;
  }

  var btn = document.getElementById('build-btn');
  btn.disabled = true;
  btn.textContent = 'Building...';

  // Pack as: OUTPUT~GAP||seqName~inSec~outSec||seqName~inSec~outSec||...
  function esc(s) { return String(s).replace(/[~|\\]/g, '_'); }
  var header = esc(outputName) + '~' + gapSeconds;
  var biteParts = [];
  for (var bi = 0; bi < bites.length; bi++) {
    var b = bites[bi];
    var seqName = b.sequenceName || defaultSeqName;
    if (!seqName) continue;
    var resolvedSeq = resolveName(seqName) || seqName;
    biteParts.push(esc(resolvedSeq) + '~' + b.inSec + '~' + b.outSec);
  }
  var packed = header + '||' + biteParts.join('||');

  // ExtendScript build — single project walk to map all needed sequences,
  // then loop through soundbites looking up each one's source.
  // Returns "OK|inserted|total|skipped" or "ERR|message".
  var BUILD_SCRIPT =
    '(function(payload){' +
    'try{' +
      'var TICKS=254016000000;' +
      'var blocks=payload.split("||");' +
      'var hdr=blocks[0].split("~");' +
      'var outputName=hdr[0];' +
      'var gapSeconds=parseFloat(hdr[1])||0.5;' +
      'if(!app||!app.project){return "ERR|No project open.";}' +
      // Collect every sequence name referenced
      'var needed={};' +
      'for(var bn=1;bn<blocks.length;bn++){var bp=blocks[bn].split("~");needed[bp[0]]=true;}' +
      // Walk project items once, building name→item map
      'var itemMap={};' +
      'try{' +
        'var seqs=app.project.sequences;' +
        'if(seqs&&typeof seqs.numSequences==="number"){' +
          'for(var i=0;i<seqs.numSequences;i++){if(seqs[i]&&seqs[i].name&&needed[seqs[i].name]){itemMap[seqs[i].name]=seqs[i].projectItem;}}' +
        '}' +
      '}catch(eA){}' +
      'if(app.project.rootItem){' +
        'var stack=[app.project.rootItem];var guard=0;' +
        'while(stack.length>0&&guard<5000){' +
          'guard++;var it=stack.pop();' +
          'if(!it||!it.children){continue;}' +
          'var nn=it.children.numItems||0;' +
          'for(var ci=0;ci<nn;ci++){' +
            'var ch=it.children[ci];if(!ch){continue;}' +
            'try{if(typeof ch.isSequence==="function"&&ch.isSequence()){' +
              'if(ch.name&&needed[ch.name]&&!itemMap[ch.name]){itemMap[ch.name]=ch;}' +
              'continue;' +
            '}}catch(eB1){}' +
            'try{if(ch.children&&ch.children.numItems>0){stack.push(ch);}}catch(eB2){}' +
          '}' +
        '}' +
      '}' +
      // Verify every needed sequence was found
      'var missing="";' +
      'for(var nk in needed){if(!itemMap[nk]){missing=missing+(missing?", ":"")+nk;}}' +
      'if(missing){return "ERR|Missing sequence(s): "+missing;}' +
      // Create output sequence. createNewSequence() can sometimes silently
      // clone the active sequence's contents (footgun when the sacred sequence
      // is the active sequence), so we scrub the new sequence empty first and
      // assert it is actually a brand-new empty sequence before inserting.
      'app.project.createNewSequence(outputName,"sacred-selects-"+(new Date()).getTime());' +
      'var newSeq=app.project.activeSequence;' +
      'if(!newSeq){return "ERR|Failed to create new sequence.";}' +
      'if(newSeq.name!==outputName){return "ERR|createNewSequence did not switch active sequence (got: "+newSeq.name+"). Aborting to avoid editing the wrong sequence.";}' +
      // Scrub any clips the create call may have copied in.
      'try{' +
        'if(newSeq.videoTracks){' +
          'for(var vt=0;vt<newSeq.videoTracks.numTracks;vt++){' +
            'var vTrack=newSeq.videoTracks[vt];' +
            'if(vTrack&&vTrack.clips){' +
              'for(var vc=vTrack.clips.numItems-1;vc>=0;vc--){' +
                'try{vTrack.clips[vc].remove(false,false);}catch(eRV){}' +
              '}' +
            '}' +
          '}' +
        '}' +
        'if(newSeq.audioTracks){' +
          'for(var at=0;at<newSeq.audioTracks.numTracks;at++){' +
            'var aTrack=newSeq.audioTracks[at];' +
            'if(aTrack&&aTrack.clips){' +
              'for(var ac=aTrack.clips.numItems-1;ac>=0;ac--){' +
                'try{aTrack.clips[ac].remove(false,false);}catch(eRA){}' +
              '}' +
            '}' +
          '}' +
        '}' +
      '}catch(eScrub){}' +
      // Insert each soundbite from its own source
      'var insertSec=0,inserted=0,skipped=0,total=blocks.length-1;' +
      'var touched={};' +
      'for(var j=1;j<blocks.length;j++){' +
        'var p=blocks[j].split("~");' +
        'var seqName=p[0];' +
        'var inS=parseFloat(p[1]),outS=parseFloat(p[2]);' +
        'var dur=outS-inS;' +
        'if(dur<=0){skipped++;continue;}' +
        'var srcItem=itemMap[seqName];' +
        'if(!srcItem){skipped++;continue;}' +
        'try{' +
          'srcItem.setInPoint(inS,4);' +
          'srcItem.setOutPoint(outS,4);' +
          'newSeq.insertClip(srcItem,String(Math.round(insertSec*TICKS)),0,0);' +
          'insertSec+=dur+gapSeconds;' +
          'inserted++;' +
          'touched[seqName]=srcItem;' +
        '}catch(e1){skipped++;}' +
      '}' +
      // Clear in/out marks on every source we touched
      'for(var tk in touched){try{touched[tk].clearInPoint(4);touched[tk].clearOutPoint(4);}catch(e2){}}' +
      'return "OK|"+inserted+"|"+total+"|"+skipped;' +
    '}catch(e){return "ERR|"+e.message;}' +
    '})("' + packed.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '")';

  cs.evalScript(BUILD_SCRIPT, function(result) {
    btn.disabled = false;
    btn.textContent = 'Build Sacred Selects';

    if (!result || String(result).indexOf('EvalScript error') !== -1) {
      showStatus('err', 'Script error: ' + result);
      updateBuildBtn();
      return;
    }

    var parts = String(result).split('|');
    if (parts[0] === 'OK') {
      var msg = 'Created "' + outputName + '"\n' + parts[1] + '/' + parts[2] + ' soundbites inserted';
      if (parseInt(parts[3], 10) > 0) msg += ', ' + parts[3] + ' skipped';
      showStatus('ok', msg);
      refreshSequences();
    } else {
      showStatus('err', parts.slice(1).join('|') || 'Unknown error');
    }

    updateBuildBtn();
  });
});

function updateBuildBtn() {
  var btn = document.getElementById('build-btn');
  var bites = soundbiteData ? (Array.isArray(soundbiteData) ? soundbiteData : soundbiteData.soundbites) : null;
  btn.disabled = !sequenceListReady || !bites || bites.length === 0;
}

function showStatus(type, msg) {
  var el = document.getElementById('status');
  el.className = type;
  el.textContent = msg;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
