<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin — My Cold Mars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #f0ece4;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="spin"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('spin');
    const ctx = canvas.getContext('2d');

    let size, cx, cy, dpr;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      size = Math.min(window.innerWidth, window.innerHeight);
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = size / 2;
      cy = size / 2;
    }

    resize();
    window.addEventListener('resize', resize);

    // Lines config: each line has an initial angle, length, dash pattern, speed, and deceleration
    const lines = [
      // Vertical line up
      { angle: -90, length: 0.38, dash: [],       speed: 0.0,    decel: 0, opacity: 0.5, width: 0.8 },
      // Vertical line down
      { angle: 90,  length: 0.35, dash: [3, 4],   speed: 0.0,    decel: 0, opacity: 0.4, width: 0.8 },
      // Horizontal line left
      { angle: 180, length: 0.42, dash: [],        speed: 0.0,    decel: 0, opacity: 0.5, width: 0.8 },
      // Horizontal line right
      { angle: 0,   length: 0.42, dash: [],        speed: 0.0,    decel: 0, opacity: 0.5, width: 0.8 },

      // Radiating lines - upper right cluster
      { angle: -52, length: 0.40, dash: [2, 4],    speed: 0.12,   opacity: 0.4, width: 0.6 },
      { angle: -38, length: 0.38, dash: [1, 3],    speed: 0.08,   opacity: 0.35, width: 0.6 },
      { angle: -25, length: 0.42, dash: [4, 3],    speed: 0.04,   opacity: 0.4, width: 0.6 },
      { angle: -15, length: 0.35, dash: [2, 5],    speed: 0.18,   opacity: 0.35, width: 0.6 },

      // Radiating lines - lower left cluster
      { angle: 155, length: 0.38, dash: [3, 4],    speed: 0.06,   opacity: 0.4, width: 0.6 },
      { angle: 168, length: 0.42, dash: [1, 3],    speed: 0.15,   opacity: 0.35, width: 0.6 },
      { angle: 195, length: 0.36, dash: [2, 3],    speed: 0.03,   opacity: 0.4, width: 0.6 },
      { angle: 210, length: 0.40, dash: [],         speed: 0.10,   opacity: 0.35, width: 0.6 },
      { angle: 230, length: 0.34, dash: [4, 4],    speed: 0.22,   opacity: 0.4, width: 0.6 },
    ];

    // Small circle near top (like "Present" circle in the image)
    const circle = { angle: -90, dist: 0.22, radius: 0.04, speed: 0.02 };

    // State
    const state = lines.map(l => ({
      currentAngle: l.angle,
      currentSpeed: l.speed,
    }));

    let circleState = {
      currentAngle: circle.angle,
      currentSpeed: circle.speed,
    };

    let lastTime = performance.now();

    function drawLine(angle, length, dash, opacity, width) {
      const rad = (angle * Math.PI) / 180;
      const endX = cx + Math.cos(rad) * length * size;
      const endY = cy + Math.sin(rad) * length * size;

      ctx.beginPath();
      ctx.setLineDash(dash.map(d => d * dpr / dpr));
      ctx.moveTo(cx, cy);
      ctx.lineTo(endX, endY);
      ctx.strokeStyle = `rgba(80, 75, 68, ${opacity})`;
      ctx.lineWidth = width;
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawCircle(angle, dist, radius) {
      const rad = (angle * Math.PI) / 180;
      const x = cx + Math.cos(rad) * dist * size;
      const y = cy + Math.sin(rad) * dist * size;
      const r = radius * size;

      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(80, 75, 68, 0.3)';
      ctx.lineWidth = 0.8;
      ctx.setLineDash([2, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function drawCenterDot() {
      ctx.beginPath();
      ctx.arc(cx, cy, 2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(80, 75, 68, 0.4)';
      ctx.fill();
    }

    function frame(now) {
      const dt = now - lastTime;
      lastTime = now;

      ctx.clearRect(0, 0, size, size);

      // Update and draw lines
      for (let i = 0; i < lines.length; i++) {
        const l = lines[i];
        const s = state[i];

        // Rotate continuously
        s.currentAngle += s.currentSpeed * dt * 0.06;

        drawLine(s.currentAngle, l.length, l.dash, l.opacity, l.width);
      }

      // Update and draw circle
      circleState.currentAngle += circleState.currentSpeed * dt * 0.06;
      drawCircle(circleState.currentAngle, circle.dist, circle.radius);

      drawCenterDot();

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
