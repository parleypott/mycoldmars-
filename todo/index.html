<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>todo · my cold mars</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Share+Tech+Mono&display=swap');

    :root {
      --paper: #f3efe6;
      --paper-deep: #ebe5d8;
      --ink: #2a2620;
      --ink-soft: #6b6358;
      --ink-faint: #a39a8c;
      --rule: #d8d0c0;
      --rule-soft: #e6dfd0;
      --card: #fbf7ee;
      --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px -12px rgba(60,40,20,0.18);
      --shadow-lift: 0 2px 0 rgba(0,0,0,0.04), 0 16px 36px -16px rgba(60,40,20,0.28);
      --hour-h: 56px;
      --quarter-h: 14px;
      --now: #d36a4f;

      --c-sage:       #9bb39a;
      --c-terracotta: #c98a72;
      --c-dustyblue:  #8aa2b8;
      --c-warmgray:   #a89e91;
      --c-plum:       #a08099;
      --c-ochre:      #c8a973;
      --c-slate:      #7a8590;
      --c-coral:      #d39d8e;
      --c-neutral:    #e0d6c2;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background: var(--paper);
      letter-spacing: 0.01em;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ───────────── header ───────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 64px;
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px;
      background: linear-gradient(to bottom, rgba(243,239,230,0.96), rgba(243,239,230,0.88));
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule-soft);
      z-index: 100;
    }
    .brand {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      color: var(--ink-soft);
    }
    .brand .dot { color: var(--c-terracotta); }
    .title {
      font-size: 19px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .grow { flex: 1; }

    .zoom-control {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--paper-deep);
      border-radius: 6px;
      padding: 2px;
    }
    .zoom-control button {
      font: inherit;
      width: 26px; height: 26px;
      border: none; background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }
    .zoom-control button:hover { background: var(--card); color: var(--ink); }
    .zoom-readout {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-soft);
      min-width: 44px;
      text-align: center;
      cursor: pointer;
    }
    .zoom-readout:hover { color: var(--ink); }

    .hours-control {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--ink-soft);
      letter-spacing: 0.04em;
    }
    .hours-control input {
      width: 40px; padding: 4px 6px;
      font: inherit; font-family: 'Share Tech Mono', monospace; font-size: 12px;
      text-align: center;
      background: rgba(255,255,255,0.5);
      border: 1px solid var(--rule);
      border-radius: 4px;
      color: var(--ink);
    }
    .btn {
      font: inherit; font-size: 13px; font-weight: 500;
      padding: 8px 14px;
      border: 1px solid var(--rule);
      background: var(--card);
      color: var(--ink);
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.12s ease, background 0.12s ease;
      letter-spacing: 0.01em;
    }
    .btn:hover { background: #fff; box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 4px 10px -4px rgba(60,40,20,0.15); }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .btn-primary:hover { background: #1a1612; }
    .btn-icon { padding: 8px 10px; font-size: 13px; }

    .menu-wrap { position: relative; }
    .menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 8px;
      box-shadow: var(--shadow-lift);
      padding: 6px;
      min-width: 180px;
      z-index: 300;
      display: none;
    }
    .menu.open { display: block; }
    .menu button {
      display: block; width: 100%;
      text-align: left;
      font: inherit; font-size: 13px;
      color: var(--ink);
      padding: 8px 10px;
      border: none; background: transparent;
      border-radius: 4px;
      cursor: pointer;
    }
    .menu button:hover { background: var(--paper-deep); }
    .menu hr { border: none; border-top: 1px solid var(--rule-soft); margin: 4px 0; }

    /* ───────────── viewport + world ───────────── */
    main {
      position: fixed; top: 64px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      cursor: default;
      background:
        radial-gradient(1200px 700px at 75% -10%, rgba(255,240,210,0.4), transparent 60%),
        radial-gradient(1000px 600px at 5% 110%, rgba(220,200,170,0.32), transparent 55%),
        var(--paper);
    }
    main.space-down { cursor: grab; }
    main.space-down.panning { cursor: grabbing; }
    /* middle-mouse pan also shows grabbing only while active */
    main.panning:not(.space-down) { cursor: grabbing; }
    main::after {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(60,40,20,0.18) 1px, transparent 1.4px);
      background-size: var(--grid-size, 24px) var(--grid-size, 24px);
      background-position: var(--grid-x, 0) var(--grid-y, 0);
      opacity: 0.55;
    }
    main::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      mix-blend-mode: multiply;
    }

    .world {
      position: absolute;
      top: 0; left: 0;
      width: 1px; height: 1px;
      transform-origin: 0 0;
      will-change: transform;
    }

    /* ───────────── column ───────────── */
    .column {
      position: absolute;
      width: 320px;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 10px;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      max-height: 80vh;
      overflow: hidden;
      transition: box-shadow 0.18s ease;
    }
    .column.dragging {
      box-shadow: var(--shadow-lift);
      transition: none;
    }
    .column.cross-drop { box-shadow: var(--shadow-lift), inset 0 0 0 2px var(--c-sage); }

    .col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 12px 10px;
      border-bottom: 1px solid var(--rule-soft);
      cursor: default;
    }
    .col-title {
      flex: 1;
      font-size: 14.5px; font-weight: 500;
      color: var(--ink);
      outline: none;
      padding: 2px 4px;
      border-radius: 4px;
      letter-spacing: -0.005em;
      cursor: text;
      min-width: 30px;
    }
    .col-title:focus { background: rgba(0,0,0,0.04); }
    .col-title:empty::before { content: 'untitled'; color: var(--ink-faint); }

    .mode-toggle {
      display: inline-flex;
      background: var(--paper-deep);
      border-radius: 5px;
      padding: 2px;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-soft);
    }
    .mode-toggle button {
      font: inherit; font-size: 11px;
      padding: 4px 9px;
      background: transparent;
      border: none;
      color: var(--ink-soft);
      border-radius: 3px;
      cursor: pointer;
      text-transform: lowercase;
    }
    .mode-toggle button.active {
      background: var(--card);
      color: var(--ink);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }
    .col-mini-btn {
      width: 22px; height: 22px;
      border: none; background: transparent;
      color: var(--ink-faint);
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .col-mini-btn:hover { background: rgba(0,0,0,0.05); color: var(--ink); }
    .col-x:hover { color: var(--c-terracotta) !important; }

    .col-resize {
      position: absolute;
      top: 0; right: -3px; bottom: 0;
      width: 6px;
      cursor: col-resize;
      z-index: 10;
    }
    .col-resize:hover { background: linear-gradient(to right, transparent, rgba(138,162,184,0.3), transparent); }

    .col-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--rule) transparent;
    }
    .col-body::-webkit-scrollbar { width: 6px; }
    .col-body::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

    /* ───────────── list mode ───────────── */
    .list-body { padding: 8px 8px 12px; }
    .item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 8px;
      border-radius: 6px;
      cursor: default;
      position: relative;
      transition: background 0.12s ease;
    }
    .item:hover { background: rgba(0,0,0,0.025); }
    .item.dragging { opacity: 0.4; }
    .item.drop-above { border-top: 2px solid var(--c-dustyblue); padding-top: 6px; }
    .item.drop-below { border-bottom: 2px solid var(--c-dustyblue); padding-bottom: 6px; }
    .item-grip {
      width: 12px; padding-top: 4px;
      color: var(--ink-faint);
      font-size: 11px; line-height: 1;
      cursor: grab;
      opacity: 0;
      transition: opacity 0.12s ease;
      flex-shrink: 0;
    }
    .item:hover .item-grip { opacity: 1; }
    .item-check {
      width: 14px; height: 14px;
      margin-top: 4px;
      border: 1.5px solid var(--ink-faint);
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s ease;
      position: relative;
    }
    .item.done .item-check { background: var(--ink-soft); border-color: var(--ink-soft); }
    .item.done .item-check::after {
      content: ''; position: absolute;
      left: 3px; top: 0px; width: 4px; height: 8px;
      border: solid var(--card);
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }
    .item-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink);
      outline: none;
      cursor: text;
      word-break: break-word;
      padding: 2px 0;
    }
    .item-text:empty::before { content: 'new item'; color: var(--ink-faint); }
    .item.done .item-text { color: var(--ink-faint); text-decoration: line-through; text-decoration-color: var(--ink-faint); }
    .item-color-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
      background: transparent;
      cursor: pointer;
      border: 1px solid var(--rule);
    }
    .item-x {
      width: 18px; height: 18px;
      border: none; background: transparent;
      color: var(--ink-faint);
      cursor: pointer;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.12s ease;
      flex-shrink: 0;
    }
    .item:hover .item-x { opacity: 1; }
    .item-x:hover { color: var(--c-terracotta); }

    .add-item {
      margin: 4px 8px 8px;
      padding: 8px 8px;
      font: inherit; font-size: 13px;
      color: var(--ink-faint);
      background: transparent;
      border: 1px dashed var(--rule);
      border-radius: 6px;
      cursor: pointer;
      width: calc(100% - 16px);
      text-align: left;
      transition: all 0.12s ease;
    }
    .add-item:hover { color: var(--ink-soft); border-color: var(--ink-faint); background: rgba(0,0,0,0.02); }

    /* ───────────── day mode ───────────── */
    .day-body { padding: 0; position: relative; }
    .day-head {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px 10px;
      border-bottom: 1px solid var(--rule-soft);
    }
    .day-date {
      flex: 1;
      font: inherit;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--ink);
      text-transform: uppercase;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 4px 6px;
      cursor: pointer;
    }
    .day-date:hover, .day-date:focus {
      background: var(--paper-deep);
      border-color: var(--rule);
      outline: none;
    }
    .day-now-btn {
      font: inherit; font-size: 10.5px;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-terracotta);
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
    }
    .day-now-btn:hover { background: var(--paper-deep); }

    .day-grid {
      position: relative;
      display: grid;
      grid-template-columns: 44px 1fr;
    }
    .hour-label {
      grid-column: 1;
      padding: 0 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10.5px;
      letter-spacing: 0.06em;
      color: var(--ink-faint);
      border-right: 1px solid var(--rule-soft);
      border-top: 1px solid var(--rule-soft);
      height: var(--hour-h);
      display: flex; align-items: flex-start;
      padding-top: 4px;
      text-transform: uppercase;
    }
    .hour-cell {
      grid-column: 2;
      border-top: 1px solid var(--rule-soft);
      height: var(--hour-h);
      position: relative;
    }
    .hour-cell::after {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 50%;
      border-top: 1px dashed var(--rule-soft);
      opacity: 0.6;
    }
    .day-canvas {
      position: absolute;
      left: 44px;
      top: 0;
      right: 0;
      bottom: 0;
      cursor: default;
    }

    .now-line {
      position: absolute;
      left: 0; right: 0;
      height: 0;
      border-top: 1px solid var(--now);
      pointer-events: none;
      z-index: 30;
    }
    .now-line::before {
      content: '';
      position: absolute;
      left: -4px; top: -4px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--now);
      box-shadow: 0 0 0 3px rgba(211,106,79,0.18);
    }

    /* Apple Calendar–style blocks: tinted bg, saturated left bar, dark text in same hue */
    .block {
      --bc: #8aa2b8;
      position: absolute;
      border-radius: 4px;
      padding: 3px 6px 3px 8px;
      font-size: 12px;
      line-height: 1.3;
      background: color-mix(in srgb, var(--bc) 22%, var(--card));
      color: color-mix(in srgb, var(--bc) 60%, #1a1612);
      border-left: 3px solid var(--bc);
      box-shadow: 0 0 0 0.5px color-mix(in srgb, var(--bc) 30%, transparent);
      cursor: default;
      overflow: hidden;
      display: flex; flex-direction: column; gap: 1px;
      transition: background 0.1s ease;
      min-height: 18px;
    }
    .block:hover { background: color-mix(in srgb, var(--bc) 30%, var(--card)); }
    .block.dragging { z-index: 50; }
    .block.selected {
      background: color-mix(in srgb, var(--bc) 30%, var(--card));
      box-shadow: 0 0 0 1.5px var(--bc), 0 1px 0 rgba(0,0,0,0.04);
      z-index: 40;
    }
    .block.ghost {
      pointer-events: none;
      opacity: 0.85;
    }
    .block-label {
      font-weight: 600;
      font-size: 12px;
      letter-spacing: -0.005em;
      outline: none;
      cursor: text;
      word-break: break-word;
      color: color-mix(in srgb, var(--bc) 75%, #1a1612);
    }
    .block-label:empty::before { content: 'untitled'; opacity: 0.55; font-weight: 500; }
    .block-time {
      font-size: 11px;
      letter-spacing: 0;
      opacity: 0.7;
      font-weight: 400;
    }
    .block-note {
      font-size: 11px;
      opacity: 0.78;
      outline: none;
      cursor: text;
      font-weight: 400;
      word-break: break-word;
      letter-spacing: 0;
      margin-top: 2px;
    }
    .block-note:empty { display: none; }
    .block-resize {
      position: absolute;
      left: 0; right: 0;
      height: 5px;
      cursor: ns-resize;
    }
    .block-resize.top { top: -2px; }
    .block-resize.bottom { bottom: -2px; }

    /* ───────────── selection toolbar (screen-fixed) ───────────── */
    .block-toolbar {
      position: fixed;
      z-index: 200;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 6px;
      box-shadow: var(--shadow-lift);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      max-width: 240px;
    }
    .block-toolbar .swatch {
      width: 20px; height: 20px;
      border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      transition: transform 0.1s ease;
    }
    .block-toolbar .swatch:hover { transform: scale(1.15); }
    .block-toolbar .swatch.active { box-shadow: 0 0 0 2px var(--ink); }
    .block-toolbar .sep { width: 1px; height: 18px; background: var(--rule); margin: 0 2px; }
    .block-toolbar .tb-btn {
      font: inherit; font-size: 12px;
      padding: 4px 8px;
      border: none;
      background: transparent;
      color: var(--ink-soft);
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    .block-toolbar .tb-btn:hover { background: var(--paper-deep); color: var(--ink); }
    .block-toolbar .tb-btn.danger:hover { color: var(--c-terracotta); }

    .palette {
      position: fixed;
      z-index: 200;
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 8px;
      box-shadow: var(--shadow-lift);
      display: grid;
      grid-template-columns: repeat(5, 22px);
      gap: 6px;
    }
    .palette button {
      width: 22px; height: 22px;
      border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      transition: transform 0.1s ease;
    }
    .palette button:hover { transform: scale(1.15); }
    .palette button.active { box-shadow: 0 0 0 2px var(--ink); }

    .empty-state {
      position: fixed; inset: 64px 0 0 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      color: var(--ink-faint);
      font-size: 14px;
    }
    .empty-state span { max-width: 360px; text-align: center; line-height: 1.6; pointer-events: auto; }

    .hint {
      position: fixed; bottom: 12px; left: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--ink-faint);
      text-transform: uppercase;
      pointer-events: none;
      z-index: 50;
    }
    .toast {
      position: fixed;
      bottom: 14px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: var(--paper);
      padding: 8px 14px;
      font-size: 12px;
      letter-spacing: 0.04em;
      border-radius: 20px;
      z-index: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease;
    }
    .toast.show { opacity: 1; }

    .minimap {
      position: fixed;
      bottom: 14px; right: 14px;
      width: 160px; height: 110px;
      background: rgba(251,247,238,0.9);
      border: 1px solid var(--rule);
      border-radius: 6px;
      box-shadow: var(--shadow);
      overflow: hidden;
      z-index: 80;
      backdrop-filter: blur(6px);
    }
    .minimap-content { position: absolute; inset: 0; }
    .minimap-block { position: absolute; background: var(--ink-soft); border-radius: 1px; }
    .minimap-view {
      position: absolute;
      border: 1.5px solid var(--c-terracotta);
      background: rgba(211,106,79,0.06);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">my cold mars <span class="dot">·</span> <span style="color:var(--ink)">todo</span></div>
    <div class="title">canvas</div>
    <div class="grow"></div>
    <div class="hours-control">
      <span>day window</span>
      <input id="hour-start" type="number" min="0" max="23" value="6">
      <span>→</span>
      <input id="hour-end" type="number" min="1" max="24" value="23">
    </div>
    <div class="zoom-control">
      <button id="zoom-out" title="zoom out (⌘-)">−</button>
      <div class="zoom-readout" id="zoom-readout" title="reset to 100%">100%</div>
      <button id="zoom-in" title="zoom in (⌘+)">+</button>
      <button id="zoom-fit" title="fit all (⌘0)">◇</button>
    </div>
    <div class="menu-wrap">
      <button class="btn btn-icon" id="menu-toggle" title="more">⋯</button>
      <div class="menu" id="menu">
        <button id="m-export">export json</button>
        <button id="m-import">import json…</button>
        <hr>
        <button id="m-undo">undo (⌘z)</button>
        <button id="m-fit">fit all (⌘0)</button>
        <button id="m-reset">reset view</button>
        <hr>
        <button id="m-clear" style="color:var(--c-terracotta)">clear all…</button>
      </div>
    </div>
    <button class="btn btn-primary" id="add-column">+ add column</button>
  </header>

  <main id="main">
    <div class="world" id="world"></div>
  </main>

  <div class="hint">double-click to create · drag to size · drag block to move · space + drag to pan · ⌘ + scroll to zoom</div>
  <div class="toast" id="toast"></div>
  <div class="minimap" id="minimap"><div class="minimap-content" id="minimap-content"></div></div>
  <input type="file" id="import-file" accept="application/json,.json" style="display:none">

<script>
'use strict';

// ───────────── state ─────────────
const STORAGE_KEY = 'mycoldmars.todo.v2';
const LEGACY_KEY  = 'mycoldmars.todo.v1';
const COLORS = [
  { name: 'sage',       value: '#9bb39a' },
  { name: 'terracotta', value: '#c98a72' },
  { name: 'dustyblue',  value: '#8aa2b8' },
  { name: 'plum',       value: '#a08099' },
  { name: 'ochre',      value: '#c8a973' },
  { name: 'slate',      value: '#7a8590' },
  { name: 'coral',      value: '#d39d8e' },
  { name: 'warmgray',   value: '#a89e91' },
  { name: 'neutral',    value: '#8a7e6c' },
];

const DEFAULT_STATE = {
  columns: [],
  hourStart: 6,
  hourEnd: 23,
  view: { tx: 0, ty: 0, scale: 1 },
};

let state = load();
let history = [];
const HISTORY_LIMIT = 50;
let selectedBlock = null;
const main = document.getElementById('main');
const world = document.getElementById('world');
let firstRenderDone = false;

function load() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      // migrate from v1 if present
      raw = localStorage.getItem(LEGACY_KEY);
      if (!raw) return structuredClone(DEFAULT_STATE);
      console.log('todo: migrating from v1');
    }
    const parsed = JSON.parse(raw);
    const merged = { ...structuredClone(DEFAULT_STATE), ...parsed };
    if (!merged.view) merged.view = { tx: 0, ty: 0, scale: 1 };
    // assign x/y to any column missing them (legacy)
    let nextX = 40, nextY = 40;
    for (const c of merged.columns) {
      if (typeof c.x !== 'number' || typeof c.y !== 'number') {
        c.x = nextX; c.y = nextY;
        nextX += (c.width || 320) + 24;
      }
    }
    return merged;
  } catch (e) {
    console.warn('todo: load failed, using defaults', e);
    return structuredClone(DEFAULT_STATE);
  }
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function pushHistory() {
  history.push(JSON.stringify(state));
  if (history.length > HISTORY_LIMIT) history.shift();
}
function undo() {
  if (history.length === 0) { toast('nothing to undo'); return; }
  const prev = history.pop();
  try {
    state = JSON.parse(prev);
    save();
    selectedBlock = null;
    render();
    toast('undid');
  } catch (e) {
    toast('undo failed');
  }
}

function uid() { return Math.random().toString(36).slice(2, 10); }

function toast(msg, ms = 1400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), ms);
}

// ───────────── world transform ─────────────
function applyTransform() {
  const v = state.view;
  world.style.transform = `translate(${v.tx}px, ${v.ty}px) scale(${v.scale})`;
  const gridSize = 24 * v.scale;
  main.style.setProperty('--grid-size', gridSize + 'px');
  main.style.setProperty('--grid-x', (v.tx % gridSize) + 'px');
  main.style.setProperty('--grid-y', (v.ty % gridSize) + 'px');
  document.getElementById('zoom-readout').textContent = Math.round(v.scale * 100) + '%';
  if (selectedBlock) renderToolbarFor(selectedBlock);
  renderMinimap();
}

// screen → world
function screenToWorld(sx, sy) {
  const r = main.getBoundingClientRect();
  const v = state.view;
  return {
    x: (sx - r.left - v.tx) / v.scale,
    y: (sy - r.top  - v.ty) / v.scale,
  };
}

function setZoom(newScale, anchorScreenX, anchorScreenY) {
  const v = state.view;
  const old = v.scale;
  newScale = clamp(newScale, 0.2, 3);
  if (newScale === old) return;
  // keep the world point under the anchor stationary
  const r = main.getBoundingClientRect();
  const sx = anchorScreenX - r.left;
  const sy = anchorScreenY - r.top;
  const wx = (sx - v.tx) / old;
  const wy = (sy - v.ty) / old;
  v.scale = newScale;
  v.tx = sx - wx * newScale;
  v.ty = sy - wy * newScale;
  applyTransform();
  save();
}

function fitAll() {
  if (state.columns.length === 0) {
    state.view = { tx: 0, ty: 0, scale: 1 };
    applyTransform();
    save();
    return;
  }
  // compute world bbox of columns (using rendered DOM heights)
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const c of state.columns) {
    const w = c.width || 320;
    // estimate column height — we'll grab actual from DOM if available
    const el = world.querySelector(`[data-col-id="${c.id}"]`);
    const h = el ? el.getBoundingClientRect().height / state.view.scale : 400;
    minX = Math.min(minX, c.x);
    minY = Math.min(minY, c.y);
    maxX = Math.max(maxX, c.x + w);
    maxY = Math.max(maxY, c.y + h);
  }
  const pad = 60;
  const r = main.getBoundingClientRect();
  const bw = maxX - minX + pad * 2;
  const bh = maxY - minY + pad * 2;
  const scale = clamp(Math.min(r.width / bw, r.height / bh), 0.2, 1);
  state.view.scale = scale;
  state.view.tx = (r.width  - (maxX - minX) * scale) / 2 - minX * scale;
  state.view.ty = (r.height - (maxY - minY) * scale) / 2 - minY * scale;
  applyTransform();
  save();
}

function resetView() {
  state.view = { tx: 0, ty: 0, scale: 1 };
  applyTransform();
  save();
}

// ───────────── render ─────────────
function render() {
  closeAllPopovers();
  world.innerHTML = '';
  document.querySelector('.empty-state')?.remove();
  if (state.columns.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<span>add a column to begin. each column is either a list of things or a day broken into hours. drop them anywhere on the canvas.</span>';
    document.body.appendChild(empty);
  } else {
    for (const col of state.columns) {
      world.appendChild(renderColumn(col));
    }
  }
  applyTransform();
  if (selectedBlock) renderToolbarFor(selectedBlock);

  if (!firstRenderDone) {
    firstRenderDone = true;
    requestAnimationFrame(scrollDayColumnsToNow);
  }
}

function renderColumn(col) {
  const el = document.createElement('div');
  el.className = 'column';
  el.dataset.colId = col.id;
  el.style.left = col.x + 'px';
  el.style.top  = col.y + 'px';
  el.style.width = (col.width || 320) + 'px';

  const head = document.createElement('div');
  head.className = 'col-header';
  head.innerHTML = `
    <div class="col-title" contenteditable="true" spellcheck="false">${escapeHtml(col.title || '')}</div>
    <div class="mode-toggle">
      <button data-mode="list" class="${col.mode === 'list' ? 'active' : ''}">list</button>
      <button data-mode="day"  class="${col.mode === 'day'  ? 'active' : ''}">day</button>
    </div>
    <button class="col-mini-btn col-dup" title="duplicate column">⎘</button>
    <button class="col-mini-btn col-x" title="delete column">×</button>
  `;
  el.appendChild(head);

  const titleEl = head.querySelector('.col-title');
  let titlePristine = true;
  titleEl.addEventListener('focus', () => { if (titlePristine) pushHistory(); titlePristine = false; });
  titleEl.addEventListener('blur', () => { titlePristine = true; });
  titleEl.addEventListener('input', () => { col.title = titleEl.textContent; save(); });
  titleEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });
  titleEl.addEventListener('pointerdown', e => e.stopPropagation()); // don't start column drag

  head.querySelectorAll('.mode-toggle button').forEach(b => {
    b.addEventListener('click', () => {
      pushHistory();
      col.mode = b.dataset.mode;
      save();
      render();
    });
    b.addEventListener('pointerdown', e => e.stopPropagation());
  });

  head.querySelector('.col-dup').addEventListener('click', () => {
    pushHistory();
    const clone = JSON.parse(JSON.stringify(col));
    clone.id = uid();
    clone.title = (col.title || 'untitled') + ' copy';
    clone.x = col.x + (col.width || 320) + 24;
    clone.y = col.y;
    if (clone.items) clone.items.forEach(i => i.id = uid());
    if (clone.blocks) clone.blocks.forEach(b => b.id = uid());
    state.columns.push(clone);
    save();
    render();
  });
  head.querySelector('.col-dup').addEventListener('pointerdown', e => e.stopPropagation());

  head.querySelector('.col-x').addEventListener('click', () => {
    if (confirm(`delete "${col.title || 'untitled'}"?`)) {
      pushHistory();
      state.columns = state.columns.filter(c => c.id !== col.id);
      save();
      render();
    }
  });
  head.querySelector('.col-x').addEventListener('pointerdown', e => e.stopPropagation());

  attachColumnDrag(el, head, col);

  const body = document.createElement('div');
  body.className = 'col-body';
  if (col.mode === 'list') body.appendChild(renderListBody(col));
  else                     body.appendChild(renderDayBody(col));
  el.appendChild(body);

  const resize = document.createElement('div');
  resize.className = 'col-resize';
  resize.addEventListener('pointerdown', e => attachColumnResize(e, el, col));
  el.appendChild(resize);

  return el;
}

// ───────────── list mode ─────────────
function renderListBody(col) {
  const wrap = document.createElement('div');
  wrap.className = 'list-body';
  if (!col.items) col.items = [];

  for (const item of col.items) {
    wrap.appendChild(renderItem(col, item));
  }

  const add = document.createElement('button');
  add.className = 'add-item';
  add.textContent = '+ add item';
  add.addEventListener('click', () => {
    pushHistory();
    const it = { id: uid(), text: '', done: false, color: null };
    col.items.push(it);
    save();
    render();
    requestAnimationFrame(() => {
      const newest = world.querySelector(`[data-item-id="${it.id}"] .item-text`);
      if (newest) {
        newest.focus();
        placeCaretAtEnd(newest);
      }
    });
  });
  wrap.appendChild(add);
  return wrap;
}

function renderItem(col, item) {
  const el = document.createElement('div');
  el.className = 'item' + (item.done ? ' done' : '');
  el.dataset.itemId = item.id;
  if (item.color) el.style.borderLeft = `3px solid ${item.color}`;

  el.innerHTML = `
    <div class="item-grip">⋮⋮</div>
    <div class="item-check"></div>
    <div class="item-text" contenteditable="true" spellcheck="false">${escapeHtml(item.text || '')}</div>
    <div class="item-color-dot" style="${item.color ? `background:${item.color};border-color:${item.color}` : ''}"></div>
    <button class="item-x" title="delete">×</button>
  `;

  el.querySelector('.item-check').addEventListener('click', () => {
    pushHistory();
    item.done = !item.done;
    save();
    el.classList.toggle('done', item.done);
  });

  const txt = el.querySelector('.item-text');
  let pristine = true;
  txt.addEventListener('focus', () => { if (pristine) pushHistory(); pristine = false; });
  txt.addEventListener('blur', () => { pristine = true; });
  txt.addEventListener('input', () => { item.text = txt.textContent; save(); });
  txt.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      pushHistory();
      const idx = col.items.indexOf(item);
      const it = { id: uid(), text: '', done: false, color: null };
      col.items.splice(idx + 1, 0, it);
      save();
      render();
      requestAnimationFrame(() => {
        const newest = world.querySelector(`[data-item-id="${it.id}"] .item-text`);
        if (newest) { newest.focus(); placeCaretAtEnd(newest); }
      });
    }
    if (e.key === 'Backspace' && txt.textContent === '') {
      e.preventDefault();
      pushHistory();
      const idx = col.items.indexOf(item);
      col.items.splice(idx, 1);
      save();
      render();
      const target = world.querySelector(`.column[data-col-id="${col.id}"] .item:nth-child(${idx}) .item-text`);
      if (target) { target.focus(); placeCaretAtEnd(target); }
    }
  });

  const dot = el.querySelector('.item-color-dot');
  dot.addEventListener('click', e => {
    e.stopPropagation();
    showPalette(dot, item.color, c => {
      pushHistory();
      item.color = c;
      save();
      render();
    });
  });

  el.querySelector('.item-x').addEventListener('click', () => {
    pushHistory();
    col.items = col.items.filter(i => i.id !== item.id);
    save();
    render();
  });

  attachItemReorder(el, col, item);
  return el;
}

// ───────────── day mode ─────────────
function renderDayBody(col) {
  if (!col.blocks) col.blocks = [];
  if (!col.date) col.date = isoDateToday();

  const wrap = document.createElement('div');
  wrap.className = 'day-body';

  const head = document.createElement('div');
  head.className = 'day-head';
  head.innerHTML = `
    <input type="date" class="day-date" value="${col.date}">
    <button class="day-now-btn" title="add a 30-min block at now">+ now</button>
  `;
  wrap.appendChild(head);

  const dateInput = head.querySelector('.day-date');
  dateInput.addEventListener('change', () => {
    pushHistory();
    col.date = dateInput.value;
    save();
    render();
  });

  head.querySelector('.day-now-btn').addEventListener('click', () => {
    pushHistory();
    const now = new Date();
    let startMin = now.getHours() * 60 + Math.floor(now.getMinutes() / 15) * 15;
    let endMin = startMin + 30;
    const minB = state.hourStart * 60, maxB = state.hourEnd * 60;
    startMin = Math.max(minB, Math.min(maxB - 30, startMin));
    endMin = startMin + 30;
    const blk = { id: uid(), startMin, endMin, label: '', note: '', color: COLORS[2].value };
    col.blocks.push(blk);
    save();
    render();
    requestAnimationFrame(() => {
      selectBlock(col.id, blk.id);
      const lab = world.querySelector(`[data-block-id="${blk.id}"] .block-label`);
      if (lab) { lab.focus(); placeCaretAtEnd(lab); }
    });
  });

  const grid = document.createElement('div');
  grid.className = 'day-grid';

  const startH = state.hourStart;
  const endH   = state.hourEnd;

  for (let h = startH; h < endH; h++) {
    const lab = document.createElement('div');
    lab.className = 'hour-label';
    lab.textContent = formatHour(h);
    grid.appendChild(lab);

    const cell = document.createElement('div');
    cell.className = 'hour-cell';
    cell.dataset.hour = h;
    grid.appendChild(cell);
  }

  const totalHours = endH - startH;
  const totalH = totalHours * cssVarPx('--hour-h');

  const dayCanvas = document.createElement('div');
  dayCanvas.className = 'day-canvas';
  dayCanvas.dataset.colId = col.id;
  dayCanvas.style.height = totalH + 'px';

  const laneMap = computeLanes(col.blocks);
  for (const blk of col.blocks) {
    dayCanvas.appendChild(renderBlock(col, blk, laneMap.get(blk.id)));
  }

  if (isToday(col.date)) {
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    if (nowMin >= startH * 60 && nowMin <= endH * 60) {
      const nowEl = document.createElement('div');
      nowEl.className = 'now-line';
      nowEl.style.top = minToPx(nowMin - startH * 60) + 'px';
      dayCanvas.appendChild(nowEl);
    }
  }

  grid.style.minHeight = totalH + 'px';
  const gridWrap = document.createElement('div');
  gridWrap.style.position = 'relative';
  gridWrap.appendChild(grid);
  gridWrap.appendChild(dayCanvas);
  wrap.appendChild(gridWrap);

  dayCanvas.style.left = '44px';
  dayCanvas.style.top = '0';
  dayCanvas.style.right = '0';
  dayCanvas.style.bottom = '0';
  dayCanvas.style.position = 'absolute';

  attachBlockCreation(dayCanvas, col, startH);
  return wrap;
}

function computeLanes(blocks) {
  const map = new Map();
  if (!blocks || blocks.length === 0) return map;
  const sorted = [...blocks].sort((a, b) => a.startMin - b.startMin || a.endMin - b.endMin);
  const clusters = [];
  for (const b of sorted) {
    let placed = false;
    for (const c of clusters) {
      if (c.some(x => x.startMin < b.endMin && x.endMin > b.startMin)) {
        c.push(b); placed = true; break;
      }
    }
    if (!placed) clusters.push([b]);
  }
  let merged = true;
  while (merged) {
    merged = false;
    outer: for (let i = 0; i < clusters.length; i++) {
      for (let j = i + 1; j < clusters.length; j++) {
        if (clusters[i].some(a => clusters[j].some(b => a.startMin < b.endMin && a.endMin > b.startMin))) {
          clusters[i] = clusters[i].concat(clusters[j]);
          clusters.splice(j, 1);
          merged = true; break outer;
        }
      }
    }
  }
  for (const c of clusters) {
    const sortedC = c.sort((a, b) => a.startMin - b.startMin || a.endMin - b.endMin);
    const lanes = [];
    for (const b of sortedC) {
      let placed = false;
      for (let li = 0; li < lanes.length; li++) {
        const lane = lanes[li];
        const last = lane[lane.length - 1];
        if (last.endMin <= b.startMin) {
          lane.push(b);
          map.set(b.id, { lane: li, total: 0 });
          placed = true; break;
        }
      }
      if (!placed) {
        lanes.push([b]);
        map.set(b.id, { lane: lanes.length - 1, total: 0 });
      }
    }
    for (const b of sortedC) map.get(b.id).total = lanes.length;
  }
  return map;
}

function renderBlock(col, blk, laneInfo) {
  const el = document.createElement('div');
  el.className = 'block';
  el.dataset.blockId = blk.id;
  if (selectedBlock && selectedBlock.colId === col.id && selectedBlock.blockId === blk.id) {
    el.classList.add('selected');
  }
  const startH = state.hourStart;
  const top = minToPx(blk.startMin - startH * 60);
  const height = Math.max(18, minToPx(blk.endMin - blk.startMin));
  el.style.top = top + 'px';
  el.style.height = height + 'px';
  el.style.background = blk.color || COLORS[2].value;

  const lane = laneInfo ? laneInfo.lane : 0;
  const total = laneInfo ? laneInfo.total : 1;
  const widthPct = 100 / total;
  el.style.left = `calc(${lane * widthPct}% + 2px)`;
  el.style.width = `calc(${widthPct}% - 4px)`;
  el.style.setProperty('--bc', blk.color || COLORS[2].value);

  el.innerHTML = `
    <div class="block-label" contenteditable="true" spellcheck="false">${escapeHtml(blk.label || '')}</div>
    <div class="block-time">${minToTimeStr(blk.startMin)}–${minToTimeStr(blk.endMin)}</div>
    <div class="block-note" contenteditable="true" spellcheck="false">${escapeHtml(blk.note || '')}</div>
    <div class="block-resize top"></div>
    <div class="block-resize bottom"></div>
  `;

  const lab = el.querySelector('.block-label');
  let labPristine = true;
  lab.addEventListener('focus', () => { if (labPristine) pushHistory(); labPristine = false; });
  lab.addEventListener('blur', () => { labPristine = true; });
  lab.addEventListener('input', () => { blk.label = lab.textContent; save(); });
  lab.addEventListener('mousedown', e => e.stopPropagation());
  lab.addEventListener('click', e => e.stopPropagation());

  const note = el.querySelector('.block-note');
  let notePristine = true;
  note.addEventListener('focus', () => { if (notePristine) pushHistory(); notePristine = false; });
  note.addEventListener('blur', () => { notePristine = true; });
  note.addEventListener('input', () => { blk.note = note.textContent; save(); });
  note.addEventListener('mousedown', e => e.stopPropagation());
  note.addEventListener('click', e => e.stopPropagation());

  el.addEventListener('click', e => {
    if (e.target.closest('.block-label') || e.target.closest('.block-note') || e.target.closest('.block-resize')) return;
    e.stopPropagation();
    selectBlock(col.id, blk.id);
  });
  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    selectBlock(col.id, blk.id);
  });

  attachBlockMove(el, col, blk);
  el.querySelector('.block-resize.top').addEventListener('pointerdown', e => attachBlockResize(e, col, blk, 'top', el));
  el.querySelector('.block-resize.bottom').addEventListener('pointerdown', e => attachBlockResize(e, col, blk, 'bottom', el));

  return el;
}

// ───────────── selection toolbar ─────────────
let toolbarEl = null;
function selectBlock(colId, blockId) {
  selectedBlock = { colId, blockId };
  document.querySelectorAll('.block').forEach(b => b.classList.remove('selected'));
  const el = world.querySelector(`[data-block-id="${blockId}"]`);
  if (el) el.classList.add('selected');
  renderToolbarFor(selectedBlock);
}
function deselectBlock() {
  selectedBlock = null;
  document.querySelectorAll('.block').forEach(b => b.classList.remove('selected'));
  if (toolbarEl) { toolbarEl.remove(); toolbarEl = null; }
}
function renderToolbarFor(sel) {
  if (toolbarEl) toolbarEl.remove();
  const col = state.columns.find(c => c.id === sel.colId);
  if (!col) return;
  const blk = col.blocks?.find(b => b.id === sel.blockId);
  if (!blk) return;
  const blockEl = world.querySelector(`[data-block-id="${sel.blockId}"]`);
  if (!blockEl) return;

  const tb = document.createElement('div');
  tb.className = 'block-toolbar';

  for (const c of COLORS) {
    const sw = document.createElement('button');
    sw.className = 'swatch';
    sw.style.background = c.value;
    sw.title = c.name;
    if (blk.color === c.value) sw.classList.add('active');
    sw.addEventListener('click', () => {
      pushHistory();
      blk.color = c.value;
      save();
      render();
    });
    tb.appendChild(sw);
  }

  const sep = document.createElement('div');
  sep.className = 'sep';
  tb.appendChild(sep);

  const dup = document.createElement('button');
  dup.className = 'tb-btn';
  dup.textContent = 'duplicate';
  dup.addEventListener('click', () => {
    pushHistory();
    const dur = blk.endMin - blk.startMin;
    const newStart = Math.min(state.hourEnd * 60 - dur, blk.endMin);
    const clone = { ...blk, id: uid(), startMin: newStart, endMin: newStart + dur };
    col.blocks.push(clone);
    save();
    render();
    selectBlock(col.id, clone.id);
  });
  tb.appendChild(dup);

  const noteBtn = document.createElement('button');
  noteBtn.className = 'tb-btn';
  noteBtn.textContent = blk.note ? 'edit note' : '+ note';
  noteBtn.addEventListener('click', () => {
    if (!blk.note) { pushHistory(); blk.note = ''; save(); render(); }
    requestAnimationFrame(() => {
      const n = world.querySelector(`[data-block-id="${sel.blockId}"] .block-note`);
      if (n) {
        n.style.display = 'block';
        n.focus(); placeCaretAtEnd(n);
      }
    });
  });
  tb.appendChild(noteBtn);

  const del = document.createElement('button');
  del.className = 'tb-btn danger';
  del.textContent = 'delete';
  del.addEventListener('click', () => {
    pushHistory();
    col.blocks = col.blocks.filter(b => b.id !== sel.blockId);
    save();
    deselectBlock();
    render();
  });
  tb.appendChild(del);

  document.body.appendChild(tb);
  // position above block in screen coords (block rect already includes world transform)
  const r = blockEl.getBoundingClientRect();
  const tbR = tb.getBoundingClientRect();
  let top = r.top - tbR.height - 8;
  if (top < 70) top = r.bottom + 8;
  let left = r.left + r.width / 2 - tbR.width / 2;
  left = Math.max(12, Math.min(window.innerWidth - tbR.width - 12, left));
  tb.style.top = top + 'px';
  tb.style.left = left + 'px';
  toolbarEl = tb;
}

// ───────────── interactions ─────────────
function attachColumnDrag(colEl, headEl, col) {
  headEl.addEventListener('pointerdown', e => {
    if (e.target.closest('.col-title') || e.target.closest('.mode-toggle') || e.target.closest('.col-mini-btn')) return;
    if (e.button !== 0) return;
    let dragging = false;
    const startScreen = { x: e.clientX, y: e.clientY };
    const origPos = { x: col.x, y: col.y };
    e.stopPropagation();

    const onMove = ev => {
      const dx = (ev.clientX - startScreen.x) / state.view.scale;
      const dy = (ev.clientY - startScreen.y) / state.view.scale;
      if (!dragging && Math.hypot(dx, dy) * state.view.scale > 4) {
        dragging = true;
        pushHistory();
        colEl.classList.add('dragging');
      }
      if (!dragging) return;
      col.x = origPos.x + dx;
      col.y = origPos.y + dy;
      colEl.style.left = col.x + 'px';
      colEl.style.top  = col.y + 'px';
      if (selectedBlock?.colId === col.id) renderToolbarFor(selectedBlock);
    };
    const onUp = () => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      colEl.classList.remove('dragging');
      if (dragging) save();
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });
}

function attachColumnResize(e, colEl, col) {
  e.stopPropagation();
  e.preventDefault();
  const startX = e.clientX;
  const startW = col.width || 320;
  pushHistory();
  const onMove = ev => {
    const dx = (ev.clientX - startX) / state.view.scale;
    col.width = clamp(Math.round(startW + dx), 220, 700);
    colEl.style.width = col.width + 'px';
  };
  const onUp = () => {
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    save();
    if (selectedBlock) renderToolbarFor(selectedBlock);
  };
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
}

function attachItemReorder(itemEl, col, item) {
  const grip = itemEl.querySelector('.item-grip');
  grip.addEventListener('pointerdown', e => {
    e.preventDefault();
    e.stopPropagation();
    let dragging = false;
    const start = { x: e.clientX, y: e.clientY };
    const onMove = ev => {
      if (!dragging && Math.hypot(ev.clientX - start.x, ev.clientY - start.y) > 4) {
        dragging = true;
        pushHistory();
        itemEl.classList.add('dragging');
      }
      if (!dragging) return;
      const items = [...itemEl.parentElement.querySelectorAll('.item')];
      items.forEach(i => i.classList.remove('drop-above', 'drop-below'));
      const target = items.find(i => {
        if (i === itemEl) return false;
        const r = i.getBoundingClientRect();
        return ev.clientY >= r.top && ev.clientY <= r.bottom;
      });
      if (target) {
        const r = target.getBoundingClientRect();
        const above = ev.clientY < r.top + r.height / 2;
        target.classList.add(above ? 'drop-above' : 'drop-below');
      }
    };
    const onUp = ev => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      const items = [...itemEl.parentElement.querySelectorAll('.item')];
      const target = items.find(i => i.classList.contains('drop-above') || i.classList.contains('drop-below'));
      items.forEach(i => i.classList.remove('drop-above', 'drop-below'));
      itemEl.classList.remove('dragging');
      if (dragging && target) {
        const fromIdx = col.items.findIndex(i => i.id === item.id);
        const above = target.classList.contains('drop-above');
        const targetId = target.dataset.itemId;
        if (fromIdx >= 0) {
          const [moved] = col.items.splice(fromIdx, 1);
          let toIdx = col.items.findIndex(i => i.id === targetId);
          if (toIdx < 0) toIdx = col.items.length;
          col.items.splice(above ? toIdx : toIdx + 1, 0, moved);
          save();
          render();
        }
      }
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });
}

function attachBlockCreation(dayCanvas, col, startH) {
  // Apple Calendar pattern: drag to create a sized block; double-click to create a 1-hour default; single click does nothing.
  dayCanvas.addEventListener('pointerdown', e => {
    if (e.target !== dayCanvas) return;
    if (e.button !== 0) return;
    e.stopPropagation();
    const rect = dayCanvas.getBoundingClientRect();
    const startY = (e.clientY - rect.top) / state.view.scale;
    const startMinAbs = startH * 60 + snap15(pxToMin(startY));
    let dragged = false;
    let endMinAbs = startMinAbs + 30;
    let historyPushed = false;
    let ghost = null;

    const startGhost = () => {
      historyPushed = true;
      pushHistory();
      ghost = document.createElement('div');
      ghost.className = 'block ghost';
      ghost.style.setProperty('--bc', COLORS[2].value);
      ghost.style.left = '2px';
      ghost.style.right = '2px';
      ghost.style.width = 'calc(100% - 4px)';
      ghost.style.top = minToPx(startMinAbs - startH * 60) + 'px';
      ghost.style.height = '14px';
      ghost.innerHTML = `<div class="block-label">new event</div><div class="block-time">${minToTimeStr(startMinAbs)}–${minToTimeStr(endMinAbs)}</div>`;
      dayCanvas.appendChild(ghost);
    };

    const onMove = ev => {
      if (!dragged && Math.hypot(ev.clientX - e.clientX, ev.clientY - e.clientY) > 4) {
        dragged = true;
        startGhost();
      }
      if (!dragged) return;
      const y = (ev.clientY - rect.top) / state.view.scale;
      const cur = startH * 60 + snap15(pxToMin(y));
      const a = Math.min(startMinAbs, cur);
      const b = Math.max(startMinAbs, cur === a ? cur + 15 : cur);
      ghost.style.top = minToPx(a - startH * 60) + 'px';
      ghost.style.height = Math.max(14, minToPx(b - a)) + 'px';
      ghost.querySelector('.block-time').textContent = `${minToTimeStr(a)}–${minToTimeStr(b)}`;
      endMinAbs = b;
    };
    const onUp = ev => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      if (!dragged) return; // single click does nothing — Apple Cal feel
      if (ghost) ghost.remove();
      const y = (ev.clientY - rect.top) / state.view.scale;
      const cur = startH * 60 + snap15(pxToMin(y));
      let a = Math.min(startMinAbs, cur);
      let b = Math.max(startMinAbs, cur);
      if (b - a < 15) b = a + 15;
      const minB = state.hourStart * 60, maxB = state.hourEnd * 60;
      a = clamp(a, minB, maxB - 15);
      b = clamp(b, a + 15, maxB);
      const blk = {
        id: uid(),
        startMin: a,
        endMin: b,
        label: '',
        note: '',
        color: COLORS[Math.floor(Math.random() * 4)].value,
      };
      col.blocks.push(blk);
      save();
      render();
      requestAnimationFrame(() => {
        selectBlock(col.id, blk.id);
        const lab = world.querySelector(`[data-block-id="${blk.id}"] .block-label`);
        if (lab) { lab.focus(); placeCaretAtEnd(lab); }
      });
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });

  dayCanvas.addEventListener('dblclick', e => {
    if (e.target !== dayCanvas) return;
    e.stopPropagation();
    const rect = dayCanvas.getBoundingClientRect();
    const y = (e.clientY - rect.top) / state.view.scale;
    let a = startH * 60 + snap15(pxToMin(y));
    let b = a + 60; // 1-hour default like Apple Cal
    const minB = state.hourStart * 60, maxB = state.hourEnd * 60;
    a = clamp(a, minB, maxB - 30);
    b = Math.min(maxB, a + 60);
    pushHistory();
    const blk = {
      id: uid(),
      startMin: a,
      endMin: b,
      label: '',
      note: '',
      color: COLORS[Math.floor(Math.random() * 4)].value,
    };
    col.blocks.push(blk);
    save();
    render();
    requestAnimationFrame(() => {
      selectBlock(col.id, blk.id);
      const lab = world.querySelector(`[data-block-id="${blk.id}"] .block-label`);
      if (lab) { lab.focus(); placeCaretAtEnd(lab); }
    });
  });
}

function attachBlockMove(blockEl, col, blk) {
  blockEl.addEventListener('pointerdown', e => {
    if (e.target.closest('.block-resize')) return;
    if (e.target.closest('.block-label')) return;
    if (e.target.closest('.block-note')) return;
    if (e.button !== 0) return;
    e.stopPropagation();

    const startY = e.clientY;
    const origStart = blk.startMin;
    const origEnd = blk.endMin;
    let movedFar = false;
    pushHistory();
    blockEl.classList.add('dragging');

    let crossTargetCol = null;

    const onMove = ev => {
      const dy = (ev.clientY - startY) / state.view.scale;
      if (!movedFar && Math.abs(dy * state.view.scale) > 3) movedFar = true;
      const dMin = snap15(pxToMin(dy));
      let newStart = origStart + dMin;
      let newEnd = origEnd + dMin;
      const minBound = state.hourStart * 60;
      const maxBound = state.hourEnd * 60;
      if (newStart < minBound) { newEnd += minBound - newStart; newStart = minBound; }
      if (newEnd > maxBound)   { newStart -= newEnd - maxBound; newEnd = maxBound; }
      blk.startMin = newStart;
      blk.endMin = newEnd;
      blockEl.style.top = minToPx(blk.startMin - state.hourStart * 60) + 'px';
      blockEl.querySelector('.block-time').textContent = `${minToTimeStr(blk.startMin)}–${minToTimeStr(blk.endMin)}`;

      const overEl = document.elementFromPoint(ev.clientX, ev.clientY);
      let dc = overEl?.closest('.day-canvas');
      if (dc && dc.dataset.colId === col.id) dc = null;
      world.querySelectorAll('.column').forEach(c => c.classList.remove('cross-drop'));
      if (dc) {
        const targetCol = state.columns.find(c => c.id === dc.dataset.colId);
        if (targetCol && targetCol.mode === 'day') {
          dc.closest('.column').classList.add('cross-drop');
          crossTargetCol = { col: targetCol, dayCanvas: dc };
        } else { crossTargetCol = null; }
      } else { crossTargetCol = null; }
    };
    const onUp = ev => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      blockEl.classList.remove('dragging');
      world.querySelectorAll('.column').forEach(c => c.classList.remove('cross-drop'));

      if (crossTargetCol && movedFar) {
        const tRect = crossTargetCol.dayCanvas.getBoundingClientRect();
        const yy = (ev.clientY - tRect.top) / state.view.scale;
        const dur = blk.endMin - blk.startMin;
        let newStart = state.hourStart * 60 + snap15(pxToMin(yy));
        const minB = state.hourStart * 60, maxB = state.hourEnd * 60;
        newStart = clamp(newStart, minB, maxB - dur);
        blk.startMin = newStart;
        blk.endMin = newStart + dur;
        col.blocks = col.blocks.filter(b => b.id !== blk.id);
        if (!crossTargetCol.col.blocks) crossTargetCol.col.blocks = [];
        crossTargetCol.col.blocks.push(blk);
        save();
        const newColId = crossTargetCol.col.id;
        render();
        selectBlock(newColId, blk.id);
        return;
      }

      save();
      if (selectedBlock?.blockId === blk.id) renderToolbarFor(selectedBlock);
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  });
}

function attachBlockResize(e, col, blk, edge, blockEl) {
  e.stopPropagation();
  e.preventDefault();
  const startY = e.clientY;
  const origStart = blk.startMin;
  const origEnd = blk.endMin;
  pushHistory();
  blockEl.classList.add('dragging');

  const onMove = ev => {
    const dy = (ev.clientY - startY) / state.view.scale;
    const dMin = snap15(pxToMin(dy));
    if (edge === 'top') {
      let newStart = origStart + dMin;
      newStart = Math.max(state.hourStart * 60, Math.min(blk.endMin - 15, newStart));
      blk.startMin = newStart;
    } else {
      let newEnd = origEnd + dMin;
      newEnd = Math.min(state.hourEnd * 60, Math.max(blk.startMin + 15, newEnd));
      blk.endMin = newEnd;
    }
    blockEl.style.top = minToPx(blk.startMin - state.hourStart * 60) + 'px';
    blockEl.style.height = Math.max(18, minToPx(blk.endMin - blk.startMin)) + 'px';
    blockEl.querySelector('.block-time').textContent = `${minToTimeStr(blk.startMin)}–${minToTimeStr(blk.endMin)}`;
  };
  const onUp = () => {
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    blockEl.classList.remove('dragging');
    save();
    if (selectedBlock?.blockId === blk.id) renderToolbarFor(selectedBlock);
  };
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
}

// ───────────── pan + zoom on main ─────────────
let spaceDown = false;
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat && !inEditable()) {
    spaceDown = true;
    main.classList.add('space-down');
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    spaceDown = false;
    main.classList.remove('space-down');
  }
});
function inEditable() {
  const a = document.activeElement;
  return a && (a.matches('[contenteditable="true"], input, textarea'));
}

main.addEventListener('pointerdown', e => {
  // pan if: middle mouse, or space+left, or background plain-left (i.e., not clicking a column / day-canvas / etc)
  const onColumn = e.target.closest('.column');
  const onWorld  = e.target === world || e.target === main;
  const wantsPan = e.button === 1 || (spaceDown && e.button === 0) || (!onColumn && (onWorld || e.target.classList?.contains('empty-state') || e.target.tagName === 'SPAN' && e.target.parentElement?.classList?.contains('empty-state')));
  if (!wantsPan) return;
  e.preventDefault();
  main.classList.add('panning');
  const startX = e.clientX, startY = e.clientY;
  const startTx = state.view.tx, startTy = state.view.ty;
  const onMove = ev => {
    state.view.tx = startTx + (ev.clientX - startX);
    state.view.ty = startTy + (ev.clientY - startY);
    applyTransform();
  };
  const onUp = () => {
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    main.classList.remove('panning');
    save();
  };
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
});

// wheel: ⌘/ctrl + scroll = zoom; trackpad pinch arrives as wheel + ctrlKey
main.addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    const factor = Math.pow(1.0015, -e.deltaY);
    setZoom(state.view.scale * factor, e.clientX, e.clientY);
    return;
  }
  // plain wheel = pan
  e.preventDefault();
  state.view.tx -= e.deltaX;
  state.view.ty -= e.deltaY;
  applyTransform();
  save();
}, { passive: false });

// ───────────── palette popover ─────────────
let openPalette = null;
function showPalette(anchor, current, onPick) {
  closePalette();
  const pal = document.createElement('div');
  pal.className = 'palette';
  const opts = [{ name: 'none', value: null }, ...COLORS];
  for (const c of opts) {
    const b = document.createElement('button');
    b.style.background = c.value || 'transparent';
    if (!c.value) {
      b.style.borderStyle = 'dashed';
      b.style.background = 'var(--paper)';
    }
    if ((current || null) === (c.value || null)) b.classList.add('active');
    b.title = c.name;
    b.addEventListener('click', () => { onPick(c.value); closePalette(); });
    pal.appendChild(b);
  }
  document.body.appendChild(pal);
  const r = anchor.getBoundingClientRect();
  pal.style.left = Math.min(window.innerWidth - 160, r.left) + 'px';
  pal.style.top  = (r.bottom + 6) + 'px';
  openPalette = pal;
  setTimeout(() => {
    document.addEventListener('pointerdown', closePaletteOnOutside, { once: true });
  }, 0);
}
function closePaletteOnOutside(e) {
  if (openPalette && !openPalette.contains(e.target)) closePalette();
  else if (openPalette) document.addEventListener('pointerdown', closePaletteOnOutside, { once: true });
}
function closePalette() {
  if (openPalette) { openPalette.remove(); openPalette = null; }
}
function closeAllPopovers() {
  closePalette();
  document.getElementById('menu')?.classList.remove('open');
}

document.addEventListener('pointerdown', e => {
  if (!selectedBlock) return;
  if (e.target.closest('.block')) return;
  if (e.target.closest('.block-toolbar')) return;
  deselectBlock();
});

// ───────────── helpers ─────────────
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function placeCaretAtEnd(el) {
  el.focus();
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}
function cssVarPx(name) {
  const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  return parseFloat(v) || 0;
}
function snap15(min) { return Math.round(min / 15) * 15; }
function pxToMin(px) { return (px / cssVarPx('--hour-h')) * 60; }
function minToPx(min) { return (min / 60) * cssVarPx('--hour-h'); }
function minToTimeStr(absMin) {
  const h = Math.floor(absMin / 60) % 24;
  const m = absMin % 60;
  const ampm = h < 12 ? 'a' : 'p';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${String(m).padStart(2,'0')}${ampm}`;
}
function formatHour(h) {
  const ampm = h < 12 ? 'AM' : 'PM';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12} ${ampm}`;
}
function isoDateToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isToday(iso) { return iso === isoDateToday(); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ───────────── add column ─────────────
document.getElementById('add-column').addEventListener('click', () => {
  pushHistory();
  // place new column near current viewport center in world coords
  const r = main.getBoundingClientRect();
  const w = screenToWorld(r.left + r.width / 2, r.top + 120);
  const isFirst = state.columns.length === 0;
  const col = {
    id: uid(),
    title: '',
    mode: isFirst ? 'list' : (state.columns[state.columns.length - 1].mode === 'list' ? 'day' : 'list'),
    items: [],
    blocks: [],
    date: isoDateToday(),
    x: Math.round(w.x - 160),
    y: Math.round(w.y),
  };
  state.columns.push(col);
  save();
  render();
  requestAnimationFrame(() => {
    const titleEl = world.querySelector(`[data-col-id="${col.id}"] .col-title`);
    if (titleEl) titleEl.focus();
  });
});

document.getElementById('import-file').addEventListener('change', async e => {
  const f = e.target.files[0];
  if (!f) return;
  try {
    const text = await f.text();
    const incoming = JSON.parse(text);
    if (!incoming.columns) throw new Error('not a todo export');
    pushHistory();
    state = { ...structuredClone(DEFAULT_STATE), ...incoming };
    if (!state.view) state.view = { tx: 0, ty: 0, scale: 1 };
    save();
    render();
    toast('imported');
  } catch (err) {
    toast('import failed: ' + err.message);

  render();
});
hEnd.addEventListener('change', () => {
  pushHistory();
  const v = clamp(parseInt(hEnd.value, 10) || 24, 1, 24);
  state.hourEnd = Math.max(v, state.hourStart + 1);
  hEnd.value = state.hourEnd;
  save();
  render();
});

// ───────────── keyboard ─────────────
window.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
    if (inEditable()) return;
    e.preventDefault();
    undo();
  }
  if ((e.metaKey || e.ctrlKey) && (e.key === '=' || e.key === '+')) {
    e.preventDefault();
    const r = main.getBoundingClientRect();
    setZoom(state.view.scale * 1.2, r.left + r.width/2, r.top + r.height/2);
  }
  if ((e.metaKey || e.ctrlKey) && e.key === '-') {
    e.preventDefault();
    const r = main.getBoundingClientRect();
    setZoom(state.view.scale / 1.2, r.left + r.width/2, r.top + r.height/2);
  }
  if ((e.metaKey || e.ctrlKey) && e.key === '0') {
    e.preventDefault();
    fitAll();
  }
  if (e.key === 'Escape') {
    deselectBlock();
    closeAllPopovers();
    if (inEditable() && document.activeElement.blur) document.activeElement.blur();
  }
  if (selectedBlock && (e.key === 'Backspace' || e.key === 'Delete')) {
    if (inEditable()) return;
    e.preventDefault();
    const col = state.columns.find(c => c.id === selectedBlock.colId);
    if (col) {
      pushHistory();
      col.blocks = col.blocks.filter(b => b.id !== selectedBlock.blockId);
      save();
      deselectBlock();
      render();
    }
  }
});

// ───────────── now line tick ─────────────
setInterval(() => {
  const hasToday = state.columns.some(c => c.mode === 'day' && isToday(c.date));
  if (hasToday) render();
}, 60_000);

function scrollDayColumnsToNow() {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  if (nowMin < state.hourStart * 60 || nowMin > state.hourEnd * 60) return;
  const offset = minToPx(nowMin - state.hourStart * 60) - 80;
  document.querySelectorAll('.column').forEach(colEl => {
    const colId = colEl.dataset.colId;
    const col = state.columns.find(c => c.id === colId);
    if (!col || col.mode !== 'day' || !isToday(col.date)) return;
    const body = colEl.querySelector('.col-body');
    if (body) body.scrollTop = Math.max(0, offset);
  });
}

// ───────────── minimap ─────────────
function renderMinimap() {
  const mc = document.getElementById('minimap-content');
  if (!mc) return;
  mc.innerHTML = '';
  if (state.columns.length === 0) return;
  // bbox of all columns
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const c of state.columns) {
    const w = c.width || 320;
    const el = world.querySelector(`[data-col-id="${c.id}"]`);
    const h = el ? el.getBoundingClientRect().height / state.view.scale : 400;
    minX = Math.min(minX, c.x);
    minY = Math.min(minY, c.y);
    maxX = Math.max(maxX, c.x + w);
    maxY = Math.max(maxY, c.y + h);
  }
  // include current viewport in bbox so the view rect always stays inside
  const r = main.getBoundingClientRect();
  const vw = r.width / state.view.scale;
  const vh = r.height / state.view.scale;
  const vx = -state.view.tx / state.view.scale;
  const vy = -state.view.ty / state.view.scale;
  minX = Math.min(minX, vx); minY = Math.min(minY, vy);
  maxX = Math.max(maxX, vx + vw); maxY = Math.max(maxY, vy + vh);

  const pad = 40;
  const bw = maxX - minX + pad * 2;
  const bh = maxY - minY + pad * 2;
  const mr = mc.getBoundingClientRect();
  const s = Math.min(mr.width / bw, mr.height / bh);
  const ox = -minX + pad;
  const oy = -minY + pad;

  for (const c of state.columns) {
    const el = world.querySelector(`[data-col-id="${c.id}"]`);
    const h = el ? el.getBoundingClientRect().height / state.view.scale : 400;
    const w = c.width || 320;
    const m = document.createElement('div');
    m.className = 'minimap-block';
    m.style.left = ((c.x + ox) * s) + 'px';
    m.style.top  = ((c.y + oy) * s) + 'px';
    m.style.width  = (w * s) + 'px';
    m.style.height = (h * s) + 'px';
    m.style.background = c.mode === 'day' ? 'var(--c-dustyblue)' : 'var(--ink-soft)';
    m.style.opacity = '0.6';
    mc.appendChild(m);
  }
  const view = document.createElement('div');
  view.className = 'minimap-view';
  view.style.left = ((vx + ox) * s) + 'px';
  view.style.top  = ((vy + oy) * s) + 'px';
  view.style.width  = (vw * s) + 'px';
  view.style.height = (vh * s) + 'px';
  mc.appendChild(view);
}

// click minimap to teleport
document.getElementById('minimap').addEventListener('click', e => {
  const mr = document.getElementById('minimap-content').getBoundingClientRect();
  const fx = (e.clientX - mr.left) / mr.width;
  const fy = (e.clientY - mr.top)  / mr.height;
  if (state.columns.length === 0) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const c of state.columns) {
    const w = c.width || 320;
    const el = world.querySelector(`[data-col-id="${c.id}"]`);
    const h = el ? el.getBoundingClientRect().height / state.view.scale : 400;
    minX = Math.min(minX, c.x); minY = Math.min(minY, c.y);
    maxX = Math.max(maxX, c.x + w); maxY = Math.max(maxY, c.y + h);
  }
  const r = main.getBoundingClientRect();
  const vw = r.width / state.view.scale;
  const vh = r.height / state.view.scale;
  const vx = -state.view.tx / state.view.scale;
  const vy = -state.view.ty / state.view.scale;
  minX = Math.min(minX, vx); minY = Math.min(minY, vy);
  maxX = Math.max(maxX, vx + vw); maxY = Math.max(maxY, vy + vh);
  const pad = 40;
  const wx = (minX - pad) + fx * (maxX - minX + pad * 2);
  const wy = (minY - pad) + fy * (maxY - minY + pad * 2);
  state.view.tx = r.width / 2 - wx * state.view.scale;
  state.view.ty = r.height / 2 - wy * state.view.scale;
  applyTransform();
  save();
});

// ───────────── seed if empty ─────────────
if (state.columns.length === 0) {

        { id: uid(), startMin: 11 * 60,       endMin: 12 * 60,      label: 'human element edit', note: '', color: '#8aa2b8' },
        { id: uid(), startMin: 14 * 60,       endMin: 15 * 60 + 30, label: 'newpress call', note: '', color: '#a08099' },
        { id: uid(), startMin: 17 * 60 + 30,  endMin: 19 * 60,      label: 'with the kids', note: '', color: '#c98a72' },

}

// ───────────── go ─────────────
render();

window.addEventListener('resize', () => {
  closePalette();

});
